<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gabriel's Repository">
  <defs>
    <linearGradient id="g-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#46e0c8"/>
      <stop offset="50%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#a978ff"/>
    </linearGradient>
    <linearGradient id="g-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g-mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a8f7e"/>
      <stop offset="50%" stop-color="#2f49c8"/>
      <stop offset="100%" stop-color="#6a34c0"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.6" flood-color="#0a0d14" flood-opacity="0.35"/>
    </filter>
    <clipPath id="clip-badge">
      <rect x="6" y="6" width="88" height="88" rx="24"/>
    </clipPath>
  </defs>

  <!-- Badge com gradiente -->
  <g clip-path="url(#clip-badge)">
    <rect x="6" y="6" width="88" height="88" fill="url(#g-badge)"/>
    <rect x="6" y="6" width="88" height="88" fill="url(#g-top)"/>
    <rect x="-50" y="2" width="24" height="96" fill="#ffffff" fill-opacity="0.16" transform="skewX(-18)">
      <animate attributeName="x" values="-50;130" dur="4.5s" repeatCount="indefinite"
               calcMode="spline" keyTimes="0;1" keySplines="0.45 0 0.2 1"/>
    </rect>

    <!-- G grande (protagonista), atrás da pasta -->
    <g fill="none" stroke="url(#g-mono)" stroke-width="11.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
      <path d="M 64.91 28.7 A 26 26 0 1 0 76 50 L 47 50"/>
    </g>

    <!-- Pasta translúcida (vidro) por cima do G
         laterais/fundo coincidem com o G (x 18.25..81.75, fundo 81.75) e abertura no meio do G (y=50) -->
    <g>
      <path d="M 24.25 44 L 44 44 L 50 50 L 75.75 50 Q 81.75 50 81.75 56
               L 81.75 75.75 Q 81.75 81.75 75.75 81.75 L 24.25 81.75 Q 18.25 81.75 18.25 75.75
               L 18.25 50 Q 18.25 44 24.25 44 Z"
            fill="#ffffff" fill-opacity="0.28" stroke="#ffffff" stroke-opacity="0.55" stroke-width="1.3"/>
      <path d="M 50 50 L 75.75 50" stroke="#ffffff" stroke-width="1" stroke-opacity="0.45"/>
    </g>
  </g>

  <!-- Borda do badge -->
  <rect x="6.5" y="6.5" width="87" height="87" rx="23.5" fill="none" stroke="#ffffff" stroke-opacity="0.25"/>
</svg>
