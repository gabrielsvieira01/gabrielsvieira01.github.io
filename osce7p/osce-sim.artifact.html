<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador OSCE — Conduta sob pressão</title>
<style>
  :root{
    --bg:#0f1419; --bg2:#161d26; --card:#1c2530; --card2:#222d3a;
    --ink:#e7eef6; --ink-dim:#9fb0c3; --line:#2c3a4a;
    --accent:#3aa0ff; --accent-2:#1d7fe0;
    --ok:#27c08a; --warn:#f5b53d; --bad:#ff5d73; --crit:#ff3860;
    /* cores de monitor por parâmetro */
    --m-hr:#39e08b; --m-spo2:#36d6ff; --m-bp:#ff6b81; --m-rr:#ffd166;
    --m-temp:#ff9f43; --m-default:#dfe9f3;
    --radius:14px; --mono:'SF Mono',ui-monospace,'Cascadia Code',Consolas,monospace;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3,h4{line-height:1.2;margin:.2em 0 .5em}
  a{color:var(--accent)}
  .wrap{max-width:1180px;margin:0 auto;padding:18px}
  .hidden{display:none !important}

  /* ---------- TELA DE ENTRADA ---------- */
  .home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px}
  .home h1{font-size:clamp(28px,5vw,46px);margin-bottom:6px;letter-spacing:-.5px}
  .home .sub{color:var(--ink-dim);max-width:560px;margin-bottom:34px}
  .home .menu{display:grid;gap:16px;width:100%;max-width:760px;grid-template-columns:repeat(3,1fr)}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:26px 18px;text-align:left;transition:.15s;color:var(--ink)}
  .tile:hover{border-color:var(--accent);transform:translateY(-3px);background:var(--card2)}
  .tile .ic{font-size:30px;display:block;margin-bottom:10px}
  .tile b{display:block;font-size:18px;margin-bottom:4px}
  .tile span{color:var(--ink-dim);font-size:13.5px}
  .home .foot{margin-top:30px;color:var(--ink-dim);font-size:13px;display:flex;gap:18px;flex-wrap:wrap;justify-content:center;align-items:center}
  .pill{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12.5px}
  .dot{width:8px;height:8px;border-radius:50%}

  /* ---------- TOPBAR ---------- */
  .topbar{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--bg2);position:sticky;top:0;z-index:30}
  .topbar .back{background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:8px 12px;font-size:14px}
  .topbar .ttl{font-weight:600}
  .topbar .spacer{flex:1}
  /* botão global do narrador */
  .narr-btn{background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:999px;padding:7px 13px;font-size:13px;font-weight:600;white-space:nowrap}
  .narr-btn:hover{border-color:var(--accent)}
  .narr-btn.off{color:var(--ink-dim);opacity:.85}
  .home .foot .narr-btn{font-weight:500}
  .clock{font-family:var(--mono);font-size:20px;font-weight:700;padding:6px 12px;border-radius:10px;background:#101820;border:1px solid var(--line)}
  .clock.warn{color:var(--warn);border-color:var(--warn)}
  .clock.bad{color:var(--bad);border-color:var(--bad);animation:pulse 1s infinite}
  .clock .lbl{font-size:10px;color:var(--ink-dim);font-weight:600;letter-spacing:.5px;display:block;text-align:center;font-family:var(--sans)}
  @keyframes pulse{50%{opacity:.55}}

  .btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14.5px;font-weight:600}
  .btn:hover{background:var(--accent-2)}
  .btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
  .btn.ghost:hover{border-color:var(--accent)}
  .btn.sm{padding:7px 12px;font-size:13px}
  .btn:disabled{opacity:.5;cursor:not-allowed}

  /* ---------- SETUP ---------- */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .panel h2{margin-top:0}
  .field{margin:14px 0}
  .field label{display:block;font-size:13px;color:var(--ink-dim);margin-bottom:6px;font-weight:600}
  select,input[type=number],input[type=text],textarea{width:100%;background:#101820;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit}
  textarea{resize:vertical;min-height:54px}
  .radio-row{display:flex;gap:10px;flex-wrap:wrap}
  .radio-row label{display:flex;align-items:center;gap:8px;background:#101820;border:1px solid var(--line);padding:10px 14px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--ink)}
  .radio-row label.on{border-color:var(--accent);background:#13202e}
  .case-list{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
  .case-card{background:#101820;border:1px solid var(--line);border-radius:12px;padding:14px;text-align:left;color:var(--ink)}
  .case-card:hover{border-color:var(--accent)}
  .case-card .tag{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-dim)}
  .case-card b{display:block;margin:4px 0;font-size:15px}
  .areabar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .chip{background:var(--card);border:1px solid var(--line);color:var(--ink-dim);border-radius:999px;padding:6px 13px;font-size:13px}
  .chip.on{background:#13202e;border-color:var(--accent);color:var(--ink)}

  /* ---------- LAYOUT DO CASO ---------- */
  .case-grid{display:grid;gap:14px;grid-template-columns:340px 1fr 300px;align-items:start;padding:14px 18px}
  .col{display:flex;flex-direction:column;gap:14px;min-width:0}
  .section-h{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-dim);font-weight:700;margin:0 0 4px}

  /* monitor */
  .monitor{background:#05080b;border:1px solid #1d2a36;border-radius:14px;padding:12px;box-shadow:inset 0 0 40px rgba(0,40,80,.15)}
  .monitor .vit-grid{display:grid;gap:8px;grid-template-columns:1fr 1fr}
  .vit{background:#0a0f14;border:1px solid #16222e;border-radius:10px;padding:9px 11px;position:relative;overflow:hidden}
  .vit .k{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:#7d93a8;font-weight:700}
  .vit .v{font-family:var(--mono);font-size:27px;font-weight:700;line-height:1.05;color:var(--m-default);margin-top:2px;word-break:break-word}
  .vit .u{font-size:11px;color:#7d93a8}
  .vit .note{font-size:10.5px;color:#8aa0b4;margin-top:2px;line-height:1.25}
  .vit.full{grid-column:1/-1}
  .vit.abn{border-color:var(--bad);box-shadow:0 0 0 1px var(--bad) inset, 0 0 14px rgba(255,93,115,.25)}
  .vit.abn .v{color:var(--bad)}
  .vit.abn::after{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:var(--bad)}
  .vit .k::after{content:attr(data-flash)}
  .vit.t-hr .v{color:var(--m-hr)} .vit.t-spo2 .v{color:var(--m-spo2)}
  .vit.t-bp .v{color:var(--m-bp)} .vit.t-rr .v{color:var(--m-rr)} .vit.t-temp .v{color:var(--m-temp)}
  .vit.t-hr.abn .v,.vit.t-spo2.abn .v,.vit.t-bp.abn .v,.vit.t-rr.abn .v,.vit.t-temp.abn .v{color:var(--bad)}
  .ecg{height:36px;margin-top:8px}
  .ecg path{stroke:var(--m-hr);stroke-width:2;fill:none}

  /* exames */
  .exam{background:#0a0f14;border:1px solid #16222e;border-radius:10px;padding:10px 12px}
  .exam .en{font-weight:700;font-size:13.5px;color:var(--ink);text-transform:capitalize}
  .exam .er{font-size:13px;color:var(--ink-dim);margin-top:4px;white-space:pre-wrap}
  .exam.na{border-style:dashed;color:var(--ink-dim)}
  .exam-sub{margin:3px 0 0;padding-left:12px;font-size:12.5px;color:var(--ink-dim)}
  .exam-empty{color:var(--ink-dim);font-size:13px;font-style:italic}

  /* feed central */
  .feed{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;min-height:240px;display:flex;flex-direction:column;gap:12px}
  .msg{padding:11px 13px;border-radius:12px;font-size:14.5px}
  .msg.scenario{background:#13202e;border:1px solid #1d3346}
  .msg.you{background:#15212c;border:1px solid var(--line);align-self:flex-end;max-width:88%}
  .msg.you .who{color:var(--accent)}
  .msg.exam-r{background:#101a14;border:1px solid #1c3326}
  .msg.consequence{background:#1a1410;border:1px solid #3a2a1c}
  .msg.probe{background:#191527;border:1px solid #2e2747;color:#cfc6ee}
  .msg.sys{background:transparent;color:var(--ink-dim);font-size:13px;text-align:center}
  .msg .who{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-dim);font-weight:700;margin-bottom:3px;display:block}
  .msg.consequence .who{color:var(--warn)}
  .turnbadge{font-size:11px;color:var(--ink-dim);font-family:var(--mono)}

  /* input */
  .inputbar{display:flex;gap:8px;align-items:flex-end;padding:12px 18px;border-top:1px solid var(--line);background:var(--bg2);position:sticky;bottom:0}
  .inputbar textarea{flex:1}
  .iconbtn{width:46px;height:46px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .iconbtn:hover{border-color:var(--accent)}
  .iconbtn.rec{background:var(--bad);border-color:var(--bad);color:#fff;animation:pulse 1s infinite}
  .inputbar .send{height:46px}
  .hint{font-size:12px;color:var(--ink-dim);padding:0 18px 10px}
  .thinking{display:inline-flex;gap:4px}
  .thinking i{width:7px;height:7px;border-radius:50%;background:var(--ink-dim);animation:bounce 1.2s infinite}
  .thinking i:nth-child(2){animation-delay:.2s} .thinking i:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:16px;max-width:680px;width:100%;max-height:86vh;overflow:auto;padding:22px}
  .modal h3{margin-top:0}
  .modal .x{float:right;background:none;border:none;color:var(--ink-dim);font-size:22px}

  /* debrief */
  .debrief{padding:18px}
  .score-hero{display:flex;gap:18px;align-items:center;flex-wrap:wrap;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
  .score-ring{--p:0;width:108px;height:108px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(var(--ringc) calc(var(--p)*1%), #223 0);display:flex;align-items:center;justify-content:center}
  .score-ring .inner{width:86px;height:86px;border-radius:50%;background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-ring .pct{font-size:26px;font-weight:800;font-family:var(--mono)}
  .score-ring .pl{font-size:10px;color:var(--ink-dim)}
  .grid2{display:grid;gap:14px;grid-template-columns:1fr 1fr}
  .timeline{position:relative;padding-left:6px}
  .tl-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .tl-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:3px;border:2px solid}
  .tl-dot.ok{background:var(--ok);border-color:var(--ok)} .tl-dot.early{background:var(--warn);border-color:var(--warn)}
  .tl-dot.late{background:var(--warn);border-color:var(--warn)} .tl-dot.bad{background:var(--bad);border-color:var(--bad)}
  .tl-dot.neutral{background:var(--ink-dim);border-color:var(--ink-dim)}
  .tl-body .what{font-size:14px;font-weight:600}
  .tl-body .why{font-size:12.5px;color:var(--ink-dim)}
  .tl-mark{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:999px;align-self:flex-start;margin-top:2px}
  .mk-ok{color:var(--ok);background:rgba(39,192,138,.12)} .mk-early{color:var(--warn);background:rgba(245,181,61,.12)}
  .mk-late{color:var(--warn);background:rgba(245,181,61,.12)} .mk-bad{color:var(--bad);background:rgba(255,93,115,.12)}
  .mk-neutral{color:var(--ink-dim);background:rgba(159,176,195,.12)}
  /* fluxo-gabarito */
  .flow{display:flex;flex-direction:column;gap:0}
  .flow-step{display:flex;gap:12px;align-items:stretch}
  .flow-rail{display:flex;flex-direction:column;align-items:center;width:26px;flex-shrink:0}
  .flow-node{width:22px;height:22px;border-radius:50%;border:2px solid var(--line);background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink-dim)}
  .flow-line{flex:1;width:2px;background:var(--line);min-height:14px}
  .flow-step.hit .flow-node{border-color:var(--ok);background:var(--ok);color:#04140d}
  .flow-step.miss .flow-node{border-color:var(--bad);color:var(--bad)}
  .flow-step.hit .flow-line{background:var(--ok)}
  .flow-card{flex:1;background:#101820;border:1px solid var(--line);border-radius:10px;padding:9px 12px;margin-bottom:8px;cursor:pointer}
  .flow-step.hit .flow-card{border-color:rgba(39,192,138,.45)}
  .flow-step.miss .flow-card{border-color:rgba(255,93,115,.4)}
  .flow-card .fc-t{font-size:13.5px;font-weight:600}
  .flow-card .fc-s{font-size:11.5px;color:var(--ink-dim);margin-top:2px}
  .flow-card .fc-detail{display:none;margin-top:8px;font-size:12.5px;color:var(--ink-dim);border-top:1px dashed var(--line);padding-top:8px;white-space:pre-wrap}
  .flow-card.open .fc-detail{display:block}
  .legend{display:flex;gap:14px;font-size:12px;color:var(--ink-dim);margin:6px 0 12px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  . point-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}
  .point-row .pv.pos{color:var(--ok)} .point-row .pv.neg{color:var(--bad)}

  /* resumos */
  .md{max-width:820px;margin:0 auto;padding:8px 18px 60px}
  .md h1{font-size:30px;border-bottom:1px solid var(--line);padding-bottom:10px}
  .md h2{font-size:22px;margin-top:30px}
  .md h3{font-size:18px;margin-top:22px}
  .md table{border-collapse:collapse;width:100%;margin:14px 0;font-size:14px}
  .md th,.md td{border:1px solid var(--line);padding:8px 10px;text-align:left}
  .md th{background:var(--card2)}
  .md blockquote{border-left:3px solid var(--accent);margin:14px 0;padding:6px 14px;background:var(--card);color:var(--ink-dim);border-radius:0 8px 8px 0}
  .md code{background:#101820;padding:2px 6px;border-radius:6px;font-family:var(--mono);font-size:13px}
  .md pre{background:#101820;padding:12px;border-radius:10px;overflow:auto}
  .md ul,.md ol{padding-left:22px}
  .md li{margin:4px 0}
  .md hr{border:none;border-top:1px solid var(--line);margin:24px 0}
  .mermaid{background:#0c1218;border:1px solid var(--line);border-radius:12px;padding:14px;margin:16px 0;text-align:center;overflow:auto}
  .topiclist{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}

  /* tracking */
  .track-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px}
  .track-bar{flex:1;height:10px;background:#101820;border-radius:6px;overflow:hidden}
  .track-bar i{display:block;height:100%;border-radius:6px}
  .track-row .tn{width:200px;font-size:13.5px}
  .track-row .tp{font-family:var(--mono);font-size:13px;width:70px;text-align:right}

  @media(max-width:920px){
    .case-grid{grid-template-columns:1fr}
    .home .menu{grid-template-columns:1fr}
    .grid2{grid-template-columns:1fr}
    .monitor .vit-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
const App = (() => {

  // ---- FLAG DE MOCK: única coisa a trocar pra ativar a IA real no artifact ----
  const USE_MOCK_AI = false;   // <— no artifact da claude.ai, mude para false
  const MODELO_IA = "claude-sonnet-4-6";

  // ----------------------------- DADOS -----------------------------
  function carregarCasos(){
    const out = [];
    document.querySelectorAll("script.dados-caso").forEach(s=>{
      try{ const arr = JSON.parse(s.textContent); (Array.isArray(arr)?arr:[arr]).forEach(c=>out.push(c)); }
      catch(e){ console.error("Caso inválido:", e); }
    });
    return out;
  }
  function carregarResumos(){
    const out = [];
    document.querySelectorAll("script.dados-resumo").forEach(s=>{
      out.push({ topico:s.dataset.topico, area:s.dataset.area||"", titulo:s.dataset.titulo||s.dataset.topico, md:s.textContent });
    });
    return out;
  }
  // Preenchidos em carregarDados() (no boot). Mutados por push() para que a
  // referência exportada em _casos continue válida.
  const CASOS = [];
  const RESUMOS = [];
  const AREA_LABEL = { neonatal:"Neonatal", obstetricia:"Obstetrícia", pals:"PALS / Pediatria" };

  // Artifact: dados vêm comprimidos (gzip+base64) num <script id="dados-gz">.
  // Dev/local: dados vêm dos blocos <script class="dados-*">. Auto-detecta.
  async function decompB64Gz(b64){
    const clean = b64.replace(/\s+/g,"");
    const bin = atob(clean); const bytes = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
    if(typeof DecompressionStream==="undefined") throw new Error("Este navegador não suporta DecompressionStream — use o Chrome/Edge atual.");
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream("gzip"));
    const buf = await new Response(stream).arrayBuffer();
    return JSON.parse(new TextDecoder("utf-8").decode(buf));
  }
  async function carregarDados(){
    const gz = document.getElementById("dados-gz");
    if(gz && gz.textContent.trim()){
      const bundle = await decompB64Gz(gz.textContent);
      (bundle.casos||[]).forEach(c=>CASOS.push(c));
      (bundle.resumos||[]).forEach(r=>RESUMOS.push(r));
    } else {
      carregarCasos().forEach(c=>CASOS.push(c));
      carregarResumos().forEach(r=>RESUMOS.push(r));
    }
  }

  // --------------------------- PERSISTÊNCIA -------------------------
  // window.storage só existe no artifact. Local: shim em localStorage.
  const PER_USER = false; // 3º parâmetro do window.storage = "por usuário"
  const store = (typeof window!=="undefined" && window.storage) ? window.storage : {
    async set(k,v){ try{ localStorage.setItem("osce:"+k, JSON.stringify(v)); }catch(e){} },
    async get(k){ try{ const r=localStorage.getItem("osce:"+k); return r?JSON.parse(r):null; }catch(e){ return null; } },
    async list(pfx){ const r=[]; try{ for(let i=0;i<localStorage.length;i++){ const key=localStorage.key(i); if(key.startsWith("osce:"+pfx)) r.push(key.slice(5)); } }catch(e){} return r; }
  };
  const TRACK_PFX = "track_";
  async function carregarTracking(){
    const map = {};
    try{
      const keys = await store.list(TRACK_PFX, PER_USER);
      for(const k of keys){ const v = await store.get(k, PER_USER); if(v) map[v.topico||k] = v; }
    }catch(e){ console.warn("tracking:", e); }
    return map;
  }
  async function salvarTracking(topico, area, ganho, max){
    const key = TRACK_PFX+topico;
    let cur = await store.get(key, PER_USER) || { topico, area, soma:0, max:0, tentativas:0 };
    cur.soma += ganho; cur.max += max; cur.tentativas += 1; cur.area = area; cur.atualizado = Date.now();
    await store.set(key, cur, PER_USER);
  }

  // ------------------------------ ESTADO ----------------------------
  const app = { root:document.getElementById("app"), screen:"home", sessao:null, modal:null, narracaoOn:true };
  const NARR_KEY = "pref_narracao";

  // --------------------------- HELPERS UI ---------------------------
  const esc = s => String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const humanize = k => k.replace(/_/g," ").replace(/\b\w/g,m=>m.toUpperCase()).replace(/\bFc\b/,"FC").replace(/\bFr\b/,"FR").replace(/\bPa\b/,"PA").replace(/\bPam\b/,"PAM").replace(/\bSato2\b/i,"SatO₂").replace(/\bTec\b/,"TEC").replace(/\bIg\b/,"IG").replace(/\bBcf\b/,"BCF");
  const el = (html)=>{ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; };

  // heurística: parâmetro fora da faixa normal?
  const ABN_RE = /(taqui|bradi|hipo|hiper|cianose|cian[oó]tic|apneia|apn[eé]ia|choque|grave|insufici|acidose|\brisco\b|hipov|sonol|palidez|edema|desconforto|reten|febre|sibil|crepit|sangr|hemorrag|dist[oó]c|sofrimento|colapso|m[aá] perfus|n[aã]o mensur|diminu[ií]|prolongad|ausent|instáv|< ?\d|gemente|tiragem)/i;
  function isAbnormal(valStr){ return ABN_RE.test(String(valStr||"")); }
  function numOf(v){ const m=String(v).replace(/\.(?=\d{3}\b)/g,"").match(/\d{1,3}([.,]\d+)?/); return m?parseFloat(m[0].replace(",",".")):null; }
  // anormal = palavra-chave OU piso numérico universal (independente de idade) p/ os perigos óbvios
  function abnormalVital(k,v){
    if(isAbnormal(v)) return true;
    const tp=tipoParam(k), n=numOf(v); if(n==null) return false;
    if(tp==="hr"  && (n<60 || n>205)) return true;
    if(tp==="spo2"&& n<92) return true;
    if(tp==="rr"  && (n>60 || n<8)) return true;
    if(tp==="temp"&& (n>=38 || n<35.5)) return true;
    return false;
  }
  // cor do parâmetro no monitor por nome de chave
  function tipoParam(k){
    const x=k.toLowerCase();
    if(/^fc|freq.*card|bcf/.test(x)) return "hr";
    if(/sato2|spo2|sat/.test(x)) return "spo2";
    if(/^pa\b|press|pam/.test(x)) return "bp";
    if(/^fr|resp|irpm/.test(x)) return "rr";
    if(/temp/.test(x)) return "temp";
    return "";
  }
  // extrai número grande + resto pra exibição
  function splitValor(v){
    const s=String(v);
    const m=s.match(/^([0-9]+[.,]?[0-9]*\s*[–\-/]?\s*[0-9]*\s*[%a-zA-Z°ºµ/]*)\s*(.*)$/);
    if(m && /[0-9]/.test(m[1])) return { big:m[1].trim(), note:(m[2]||"").trim() };
    return { big:s.length>16? s.slice(0,16)+"…": s, note: s.length>16? s : "" };
  }

  // ============================ ROTEADOR ============================
  function go(screen, data){ cancelarFala(); app.screen=screen; render(screen, data); wireNarr(); window.scrollTo(0,0); }
  function render(screen, data){
    closeModal();
    if(screen==="home") return renderHome();
    if(screen==="resumos") return renderResumosLista();
    if(screen==="resumo") return renderResumo(data);
    if(screen==="estudo-setup") return renderEstudoSetup();
    if(screen==="osce-setup") return renderOsceSetup();
    if(screen==="caso") return renderCaso();
    if(screen==="debrief") return renderDebrief(data);
    if(screen==="tracking") return renderTracking();
  }

  // ============================== HOME =============================
  function renderHome(){
    app.root.innerHTML = `
    <div class="home">
      <h1>Simulador OSCE</h1>

  function iniciarCasoAtual(){
    const s=app.sessao, caso=s.casos[s.idx];
    s.atual = {
      caso,
      estado: JSON.parse(JSON.stringify(caso.estado_inicial||{})),
      historico: [],          // {texto, res}
      examesRevelados: [],     // {nome, valor}
      turno:0,
      fase: (s.leituraSeg? "leitura":"conduta"),
      encerrado:false,
      pontos:[], penalidades:[]

  function drawMonitor(){

    let html=`<div class="vit-grid">`;

      const v=st0[k]; if(v==null||v==="") return;
      const tp=tipoParam(k), abn=abnormalVital(k,v);
      const sv=splitValor(v);
      const wide = sv.big.length>9 || /respira|cor|tonus|conscien|ausculta|edema|extremidad|gatilho|alergia/i.test(k);
      html+=`<div class="vit ${tp?'t-'+tp:''} ${abn?'abn':''} ${wide?'full':''}">

        <div class="v">${esc(sv.big)}</div>
        ${sv.note?`<div class="note">${esc(sv.note)}</div>`:""}

  // -------------------- SUBMETER CONDUTA --------------------
  let avaliando=false;
  async function submitConduta(){
    const st=app.sessao.atual; if(st.encerrado||avaliando||st.fase==="leitura") return;
    const ta=app.root.querySelector("#conduta"); const texto=(ta.value||"").trim();
    if(!texto) return;
    ta.value=""; ta.style.height="auto";
    st.turno++;
    pushMsg("you","Você",texto);
    avaliando=true;
    const thinking=pushMsg("sys","",""); if(thinking) thinking.innerHTML=`<div class="thinking"><i></i><i></i><i></i></div>`;
    let res;
    try{ res = await avaliarConduta(st, texto); }
    catch(e){ console.error(e); res={ classe:"erro_ia", consequencia_narrativa:"Falha ao avaliar (IA indisponível no teste local)." }; }
    if(thinking) thinking.remove();
    avaliando=false;
    aplicarResultado(st, texto, res);
  }

  // -------------------- APLICAR RESULTADO --------------------
  function aplicarResultado(st, texto, res){
    st.historico.push({ texto, res, turno:st.turno });
    // acumula pontos/penalidades
    (res.pontos_ganhos||[]).forEach(p=>st.pontos.push(p));
    (res.penalidades_aplicadas||[]).forEach(p=>st.penalidades.push(p));

    if(res.classe==="exame"){
      revelarExame(st, res);
    } else if(res.classe==="encerramento"){
      // examinador não corrige; encerra
      pushMsg("sys","", res.consequencia_narrativa||"Você declara o encerramento do caso.");
      return encerrarCaso("declaracao");
    } else if(res.classe==="nao_reconhecida"){
      pushMsg("probe","Examinador", res.sondagem||"Não entendi a conduta. Pode reformular?");
      return;
    }

    // consequência clínica (intervenção)
    if(res.novo_estado && typeof res.novo_estado==="object"){
      Object.entries(res.novo_estado).forEach(([k,v])=>{ if(v!=null&&v!=="") st.estado[k]=v; });
      drawMonitor();
    }
    if(res.consequencia_narrativa && res.classe!=="exame"){
      pushMsg("consequence","Evolução do paciente", res.consequencia_narrativa);
      narrar(res.consequencia_narrativa);
    }
    // sondagem neutra do examinador (sem revelar acerto)
    if(res.sondagem){ pushMsg("probe","Examinador", res.sondagem); }
  }

  function revelarExame(st, res){
    const caso=st.caso, ex=caso.exames_disponiveis||{};
    const chave = res.exame_chave;
    let achou=null, nomeReal=chave;
    if(chave && ex[chave]!=null){ achou=ex[chave]; }
    else {
      // tenta casar por similaridade de nome
      const alvo=(chave||res.conduta_reconhecida||"").toLowerCase().replace(/[^a-z0-9]/g,"");
      for(const k of Object.keys(ex)){
        if(k==="NOTA") continue;
        const kk=k.toLowerCase().replace(/[^a-z0-9]/g,"");
        if(alvo&&(kk.includes(alvo)||alvo.includes(kk))){ achou=ex[k]; nomeReal=k; break; }
      }
    }
    if(achou==null){
      st.examesRevelados.push({ nome:(chave||res.conduta_reconhecida||"exame"), na:true });
      pushMsg("exam-r","Resultado de exame", `"${chave||res.conduta_reconhecida||'exame'}" — não disponível neste caso.`);
    } else {
      if(!st.examesRevelados.some(e=>e.nome===nomeReal)){
        st.examesRevelados.push({ nome:nomeReal, valor:achou });
      }
      const resumo = typeof achou==="object" ? Object.entries(achou).map(([k,v])=>`${humanize(k)}: ${v}`).join(" · ") : achou;
      pushMsg("exam-r","Resultado: "+humanize(nomeReal), resumo);
    }
    drawExames();
  }

  function openCasoModal(caso){
    openModal(`<button class="x" data-x>×</button><h3>Caso clínico</h3>
      <p><b>Comando:</b> ${esc(caso.comando)}</p>

  // ============================ AVALIAÇÃO (IA) ============================
  async function avaliarConduta(st, texto){
    if(USE_MOCK_AI) return mockAvaliar(st, texto);
    const prompt = montarPrompt(st, texto);
    const resp = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ model:MODELO_IA, max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    const data = await resp.json();
    const txt = data.content[0].text;
    return parseRespostaIA(txt);
  }

  function montarPrompt(st, texto){
    const caso=st.caso;
    const estadoStr = JSON.stringify(st.estado, null, 0);
    const histStr = st.historico.map((h,i)=>`${i+1}. "${h.texto}" → ${h.res&&h.res.conduta_reconhecida||"?"}`).join("\n") || "(nenhuma ainda)";
    const condutas = JSON.stringify(caso.condutas_esperadas);
    const exames = JSON.stringify(Object.keys(caso.exames_disponiveis||{}));
    const pont = JSON.stringify(caso.pontuacao||{});
    return `Você é o EXAMINADOR de uma prova oral OSCE de medicina. Avalie UMA conduta do aluno, em silêncio didático (não corrija, não elogie — apenas aplique a consequência clínica e, se faltar complemento, sonde de forma neutra).

CASO (área: ${caso.area}; tópico: ${caso.topico}):
Comando: ${caso.comando}

ESTADO ATUAL DO PACIENTE (JSON):
${estadoStr}

CONDUTAS JÁ REALIZADAS PELO ALUNO:
${histStr}

REGRAS DO CASO — condutas esperadas (grafo de dependências, com ordem, pré-requisitos, qualificadores exigidos, efeito e consequências):
${condutas}

EXAMES DISPONÍVEIS (apenas estas chaves existem; qualquer outro = não disponível, NUNCA invente resultado):
${exames}

TABELA DE PONTUAÇÃO (use EXATAMENTE estas chaves ao pontuar):
${pont}

CONDUTA QUE O ALUNO ACABOU DE DAR:
"${texto}"

Responda SOMENTE com um objeto JSON (sem texto fora dele, sem cercas de código) com estes campos:
{
 "conduta_reconhecida": "string curta do que o aluno quis fazer (entenda sinônimos: 'ambuzar'='VPP')",
 "classe": "intervencao" | "exame" | "encerramento" | "nao_reconhecida",
 "exame_chave": "se classe=exame, a chave exata da lista de exames, senão null",
 "acerto_conceito": true|false,
 "ordem_adequada": true|false,
 "pre_requisitos_cumpridos": true|false,
 "qualificadores": {"dose":"ok|faltou|errado|na","via":"ok|faltou|errado|na","frequencia":"ok|faltou|errado|na"},
 "match_ordem": número da conduta esperada que melhor corresponde (ou null),
 "gravidade_erro": 0|1|2|3,
 "sondagem": "pergunta neutra pedindo complemento que faltou (dose? via?) ou null",
 "consequencia_narrativa": "1-2 frases do que acontece com o paciente após esta conduta (o paciente melhora/piora conforme acerto, ordem e qualificadores). Sem corrigir.",
 "novo_estado": { "apenas as chaves de sinais vitais que mudaram, com o novo valor como string" },
 "pontos_ganhos": [ {"chave":"<chave da tabela passos_criticos>","valor":<n>} ],
 "penalidades_aplicadas": [ {"chave":"<chave da tabela penalidades>","valor":<n negativo>} ]
}`;
  }

  function parseRespostaIA(txt){
    let s=String(txt||"").trim();
    s=s.replace(/^```(?:json)?/i,"").replace(/```$/,"").trim();
    const i=s.indexOf("{"), j=s.lastIndexOf("}");
    if(i>=0&&j>i) s=s.slice(i,j+1);
    try{ return JSON.parse(s); }
    catch(e){ console.warn("parse IA falhou:",e,txt); return { classe:"nao_reconhecida", sondagem:"Não consegui interpretar. Pode reformular a conduta?" }; }
  }

  // -------------------- MOCK DA IA (só teste local) --------------------
  // Casa o texto do aluno com a melhor conduta esperada por palavras-chave,
  // e sintetiza a resposta no MESMO formato da IA real.
  function mockAvaliar(st, texto){
    return new Promise(resolve=>{
      setTimeout(()=>resolve(_mock(st,texto)), 420);
    });
  }
  const STOP=new Set("a o e de da do com para por no na em que se um uma os as ao aos e/ou ou faco faço fazer pedir peco peço solicito dar dou o paciente bebe rn".split(" "));
  function tokens(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9 ]/g," ").split(/\s+/).filter(w=>w.length>2&&!STOP.has(w)); }
  function _mock(st, texto){
    const caso=st.caso, t=texto.toLowerCase();
    // encerramento? Exige VERBO de finalização — "aciono/chamo a UTI" (convocar equipe) NÃO encerra.
    if(/\b(encaminho|encaminhar|transfiro|transferir|interno|internar|encerro|encerrar|terminei|terminar|finalizo|finalizar|finalizado|concluo|concluir|conclui|acabei|declaro)\b|\bfim do caso\b|\bdou alta\b/i.test(texto)){
      const instavel = isAbnormal(JSON.stringify(st.estado).replace(/peso|IG|idade/gi,""));
      const transferiu = /\buti\b|utin|transfer|encaminh|intern/.test(t);
      return { conduta_reconhecida:"Encerramento do caso", classe:"encerramento",
        consequencia_narrativa: transferiu? "Você declara o encerramento e encaminha o paciente." : "Você declara o encerramento do caso.",
        pontos_ganhos: transferiu? pontosDe(caso,"cuidados pos reanimacao transferir UTIN encaminhar alta observacao"): [],
        penalidades_aplicadas: (!transferiu && instavel)? penalDe(caso,"encerrar sem transferir UTIN instavel"): [] };
    }
    // exame?
    if(/(pe[cç]o|solicito|gaso|glicemia|hemograma|raio|\brx\b|radiograf|usg|ultrass|exame|sorolog|tipagem|lactato|eletro|ecg|cultura)/.test(t)){
      const ex=caso.exames_disponiveis||{}; const tk=tokens(texto); let best=null,bs=0;
      Object.keys(ex).forEach(k=>{ if(k==="NOTA")return; const kk=tokens(k.replace(/_/g," ")); const sc=overlap(tk,kk); if(sc>bs){bs=sc;best=k;} });
      return { conduta_reconhecida:"Solicitação de exame", classe:"exame", exame_chave: bs>0?best:(tk[0]||"exame") };
    }
    // casa com conduta esperada
    const condutas=caso.condutas_esperadas||[]; const tk=tokens(texto);
    let best=null,bs=0;
    condutas.forEach(cd=>{ const base=tokens(cd.acao+" "+JSON.stringify(cd.qualificadores||{})); const sc=overlap(tk,base); if(sc>bs){bs=sc;best=cd;} });
    if(!best||bs===0){
      return { conduta_reconhecida:texto, classe:"nao_reconhecida", gravidade_erro:0,
        sondagem:"Pode ser mais específico sobre a conduta?" };
    }
    // ordem: já fez os anteriores? (heurística: nº de condutas de ordem menor já reconhecidas)
    const feitas=new Set(st.historico.map(h=>h.res&&h.res.match_ordem).filter(x=>x!=null));
    const faltamAntes = condutas.filter(c=>c.ordem<best.ordem && c.tipo!=="avaliacao" && !feitas.has(c.ordem));
    // conduta de prioridade (1ª linha / imediata) não é "adiantada" mesmo pulando passos anteriores
    const prioridade = /imediat|primeira (linha|medida|medida farmac)|nunca atras|sem demora|1.?.?linha/i.test(best.janela||"") || /primeira linha|nunca atras/i.test(JSON.stringify(best.qualificadores||{}));
    const adiantou = faltamAntes.length>=2 && !prioridade;
    const ordem_adequada = !adiantou;
    // qualificadores: o aluno citou dose/via/freq? E a conduta exige cada um?
    const temNum=/\d/.test(t), temVia=/(\bim\b|\biv\b|\bev\b|via|umbilical|endotraqueal|\bet\b|inalat|nebuliz|\bvo\b|\bsc\b)/.test(t), temFreq=/(\/min|\/h|ciclo|vezes|repet|de \d|\dx)/.test(t);
    const qjson=JSON.stringify(best.qualificadores||{});
    const exigeDose=/dose|mg|mcg|\bml\b|fio2|diluicao|volume|\d\s*:\s*\d/i.test(qjson);
    const exigeVia=/\bvia\b|\bim\b|\biv\b|endotraqueal|umbilical|inalat|nebuliz|\bvo\b|\bsc\b|via_/i.test(qjson);
    const exigeFreq=/frequencia|\/min|\bciclo|vent.*min|repeticao/i.test(qjson);
    const q={ dose: exigeDose?(temNum?"ok":"faltou"):"na", via: exigeVia?(temVia?"ok":"faltou"):"na", frequencia: exigeFreq?(temFreq?"ok":"na"):"na" };
    let sondagem=null;
    if(q.dose==="faltou"&&q.via==="faltou") sondagem="Qual a dose e a via?";
    else if(q.dose==="faltou") sondagem="Qual a dose?";
    else if(q.via==="faltou") sondagem="Por qual via?";
    // consequência: usa o efeito do caso; se adiantou, paciente piora
    let narrativa, novo={};
    if(adiantou){
      narrativa = (best.consequencia_se_adiantada && best.consequencia_se_adiantada!=="N/A (é o primeiro passo após avaliação)" ? best.consequencia_se_adiantada : "Conduta avançada sem cumprir o passo anterior — o paciente não responde bem.");
      novo = piora(st.estado);
    } else {
      narrativa = best.efeito || "Conduta realizada.";
      const ext=extrairVitalDoEfeito(best.efeito||"");
      if(ext) Object.assign(novo, ext);
    }
    return {
      conduta_reconhecida: best.acao, classe: best.tipo==="avaliacao"?"intervencao":"intervencao",
      acerto_conceito: bs>0, ordem_adequada, pre_requisitos_cumpridos: ordem_adequada,
      qualificadores:q, match_ordem:best.ordem, gravidade_erro: adiantou?2:(q.dose==="errado"?2:0),
      sondagem, consequencia_narrativa:narrativa, novo_estado:novo,
      pontos_ganhos: ordem_adequada? pontosDe(caso,best.acao): [],
      penalidades_aplicadas: adiantou? penalDe(caso,best.acao): []
    };
  }
  function overlap(a,b){ const sb=new Set(b); let n=0; a.forEach(w=>{ if(sb.has(w))n++; }); return n; }
  // melhor correspondência por sobreposição de tokens entre uma ação e as chaves da tabela
  function tokBest(srcTokens, dict){ let best=null,bs=0; for(const k in dict){ const sc=overlap(srcTokens, tokens(k.replace(/_/g," "))); if(sc>bs){bs=sc;best=k;} } return best&&bs>0?[{chave:best,valor:dict[best]}]:[]; }
  function pontosDe(caso,acao){ return tokBest(tokens(acao),(caso.pontuacao&&caso.pontuacao.passos_criticos)||{}); }
  function penalDe(caso,acao){ return tokBest(tokens(acao),(caso.pontuacao&&caso.pontuacao.penalidades)||{}); }
  function extrairVitalDoEfeito(efeito){
    // pega padrões "FC ... 80 bpm" / "FC cai para 40" — só pra mock dar vida ao monitor
    const out={};
    const m=efeito.match(/FC[^0-9]{0,18}(\d{1,3})\s*bpm/i) || efeito.match(/FC.{0,18}(?:para|vai para|sobe para|cai para)\s*(\d{1,3})/i);
    if(m) out.FC=m[1]+" bpm";
    return Object.keys(out).length?out:null;
  }
  function piora(estado){
    const out={};
    for(const k in estado){ const tp=tipoParam(k); const n=parseInt(String(estado[k]).match(/\d{1,3}/));
      if(tp==="hr"&&n){ out[k]=Math.max(0,n-12)+" bpm ↓"; break; } }
    return out;
  }

  // ============================ ENCERRAR / DEBRIEF ============================
  function encerrarCaso(motivo){
    const s=app.sessao, st=s.atual; if(st.encerrado) return; st.encerrado=true; stopTimers();
    // pontuação do caso
    const tabela=(st.caso.pontuacao&&st.caso.pontuacao.passos_criticos)||{};
    const maxTotal=Object.values(tabela).reduce((a,b)=>a+b,0)||1;
    const ganhosUnq={}; st.pontos.forEach(p=>{ ganhosUnq[p.chave]=p.valor; });
    const penalUnq={}; st.penalidades.forEach(p=>{ penalUnq[p.chave]=p.valor; });
    let soma=Object.values(ganhosUnq).reduce((a,b)=>a+b,0)+Object.values(penalUnq).reduce((a,b)=>a+b,0);
    soma=Math.max(0,soma);
    const resultado={ caso:st.caso, motivo, historico:st.historico, ganhos:ganhosUnq, penalidades:penalUnq, soma, max:maxTotal };
    s.resultados.push(resultado);
    // tracking (por tópico)
    salvarTracking(st.caso.topico, st.caso.area, soma, maxTotal);
    // próximo (OSCE) ou debrief
    if(s.modo==="osce" && s.idx < s.casos.length-1){
      s.idx++;
      pushMsg("sys","", `Caso ${s.idx}/${s.casos.length} concluído. Próximo caso em instantes…`);
      setTimeout(()=>iniciarCasoAtual(), 1200);
    } else {
      go("debrief", s.resultados);
    }
  }

  function classifyTL(h){
    const r=h.res||{};
    if(r.classe==="exame") return {cls:"neutral",mark:"exame",label:"Exame"};
    if(r.classe==="encerramento") return {cls:"neutral",mark:"fim",label:"Encerrou"};
    if(r.classe==="nao_reconhecida") return {cls:"neutral",mark:"?",label:"Não reconhecida"};
    if(r.gravidade_erro>=2 || r.pre_requisitos_cumpridos===false) return {cls:"bad",mark:"adiantou",label:"Adiantou / pré-req faltando"};
    if(r.ordem_adequada===false) return {cls:"late",mark:"ordem",label:"Ordem inadequada"};
    if(r.qualificadores && (r.qualificadores.dose==="faltou"||r.qualificadores.via==="faltou")) return {cls:"early",mark:"incompleto",label:"Faltou complemento"};
    return {cls:"ok",mark:"ok",label:"Adequada"};
  }

  function renderTimeline(hist){
    if(!hist.length) return `<div class="exam-empty">Nenhuma conduta registrada.</div>`;
    return hist.map(h=>{
      const c=classifyTL(h); const r=h.res||{};
      return `<div class="tl-item"><div class="tl-dot ${c.cls}"></div>
        <div class="tl-body" style="flex:1"><div class="what">${esc(r.conduta_reconhecida||h.texto)}</div>
        <div class="why">"${esc(h.texto)}"${r.consequencia_narrativa?` — ${esc(r.consequencia_narrativa)}`:""}</div></div>
        <span class="tl-mark mk-${c.cls}">${esc(c.label)}</span></div>`;
    }).join("");
  }
  function renderFlow(caso, feitas){
    const seq=caso.condutas_esperadas||[];
    return seq.map((cd,i)=>{
      const hit=feitas.has(cd.ordem);
      const last=i===seq.length-1;
      const detail = [cd.janela?("Janela: "+cd.janela):"", cd.efeito?("Efeito: "+cd.efeito):"", qualResumo(cd.qualificadores)].filter(Boolean).join("\n\n");
      return `<div class="flow-step ${hit?'hit':'miss'}">
        <div class="flow-rail"><div class="flow-node">${cd.ordem}</div>${last?"":'<div class="flow-line"></div>'}</div>
        <div class="flow-card"><div class="fc-t">${esc(cd.acao)}</div><div class="fc-s">${esc(cd.tipo)}${hit?" · você fez":""}</div><div class="fc-detail">${esc(detail)}</div></div>
      </div>`;
    }).join("");
  }
  function qualResumo(q){ if(!q) return ""; const flat=[]; const walk=(o,p)=>{ for(const k in o){ const v=o[k]; if(v&&typeof v==="object") walk(v,k); else flat.push(`${humanize(k)}: ${v}`); } }; walk(q,""); return flat.slice(0,8).join(" · "); }
  function renderPoints(obj,sign){ const ks=Object.keys(obj||{}); if(!ks.length) return ""; return ks.map(k=>`<div class="point-row"><span>${esc(humanize(k))}</span><span class="pv ${sign}">${sign==='neg'?'':'+'}${obj[k]}</span></div>`).join(""); }

  let clockTimer=null, clockLeft=0, clockCb=null;
  function startClock(seg, onZero){ stopTimers(); clockLeft=seg; clockCb=onZero; placeClock(); clockTimer=setInterval(()=>{ clockLeft--; placeClock(); if(clockLeft<=0){ stopTimers(); if(clockCb) clockCb(); } },1000); }

  function placeClock(){
    const slot=document.getElementById("clock-slot"); if(!slot) return;

    const m=Math.floor(clockLeft/60), s=clockLeft%60; const lbl=app.sessao&&app.sessao.atual&&app.sessao.atual.fase==="leitura"?"LEITURA":"CONDUTA";
    const cls=clockLeft<=15?"bad":clockLeft<=30?"warn":"";

  }

  // ============================ MARKDOWN MINI ============================
  function mdToHtml(md){
    const lines=md.replace(/\r/g,"").split("\n");
    let out=[], i=0;
    const inline=(s)=> esc(s).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>");
    while(i<lines.length){
      let ln=lines[i];
      // fence
      if(/^```/.test(ln)){
        const lang=ln.replace(/^```/,"").trim(); const buf=[]; i++;
        while(i<lines.length && !/^```/.test(lines[i])){ buf.push(lines[i]); i++; }
        i++;
        if(lang==="mermaid"){ out.push(`<div class="mermaid">${esc(buf.join("\n").replace(/\\n/g,"<br/>"))}</div>`); }
        else out.push(`<pre><code>${esc(buf.join("\n"))}</code></pre>`);
        continue;
      }
      // table
      if(/\|/.test(ln) && i+1<lines.length && /^\s*\|?[\s:-]+\|[\s:|-]*$/.test(lines[i+1])){
        const head=ln.split("|").map(s=>s.trim()).filter((s,idx,a)=>!(idx===0&&s==="")&&!(idx===a.length-1&&s===""));
        i+=2; const rows=[];
        while(i<lines.length && /\|/.test(lines[i]) && lines[i].trim()!==""){ rows.push(lines[i].split("|").map(s=>s.trim()).filter((s,idx,a)=>!(idx===0&&s==="")&&!(idx===a.length-1&&s===""))); i++; }
        out.push(`<table><thead><tr>${head.map(h=>`<th>${inline(h)}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${inline(c)}</td>`).join("")}</tr>`).join("")}</tbody></table>`);
        continue;
      }
      if(/^#{1,4}\s/.test(ln)){ const lv=ln.match(/^#+/)[0].length; out.push(`<h${lv}>${inline(ln.replace(/^#+\s/,""))}</h${lv}>`); i++; continue; }
      if(/^\s*(---|\*\*\*)\s*$/.test(ln)){ out.push("<hr>"); i++; continue; }
      if(/^>\s?/.test(ln)){ const buf=[]; while(i<lines.length&&/^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/,"")); i++; } out.push(`<blockquote>${buf.map(inline).join("<br>")}</blockquote>`); continue; }
      if(/^\s*[-*]\s/.test(ln)){ const buf=[]; while(i<lines.length&&/^\s*[-*]\s/.test(lines[i])){ buf.push(`<li>${inline(lines[i].replace(/^\s*[-*]\s/,""))}</li>`); i++; } out.push(`<ul>${buf.join("")}</ul>`); continue; }
      if(/^\s*\d+\.\s/.test(ln)){ const buf=[]; while(i<lines.length&&/^\s*\d+\.\s/.test(lines[i])){ buf.push(`<li>${inline(lines[i].replace(/^\s*\d+\.\s/,""))}</li>`); i++; } out.push(`<ol>${buf.join("")}</ol>`); continue; }
      if(ln.trim()===""){ i++; continue; }
      // parágrafo (junta linhas até branco)
      const buf=[ln]; i++;
      while(i<lines.length && lines[i].trim()!=="" && !/^(#{1,4}\s|>|\s*[-*]\s|\s*\d+\.\s|```|\|)/.test(lines[i])){ buf.push(lines[i]); i++; }
      out.push(`<p>${buf.map(inline).join(" ")}</p>`);
    }
    return out.join("\n");
  }
  function runMermaid(){
    if(!window.mermaid){ return; }
    try{ window.mermaid.run({ querySelector:".mermaid" }); }catch(e){ console.warn("mermaid:",e); }
  }

  // ============================ BOOT ============================
  async function boot(){
    try{ const v = await store.get(NARR_KEY, PER_USER); if(v!==null && v!==undefined) app.narracaoOn = !!v; }catch(e){}
    try{ await carregarDados(); }
    catch(e){ app.root.innerHTML = `<div class="wrap"><div class="panel"><h2>Erro ao carregar os dados</h2><p>${esc(e.message)}</p></div></div>`; return; }
    renderHome(); // renderHome chama wireNarr()
  }
  return { boot, _state:app, _casos:CASOS };
})();
</script>
