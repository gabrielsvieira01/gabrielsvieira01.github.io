para a hipocalemia e a alcalose metabólica. Além disso, na alcalemia, o K+ extracelular é conduzido para dentro da célula em troca de H+ intracelular (via antiportador Na+/H+ e Na+/K+-ATPase) para compensar os níveis elevados de pH sanguíneo. Vômitos persistentes ou aspiração excessiva de NG também causam perda de K+ além da perda de água livre; as secreções gástricas apresentam maior concentração de K+ (aproximadamente 10–15 mEq/L) quando comparadas ao plasma devido ao vazamento de K+ via canais KCNE2/KCNQ1 no lúmen das células parietais. O tratamento da alcalose de contração (uma alcalose metabólica responsiva ao cloreto) consiste em fluidoterapia com NaCl a 0,9% para corrigir a perda de volume extracelular e repleção de cloreto, garantindo assim a entrega adequada de Cl ao túbulo contorcido distal (DCT). A entrega adequada de Cl- ao DCT é necessária para a atividade do trocador de pendrina, que reabsorve Cl- em troca da excreção de HCO3- no lúmen do DCT. A correção do status do volume geralmente também corrige quaisquer distúrbios eletrolíticos leves, mas para distúrbios eletrolíticos moderados a graves, pode ser necessário tomar medidas adicionais (por exemplo, reposição com cloreto de potássio para hipocalemia grave). Consulte a tabela “Distúrbios ácido-base associados a distúrbios gastrointestinais”.\\n\\nDistratores:\\n\\nA hiponatremia pode ocorrer em pacientes com vômitos prolongados se a perda líquida de sódio exceder a perda líquida de água livre, normalmente devido a alterações na manipulação renal de Na+ induzidas por alcalose de contração persistente. Entretanto, nesse cenário, a osmolalidade sérica estaria diminuída (hiponatremia hipotônica hipovolêmica). A osmolalidade sérica aumentada neste paciente desidratado indica uma perda de água livre superior à perda de sódio, portanto seria esperada hipernatremia. A hipernatremia ocorre após o vômito porque as secreções gástricas têm uma concentração menor de Na+ (aproximadamente 20–100 mEq/L) quando comparadas ao plasma. Na alcalemia, há uma diminuição na concentração sérica de H+, e proteínas carregadas negativamente no soro (por exemplo, albumina) ligam-se a íons carregados positivamente, como Mg2+, resultando em níveis diminuídos, e não aumentados, de magnésio livre. Na alcalemia, há uma diminuição na concentração sérica de H+, e proteínas carregadas negativamente no soro (por exemplo, albumina) ligam-se a íons carregados positivamente, como Ca2+, resultando em níveis diminuídos, e não aumentados, de cálcio livre.","needs_distractors":true},{"year":"2024.1","qnum":41,"enunciado":"Gestante, 23 anos, G2P1nA0, IG: 21 semanas, comparece à consulta de pré-natal trazendo exames solicitados em consulta anterior. Não apresentou nenhuma alteração de exame laboratorial no primeiro trimestre. Nega comorbidades. Exames: Hb: 13,4g/dL(ref:13,016,9), Glicose 86mg/dL, VDRL não reagente, Anti-HIV 1 e 2 não reagentes, HBsAG não reagente, Anti- HCV não reagente, Sorologia Citomegalovírus IgG e IgM não reagentes, Sorologia toxoplasmose IgM e IgG reagentes. Diante do resultado dos exames apresentados, qual a melhor conduta a ser adotada para essa paciente?","alternativas":[{"letra":"A","texto":"Solicitar amniocentese e iniciar sulfadiazina, pirimetamina e ácido folínico. Caso amniocentese negativa, deve-se trocar o esquema tríplice por espiramicina."},{"letra":"B","texto":"Iniciar apenas espiramicina e manter durante toda a gestação, sem necessidade de amniocentese ou troca de esquema."},{"letra":"C","texto":"Indicar interrupção da gestação por alto risco de malformações fetais incompatíveis com a vida."},{"letra":"D","texto":"Aguardar nova sorologia em 30 dias antes de iniciar qualquer tratamento, mantendo apenas observação clínica."}],"correta":"A","resposta":"Gestante sorologia positiva para toxoplasmose no 2 trimestre, com idade gestacional > 16 semanas, não havendo possibilidade de realização de teste de avidez para descartar infecção prévia a gestação. Além disso, no enunciado informa que todas as sorologias do primeiro trimestre eram negativas. Dessa forma, estamos diante de uma toxoplasmose adquirida na gestação. Como idade gestacional > 18 semanas, já há possibilidade de ser realizado a amniocentese, que é padrão ouro para o diagnóstico de toxoplasmose fetal. Como gestante > 16 semanas, está recomendado, até realização da amniocentese, iniciar o esquema tríplice de sulfadiazina + pirimetamina + ácido folínico. Caso amniocentese venha negativa, deve-se trocar o esquema tríplice por espiramicina. Em caso de amniocentese positiva, mantém-se o esquema tríplice até o parto.","needs_distractors":true},{"year":"2024.1","qnum":42,"enunciado":"Durante a consulta de pré-natal, uma nuligesta de 32 semanas de gestação está angustiada pois tem observado inchaço nos pés e tornozelos. Após o exame, foi constatado edema pronunciado em membros inferiores além de pressão arterial elevada (140/90 mmHg). A paciente refere não ter histórico prévio de hipertensão. Os exames complementares pré-natais revelam ausência de proteinúria e trombocitopenia. Assinale a alternativa que apresenta a fisiopatologia do edema e a orientação/conduta adequada para a paciente.","alternativas":[{"letra":"A","texto":"Maior retenção de sódio induzida por hormônio e compressão intermitente do útero aumentado na veia cava inferior obstruindo a via de saída de ambas as veias femorais. Realizar repouso em decúbito lateral esquerdo, restrição de sal e cafeína e iniciar metildopa como anti-hipertensivo."},{"letra":"B","texto":"Sobrecarga cardíaca aguda; iniciar furosemida e restrição hídrica rigorosa, além de propranolol para controle pressórico."},{"letra":"C","texto":"Síndrome nefrótica gestacional; iniciar prednisona em altas doses e dieta hipoproteica."},{"letra":"D","texto":"Pré-eclâmpsia leve; internar para observação, iniciar sulfato de magnésio profilático e antecipar o parto."}],"correta":"A","resposta":"A formação de edema na gestação pode ocorrer a qualquer momento na gestação, mas é mais comum a partir do final do segundo trimestre, ou seja, a partir do final do quinto mês de gestação e aumenta durante o terceiro trimestre. Ele se dá pela retenção de sódio induzida por hormônio. Também pode ocorrer edema quando o útero aumentado comprime intermitentemente a veia cava inferior em decúbito dorsal, obstruindo a via de saída de ambas as veias femorais. Alguns fatores podem afetar o desenvolvimento do edema:\\n\\nTemperaturas elevadas. Grávidas ficam mais edemaciadas no verão. Ficar de pé ou sentada sem mexer os pés e as pernas por longo período de tempo. O exagero nas atividades físicas ou a inatividade física pode colaborar para o aparecimento de edemas em gestantes. Dietas pobres em potássio. Alto consumo de cafeína. Excesso de sal (sódio) na dieta. A prescrição de metildopa como anti-hipertensivo é adequada, juntamente com as orientações sobre repouso, restrição de sal e monitoramento da pressão arterial. Embora a disfunção endotelial e o aumento da permeabilidade capilar sejam, também, causas fisiopatológicas do edema na hipertensão gestacional, a prescrição de nifedipina não é recomendada como anti-hipertensivo de primeira linha nesse contexto. A suplementação de Cálcio ou AAS no pré-natal deve ser prescrita nas pacientes com alto risco de desenvolver pré - eclampsia e deve ser considerado naquelas pacientes com risco moderado. A perda de proteínas na urina pode contribuir para o edema, mas não é a principal causa na hipertensão gestacional. Além disso, a prescrição de labetalol não é a primeira escolha como anti- hipertensivo na gravidez. Embora a obstrução linfática possa contribuir para o edema, não é a principal causa na hipertensão gestacional. A prescrição de hidroclorotiazida não é recomendada para gestantes devido aos riscos associados ao uso durante a gravidez.","needs_distractors":true},{"year":"2024.1","qnum":43,"enunciado":"Um menino, de 10 anos, é trazido pelos pais para a Unidade de Pronto Atendimento com queixas de dor abdominal intensa e persistente há 36 horas associada a vômitos e febre de 38,5C. Os pais relatam que a criança não tem apetite e parece muito pálida. A dor inicialmente era epigástrica e tornou-se mais intensa no quadrante inferior direito do abdome. Ao exame o paciente apresentava-se letárgico, com extremidades frias e pulsos finos. Sinais Vitais: temperatura axilar de 38,6°C, frequência cardíaca de 140 bpm, frequência respiratória de 30 rpm, e pressão arterial de 85/45 mmHg. Os exames laboratoriais evidenciavam leucocitose com desvio à esquerda. Qual é o tipo mais provável de choque apresentado pelo paciente é paciente?","alternativas":[{"letra":"A","texto":"Choque séptico."},{"letra":"B","texto":"Choque hipovolêmico não hemorrágico."},{"letra":"C","texto":"Choque anafilático."},{"letra":"D","texto":"Choque obstrutivo por tromboembolismo pulmonar."}],"correta":"A","resposta":"O quadro clínico sugere fortemente choque séptico, caracterizado pela combinação de infecção (indicada por febre e leucocitose com desvio à esquerda), hipotensão (85/45 mmHg), taquicardia (140 bpm), alterações na perfusão periférica (pele fria e pegajosa), e alteração do estado mental (letargia). A dor abdominal intensa e localizada, junto com febre e leucocitose, aponta para um processo inflamatório ou infeccioso no abdome, que pode ter evoluído para uma resposta inflamatória sistêmica severa, resultando em choque séptico. Alternativas erradas:\\n\\nChoque cardiogênico é causado por falha primária na função do coração, que não é sugerida pelos sinais clínicos e sintomas apresentados. Choque hipovolêmico resulta de uma grande perda de sangue ou fluidos, que pode ser uma consideração inicial, mas a presença de febre e leucocitose direciona mais especificamente para uma causa séptica. Choque distributivo pode incluir choque séptico, mas como uma categoria, é mais amplo e também inclui causas como choque anafilático e neurogênico, que não se encaixam na apresentação clínica","needs_distractors":true},{"year":"2024.1","qnum":44,"enunciado":"Paciente, de 32 anos, G1P0, 39 semanas de gestação, pré-natal incompleto. Apresentou glicemia de jejum de 125mg/dL no segundo trimestre, mas não houve acompanhamento do Diabetes gestacional. Ao exame foi observado: altura fundo uterino (AFU) 37cm, dinâmica uterina presente, toque vaginal com dilatação total, +1 no plano DeLee. Paciente foi encaminhada imediatamente ao pré-parto para assistência ao parto normal. Após a saída do polo cefálico, não houve o desprendimento dos ombros. A equipe obstétrica está completa ao redor da paciente e foi identificado uma distocia de ombros. A primeira manobra a ser realizada nessa situação é:","alternativas":[{"letra":"A","texto":"flexão e abdução das coxas da gestante em direção ao ventre."},{"letra":"B","texto":"tração lateral vigorosa sobre a cabeça do feto para liberação do ombro impactado."},{"letra":"C","texto":"fundo de pressão uterina aplicada por auxiliar para forçar a saída do feto."},{"letra":"D","texto":"indicação imediata de cesariana mesmo com a cabeça já exteriorizada."}],"correta":"A","resposta":"Trata-se de uma distocia de ombros. Segundo o mnemônico ALEERTA, devemos:\\n\\nA: chamar ajuda (você já está com a equipe completa ao seu redor) L: levantar pernas (Manobra de McRoberts) E: externa: pressão suprapubica (Manobra de Rubin 1) E: considerar episiotomia R: remover o braço posterior (Manobra de Jacquemier) T: toque para manobras internas: manobra de Rubin II, manobra de Wood; manobra do parafuso invertido. A: Alternar a posição: manobra de quatro apoios (Gaskin) Segundo o ALSO, a primeira manobra recomendada é o McRoberts que consiste na flexão e abdução das coxas em direção ao ventre materno. Portanto, a alternativa correta é (flexão e abdução das coxas em direção ao ventre materno)","needs_distractors":true},{"year":"2024.1","qnum":45,"enunciado":"Paciente RCM, 17 anos, sexo feminino, natural de Belo Horizonte/MG, atualmente reside em São João Del Rei/MG com seus pais e dois irmãos, católica. A paciente compareceu à consulta com médico da UBS após encaminhamento realizado pela sua psicóloga. Durante a consulta, a paciente referiu que vem apresentando há um mês quadro de humor deprimido, fadiga, insônia, falta de interesse nas suas atividades diárias, diminuição do apetite e desânimo, associados a pensamentos de morte e ideação suicida, sem planejamento. Não refere episódios prévios de alteração de humor e nega uso de medicamentos psiquiátricos. Paciente sem comorbidades clínicas e/ou psiquiátricas. Relata bom convívio com seus familiares e boa relação com seus colegas de escola. Sabemos que a síndrome depressiva está associada a um risco aumentado de suicídio. Indivíduos com transtorno depressivo maior têm uma alta taxa de mortalidade, em grande parte devido ao suicídio. Por isso, é fundamental que pessoas com sintomas depressivos ou pensamentos suicidas procurem ajuda profissional para avaliação e tratamento adequados. Sobre o tratamento farmacológico para depressão podemos afirmar que","alternativas":[{"letra":"A","texto":"os antipsicóticos podem ser usados como medicamentos potencializadores quando há resposta parcial a antidepressivos no tratamento de depressão grave."},{"letra":"B","texto":"antipsicóticos são contraindicados no tratamento da depressão grave por aumentarem o risco de suicídio."},{"letra":"C","texto":"antipsicóticos devem ser usados como monoterapia em substituição aos antidepressivos quando há resposta parcial."},{"letra":"D","texto":"antipsicóticos são indicados apenas em quadros depressivos com sintomas psicóticos, sendo contraindicados em depressão refratária sem psicose."}],"correta":"A","resposta":"Os ISRS são considerados de primeira linha para o tratamento do transtorno depressivo por apresentarem menos efeitos colaterais. Os medicamentos antidepressivos devem ser iniciados em doses baixas nos primeiros dias para evitar efeitos colaterais indesejados. A resposta ao tratamento com uso dos medicamentos inibidores seletivos de recaptação de serotonina para quadros depressivos não é imediata. Isso deve ser explicado ao paciente. Não é indicado associar dois antidepressivos da mesma classe.","needs_distractors":true},{"year":"2024.1","qnum":46,"enunciado":"Homem, de 67 anos, consulta na unidade básica de saúde para apresentar o resultado dos exames solicitados em consulta anterior para investigação de um quadro de fadiga, palidez, hiporexia e palpitações, há um mês. Apresenta hipertensão há dez anos e está em tratamento para hanseníase multibacilar há seis meses. Faz uso de losartana, dapsona, clofazimina e rifampicina.\\n\\nHEMOGRAMA:\\n\\nHemácias: 3,5 milhões/mm3 (Valor de referência: 4,32 - 5,67 milhões/mm3) Hemoglobina: 9,0 g/dL (Valor de referência:13,3 - 16,5 g/dL) Hematócrito: 27% (Valor de referência:39,2 - 49,0%) HCM: 30 pg (Valor de referência: 27,7 - 32,7 pg) VCM: 87 fL (Valor de referência: 81,7 - 95,3 fL) CHCM: 33,2 g/dL (Valor de referência: 32,4 - 36,0 g/dL) RDW: 13,0% (Valor de referência: 11,8 - 14,1%) Leucócitos: 5.850/mm3 (Valor de referência: 3.650 - 8.120/mm3) Plaquetas: 182.000/mm3 (Valor de referência:151.000 - 304.000/mm3) Reticulócitos: 5,0% (Valor de referência: 0,5% a 2,5 %) Assinale a alternativa que contem o diagnóstico mais provável e a melhor conduta.","alternativas":[{"letra":"A","texto":"Anemia hemolítica. Suspender dapsona e encaminhar para serviço especializado."},{"letra":"B","texto":"Anemia ferropriva. Iniciar sulfato ferroso oral 300mg de 8/8h por 6 meses."},{"letra":"C","texto":"Anemia megaloblástica. Iniciar reposição de vitamina B12 intramuscular semanal."},{"letra":"D","texto":"Anemia da doença crônica. Manter a dapsona e iniciar eritropoetina recombinante humana."}],"correta":"A","resposta":"Trata-se de anemia normocítica e normocrômica, desfavorecendo hipóteses de anemia ferropriva e perniciosa. Como o índice de reticulócitos está elevado, a hipótese de anemia hemolítica é favorecida sobre a de anemia por doença crônica, sobretudo em paciente em uso de Dapsona para o tratamento da hanseníase. Durante o tratamento para hanseníase, em caso de anemia hemolítica, a principal ação é a suspensão da dapsona e substituição do esquema terapêutico.","needs_distractors":true},{"year":"2024.1","qnum":47,"enunciado":"João, um adolescente de 16 anos, é levado à Unidade Básica de Saúde (UBS) pelos pais devido a episódios recorrentes de paralisia súbita em suas pernas. Ele relata que, de repente, não consegue mais mover suas pernas, mas não sente dor associada a isso. Após algumas horas ou dias, a paralisia desaparece espontaneamente e ele recupera a mobilidade normal. Durante os episódios de paralisia, João não apresenta fraqueza muscular nem alterações sensoriais. Ele também nega sintomas como incontinência urinária ou fecal, perda de controle da bexiga ou intestino, ou alterações no funcionamento sexual. Analisando o quadro clínico apresentado, o diagnóstico provável seria","alternativas":[{"letra":"A","texto":"Transtorno conversivo (somatiforme)."},{"letra":"B","texto":"Esclerose múltipla."},{"letra":"C","texto":"Síndrome de Guillain-Barré."},{"letra":"D","texto":"Simulação (transtorno factício)."}],"correta":"A","resposta":"O quadro clínico de João é consistente com os sintomas de transtorno conversivo, anteriormente conhecido como transtorno somatoforme, onde os sintomas neurológicos não têm uma explicação médica orgânica adequada. A ausência de fraqueza muscular, alterações sensoriais e outros sinais de disfunção neurológica sugere que os sintomas de paralisia são de origem psicogênica.","needs_distractors":true},{"year":"2024.1","qnum":48,"enunciado":"Homem, de 32 anos, comparece à unidade de pronto atendimento com queixa de diarreia e vômitos há 10 dias. Há 2 dias somou-se fraqueza, cansaço e diminuição da diurese. Ao exame físico: orientado, desidratado; PA = 90 x 60 mmHg; FC = 108 bpm. Resultado de exames laboratoriais colhidos à admissão: ureia = 202 mg/dl; creatinina = 2,6 mg/dl; K + = 6,1 mEq/L; pH = 7,09, HCO 3- 9,5 mEq/L; PaCO 2 = 18 mmHg; Ânion-gap = 19; Cloreto = 108 mEq/L. Considerando a principal hipótese diagnóstica, marque a alternativa que apresenta a etiologia do quadro clínico e a medida terapêutica a ser instituída.","alternativas":[{"letra":"A","texto":"IRA pré-renal por hipovolemia, devendo realizar hidratação com solução salina (SF 0,9%) e administrar bicarbonato de sódio para correção da acidose e da hiperpotassemia."},{"letra":"B","texto":"IRA renal intrínseca por necrose tubular aguda, devendo iniciar diálise de urgência sem hidratação prévia."},{"letra":"C","texto":"IRA pós-renal obstrutiva, devendo realizar sondagem vesical de alívio e ultrassonografia de vias urinárias antes da hidratação."},{"letra":"D","texto":"Síndrome hepatorrenal, devendo iniciar terlipressina e albumina endovenosa antes da reposição volêmica."}],"correta":"A","resposta":"Diarreia e vômitos — o que deve estar acontecendo com o paciente? Evidentemente, espera-se um balanço negativo de sal e água nesta situação (hipovolemia). A PA atual é de 90 x 60 mmHg. Apesar de esse valor corresponder ao limite inferior da normalidade, diante do contexto clínico apresentado, é muito provável que se trate de hipotensão. Logo, a principal hipótese para explicar o achado laboratorial de IRA é, sem dúvida, a hipovolemia (IRA pré-renal). Isso quer dizer que a taxa de filtração glomerular caiu devido à instalação de um processo renal isquêmico agudo. A conduta, por conseguinte, consiste na re-expansão volêmica do paciente, utilizando solução salina isotônica pela via venosa. A solução de escolha é o soro fisiológico (NaCl 0,9%) — lembre-se de que o Ringer contém K +, sendo contraindicado na vigência de hipercalemia. Como seu pH está seriamente reduzido (< 7,1), podemos lançar mão de reposição de bicarbonato associado, o que vai amenizar a acidose metabólica e, de quebra, vai ajudar a reduzir a calemia (a alcalinização do plasma fará o K + entrar nas células, pois o excesso de H + que estava tamponado pelo intracelular vai ser liberado em troca da entrada de outro cátion no citoplasma — no caso, o próprio K +, que é o principal cátion do meio intracelular. A terapia de “suporte renal” (diálise) será indicada somente se os distúrbios eletrolíticos e acidobásicos se mostrarem refratários. Vale lembrar que a IRA pré-renal por hipovolemia é potencialmente reversível com as condutas que citamos.","needs_distractors":true},{"year":"2024.1","qnum":49,"enunciado":"Um paciente de 29 anos buscou a Unidade Básica de Saúde relatando hematúria macroscópica há 3 meses. Relata dificuldade para urinar e necessidade de utilizar sonda de alívio, mas sem alterações na cistoscopia. Trouxe vários exames de sangue feitos nos últimos meses, mostrando anemia normocítica e normocrômica e EAS sem alterações. Solicitou pedido de tomografia e laudo para o INSS, pois além da hematúria sente dores lombares incapacitantes que não lhe possibilitam trabalhar. É usuário de metadona por quadro de nefrolitíase. De acordo com o caso clínico descrito, analise as assertivas abaixo.\\n\\nI. O paciente é usuário de uma substância psicoativa, metadona, mas sem perfil de adição.\\n\\nII. A hematúria pode estar sendo provocada pelo uso da sonda vesical, configurando um transtorno factício.\\n\\nIII. As alterações inespecíficas do paciente em conjunto com um quadro de impossibilidade laboral devem levar a suspeita de um transtorno conversivo. Está correto apenas o que se afirma em:","alternativas":[{"letra":"A","texto":"II e III."},{"letra":"B","texto":"I e II."},{"letra":"C","texto":"I e III."},{"letra":"D","texto":"Apenas III."}],"correta":"A","resposta":"A metadona é um opioide que causa adição. A hematúria pode estar sendo autoprovocada uma vez que o exame de urina foi normal e a cistoscopia também. As alterações inespecíficas, o uso de uma substância psicoativa e o pedido de laudo podem demonstrar um ganho secundário.","needs_distractors":true},{"year":"2024.1","qnum":50,"enunciado":"Um recém-nascido de 37 semanas e 5 dias, nasceu sem drive respiratório e hipotônico. A mãe foi submetida a cesárea de urgência. Foram realizados os passos iniciais de reanimação e manteve bradicardia. No momento, o paciente está recebendo massagem cardíaca, coordenada com ventilação em tubo orotraqueal com FiO2 de 100%. Após os 60 segundos de massagem e ventilação com técnica correta, o paciente apresenta frequência cardíaca de 50 bpm. Assinale a conduta imediata indicada para esse paciente.","alternativas":[{"letra":"A","texto":"Inserir cateter venoso umbilical para administração de adrenalina endovenosa, e enquanto este é realizado, pode-se administrar dose única de adrenalina."},{"letra":"B","texto":"Realizar massagem cardíaca por mais 60 segundos sem administração de adrenalina e reavaliar."},{"letra":"C","texto":"Suspender as manobras de reanimação por critério de irreversibilidade após 5 minutos sem resposta."},{"letra":"D","texto":"Administrar adrenalina endotraqueal sem necessidade de acesso venoso umbilical, em qualquer fase da reanimação."}],"correta":"A","resposta":"Atualmente no Brasil, seguimos as orientações do programa de reanimação neonatal para adotar as condutas na sala de parto. A última diretriz publica pela Sociedade Brasileira de Pediatria, data de 2022 e tem os seguintes textos:\\n\\n“Quando a FC permanece menor que 60 bpm, a despeito de ventilação efetiva por cânula traqueal com O2 a 100% e acompanhada de massagem cardíaca adequada e sincronizada à ventilação por no mínimo 60 segundos, o uso de adrenalina está indicado.” “Na presença de colapso cardiovascular, não é recomendado tentar obter um acesso venoso periférico. O cateter venoso umbilical deve ser inserido de emergência.” “Enquanto o cateterismo venoso umbilical de emergência está sendo realizado, pode-se administrar uma única dose de 0,05-0,10 mg/kg de adrenalina por via traqueal.” “A adrenalina endovenosa é aplicada na dose de 0,01-0,03 mg/kg.”","needs_distractors":true},{"year":"2024.2","qnum":1,"enunciado":"(FACIMPA) Uma mulher cisgênero de 42 anos procura o ambulatório escola de coloproctologia com queixa de dor anal intensa e desconforto ao evacuar, que piorou nos últimos meses. Ela relata episódios de sangramento ao evacuar, com sangue vivo no papel higiênico. Além disso, sente a presença de um “caroço” na região anal, que costuma “sair para fora” durante a evacuação e, nas últimas semanas, não tem retornado espontaneamente, mesmo com auxílio digital. A paciente relata constipação crônica, com esforço evacuatório frequente. Ao exame físico, observam-se sinais de prolapso hemorroidário. Diante do quadro clínico, qual a conduta mais adequada para o manejo dessa paciente, baseado na classificação das doenças hemorroidárias?","alternativas":[{"letra":"A","texto":"Realizar ligadura elástica das hemorroidas no ambulatório, que é uma opção eficaz para a resolução completa dos sintomas, principalmente em casos de hemorroidas grau II."},{"letra":"B","texto":"Prescrever pomadas tópicas à base de corticoides e anestésicos locais, que promovem alívio rápido dos sintomas e podem evitar a necessidade de cirurgia em casos de hemorroidas prolapsadas."},{"letra":"C","texto":"Prescrever medidas conservadoras, como aumento da ingesta de fibras e uso de laxantes, orientando retorno em um mês para reavaliação da resposta ao tratamento."},{"letra":"D","texto":"Indicar tratamento cirúrgico para correção do prolapso hemorroidário, já que a paciente apresenta sintomas refratários ao manejo conservador e o prolapso não está retornando espontaneamente."}],"correta":"D","resposta":"O tratamento conservador, com aumento da ingestão de fibras e uso de laxantes, é a primeira linha de manejo em casos de hemorroidas sem complicações graves, especialmente nas fases iniciais da doença. No entanto, quando há sinais de prolapso irreversível, essa conduta isolada pode não ser suficiente para resolver o problema. A ligadura elástica é uma técnica ambulatorial eficaz em hemorroidas de grau II, que ainda retornam espontaneamente após o prolapso. No entanto, no caso descrito, o prolapso já não está retornando nem com auxílio manual, o que sugere que a paciente apresenta uma condição mais avançada (grau III ou IV), com provável indicação cirúrgica. A indicação cirúrgica é apropriada para pacientes com prolapso hemorroidário irreversível e sintomas refratários ao tratamento conservador. Nesse caso, a paciente apresenta dor, sangramento e um prolapso que não retorna espontaneamente, indicando uma possível hemorroidectomia ou outro tratamento cirúrgico definitivo. As pomadas tópicas com corticoides e anestésicos locais podem oferecer alívio temporário dos sintomas, mas não tratam a causa subjacente em casos de prolapso hemorroidário irreversível. Elas são mais indicadas em casos de hemorroidas menos graves ou com inflamação localizada.","needs_distractors":false},{"year":"2024.2","qnum":2,"enunciado":"(UNINOVAFAPI) Ana, 34 anos, gestante de 32 semanas, comparece ao ambulatório de alto risco relatando inchaço progressivo nas pernas e rosto, acompanhado de dores de cabeça frequentes e turvação visual nos últimos dias. Ela tem diagnóstico de hipertensão arterial crônica e está em acompanhamento regular, mas nas últimas semanas tem percebido piora dos sintomas. No exame físico, apresenta edema 3+/4+ em membros inferiores, pressão arterial de 170/110 mmHg, e reflexos tendíneos exaltados. A análise de urina revela proteinúria significativa. Com base no caso de Ana, qual é o diagnóstico mais provável e a conduta mais adequada?","alternativas":[{"letra":"A","texto":"Edema fisiológico da gestação, aumento da ingestão de líquidos e repouso."},{"letra":"B","texto":"Síndrome HELLP, administração de corticosteroides e interrupção imediata da gestação."},{"letra":"C","texto":"Pré-eclâmpsia grave, administração de sulfato de magnésio e monitoramento fetal intensivo."},{"letra":"D","texto":"Hipertensão gestacional sem complicações, manejo ambulatorial e repouso."}],"correta":"C","resposta":"Hipertensão gestacional sem complicações, manejo ambulatorial e repouso:\\n\\nIncorreta. Embora a hipertensão gestacional possa ocorrer na ausência de outros sinais de gravidade, Ana apresenta sintomas significativos, como proteinúria, cefaleia e turvação visual, além de pressão arterial severamente elevada, todos indicativos de pré-eclâmpsia grave, que requer manejo hospitalar.\\n\\nPré-eclâmpsia grave, sulfato de magnésio e monitoramento fetal intensivo:\\n\\nCorreta. A pré-eclâmpsia grave é caracterizada por hipertensão severa (≥160/110 mmHg), sinais de comprometimento de órgãos-alvo e sinais de alarme / iminência de eclampsia como cefaleia, turvação visual, escotomas citilantes, epigastralgia, entre outros. O manejo envolve internação imediata, administração de sulfato de magnésio para estabilização, além de controle rigoroso da pressão arterial e monitoramento fetal.\\n\\nDeve-se considerar a indução do parto se houver deterioração materna ou fetal. Síndrome HELLP, administração de corticosteroides e interrupção imediata da gestação: Incorreta. Embora a síndrome HELLP seja uma complicação grave da pré- eclâmpsia, caracterizada por hemólise, elevação de enzimas hepáticas e plaquetopenia, não há evidências de alteração hepática ou plaquetária no caso de Ana. O diagnóstico mais provável é pré-eclâmpsia grave. Edema fisiológico da gestação, aumento da ingestão de líquidos e repouso:\\n\\nIncorreta. O edema fisiológico na gestação não é acompanhado por hipertensão severa, proteinúria e sinais de comprometimento de órgãos, como observado no caso de Ana. A presença desses sintomas aponta para uma condição mais grave, como a pré-eclâmpsia.","needs_distractors":false},{"year":"2024.2","qnum":3,"enunciado":"(FIPGUANAMBI) Recém-nascido (RN) de 38 semanas de idade gestacional, parto cesáreo, nasceu hipotônico com frequência cardíaca (FC) de 56 bpm, cianótico e choro ausente. Foram iniciadas as manobras de reanimação, ventilação adequada, intubação orotraqueal e massagem cardíaca sincronizados, porém o RN permanece sem movimentos respiratórios, cianótico e com FC: 50 bpm. A conduta imediata adequada para o recém-nascido é:","alternativas":[{"letra":"A","texto":"administrar soro fisiológico 0,9% 10ml/kg na veia umbilical para expansão volumétrica."},{"letra":"B","texto":"administrar adrenalina 1: 10.000 na dose de 0,1ml/Kg na veia umbilical."},{"letra":"C","texto":"administrar bicarbonato de sódio através do cateter inserido na veia umbilical."},{"letra":"D","texto":"administar adrenalina 1:1.000 na dose de 0,1ml/Kg na cânula orotraqueal."}],"correta":"B","resposta":"A dose de adrenalina a ser utilizada é 0,01 a 0,03mg/kg. Como será feita via endovenosa, deve ser diluída na proporção de 1 mL de adrenalina para 9 mL de solvente (SF ou AD), a fim de obter solução de 1:10.000. Portanto a dose em mL será de 0,1 – 0,3mL/kg. Não se recomenda a adrenalina endotraqueal, por não se saber a biodisponibilidade, apenas na ausência de um acesso venoso. Mas caso haja necessidade de uso endotraqueal a diluição deverá ser a mesma da endotvenosa (1:1000) O expansor de volume pode ser necessário para reanimar o recém-nascido com hipovolemia. A suspeita é feita se não houver aumento da FC em resposta às outras medidas de reanimação e/ou se há perda de sangue ou sinais de choque hipovolêmico, como palidez, má perfusão e pulsos débeis. O bicarbonato de sódio não é recomendado na reanimação do recém-nascido na sala de parto, a hiper osmolaridade da solução, a hipernatremia desencadeada pela sua infusão e o fato de gerar CO2 podem diminuir a resistência vascular sistêmica, piorando a pressão de perfusão coronariana e, por conseguinte, a função miocárdica, exacerbando acidose venosa e contribuindo para o aumento da mortalidade.","needs_distractors":false},{"year":"2024.2","qnum":4,"enunciado":"(UNISL PORTO VELHO) Um paciente de 65 anos foi submetido a uma cirurgia de grande porte e encontra-se no 3º dia de pós-operatório em unidade de terapia intensiva. Apresenta-se com edema leve, fraqueza muscular, hipotensão postural e hiponatremia (Na+ = 125 mEq/L). Exames laboratoriais mostram hipocalemia (K+ = 2,8 mEq/L), níveis normais de creatinina e ureia. A diurese nas últimas 24 horas foi de 500 mL. Não há sinais de sobrecarga volêmica. Com base no quadro clínico e laboratorial, qual a conduta mais apropriada para corrigir com segurança os distúrbios hidro-eletrolíticos e preparar o paciente para alta hospitalar?","alternativas":[{"letra":"A","texto":"Restrição hídrica leve com reposição de potássio oral, associada ao uso de diurético de alça para reduzir o edema e controlar a hiponatremia."},{"letra":"B","texto":"Reposição de solução salina isotônica (NaCl 0,9%) para correção gradual da hiponatremia, com reposição intravenosa de potássio e monitorização clínica a cada rotina matinal."},{"letra":"C","texto":"Administração de potássio intravenoso, solução salina isotônica (NaCl 0,9%), associada ao uso de corticosteróides para manejo da hipotensão postural."},{"letra":"D","texto":"Administração de solução salina isotônica (NaCl 0,9%) e reposição de potássio intravenoso, com monitorização frequente dos eletrólitos a cada 6 horas."}],"correta":"D","resposta":"A administração de solução a 0,9% neste paciente sintomático está adequada pois oferece uma abordagem completa e equilibrada para a correção dos distúrbios hidroeletrolíticos apresentados, com monitorização adequada. As demais alternativas cometem erros ao propor condutas inadequadas, como o uso de diuréticos, monitorização insuficiente e reposição oral de potássio além de incorretamente sugerir o uso de corticosteróides sem evidência de insuficiência adrenal, além de não considerar a verdadeira causa da hipotensão.","needs_distractors":false},{"year":"2024.2","qnum":5,"enunciado":"(UNIDEP) Paciente de 62 anos, sexo masculino, com histórico de hipertensão arterial há 10 anos. O paciente apresenta: - Creatinina sérica: 2,6 mg/dL - Taxa de filtração glomerular estimada (TFGe): 35 mL/min/1,73 m² - Proteína na urina: 1,8 g/24 horas - Hemoglobina: 10 g/dL. Qual é a classificação da doença renal crônica (DRC) deste paciente, conforme a classificação da National Kidney Foundation (NKF) e da Sociedade Internacional de Nefrologia (ISN)?","alternativas":[{"letra":"A","texto":"DRC Estágio 5 (Insuficiência Renal)."},{"letra":"B","texto":"DRC Estágio 3B (Risco Alto)."},{"letra":"C","texto":"DRC Estágio 3A (Risco Moderado)."},{"letra":"D","texto":"DRC Estágio 4 (Risco Muito Alto)."}],"correta":"B","resposta":"DRC Estágio 3A (Risco Moderado):\\n\\n- TFGe entre 45-59 mL/min/1,73 m² - Presença de lesão renal Não se aplica ao caso, pois a TFGe do paciente é abaixo de 45 mL/min/1,73 m². DRC Estágio 3B (Risco Alto):\\n\\n- TFGe entre 30-44 mL/min/1,73 m² - Presença de lesão renal Corresponde ao caso, pois o paciente tem TFGe de 35 mL/min/1,73 m² e proteinúria. DRC Estágio 4 (Risco Muito Alto):\\n\\n- TFGe entre 15-29 mL/min/1,73 m² - Presença de lesão renal Não se aplica ao caso, pois a TFGe do paciente é acima de 30 mL/min/1,73 m². DRC Estágio 5 (Insuficiência Renal):","needs_distractors":false},{"year":"2024.2","qnum":6,"enunciado":"(FMIT) Um paciente de 18 anos, sexo masculino, chega à Unidade Básica de Saúde com queixa de dor abdominal há 24 horas, iniciada na região periumbilical e migrando para o quadrante inferior direito. Ele apresenta náuseas, febre baixa (37,8 °C) e anorexia. Ao exame físico, nota-se dor à palpação no quadrante inferior direito do abdômen e sinal de Blumberg positivo. Diante do quadro clínico apresentado, qual é a conduta mais adequada?","alternativas":[{"letra":"A","texto":"Encaminhar o paciente imediatamente para o hospital, considerando suspeita de apendicite aguda."},{"letra":"B","texto":"Prescrever antibiótico de largo espectro e observar evolução nas próximas 48 horas."},{"letra":"C","texto":"Orientar repouso domiciliar e analgésico, com retorno em 24 horas para reavaliação."},{"letra":"D","texto":"Solicitar exames laboratoriais na UBS e aguardar os resultados antes de tomar uma decisão."}],"correta":"A","resposta":"O quadro clínico apresentado pelo paciente (dor abdominal migratória para o quadrante inferior direito, náuseas, febre e sinal de Blumberg positivo) é altamente sugestivo de apendicite aguda, uma condição cirúrgica de emergência. A apendicite pode evoluir rapidamente para complicações graves, como perfuração e peritonite, se não for tratada prontamente. Portanto, o encaminhamento imediato para um hospital é essencial para confirmação diagnóstica e tratamento cirúrgico. Condutas como aguardar exames na UBS, observar a evolução ou prescrever apenas analgésicos ou antibióticos sem encaminhamento adequado podem atrasar o diagnóstico e aumentar o risco de complicações.","needs_distractors":false},{"year":"2024.2","qnum":7,"enunciado":"(AFYA PARAÍBA) Um menino de 8 anos é trazido pelos pais para avaliação na Unidade Básica de Saúde devido à preocupação com o seu comportamento. Desde a primeira infância, a criança tem demonstrado dificuldades em interações sociais. Ele raramente faz contato visual e tem um padrão de linguagem limitado, falando poucas palavras e repetindo frases. Na escola, ele prefere brincar sozinho e demonstra resistência a mudanças na rotina. Além disso, apresenta comportamentos repetitivos, como balançar o corpo para frente e para trás e fica fascinado por tópicos específicos, como números e calendários, aos quais dedica longos períodos de tempo. Com base no caso descrito, marque a alternativa que apresenta o diagnóstico mais provável.","alternativas":[{"letra":"A","texto":"Transtorno de espectro autista."},{"letra":"B","texto":"Transtorno de déficit de atenção e hiperatividade."},{"letra":"C","texto":"Transtorno compulsivo."},{"letra":"D","texto":"Transtorno de ansiedade generalizada."}],"correta":"A","resposta":"Resposta correta: Transtorno do Espectro Autista (TEA) Justificativa:\\n\\nAs características do quadro descrito são compatíveis com TEA, incluindo dificuldades na comunicação social, comportamentos repetitivos e interesses restritos. Essas características são centrais para o diagnóstico do TEA, de acordo com o DSM-5 (American Psychiatric Association). O TEA é caracterizado por desafios persistentes na comunicação e interação social, além de padrões de comportamento restritos e repetitivos. Outros transtornos, como ansiedade ou TDAH, podem apresentar alguns sintomas semelhantes, mas o quadro clínico completo descrito é mais típico de TEA.","needs_distractors":false},{"year":"2024.2","qnum":8,"enunciado":"(FESAR) Mulher cisgênero de 20 anos procura atendimento de urgência devido à erupção cutânea nos membros inferiores, semelhante a um rash. Nos últimos dias, relatou sangramento nasal prolongado em duas ocasiões e o surgimento de hematomas. Ao exame físico, observaram-se equimoses e petéquias presentes nos membros inferiores. Laboratório evidenciou: Plaquetas de 16.800/mL; VCN = 84Fl; leucócitos dentro da normalidade. Para prosseguir com o plano terapêutico, a paciente foi internada e encaminhada para enfermaria. Com base nas informações, assinale a alternativa que contenha a conduta inicial mais adequada para este caso.","alternativas":[{"letra":"A","texto":"Anti-histamínicos."},{"letra":"B","texto":"Imunoglobulina intravenosa."},{"letra":"C","texto":"Glicocorticoides."},{"letra":"D","texto":"Transfusão de plaquetas imediata."}],"correta":"C","resposta":"O tratamento inicial da PTI geralmente envolve o uso de corticosteroides, como a prednisona. A ideia é diminuir a atividade do sistema imune para preservar as plaquetas. Após a melhora da contagem de plaquetas, a dose da prednisona deve ser reduzida gradualmente. INCORRETA. A imunoglobulina (400 mg/dia por 5 dias ou 1 g/dia por 2 dias) é indicada em sangramentos graves ou plaquetas muito baixas. A paciente deste caso não se encaixa nesses critérios. INCORRETA. A transfusão de plaquetas em pacientes com púrpura trombocitopênica imune (PTI) não é a abordagem mais eficaz. A PTI é uma doença autoimune, onde o próprio organismo produz anticorpos que destroem as plaquetas. Ao receber uma transfusão de plaquetas, estas novas células também serão atacadas por esses anticorpos, limitando a efetividade do tratamento e expondo o paciente aos riscos inerentes a qualquer transfusão de sangue. INCORRETA. Anti-histamínicos não possuem efeito sobre a contagem de plaquetas e não são indicados para o tratamento da PTI. Além disso, não há evidências de uma reação alérgica ou aumento dos níveis de histamina que justifiquem o uso de um anti-histamínico neste caso.","needs_distractors":false},{"year":"2024.2","qnum":9,"enunciado":"(FMIT) Uma gestante de 19 anos, no primeiro trimestre da gestação, com 10 semanas, pela DUM (data da última menstruação) e pela ultrassonografia de primeiro trimestre, dá entrada na emergência da maternidade com quadro de febre, dor abdominal em baixo ventre, sangramento vaginal em pequena a moderada quantidade e queixa de secreção vaginal de início há 2 dias. Sinais vitais à admissão: TAX 39ºC, FC 92 bpm, PA 110x70 mmHg, FR=20 irpm. Ao exame físico apresentava-se com dor à palpação em região inferior do abdome, sem sinais de irritação peritoneal. Ao exame especular observava-se: secreção purulenta exteriorizando através de orifício externo de colo uterino. A ultrassonografia realizada é sugestiva de abortamento incompleto infectado. A conduta adequada para a paciente é:","alternativas":[{"letra":"A","texto":"Realizar a curetagem uterina AMIU (aspiração manual intra uterina) imediatamente logo após a internação, para esvaziar a cavidade uterina e depois do procedimento administrar antibióticos e/ou analgésicos."},{"letra":"B","texto":"Monitorar a paciente clinicamente por 48 horas, com sinais vitais, iniciando administração de antibiótico e analgésicos imediatamente na internação, antes de qualquer intervenção, a menos que haja sangramento intenso."},{"letra":"C","texto":"Prescrever imediatamente na internação analgésicos e medicações sintomáticas e aguardar a expulsão espontânea do conteúdo uterino, utilizando misoprostol, que é o método menos invasivo para estes casos."},{"letra":"D","texto":"Iniciar antibioticoterapia intravenosa imediatamente na internação, e logo que possível, preparar a paciente para realizar curetagem uterina ou AMIU (aspiração manual intra uterina), se a mesma estiver clinicamente estável."}],"correta":"D","resposta":"A condução de um aborto infectado requer uma abordagem cuidadosa para prevenir complicações graves, como sepse. A opção mais apropriada é:\\n\\nIniciar antibioticoterapia intravenosa e realizar curetagem uterina ou AMIU (aspiração manual intra uterina) após estabilização da paciente, pois envolve:\\n\\nDe acordo com Zugaib, a abordagem para o aborto infectado deve incluir:\\n\\n1. 1. Antibioticoterapia : A administração de antibióticos intravenosos é essencial para tratar a infecção e prevenir complicações sépticas. O tratamento deve ser iniciado assim que o aborto infectado for diagnosticado.\\n\\n2. Curetagem Uterina ou AMIU : A curetagem ou AMIU deve ser realizada para remover o conteúdo uterino retido, mas somente após a estabilização da paciente. Isso é crucial para evitar a progressão da infecção e garantir a segurança do procedimento.\\n\\n3. O abortamento infectado é uma condição que coloca em risco a vida da mulher, se evoluir para sepse ou choque séptico ne cessita de imediata reanimação, esvaziamento uterino e antibioticoterapia de amplo espectro. (ACOG) Análise das Alternativas incorretas:\\n\\nRealizar a curetagem uterina ou AMIU imediatamente, sem administração prévia de antibióticos : Essa abordagem pode expor a paciente a riscos maiores de complicações, pois a infecção pode ser agravada sem o uso de antibióticos. Monitorar a paciente por 24 horas antes de qualquer intervenção, a menos que haja sangramento intenso : O monitoramento pode ser importante, mas a infecção requer intervenção imediata. A espera pode levar a complicações sérias. Prescrever apenas analgésicos e aguardar a expulsão espontânea do conteúdo uterino : Essa conduta é inadequada em casos de aborto infectado, pois não trata a infecção e pode resultar em um agravamento do quadro clínico. REFERÊNCIA DA QUESTÃO:\\n\\nMORAES, L. M.; SILVA, A. L. Aborto espontâneo e suas complicações. Revista Brasileira de Ginecologia e Obstetrícia , São Paulo, v. 40, n. 7, p. 389-396, 2018. DOI: 10.1056/S0004- 27302018000700002. ZUGAIB, M. Aborto: diagnóstico e tratamento. In: Obstetrícia . São Paulo: Atheneu, 2021. p. 205- 210. AMERICAN COLLEGE OF OBSTETRICIANS AND GYNECOLOGISTS (ACOG). Practice Bulletin: Early Pregnancy Loss . Obstetrics & Gynecology, v. 130, n. 6, p. e203-e216, 2022. DOI:\\n\\n10.1097/AOG.0000000000004975.","needs_distractors":false},{"year":"2024.2","qnum":10,"enunciado":"(FASA VIC) Paciente de 35 anos, deu entrada em pronto atendimento com história de múltiplas hospitalizações nos últimos dois anos devido a uma variedade de sintomas físicos inexplicáveis, incluindo dor abdominal intensa, dor articular em grandes articulações, fraqueza generalizada e convulsões. Ele relata ter sido submetido a numerosos exames e procedimentos médicos invasivos, mas nenhum diagnóstico médico definitivo foi estabelecido até o momento. O paciente conhece bem os termos médicos e frequentemente menciona experiências anteriores com diferentes especialistas. Além disso, ele expressa um desejo frequente de ser hospitalizado e busca constantemente atenção médica. Qual é o diagnóstico mais provável para esse paciente?","alternativas":[{"letra":"A","texto":"Transtorno de Somatização"},{"letra":"B","texto":"Transtorno Factício"},{"letra":"C","texto":"Transtorno de Conversão"},{"letra":"D","texto":"Transtorno de Ansiedade Generalizada"}],"correta":"B","resposta":"A resposta correta é Transtorno Factício . Este transtorno envolve a fabricação deliberada ou simulação de sintomas físicos ou psicológicos para assumir o papel de paciente. Indivíduos com esse transtorno geralmente têm um histórico de múltiplas hospitalizações e procedimentos médicos desnecessários. Eles buscam atenção médica de forma persistente e são altamente conhecedores da linguagem e dos procedimentos médicos, como observado no caso apresentado. Os principais diagnósticos diferenciais incluem:\\n\\nTranstorno de Somatização : Este transtorno envolve múltiplos sintomas físicos, mas não há intenção deliberada de simular ou causar esses sintomas. Transtorno de Conversão : Caracterizado pela presença de sintomas neurológicos sem causa orgânica identificável, como paralisia ou convulsões. No entanto, no transtorno de conversão, os sintomas não são intencionalmente fabricados. Transtorno de Ansiedade Generalizada : Envolve preocupação e ansiedade excessivas sobre uma variedade de eventos ou atividades, mas não está associado à simulação de sintomas físicos.","needs_distractors":false},{"year":"2024.2","qnum":11,"enunciado":"(FIPGUANAMBI) Paciente jovem, comparece à UBS com histórico de febre alta (39ºC ) intermitente, de início abrupto há 4 dias, associado a cefaleia, adinamia, astenia, mialgia e dor retro-ocular. Nega artralgia, conjuntivite e sintomas respiratórios. Como ele reside em região endêmica para arboviroses, o medico do PSF pensou na Dengue como hipótese mais provável. Considerando os aspectos clínicos e o tempo de doença, qual o exame mais indicado para confirmação diagnóstica neste caso?","alternativas":[{"letra":"A","texto":"Hematócrito, contagem de plaquetas e dosagem de albumina."},{"letra":"B","texto":"Demonstração de soroconversão de anticorpos por Hemaglutinação."},{"letra":"C","texto":"Pesquisa de anticorpos IgM e IgG por testes sorológicos."},{"letra":"D","texto":"Pesquisa da proteína não estrutural 1 (NS1)."}],"correta":"D","resposta":"Em razão da semelhança entre alguns sinais e sintomas de dengue, Zika e chikungunya, recomenda-se, em caso de a suspeita inicial ser dengue, que a testagem seja iniciada por métodos diretos em amostras coletadas até o quinto dia de início de sintomas. Para dengue, a proteína não estrutural 1 (NS1) é uma glicoproteína altamente conservada, presente em altas concentrações no soro de pacientes infectados pelo vírus, razão pela qual pode ser identificado logo após o surgimento dos sintomas na fase aguda da doença e antes do aparecimento de anticorpos específicos. O hematócrito, a contagem de plaquetas e a dosagem de albumina não são exames para o diagnóstico de dengue. Auxiliam na avaliação e no monitoramento dos pacientes com suspeita ou diagnóstico confirmado de dengue, especialmente os que apresentarem sinais de alarme ou gravidade. Já a pesquisa de anticorpos IgM e IgG por testes sorológicos e a demonstração de soroconversão de anticorpos por Hemaglutinação são métodos indiretos, e terão sua positividade identificada em períodos mais tardios da doença.","needs_distractors":false},{"year":"2024.2","qnum":12,"enunciado":"(UNISL PORTO VELHO) Uma paciente adulta será submetida a uma colecistectomia eletiva. Durante a consulta pré-operatória, foram identificadas alterações no perfil de coagulação, e o cirurgião recomenda uma avaliação com o hematologista. Assinale a alternativa que contém os exames mais adequados a serem solicitados .","alternativas":[{"letra":"A","texto":"Glicemia de jejum para excluir distúrbios metabólicos que possam interferir na cirurgia, REMIT e processo de coagulação."},{"letra":"B","texto":"Dosagem de creatinina sérica para verificar a função renal e possíveis interferências na coagulação."},{"letra":"C","texto":"Tempo de protrombina (TP) e Tempo de tromboplastina parcial ativada (TTPa) para investigar as vias de coagulação."},{"letra":"D","texto":"Hemograma completo para avaliar as contagens de plaquetas e tamanho das hemácias e outros componentes sanguíneos."}],"correta":"C","resposta":"Os exames Tempo de protrombina (TP) e Tempo de tromboplastina parcial ativada (TTPa) são os mais indicados para investigar alterações no sistema de coagulação, pois avaliam as vias extrínseca e intrínseca da coagulação. Eles ajudam a identificar possíveis distúrbios que podem impactar o risco de sangramento durante e após a cirurgia. Hemograma completo: Embora útil para avaliar a contagem de plaquetas, o hemograma não avalia diretamente as vias da coagulação, que é o foco principal no cenário de alterações de coagulação. Dosagem de creatinina sérica: A creatinina avalia a função renal, o que é importante para a saúde geral do paciente, mas não é o exame indicado para investigar alterações específicas da coagulação. Glicemia de jejum: A glicemia ajuda a monitorar distúrbios metabólicos, como diabetes, mas não tem relação direta com a avaliação do sistema de coagulação.","needs_distractors":false},{"year":"2024.2","qnum":13,"enunciado":"(UNIDEP) Um paciente do sexo masculino, 68 anos, aposentado, comparece à unidade de saúde com queixas de perda de peso inexplicável nos últimos 6 meses (aproximadamente 8 kg), episódios frequentes de diarreia crônica e fadiga intensa. O paciente relata também febre vespertina intermitente e sudorese noturna. Ao ser questionado sobre sua vida sexual, o paciente informa que tem um parceiro fixo e não usa preservativo regularmente. Ao exame físico, nota-se emagrecimento importante, com índice de massa corporal (IMC) de 18,5 kg/m², linfadenopatia generalizada e candidíase oral. Considerando as informações acima, analise as alternativas abaixo e selecione a correta:","alternativas":[{"letra":"A","texto":"Por ser um paciente idoso, algumas hipóteses diagnósticas não devem ser elencadas, como HIV."},{"letra":"B","texto":"Considerando o quadro clínico do paciente, deverá ser solicitado contagem de CD4 para o paciente para fechar o diagnóstico."},{"letra":"C","texto":"Um diagnóstico provável é de HIV e deve ser realizado teste rápido na unidade de saúde, sempre com consentimento do paciente."},{"letra":"D","texto":"Considerando a possibilidade do diagnóstico ser de HIV, o paciente deve ser referenciado ao centro de testagem e aconselhamento do município."}],"correta":"C","resposta":"Os testes rápidos são realizados na unidade de saúde e sempre devem ser consentidos pelo usuário. A história clínica é sugestiva de HIV e o seguimento adequado será dado ao paciente após a realização do teste. Se positivo, deverá ser realizado outro exame de outra marca. Se os resultados forem divergentes, deverá ser solicitado exame laboratorial para a confirmação.","needs_distractors":false},{"year":"2024.2","qnum":14,"enunciado":"(AFYA IPATINGA) Paciente primigesta de 38 semanas de gestação foi admitida para a assistência ao trabalho de parto. Estava com 2 cm de dilatação, feto no plano – 3 de de Lee, BCF:\\n\\n152 bpm, bolsa íntegra e apresentou 2 contrações de 15 segundos durante 10 minutos, no momento de sua admissão. Foi reavaliada após 3 horas e estava com a mesma dilatação e as mesmas contrações e o BCF: 125 bpm. Segundo as recomendações do ALSO, qual a conduta adequada para a paciente?","alternativas":[{"letra":"A","texto":"Realizar cesárea para a extração fetal."},{"letra":"B","texto":"Articular o fórceps para a extração fetal."},{"letra":"C","texto":"Aguardar entrar em fase ativa do trabalho de parto."},{"letra":"D","texto":"Iniciar ocitocina para acelerar o trabalho de parto."}],"correta":"C","resposta":"A paciente não encontra se em fase ativa do trabalho de parto portanto, deve receber alta médica com orientações quanto aos sinais / sintomas para retornar ao hospital. Segundo o ALSO, fase ativa do trabalho de parto caracteriza se por 6 cm ou mais de dilatação do colo uterino associada a contrações uterinas eficientes e duradouras. Não existe indicação médica para a realização de cesárea e, como está com 38 semanas, não é recomendada realização de cesárea a pedido. Não existe nenhuma indicação ou critério médico para alocar fórceps no caso apresentado bem como uso de ocitocina. Analgesia deve ser administrada em fase ativa do trabalho de parto e a mesma não acelera o processo. A paciente não está em fase ativa e não possui indicação médica para interrupção da gestação neste momento, deve portanto, receber alta medica com orientações quanto a sinais e sintomas para retorno ao hospital.","needs_distractors":false},{"year":"2024.2","qnum":15,"enunciado":"(FIPGUANAMBI) Uma paciente grávida de 32 semanas é admitida na maternidade com quadro de emergência hipertensiva. Ao exame, apresenta pressão arterial de 180/110 mmHg, cefaleia intensa, edema generalizado e oligúria. A gasometria arterial mostra pH de 7,33, bicarbonato de 17 mEq/L, sódio 130mEq/L, cálcio 1,2mmol/L, Magnésio 2,2 mg/dL, potássio 3,7mEq/L. Qual dos seguintes distúrbios hidroeletrolíticos e sua correlação com o quadro clínico é a mais provável?","alternativas":[{"letra":"A","texto":"Hipermagnesemia, resultante da terapia de sulfato de magnésio, levando a hipotonia e comprometimento respiratório como complicações adicionais."},{"letra":"B","texto":"Hipocalemia, levando a arritmias cardíacas graves, relacionadas à diminuição do volume plasmático e redução da perfusão renal."},{"letra":"C","texto":"Hiponatremia dilucional associada a síndrome de secreção inapropriada de hormônio antidiurético (SIADH), contribuindo para o edema e sintomas neurológicos."},{"letra":"D","texto":"Hipernatremia, provocando edema cerebral e sintomas neurológicos, que são comuns em pré- eclâmpsia grave."}],"correta":"C","resposta":"Na emergência hipertensiva gestacional, distúrbios hidroeletrolíticos como hiponatremia dilucional são frequentes e podem ocorrer devido à SIADH, contribuindo para o edema e sintomas neurológicos associados ao quadro clínico. A terapia com sulfato de magnésio (resposta D) é frequentemente usada em pré-eclâmpsia, mas a paciente aqui não apresenta sinais de hipermagnesemia e nem de hipocalcemia. A gasometria evidencia uma hiponatremia.","needs_distractors":false},{"year":"2024.2","qnum":16,"enunciado":"(UNIGRANRIO DUQUE DE CAXIAS) Escolar de 8 anos, sexo masculino, é levado ao pronto- socorro com queixas de dor abdominal intensa e difusa, acompanhada de febre, vômitos biliosos e falta de apetite nas últimas 12 horas. No exame físico, observa-se abdome distendido, doloroso à palpação, com sinais de defesa e ruídos hidroaéreos diminuídos. Os sinais vitais mostram taquicardia (frequência cardíaca de 130 bpm), hipotensão e extremidades frias. Exames laboratoriais revelam leucocitose com desvio à esquerda, aumento de PCR e gasometria arterial com lactato de 6mmol/L. A tomografia computadorizada de abdome indica sinais de apendicite complicada com abscesso e possível peritonite. Qual é a classificação mais provável de choque neste paciente?","alternativas":[{"letra":"A","texto":"Séptico."},{"letra":"B","texto":"Neurogênico."},{"letra":"C","texto":"Cardiogênico."},{"letra":"D","texto":"Hipovolêmico."}],"correta":"A","resposta":"Choque séptico (Correta):\\n\\nO choque séptico é uma complicação comum em casos de infecções graves e pode surgir em crianças com abdome agudo inflamatório, como na apendicite complicada. Este tipo de choque caracteriza-se pela resposta inflamatória sistêmica associada à infecção, levando a taquicardia, febre, hipotensão e, em alguns casos, extremidades frias. No contexto de apendicite com peritonite, o choque séptico é a classificação mais provável devido à presença de febre, sinais de resposta inflamatória e alterações nos sinais vitais. Choque hipovolêmico:\\n\\nO choque hipovolêmico em pediatria geralmente ocorre devido à perda de líquidos extracelulares, como em casos de vômito e diarreia graves. Embora taquicardia e hipotensão possam estar presentes, o choque hipovolêmico não está associado a infecção intra-abdominal. Em casos de abdome agudo inflamatório, especialmente com peritonite, a causa mais provável do choque seria de natureza infecciosa e inflamatória, como o choque séptico. Choque cardiogênico:\\n\\nO choque cardiogênico ocorre devido à falha do coração em bombear sangue adequadamente, podendo ser causado por doenças cardíacas ou, em casos raros, por infecções que afetam diretamente o miocárdio. Os sinais incluem taquicardia, hipotensão e, muitas vezes, congestão pulmonar. No entanto, o choque cardiogênico não é uma consequência típica de abdome agudo inflamatório, sendo uma causa improvável neste caso pediátrico com apendicite complicada. Choque neurogênico:\\n\\nChoque neurogênico ocorre devido à disfunção do sistema nervoso autônomo, geralmente em resposta a uma lesão medular ou trauma que leva à perda de tônus vasomotor. É caracterizado por hipotensão e, muitas vezes, frequência cardíaca normal ou baixa, sem extremidades frias. Esse tipo de choque é improvável em casos de abdome agudo com causa infecciosa e inflamatória, como na apendicite complicada com peritonite.","needs_distractors":false},{"year":"2024.2","qnum":17,"enunciado":"(AFYA IPATINGA) Primípara de 27 anos, gestação de alto risco com 29 semanas e 3 dias, em acompanhamento devido a quadro de pré eclampsia, em uso de metildopa. Evoluiu com PAS (pressão arterial sistólica) = 210 mmHg, sem melhora após medicamentos administrados. Realizada avaliação da vitalidade fetal, que foi desfavorável, sendo indicada cesariana de urgência. O recém nascido apresentava respiração tipo gasping e tônus diminuído. Segundo o Manual de Reanimação do RN < 34 semanas, a conduta inicial a ser adotada é:","alternativas":[{"letra":"A","texto":"aguardar 30 segundos para clampar o cordão umbilical e proceder ventilação com pressão positiva com FiO2 à 21 % sob calor radiante."},{"letra":"B","texto":"aguardar 30 segundos para proceder o clampeamento do cordão umbilical objetivando prevenção da anemia da prematuridade."},{"letra":"C","texto":"iniciar massagem cardíaca se ao final dos primeiros 30 segundos de vida e após a ausculta de precórdio por 10 segundos, a frequência cardíaca estiver abaixo de 60 bpm."},{"letra":"D","texto":"clampear o cordão imediatamente, levar para a unidade de calor radiante para evitar a hipotermia e colocar em saco plástico com touca dupla, sem que seja previamente secado."}],"correta":"D","resposta":"Segundo a última atualização do Manual de Reanimação do Recém Nascido < 34 semanas, por não haver choro e/ou respiração adequada + presença de tônus em flexão ao nascer, o cordão deve ser imediatamente clampeado, independente da resposta aos estímulos no dorso feitos pelo obstetra, com intuito único de acelerar a primeira respiração do bebê. Gasping não é padrão adequado, associado a ausência de tônus, mantém a indicação de clampeamento imediato do cordão umbilical. Após 30 segundos de vida, se ausculta de precórdio informar FC < 60 bpm, está indicado 1 ciclo de VPP com Fio2 30% e não massagem cardíaca, que só pode ser iniciada após intubação deste recém nascido. Sendo assim, apenas a alternativa que indica clampeamento imediato do cordão e realização de primeiros passos sem que o recém nascido seja secado está correta.","needs_distractors":false},{"year":"2024.2","qnum":18,"enunciado":"(UNITPAC) Paciente de 17 anos é trazida ao consultório pela mãe que está preocupada com a perda de peso significativa da filha nos últimos seis meses. A paciente, que costumava pesar 58 kg, agora pesa 42 kg, com IMC de 16,2. Apesar da magreza extrema, ela insiste que se sente \\"gorda\\" e tem um medo intenso de ganhar peso. Relata que reduziu drasticamente a ingestão de alimentos, especialmente carboidratos e gorduras, e está praticando exercícios físicos excessivos diariamente. Recusa-se a comer em frente a outras pessoas e desenvolveu rituais alimentares como cortar a comida em pedaços minúsculos e consumir apenas alimentos de baixa caloria. Durante a consulta, admite que se sente exausta, mas não vê problemas em seu comportamento alimentar, afirmando que está \\"apenas tentando ser saudável\\". A mãe relata que a filha não menstruou nos últimos quatro meses, e a paciente acredita que isso é um sinal de que seu corpo está se \\"ajustando a um estilo de vida mais saudável\\". Com base no caso clínico, pensando na principal hipótese diagnóstica e suas repercussões podemos inferir que pacientes com este quadro experimentam sintomatologia significativa, de forma frequente, mas não exclusiva, relacionada à:","alternativas":[{"letra":"A","texto":"depressão, funcionamento anormal do hormônio reprodutivo, mas também hipotermia, taquidicardia, ortostase e reservas de gordura corporal severamente reduzidas;"},{"letra":"B","texto":"inanição, funcionamento anormal do hormônio reprodutivo, mas também hipotermia, bradicardia, ortostase e reservas de gordura corporal severamente reduzidas;"},{"letra":"C","texto":"depressão, involuntariamente reduzem e mantém um grau doentio de perda de peso ou não conseguem ganhar peso proporcional ao crescimento;"},{"letra":"D","texto":"inanição, funcionamento normal do hormônio reprodutivo, mas também hipotermia, bradicardia, ortostase e reservas de gordura corporal severamente reduzidas;"}],"correta":"B","resposta":"Resposta correta: Indivíduos com essa patologia experimentam sintomatologia médica significativa relacionada à inanição, de forma frequente, mas não exclusiva, funcionamento anormal do hormônio reprodutivo, mas também hipotermia, bradicardia, ortostase e reservas de gordura corporal severamente reduzidas.\\n\\nJustificativa: O quadro clínico de Carolina é característico de Anorexia Nervosa , uma condição marcada por uma redução extrema da ingestão alimentar, intensa preocupação com o peso e uma distorção da imagem corporal. Além disso, os sinais médicos mais comuns relacionados à anorexia incluem alterações hormonais (como amenorreia, que Carolina apresenta), hipotermia, bradicardia (observada na consulta com frequência cardíaca de 50 bpm), e reservas de gordura corporal significativamente reduzidas devido à desnutrição. Erro das alternativas incorretas:\\n\\nSintomatologia médica significativa relacionada à depressão, taquidicardia...\\n\\nErro: Embora a depressão possa estar associada à anorexia nervosa, a taquicardia é incompatível com o quadro típico de anorexia. Na anorexia, bradicardia é mais comum devido à desnutrição e efeitos metabólicos. Funcionamento normal do hormônio reprodutivo...\\n\\nErro: A anorexia nervosa frequentemente causa disfunção hormonal , levando a amenorreia (ausência de menstruação), como observado no caso de Carolina. O funcionamento hormonal não é normal nesses pacientes. Involuntariamente reduzem o peso...\\n\\nErro: Na anorexia nervosa, a perda de peso é intencional . Os pacientes têm um medo intenso de ganhar peso e adotam comportamentos para restringir a ingestão de alimentos. Portanto, a redução de peso não é involuntária.","needs_distractors":false},{"year":"2024.2","qnum":19,"enunciado":"(UNIREDENTOR) Paciente masculino, 64 anos, esteve em atendimento na UBS devido queixas de de dispneia, mal-estar, hematomas subungueais, palidez e cianose, além de estar apresentado eritema nodoso há 1 semana, onde o diagnóstico de Hanseníase foi suspeitado, trazendo hoje o diagnóstico através da baciloscopia positiva. Irá iniciar a poliquimioterapia. Traz consigo alguns exames já solicitados e realizados, com os seguintes resultados:\\n\\nHemoglobina 10 (12-18 g/dL) Hematócrito 30% ( 36-50%) VCM 88 (80-97) CHM 32 (32 a 38) Ferro sérico 33 (65 e 165 μg/dL) VHS 85 ( <20) Ferritina 250 (30 -250 pmol/L) PCR 24 (<6) Diante do apresentado, marque a alternativa correta quanto ao diagnóstico e ao plano terapêutico indicada:","alternativas":[{"letra":"A","texto":"Trata-se de uma anemia ferropriva, já que este é o tipo mais comum de anemia, e a terapêutica consiste em suplementação de sulfato ferroso."},{"letra":"B","texto":"O hemograma está normal, não apresenta alterações com relevância clínica, não sendo necessário tratamento."},{"letra":"C","texto":"Devido ao quadro de hanseníase, o paciente evoluiu com anemia megaloblástica por deficiência de vitamina B12, tendo agora que suplementar B12 via IM."},{"letra":"D","texto":"A provável causa de anemia se dá devido o aumento de citocinas inflamatórias; logo, tratando a doença de base, se tratará a anemia."}],"correta":"D","resposta":"Paciente apresenta uma doença infecciosa ainda sem tratamento adequado, evoluindo com anemia normocrômica e normocítica, além de reagentes de fase aguda ( VHS e PCR) aumentados, justificando a hipótese diagnóstica de anemia de doença crônica. Conduta no caso de ADC:\\n\\n“O tratamento dessa anemia nem sempre é necessário, pois sendo ela discreta, habitualmente não determina qualquer limitação funcional. O tratamento da doença básica responsável pela ADC, quando eficaz, associa-se à melhora do quadro hematológico.”","needs_distractors":false},{"year":"2024.2","qnum":20,"enunciado":"(UNIFIPMOC) Gestante de 32 anos, G3P2A0, idade gestacional de 9 semanas e 4 dias, procura atendimento na maternidade com queixa de sangramento vaginal iniciado há 13 dias, que evoluiu com secreção purulenta e odor fétido. Refere que hoje iniciou com dor abdominal tipo cólica e febre aferida de 38,4 °C. Ao exame apresentava-se: hipocorada, 1+/4+, hidratada, eupneica, sem edemas. Pressão arterial de 110/70mmHg, frequência cardíaca de 98 bpm, saturação de oxigênio de 98%, frequência respiratória de 18 ipm, temperatura axilar de 39 °C. Abdome doloroso à palpação profunda, principalmente em região suprapúbica. Exame especular: presença de sangramento com coágulos, associado a secreção purulenta e forte odor fétido. Toque vaginal:\\n\\nútero intrapélvico, dor à palpação uterina e à mobilização do colo, com colo pérvio. A principal hipótese diagnóstica e a conduta adequada são:","alternativas":[{"letra":"A","texto":"Aborto completo, indicar curetagem uterina e antibiótico venoso."},{"letra":"B","texto":"Aborto infectado, antibiótico venoso, exames e curetagem uterina."},{"letra":"C","texto":"Aborto retido, aguardar até 30 dias para conduta expectante."},{"letra":"D","texto":"Aborto infectado, iniciar antibiótico oral, realizar exames e indicar AMIU."}],"correta":"B","resposta":"Aborto retido, aguardar até 30 dias para conduta expectante. ERRADA. O aborto retido apresenta clínica de sangramento discreto, em pequena quantidade, sem sinais de infecção. As vezes um achado ultrassonográfico sem nenhum sintoma. Necessita ultrassonografia para confirmação. Aborto infectado, iniciar antibiótico oral, realizar exames e indicar AMIU. ERRADA. Realmente trata-se de aborto infectado, porém a antibioticoterapia necessita ser venosa. Aborto completo, indicar curetagem uterina e antibiótico venoso. ERRADA. O aborto completo apresenta quadro clínico de sangramento volumoso, seguido de interrupção do sangramento e alívio de dor. Não tem sinais de infecção como no caso acima. Aborto infectado, antibiótico venoso, exames e curetagem uterina. VERDADEIRA O aborto infectado é a terceira causa de morte materna no Brasil. Associação com abortamento provocado, causado por ascensão de bactérias vaginais e intestinais. E tem com sintomas:\\n\\nsangramento volumoso, febre, dor hipogástrio, dor a mobilização do colo uterino, leucorréia purulenta e fétida. No caso acima temos um quadro clássico de aborto infectado. Temos como tratamento: estabilizar a paciente; acesso venoso de grosso calibre; hidratação venosa; antibioticoterapia (clindamicina 900mg 8/8h+gentamicina 3-5mg/kg/dose única); ou Ampicilina(1-2gr 6/6h)+ gentamicina(3-5mg/kg/dia)+ metronidazol(500mg 8/8h) e esvaziamento cavidade uterina de acordo com idade gestacional (curetagem uterina ou AMIU). Sendo a opção que contempla a antibioticoterapia venosa e curetagem a mais adequada.","needs_distractors":false},{"year":"2024.2","qnum":21,"enunciado":"(UNISL PORTO VELHO) Uma gestante de 30 anos, G3P1A1, com 31 semanas de gestação, procura atendimento em uma maternidade com queixa de contrações uterinas regulares e dolorosas a cada 8 minutos, iniciadas há 4 horas. Ao exame físico observava-se: colo uterino com apagamento de 70% e dilatação de 2 cm. Os sinais vitais estão estáveis, sem sangramento vaginal ou perda de líquido amniótico. O histórico obstétrico da paciente inclui um parto prematuro na gestação anterior e uma perda fetal precoce. Os exames complementares revelavam:\\n\\nausência de infecção urinária e não havia amniorrexe (rompimento prematuro das membranas). Na cardiotocografia não havia evidências de sofrimento fetal. Qual a conduta inicial adequada para a paciente?","alternativas":[{"letra":"A","texto":"Infecções urinárias na gestação anterior. Encaminhar a paciente para parto cesáreo imediato, uma vez que o colo está dilatado e há risco de complicações fetais."},{"letra":"B","texto":"Administrar corticoide para maturação pulmonar fetal, iniciar tocólise para inibir as contrações e administrar sulfato de magnésio para neuroproteção fetal."},{"letra":"C","texto":"Permitir que o trabalho de parto progrida sem intervenção, pois o feto já está em idade gestacional viável, monitorando a vitalidade fetal."},{"letra":"D","texto":"Administrar antibiótico profilático e iniciar a indução do parto devido ao risco elevado de infecção intrauterina."}],"correta":"B","resposta":"Alternativa correta:\\n\\nAdministrar corticoide para maturação pulmonar fetal, iniciar tocólise para inibir as contrações e administrar sulfato de magnésio para neuroproteção fetal. Esta é a conduta padrão para gestantes com menos de 34 semanas de gestação em trabalho de parto prematuro, com foco na maturação pulmonar do feto (com corticoide), neuroproteção (com sulfato de magnésio) e retardamento do parto (tocólise) para reduzir os riscos associados à prematuridade. O objetivo é ganhar tempo e permitir que o feto se beneficie dessas intervenções. Alternativas incorretas:\\n\\nEncaminhar a paciente para parto cesáreo imediato, uma vez que o colo está dilatado e há risco de complicações fetais. Incorreta. A conduta de parto cesáreo imediato não é indicada nesse caso, pois os sinais vitais da paciente estão estáveis e não há sofrimento fetal na cardiotocografia. A dilatação cervical e o trabalho de parto prematuro sem sinais de complicação fetal ou materna não justificam uma cesárea emergencial. A prioridade é prolongar a gestação para reduzir os riscos da prematuridade. Permitir que o trabalho de parto progrida sem intervenção, pois o feto já está em idade gestacional viável, monitorando a vitalidade fetal. Incorreta. Embora o feto tenha boas chances de sobrevivência em 31 semanas, permitir que o trabalho de parto progrida sem intervenção não é adequado. O manejo deve focar em retardar o parto e permitir tempo para intervenções como corticoides e neuroproteção , que melhoram os desfechos neonatais. Apenas monitorar o feto não garante o melhor resultado, pois a prematuridade ainda apresenta riscos significativos. Administrar antibiótico profilático e iniciar a indução do parto devido ao risco elevado de infecção intrauterina. Incorreta. A administração de antibióticos profiláticos e a indução do parto não são indicadas neste caso, já que a paciente não apresenta sinais de infecção intrauterina ou rompimento das membranas (amniorrexe). A ausência de infecção e o padrão tranquilizador da cardiotocografia excluem a necessidade de medidas profiláticas com antibióticos ou indução de parto neste momento.","needs_distractors":false},{"year":"2024.2","qnum":22,"enunciado":"(AFYA ITABUNA) Qual dos seguintes sinais ou sintomas é mais comumente associado ao diagnóstico de malária em áreas endêmicas?","alternativas":[{"letra":"A","texto":"Tosse e dor torácica."},{"letra":"B","texto":"Perda de peso rápida e fadiga."},{"letra":"C","texto":"Dor abdominal e icterícia."},{"letra":"D","texto":"Cefaleia e febre intermitente."}],"correta":"D","resposta":"","needs_distractors":false},{"year":"2024.2","qnum":23,"enunciado":"(FIPGUANAMBI) Homem de 45 anos, diagnosticado com HIV há 10 anos, apresenta-se à UBS queixando-se de fezes com coágulos e dor abdominal em região mesogástrica e flanco esquerdo, intensa e sem relação com a alimentação. Nega hematêmese, febre ou diarreia. Ele tem estado em tratamento antirretroviral regular, com carga viral suprimida. No entanto, ele admite que ocasionalmente falha na adesão ao tratamento. No exame físico, o paciente está hipotenso, taquicardíaco e pálido, com sinais de desidratação. A anamnese revela um histórico de úlcera péptica tratada há cinco anos. Diante desse quadro clínico, qual dos seguintes diagnósticos é mais provável?","alternativas":[{"letra":"A","texto":"Úlcera péptica recorrente."},{"letra":"B","texto":"Colite ulcerativa."},{"letra":"C","texto":"Colite isquêmica."},{"letra":"D","texto":"Trombocitopenia imune."}],"correta":"C","resposta":"Pacientes com HIV têm um risco aumentado de desenvolver complicações gastrointestinais, incluindo colite isquêmica. Esta condição pode ser desencadeada por vários fatores, incluindo a própria infecção pelo HIV, uso de medicamentos antirretrovirais e outros fatores de risco como tabagismo, diabetes e hipertensão. A apresentação clínica com fezes com sangue vivo, dor abdominal intensa e sinais de choque sugerem uma hemorragia digestiva baixa significativa, que pode ser causada por colite isquêmica em pacientes com HIV.","needs_distractors":false},{"year":"2024.2","qnum":24,"enunciado":"(ITPAC PORTO NACIONAL) Adolescente de 12 anos é levado ao pronto-socorro com queixa de hematêmese e melena. Os sinais vitais indicam pressão arterial de 90/60 mmHg e frequência cardíaca de 150 bpm. O exame físico mostra palidez cutânea, mucosas secas, TEC 4s, pulsos filiformes. Considerando o diagnóstico sindrômico mais provável, qual deve ser a conduta inicial adequada para o manejo deste paciente?","alternativas":[{"letra":"A","texto":"Iniciar reposição volêmica com soro fisiológico 0,9% e realizar hemotransfusão, se necessário, seguido de encaminhamento para endoscopia digestiva."},{"letra":"B","texto":"Administrar antiemético, de preferência ondasetrona, e observar regressão do quadro por 24 horas, considerando tratar-se de um adolescente."},{"letra":"C","texto":"Realizar administração de inibidores da bomba de prótons (IBPs) e esperar melhora clínica antes de tomar outras medidas."},{"letra":"D","texto":"Prescrever dieta zero e aguardar avaliação da equipe cirúrgica, sem necessidade de monitorização hemodinâmica."}],"correta":"A","resposta":"Este caso clínico sugere um quadro de hemorragia digestiva alta , que pode ser identificado pelos sinais de hematêmese (vômito com sangue) e melena (fezes negras indicativas de sangue digestivo) . A criança apresenta sinais de choque hipovolêmico (hipotensão arterial, taquicardia, palidez, mucosas secas, tempo de enchimento capilar prolongado e pulsos filiformes), o que indica uma perda significativa de volume sanguíneo. Conduta: Reposição volêmica com cristaloides, como soro fisiológico a 0,9%, para estabilizar a hemodinâmica; A transfusão sanguínea deve ser considerada caso haja sinais de anemia grave ou instabilidade hemodinâmica persistente; A endoscopia digestiva é indicada após a estabilização inicial para identificar a fonte do sangramento e possibilitar o tratamento definitivo, se necessário. Administrar antiemético, de preferência ondasetrona, e observar regressão do quadro por 24 horas– INCORRETA. Em caso de hematêmese não há indicação de antiemético. A necessidade principal neste caso é, após resolução da condição de colapso cardiocirculatório, buscar a causa da hematêmese. Iniciar reposição volêmica com soro fisiológico 0,9% e realizar transfusão sanguínea, se necessário, seguido de encaminhamento para endoscopia digestiva. – CORRETA. Em casos de hemorragia digestiva significativa, como indicado pela presença de hematêmese, melena e sinais de choque hipovolêmico, a conduta inicial envolve estabilizar o paciente com reposição volêmica e, se necessário, transfusão sanguínea. Além disso, uma endoscopia digestiva deve ser realizada para diagnóstico e possível intervenção terapêutica. Realizar administração de inibidores da bomba de prótons (IBPs) e esperar melhora clínica antes de tomar outras medidas. – INCORRETA. Não há indicação de inibidores de bomba de prótons ou qualquer outro protetor gástrico até que seja resolvido o quadro de choque em que o paciente se encontra e determinada a causa da HDA. Prescrever dieta zero e aguardar avaliação da equipe cirúrgica, sem necessidade de monitorização hemodinâmica – INCORRETA. O primeiro passo na condução do caso é estabilização hemodinâmica do paciente, resolvendo o quadro de choque. Em seguida, é necessário realização de propedêutica complementar a fim de buscar a causa da HDA.","needs_distractors":false},{"year":"2024.2","qnum":25,"enunciado":"(IESVAP) Mulher de 55 anos, sem comorbidades conhecidas, é conduzida por familiares ao serviço de urgência com relato de hematêmese em grande volume (cerca de 2 litros) há 30 minutos. Desde então, paciente evoluiu com rebaixamento do nível de consciência. Ao exame físico, PA – 90x50 mmHG, FC- 128 bpm, FR- 32 irpm, tempo de enchimento capilar de 3 segundos, Escala de Coma de Glasgow – 11 (Abertura Ocular- 3, Resposta Verbal – 3, Resposta Motora- 5), ausência de déficits neurológicos focais. Filha relata que mãe, estava há 7 dias fazendo uso de um medicamento que foi receitado para dor em joelho e havia se queixado de epigastralgia nos últimos dias. De acordo com caso clínico, qual a melhor conduta nesta situação?","alternativas":[{"letra":"A","texto":"Paciente deve ser tratado com ferro endovenoso imediatamente, devido as perdas e solicitar exames laboratoriais para definir necessidade de transfusão."},{"letra":"B","texto":"Solicitar hemograma com urgência e transfundir 01 concentrado de hemácias se hemoglobina for menor que 7 g/dl."},{"letra":"C","texto":"Paciente deve ser submetido imediatamente a uma tomografia de crânio e abdome, pois a principal hipótese que justifique o rebaixamento do nível de consciência é acidente vascular encefálico."},{"letra":"D","texto":"Como trata-se de uma hemorragia
