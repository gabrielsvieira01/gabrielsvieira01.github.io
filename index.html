itui a drenagem , especialmente com febre e risco de complicação.\\n\\n• Cuidados locais isolados não são suficientes , e aguardar reavaliação adia um tratamento essencial — podendo evoluir para fístula ou sepse.\\n\\n• A retossigmoidoscopia não é indicada na fase aguda de abscesso doloroso , e o diagnóstico é clínico. Exames de imagem/endoscopia são reservados para suspeita de fístulas complexas, neoplasias ou doença de Crohn em fases posteriores.","needs_distractors":false},{"year":"2025.1","qnum":9,"enunciado":"(Banco AFYA) Um menino de 4 anos, sexo masculino, com história de sibilância prévia, é levado à emergência com quadro de tosse, febre e dispneia há 3 dias . Há cerca de 12 horas, evolui com piora do esforço respiratório e sonolência. Ao exame apresentava-se: sonolento, pouco responsivo, taquipneico (FR: 48 irpm ), com batimentos de asa do nariz, tiragem subcostal, cianose perioral , e saturação de oxigênio de 85% em ar ambiente . A ausculta pulmonar revelava sibilos difusos e murmúrio vesicular globalmente diminuído . Qual é mais adequada para a hipótese diagnóstica e a conduta adequada?","alternativas":[{"letra":"A","texto":"Desconforto respiratório leve, iniciar oxigenoterapia suplementar com máscara sem reservatório, tratar com broncodilatador inalatório via espaçador."},{"letra":"B","texto":"Insuficiência respiratória, iniciar oxigenoterapia com máscara com reservatório (não reinalante), broncodilatador inalatório via espaçador e considerar suporte ventilatório se não houver resposta."},{"letra":"C","texto":"Insuficiência respiratória, iniciar oxigenoterapia suplementar com cateter nasal com 1 l/min, broncodilatador inalatório via espaçador."},{"letra":"D","texto":"Desconforto respiratório, iniciar oxigenoterapia com máscara de Venturi, manter em observação."}],"correta":"B","resposta":"A alternativa \\"Classificar como insuficiência respiratória, iniciar oxigenoterapia suplementar, monitoramento contínuo e considerar suporte ventilatório se não houver resposta\\": Correta. A criança apresenta sinais clínicos claros de insuficiência respiratória, incluindo:\\n\\nSaturação < 90%, Cianose, Taquipneia acentuada, Tiragem e uso de musculatura acessória, Alteração do nível de consciência (prostração, resposta lenta). A conduta imediata deve incluir:\\n\\nOxigenoterapia com alta concentração (máscara com reservatório ou cânula de alto fluxo). Monitoramento contínuo de frequência respiratória, cardíaca e saturação. Avaliação precoce para suporte ventilatório não invasivo ou invasivo, caso não haja melhora com medidas iniciais, CPAP ou intubação orotraqueal.\\n\\nAlternativa: \\"Iniciar oxigenoterapia com máscara de Venturi, manter em observação por 2 horas e repetir a oximetria\\" Incorreta. A máscara de Venturi fornece frações fixas de oxigênio e não é adequada para hipoxemia grave, como neste caso. Caso o nível de consciência não melhore com oxigenioterapia, há indicação de intubação orotraqueal.\\n\\nAlternativa: insuficiência respiratória, iniciar oxigenoterapia suplementar com cateter nasal com 1l/min, broncodilatador inalatório via espaçador. Incorreta há critérios para insuficiência respiratória, mas o cateter nasal com 1l/min fornece baixo fluxo e FiO2 entre 24-40%.\\n\\nAlternativa: desconforto respiratório leve, iniciar oxigenoterapia suplementar com máscara sem reservatório, tratar com broncodilatador inalatório via espaçador. Incorreta, há critérios para insuficiência respiratória. Máscara seria com reservatório (não reinalante).","needs_distractors":false},{"year":"2025.1","qnum":10,"enunciado":"(UNIPTAN) Gestante de 32 semanas é admitida na maternidade com história de rotura prematura de membranas há mais de 18 horas, em trabalho de parto. O recém-nascido nasceu por parto vaginal e apresentava-se: flácido, com ausência de movimentos respiratórios e frequência cardíaca (FC) de 80 bpm. Peso estimado: 1.500 g. O pediatra coloca o bebê sob calor radiante, considerando a idade gestacional e o quadro clínico apresentado. Assinale qual das condutas abaixo está corretamente indicada no atendimento inicial do recém-nascido.","alternativas":[{"letra":"A","texto":"Realizar aspiração traqueal imediatamente ao nascimento, independente da presença de mecônio, e iniciar compressões torácicas se a frequência cardíaca estiver abaixo de 100 bpm."},{"letra":"B","texto":"Iniciar a reanimação com ventilação em pressão positiva (VPP) com oxigênio a 100%, utilizando cânula traqueal, mantendo o RN envolto em campos secos para evitar hipotermia e com monitorização de oximetria pré-ductal."},{"letra":"C","texto":"Utilizar máscara laríngea como via aérea inicial para realizar a ventilação com pressão positiva (VPP) nos RNs com menos de 34 semanas, associada ao uso precoce de adrenalina e expansão volêmica com soro fisiológico aquecido."},{"letra":"D","texto":"Garantir controle térmico com saco plástico sem secagem prévia, monitorizar oximetria pré- ductal, se FC abaixo de 100 bpm iniciar ventilação com pressão positiva (VPP) com máscara facial com oxigênio a 30% e avaliar resposta clínica antes de prosseguir com manobras adicionais."}],"correta":"D","resposta":"\\"Realizar aspiração traqueal imediatamente ao nascimento, independente da presença de mecônio, e iniciar compressões torácicas se a frequência cardíaca estiver abaixo de 100 bpm.\\" - Incorreta - A aspiração traqueal só é indicada se houver presença de secreção ou mecônio. A FC de 80 bpm não é indicação para compressões — elas só são iniciadas se a FC < 60 bpm após 30 segundos de VPP eficaz. \\"Iniciar a reanimação com ventilação em pressão positiva (VPP) com oxigênio a 100%, utilizando cânula traqueal, mantendo o RN envolto em campos secos para evitar hipotermia e com monitorização de oximetria pré-ductal.\\" - Incorreta - O uso de oxigênio a 100% não é recomendado na reanimação inicial de prematuros — o excesso de O ₂ pode causar toxicidade pulmonar e retinopatia da prematuridade. Além disso, campos secos não garantem isolamento térmico em prematuros — o correto é saco plástico sem secagem. \\"Utilizar máscara laríngea como via aérea inicial para realizar a ventilação com pressão positiva (VPP) nos RNs com menos de 34 semanas, associada ao uso precoce de adrenalina e expansão volêmica com soro fisiológico aquecido.\\" - Incorreta - A máscara laríngea não é via aérea inicial em prematuros menores de 34 semanas. O uso de adrenalina e expansão volêmica é reservado a casos refratários, não sendo medidas iniciais. \\"Garantir controle térmico com saco plástico sem secagem prévia, usar monitorização de oximetria pré-ductal, considerar ventilação com pressão positiva (VPP) com máscara facial e avaliar resposta clínica antes de prosseguir com manobras adicionais.\\" Correta. A alternativa correta descreve as medidas recomendadas para reanimação de recém-nascido pré-termo com menos de 34 semanas, segundo as diretrizes da Sociedade Brasileira de Pediatria (SBP):\\n\\nControle térmico rigoroso: Utilizar saco plástico ou filme plástico envolvendo o RN sem secagem prévia para evitar perda de calor (risco elevado de hipotermia em prematuros).\\n\\nOxigenação: Iniciar VPP ou CPAP com FiO ₂ 30%, titulando conforme a avaliação clínica. Monitoramento adequado: Sempre que possível, utilizar oximetria pré-ductal e monitor de frequência cardíaca (ecocardiografia ou monitor cardíaco). Via aérea: Máscara facial é a via de escolha inicial, e cânula traqueal é reservada para falha da ventilação ou necessidade de intubação. Nos prematuros menores de 34 semanas, a máscara laríngea não é uma opção de via aérea. Avaliação sequencial: Reavaliar após 30 segundos de VPP eficaz para decidir os próximos passos (como compressões ou medicações).","needs_distractors":false},{"year":"2025.1","qnum":11,"enunciado":"(AFYA Ipatinga) Menino de 6 anos, filho único, está iniciando a alfabetização na escola, mas não consegue acompanhar o desenvolvimento cognitivo dos colegas. Apresenta desatenção, inquietação, impulsividade, hiperatividade. Os pais acham que ele só quer brincar mesmo, como é filho único é mimado e costuma não obedecer, sempre foi desse jeito. A mãe trouxe o garoto para consulta na unidade de saúde para que o médico possa então esclarecer melhor sobre o caso do seu filho. Considerando o caso e a repercussão, deve-se pensar na possibilidade mais provável de:","alternativas":[{"letra":"A","texto":"transtorno do déficit de atenção com hiperatividade."},{"letra":"B","texto":"agorafobia."},{"letra":"C","texto":"ansiedade social."},{"letra":"D","texto":"transtorno desafiador opositor."}],"correta":"A","resposta":"O transtorno de déficit de atenção/hiperatividade (TDAH) é considerado um tipo de transtorno do neurodesenvolvimento. Distúrbios de neurodesenvolvimento são condições neurológicas que aparecem precocemente na infância, geralmente antes da idade escolar, e prejudicam o desenvolvimento do funcionamento pessoal, social, acadêmico e/ou profissional. TDAH combinado cursa habitualmente com desatenção, inquietação, impulsividade, hiperatividade, já presente em crianças e ocasionando comprometimento do neurodesenvolvimento se não cuidado. O transtorno desafiador opositivo é um padrão recorrente ou persistente de comportamento negativo, desafiador ou mesmo hostil direcionado contra figuras de autoridade. O diagnóstico é por critérios clínicos. Os distúrbios da ansiedade são estados de medo, preocupação ou pavor, desproporcionais à situação, e que enfraquecem as habilidades funcionais normais da criança. Para o diagnóstico da agorafobia, os pacientes precisam apresentar consistentemente medo ou ansiedade excessiva sem motivo em cerca de ≥ 2 dos seguintes por ≥ 6 meses:\\n\\nUso de transporte público. Estar em espaços abertos. Estar em espaços fechados. Ficar na fila ou no meio da multidão. Estar fora de casa sozinho.","needs_distractors":false},{"year":"2025.1","qnum":12,"enunciado":"(UNIREDENTOR) Joana, 45 anos, hipertensa controlada, comparece à unidade de saúde no quinto dia de sintomas de dengue. Refere febre nos primeiros dias, que cessou ontem, além de mialgia, cefaleia intensa, náuseas e dor abdominal em peso. Relata também sangramento gengival ao escovar os dentes. Hoje encontra-se mais prostrada. Ao exame físico: PA 100×70 mmHg, FC 98 bpm, tempo de enchimento capilar 2s, sem sinais de choque, extremidades mornas. Apresenta exantema difuso e petéquias em membros inferiores. Exames laboratoriais mostram:\\n\\nHematócrito: 45% (basal conhecido: 39%).\\n\\nPlaquetas: 65.000/mm³.\\n\\nLeucócitos: 2.800/mm³. Com base nas diretrizes do Ministério da Saúde, assinale a alternativa que indica corretamente a classificação e conduta para este caso:","alternativas":[{"letra":"A","texto":"Grupo D – com sinais de choque evidente, com necessidade de internação imediata em unidade de terapia intensiva."},{"letra":"B","texto":"Grupo C – com sinais de alarme clínico e laboratorial, com necessidade de encaminhamento para hidratação venosa e monitoramento."},{"letra":"C","texto":"Grupo A – sem sinais de alarme ou alterações laboratoriais, com indicação de hidratação oral e observação ambulatorial."},{"letra":"D","texto":"Grupo B – comorbidade presente, sem sinais de alarme, com orientação para hidratação supervisionada e reavaliação em 24 horas."}],"correta":"B","resposta":"Grupo A – sem sinais de alarme ou alterações laboratoriais, com indicação de hidratação oral e observação ambulatorial. Incorreta. Grupo A é reservado para casos sem comorbidades ou alterações clínicas/laboratoriais relevantes. Joana apresenta sinais de alarme e alterações hematológicas. Grupo B – comorbidade presente, sem sinais de alarme, com orientação para hidratação supervisionada e reavaliação em 24 horas. Incorreta. Apesar da comorbidade, há sinais clínicos e laboratoriais importantes que superam os critérios do grupo B. Grupo C – com sinais de alarme clínico e laboratorial, com necessidade de encaminhamento para hidratação venosa e monitoramento. Correta. O caso apresenta sinais de alarme clínicos (dor abdominal, sangramento gengival, prostração) e alteração laboratorial (aumento do hematócrito e plaquetopenia), compatíveis com Grupo C, com indicação de encaminhamento imediato. Grupo D – com sinais de choque evidente, com necessidade de internação imediata em unidade de terapia intensiva. Incorreta. Não há hipotensão, TRC prolongado ou sinais periféricos de choque, o que afastaria o grupo D neste momento.","needs_distractors":false},{"year":"2025.1","qnum":13,"enunciado":"(UNIDEP) Uma mulher de 38 anos, grávida de 20 semanas, vai até o pronto-socorro com queixa de dor abdominal, progressiva, localizada no quadrante inferior direito, associada a náuseas, nega episódios de febre. Durante o exame físico, apresenta dor à palpação profunda de quadrante inferior direito, com defesa à palpação e sinal de Rovsing positivo. Foi solicitado um exame de ultrassonografia, sugerindo apendicite aguda. Em relação à abordagem dessa paciente com diagnóstico de apendicite aguda durante a gestação, qual é a melhor conduta neste momento?","alternativas":[{"letra":"A","texto":"Iniciar tratamento conservador com antibioticoterapia devido ao risco cirúrgico de uma apendicectomia durante a gestação."},{"letra":"B","texto":"Solicitar uma tomografia de abdome para confirmar o diagnóstico antes de indicar o procedimento cirúrgico."},{"letra":"C","texto":"Indicar apendicectomia videolaparoscópica, por ser o método mais seguro na abordagem ao paciente."},{"letra":"D","texto":"Indicar apendicectomia, mas por método convencional, com incisão no ponto de McBurney devido ao risco anestésico."}],"correta":"C","resposta":"Justificativas:\\n\\nPostergar o procedimento cirúrgico aumenta o risco de complicações, como perfuração do apêndice, peritonite, nascimento prematuro e até perda fetal. (incorreta) A apendicectomia é o tratamento ideal, sendo a abordagem laparoscópica segura e eficaz, sendo a principal opção durante a gestação. (correta) Embora seja uma opção cirúrgica, o método convencional pode ser necessário ampliar a incisão, aumentando riscos pós-operatórios e a anestesia geral nesta fase da gestão também é segura.\\n\\n(incorreta) Já tendo o diagnóstico de apendicite pela clínica, exame físico e ultrassom, a tomografia não é necessária, bem como aumenta o risco fetal devido à irradiação. (incorreta)","needs_distractors":false},{"year":"2025.1","qnum":14,"enunciado":"(UNIGRANRIO Caxias) Um paciente de 35 anos é admitido no pronto-socorro após sofrer um acidente de carro. Ele está pálido, com frequência cardíaca elevada e pressão arterial baixa, porém estável o suficiente para realizar uma tomografia computadorizada que revela uma laceração hepática com hemorragia interna. Após a ressuscitação hídrica com 1.000 ml de solução de Ringer Lactato, ele experimenta uma breve melhora, mas volta a ficar hipotenso e taquicárdico. Qual é o manejo mais apropriado para tratar esse paciente?","alternativas":[{"letra":"A","texto":"Uso de eritropoetina para estimular a produção de células vermelhas."},{"letra":"B","texto":"Transfusão de concentrado de hemácias e intervenção cirúrgica para controle da hemorragia."},{"letra":"C","texto":"Administração de mais fluidos intravenosos, vasoconstritores e observação clínica."},{"letra":"D","texto":"Prescrição de vasopressina, albumina e ferro venoso em unidade de terapia intensiva."}],"correta":"B","resposta":"Iniciar transfusão de concentrado de hemácias e indicar intervenção cirúrgica para controle da hemorragia. De acordo com o Sabiston – Tratado de Cirurgia (21ª ed., capítulo 21 – Trauma Abdominal) , pacientes com trauma hepático e instabilidade hemodinâmica persistente ou recorrente após ressuscitação inicial devem ser considerados candidatos à intervenção cirúrgica imediata .\\n\\n• O paciente apresenta sinais clássicos de sangramento intra-abdominal em curso : instabilidade hemodinâmica com resposta transitória à reposição volêmica.\\n\\n• Nestes casos, a conduta correta é:\\n\\n• Transfusão de hemocomponentes (hemácias, plasma, plaquetas, conforme necessário) • Cirurgia de controle de danos ou laparotomia exploradora , dependendo do estado geral e das condições do serviço. “Pacientes que apresentam resposta transitória à ressuscitação volêmica devem ser levados ao centro cirúrgico para controle da hemorragia.” (Sabiston, 21ª ed., cap. 21, p. 464–466) Distratores:\\n\\nApenas administrar fluidos e observar piora o desfecho . Vasoconstritores podem mascarar sinais de choque e agravar a perfusão tecidual em hipovolemia não corrigida. Observação isolada é contraindicada em sangramento ativo com instabilidade . Vasopressina e albumina não têm papel prioritário na reposição volêmica inicial de trauma. Ferro venoso não trata urgência hemorrágica e não tem aplicação imediata no cenário agudo . Eritropoetina é ineficaz no manejo de sangramento agudo . Seu efeito é tardio e não substitui a transfusão de hemácias em paciente com choque hipovolêmico.","needs_distractors":false},{"year":"2025.1","qnum":15,"enunciado":"(UNIFIPMOC) Gestante de 32 anos, G3P2A0, idade gestacional de 9 semanas e 4 dias, procura atendimento na maternidade com queixa de sangramento vaginal iniciado há 13 dias, que evoluiu com secreção purulenta e odor fétido. Refere que hoje iniciou com dor abdominal tipo cólica e febre aferida de 38,4 °C. Ao exame apresentava-se: hipocorada, 1+/4+, hidratada, eupneica, sem edemas. Pressão arterial de 110/70mmHg, frequência cardíaca de 98 bpm, saturação de oxigênio de 98%, frequência respiratória de 18 ipm, temperatura axilar de 39 °C. Abdome doloroso à palpação profunda, principalmente em região suprapúbica. Exame especular: presença de sangramento com coágulos, associado a secreção purulenta e forte odor fétido. Toque vaginal:\\n\\nútero intrapélvico, dor à palpação uterina e à mobilização do colo, com colo pérvio. A principal hipótese diagnóstica e a conduta adequada são:","alternativas":[{"letra":"A","texto":"Aborto infectado, antibiótico venoso, exames e curetagem uterina."},{"letra":"B","texto":"Aborto retido, aguardar até 30 dias para conduta expectante."},{"letra":"C","texto":"Aborto completo, indicar curetagem uterina e antibiótico venoso."},{"letra":"D","texto":"Aborto infectado, iniciar antibiótico oral, realizar exames e indicar AMIU."}],"correta":"A","resposta":"Aborto retido, aguardar até 30 dias para conduta expectante. ERRADA. O aborto retido apresenta clínica de sangramento discreto, em pequena quantidade, sem sinais de infecção. As vezes um achado ultrassonográfico sem nenhum sintoma. Necessita ultrassonografia para confirmação. Aborto infectado, iniciar antibiótico oral, realizar exames e indicar AMIU. ERRADA. Realmente trata-se de aborto infectado, porém a antibioticoterapia necessita ser venosa. Aborto completo, indicar curetagem uterina e antibiótico venoso. ERRADA. O aborto completo apresenta quadro clínico de sangramento volumoso, seguido de interrupção do sangramento e alívio de dor. Não tem sinais de infecção como no caso acima. Aborto infectado, antibiótico venoso, exames e curetagem uterina. VERDADEIRA O aborto infectado é a terceira causa de morte materna no Brasil. Associação com abortamento provocado, causado por ascensão de bactérias vaginais e intestinais. E tem com sintomas:\\n\\nsangramento volumoso, febre, dor hipogástrio, dor a mobilização do colo uterino, leucorréia purulenta e fétida. No caso acima temos um quadro clássico de aborto infectado. Temos como tratamento: estabilizar a paciente; acesso venoso de grosso calibre; hidratação venosa; antibioticoterapia (clindamicina 900mg 8/8h+gentamicina 3-5mg/kg/dose única); ou Ampicilina(1-2gr 6/6h)+ gentamicina(3-5mg/kg/dia)+ metronidazol(500mg 8/8h) e esvaziamento cavidade uterina de acordo com idade gestacional (curetagem uterina ou AMIU). Sendo a opção que contempla a antibioticoterapia venosa e curetagem a mais adequada.","needs_distractors":false},{"year":"2025.1","qnum":16,"enunciado":"(UNIGRANRIO Caxias) Um paciente de 45 anos, com histórico de múltiplas cirurgias abdominais, apresenta-se ao pronto-socorro com dor abdominal difusa, vômitos e distensão abdominal. A radiografia de abdômen mostra níveis hidroaéreos e alças intestinais dilatadas. Qual é a abordagem inicial mais apropriada para este caso?","alternativas":[{"letra":"A","texto":"Prescrever laxantes e observar a resposta clínica por 24 horas."},{"letra":"B","texto":"Proceder imediatamente com cirurgia exploradora para liberação das bridas."},{"letra":"C","texto":"Realizar colonoscopia para descompressão das alças intestinais."},{"letra":"D","texto":"Iniciar tratamento conservador com sonda nasogástrica, fluidos intravenosos e observação."}],"correta":"D","resposta":"O tratamento conservador é frequentemente a primeira linha para obstrução intestinal por bridas, permitindo que algumas obstruções se resolvam sem cirurgia. Embora a cirurgia possa ser necessária se o tratamento conservador falhar, iniciar imediatamente com cirurgia não é a abordagem padrão sem sinais de complicações graves. Laxantes são contraindicados em obstrução intestinal, pois podem agravar a distensão e causar complicações. A colonoscopia não é indicada para descompressão em obstrução por bridas e não resolveria a causa subjacente.","needs_distractors":false},{"year":"2025.1","qnum":17,"enunciado":"(AFYA Garanhuns) Luca, 7 anos, é levado à UBS pelos pais devido a dificuldades persistentes na escola e em casa. Segundo os responsáveis, desde os primeiros anos, Luca demonstrava pouco interesse em interações sociais. Atualmente, apresenta dificuldades marcadas em manter conversas, não demonstra interesse em fazer amigos e frequentemente repete falas de desenhos animados em momentos inadequados. Os professores relatam que ele se isola das outras crianças, tem comportamentos repetitivos e mostra grande interesse por temas específicos, como o funcionamento de ventiladores, falando disso de forma intensa e exclusiva. No exame físico e neurológico, não há alterações significativas. O desenvolvimento motor foi dentro do esperado, mas o desenvolvimento da linguagem foi atrasado. Não há histórico de abuso ou negligência familiar. Com base no caso descrito, assinale a mais provável hipótese diagnóstica.","alternativas":[{"letra":"A","texto":"Transtorno de Aprendizagem Específico."},{"letra":"B","texto":"Transtorno de Ansiedade de Separação."},{"letra":"C","texto":"Transtorno do Espectro Autista (TEA)."},{"letra":"D","texto":"Transtorno de Déficit de Atenção e Hiperatividade (TDAH)."}],"correta":"C","resposta":"Transtorno de Déficit de Atenção e Hiperatividade (TDAH) Comentário: Embora o TDAH seja comum nessa faixa etária e possa cursar com dificuldades escolares e comportamentais, ele não costuma apresentar os prejuízos sociais qualitativos descritos no caso. Luca não demonstra desatenção ou impulsividade como sintomas centrais, e sim dificuldades específicas de comunicação social, isolamento, padrões repetitivos e interesses restritos — características mais compatíveis com TEA. Transtorno de Ansiedade de Separação.\\n\\nComentário: Esse transtorno é caracterizado por medo excessivo e inadequado de separação das figuras de apego, o que não aparece no caso descrito. Luca não demonstra angústia ao se afastar dos pais nem apresenta sintomas ansiosos com esse foco. Além disso, os sintomas apresentados são pervasivos e estão relacionados ao funcionamento social e comportamental, não ao medo ou ansiedade situacional. Transtorno do Espectro Autista (TEA) Comentário: Correta. O caso clínico é típico de TEA: prejuízos persistentes na comunicação social (pouco interesse em interações, dificuldade em manter conversas, ausência de interesse em amigos), comportamentos repetitivos (repetição de falas de desenhos animados), interesses restritos (ventiladores), além de atraso na linguagem. O diagnóstico de TEA é clínico e deve levar em conta os critérios do DSM-5, que exigem sintomas nas duas áreas principais: (1) comunicação e interação social e (2) padrões restritos e repetitivos de comportamento. Transtorno de Aprendizagem Específico.\\n\\nComentário: Esse transtorno se manifesta como dificuldade significativa em uma ou mais áreas do aprendizado (leitura, escrita, matemática), mas não envolve prejuízos sociais ou comportamentos repetitivos. Luca apresenta dificuldades generalizadas no convívio social, comunicação e comportamento, o que não é explicado apenas por dificuldades acadêmicas. Portanto, essa opção não é compatível com o quadro descrito.","needs_distractors":false},{"year":"2025.1","qnum":18,"enunciado":"(UNIGRANRIO Caxias) Uma criança de 7 anos, vítima de um acidente automobilístico, dá entrada na emergência com dor torácica, dispneia e instabilidade hemodinâmica. Ao exame, apresentava-se: taquicárdica FC = 148 bpm, perfusão periférica de 4 segundos, hipotensa, com turgência jugular. A ausculta cardíaca revelava abafamento de bulhas cardíacas. O ecocardiograma evidenciou derrame pericárdico volumoso, com sinais de tamponamento cardíaco. Segundo o Pediatric Advanced Life Support (PALS) Provider Manual, o principal objetivo do tratamento do choque apresentado pela paciente deve ser:","alternativas":[{"letra":"A","texto":"reduzir a atividade inflamatória (liberação de interleucinas e bradicininas) com corticoterapia."},{"letra":"B","texto":"iniciar noradrenalina para otimizar débito cardíaco."},{"letra":"C","texto":"reverter a obstrução mecânica do fluxo sanguíneo."},{"letra":"D","texto":"iniciar vasodilatadores para reduzir a pós-carga."}],"correta":"C","resposta":"Reduzir a atividade inflamatória (liberação de interleucinas e bradicininas) com corticoterapia. Incorreta. Incorreta. Não se trata de choque séptico e, mesmo se fosse o diagnóstico, a corticoterapia só está indicada no choque refratário a volume. Iniciar noradrenalina para otimizar débito cardíaco. Incorreta. Quem otimiza inotropismo é a adrenalina e a dobutamina, e não solucionariam a obstrução mecânica. Iniciar vasodilatadores para reduzir a pós-carga. Incorreta. Vasodilatadores estão contraindicados na hipotensão, pois agravariam o choque. Reverter a obstrução mecânica do fluxo sanguíneo. Correta. A pericardiocentese para drenagem pericárdica é o tratamento adequado para resolução da obstrução mecânica do fluxo sanguíneo.","needs_distractors":false},{"year":"2025.1","qnum":19,"enunciado":"(FESAR) Gestante de 29 anos, G2P1A0, com 31 semanas de gestação, comparece ao ambulatório de alto risco relatando cefaleia intensa, turvação visual e edema em membros inferiores que evoluiu nas últimas 48 horas. Refere também ganho ponderal de 2,5 kg na última semana. Ao exame físico, apresenta pressão arterial de 165/110 mmHg, edema em membros inferiores até joelhos, reflexos tendinosos vivos e presença de proteínas na urina por fita reagente. Exames laboratoriais: transaminases normais, LDH normal, plaquetas normais. A ausculta cardíaca e pulmonar está sem alterações significativas. O diagnóstico mais provável e a fisiopatologia do quadro clínico descrito são:","alternativas":[{"letra":"A","texto":"síndrome HELLP clássica, definida pela presença de anemia hemolítica microangiopática, insuficiência renal e edema limitado aos membros inferiores."},{"letra":"B","texto":"pré-eclâmpsia grave, caracterizada por disfunção endotelial generalizada, aumento da permeabilidade capilar e proteinúria significativa."},{"letra":"C","texto":"hipertensão arterial crônica, caracterizada por alteração prévia da pressão arterial e retenção hídrica por insuficiência cardíaca."},{"letra":"D","texto":"edema fisiológico da gravidez, resultado da compressão do útero gravídico sobre a veia cava inferior, sem repercussões clínicas sistêmicas."}],"correta":"B","resposta":"Correta: Pré-eclâmpsia grave, caracterizada por disfunção endotelial generalizada, aumento da permeabilidade capilar e proteinúria significativa. A paciente apresenta critérios clássicos de pré-eclâmpsia grave: hipertensão severa (>160/110 mmHg), proteinúria, edema progressivo, sintomas neurológicos (cefaleia, turvação visual). A fisiopatologia principal envolve disfunção endotelial → aumento da permeabilidade capilar → extravasamento de proteínas e líquidos → edema. A síndrome HELLP exige achados laboratoriais de hemólise, elevação de enzimas hepáticas e plaquetopenia, o que não foi descrito no caso. A hipertensão crônica não explicaria a instalação recente dos sintomas e o edema agudo. O edema fisiológico é comum, mas não se associa a proteinúria, hipertensão severa ou sinais de disfunção orgânica.\\n\\nIncorreta: edema fisiológico da gravidez, resultado da compressão do útero gravídico sobre a veia cava inferior, sem repercussões clínicas sistêmicas. Edema fisiológico cursa sem hipertensão ou proteinúria.\\n\\nIncorreto: síndrome HELLP clássica, definida pela presença de anemia hemolítica microangiopática, insuficiência renal e edema limitado aos membros inferiores. Síndrome Help cursa com anemia. O paciente apresentava: Exames laboratoriais: transaminases normais, LDH normal, plaquetas normais. Na síndrome HELLP, as transaminases estão aumentadas, há plaquetopenia e sinais de hemólise.","needs_distractors":false},{"year":"2025.1","qnum":20,"enunciado":"(UNITPAC) Um homem de 45 anos, previamente saudável, apresenta dor intensa no quadrante superior direito (QSD) do abdômen há 24 horas, febre de 38,5 °C, náuseas e vômitos. No exame físico, o sinal de Murphy é positivo. Os exames laboratoriais mostram: leucocitose com desvio à esquerda, bilirrubina total de 2,1 mg/dL (direta de 1,3 mg/dL), fosfatase alcalina discretamente elevada, TGO e TGP normais. A ultrassonografia (USG) revela vesícula biliar distendida, com parede espessada (5 mm), presença de cálculo impactado no colo vesicular, líquido pericolecístico e sinal de Murphy ultrassonográfico positivo. A tomografia computadorizada confirma o espessamento da parede e edema pericolecístico, sem pneumobilia nem coleções. A colangiorressonância é evidenciada abaixo:\\n\\nFonte: Jezreel, 2017. Reconstrução 3D MIP de uma colangiopancreato RM. Disponível em:\\n\\nhttps://www.youtube.com/watch?v=hFyjeIBboVk. Acesso em: 28 abr. 2025. Com base nesse quadro clínico e nos achados complementares, assinale a alternativa correta:","alternativas":[{"letra":"A","texto":"A combinação de dor no QSD com o sinal de Murphy positivo, leucocitose e espessamento da parede vesicular ao USG é suficiente para o diagnóstico de colecistite aguda."},{"letra":"B","texto":"A ausência de dilatação das vias biliares na colangiografia exclui coledocolitíase, sendo o diagnóstico mais provável pancreatite biliar leve."},{"letra":"C","texto":"O achado de líquido pericolecístico é específico de colecistite enfisematosa, sendo necessário tratamento cirúrgico de urgência."},{"letra":"D","texto":"A presença de bilirrubina direta elevada e cálculo impactado no colo vesicular indica colangite ascendente, devendo-se iniciar antibioticoterapia de amplo espectro imediatamente."}],"correta":"A","resposta":"A alternativa \\"A combinação de dor no QSD com o sinal de Murphy positivo, leucocitose e espessamento da parede vesicular ao USG é suficiente para o diagnóstico de colecistite aguda.\\" está correta porque descreve com precisão os critérios clínicos, laboratoriais e de imagem necessários para o diagnóstico de colecistite aguda litiásica, conforme preconizado pelas diretrizes internacionais, como as Tokyo Guidelines. A reconstrução 3D MIP da colangiopancreato RM ilustrada na imagem do enunciado demonstra um exame sem alterações e vias biliares sem obstruções. O paciente apresenta dor no hipocôndrio direito, febre, náuseas, vômitos e sinal de Murphy positivo, que são manifestações clínicas típicas. Além disso, os exames laboratoriais revelam leucocitose com desvio à esquerda, sugerindo processo inflamatório agudo, e a ultrassonografia mostra espessamento da parede da vesícula, distensão, líquido pericolecístico e cálculo impactado no colo vesicular, todos achados compatíveis com inflamação vesicular. A colangiorressonância confirma que as vias biliares estão de calibre normal, afastando complicações como coledocolitíase ou colangite. Portanto, a combinação de achados clínicos e de imagem é suficiente para confirmar o diagnóstico de colecistite aguda. A alternativa \\"A ausência de dilatação das vias biliares na colangiografia exclui coledocolitíase, sendo o diagnóstico mais provável pancreatite biliar leve.\\" está incorreta porque, apesar da ausência de dilatação das vias biliares realmente diminuir a probabilidade de coledocolitíase, o diagnóstico de pancreatite biliar leve não é coerente com o quadro apresentado. O paciente não tem dor epigástrica irradiada para o dorso, tampouco há dados laboratoriais que apontem elevação de amilase ou lipase, marcadores típicos de pancreatite. Além disso, a presença do sinal de Murphy positivo, associada aos achados ultrassonográficos sugestivos de inflamação vesicular, torna a hipótese de colecistite muito mais provável do que pancreatite. A alternativa \\"A presença de bilirrubina direta elevada e cálculo impactado no colo vesicular indica colangite ascendente, devendo-se iniciar antibioticoterapia de amplo espectro imediatamente.\\" está equivocada ao sugerir o diagnóstico de colangite ascendente com base apenas na presença de bilirrubina direta elevada e cálculo impactado no colo vesicular. Embora a bilirrubina esteja discretamente aumentada, não há evidência clínica de icterícia ou colúria, nem dilatação de vias biliares na colangiorressonância, o que enfraquece a hipótese de obstrução do colédoco. A tríade de Charcot — composta por dor, febre e icterícia —, típica da colangite, não está presente. Além disso, o cálculo impactado está localizado no colo da vesícula e não obstruindo diretamente a via biliar principal, o que reforça o diagnóstico de colecistite e não de colangite. A alternativa \\"O achado de líquido pericolecístico é específico de colecistite enfisematosa, sendo necessário tratamento cirúrgico de urgência.\\" também está incorreta ao afirmar que o achado de líquido pericolecístico é específico de colecistite enfisematosa. Esse achado é comum em qualquer forma de colecistite aguda e não é exclusivo da variante enfisematosa, que se caracteriza pela presença de gás na parede ou no interior da vesícula, geralmente detectado por tomografia. No caso descrito, a tomografia não identificou pneumobilia ou presença de gás, o que exclui essa forma grave de colecistite. Portanto, a menção à necessidade de cirurgia urgente por colecistite enfisematosa está baseada em uma interpretação incorreta dos achados de imagem.","needs_distractors":false},{"year":"2025.1","qnum":21,"enunciado":"(UNIFIPMOC) Adolescente, 16 anos, masculino, é levado à Unidade Básica de Saúde por sua mãe, que relata um episódio súbito de fraqueza em todo o corpo, principalmente nas pernas, ocorrido enquanto ele se preparava para uma prova escolar. A mãe descreve que ele \\"caiu no chão como se estivesse desmaiando\\", mas permaneceu consciente. No atendimento, o adolescente mostra-se alerta, orientado, comunicativo e sem sinais de sofrimento físico evidente. Refere formigamento nas pernas e fraqueza para se levantar, mas sem alterações de força, sensibilidade ou reflexos nos membros inferiores. Sem rigidez de nuca, sem sinais meníngeos, sem alteração pupilar. Não há febre, cefaleia ou história pregressa de epilepsia ou outro transtorno neurológico. O exame neurológico e físico geral está normal. Ao final da consulta, o profissional de saúde identifica, por meio de escuta atenta e vínculo, que o paciente está vivenciando forte pressão escolar e familiar. A conduta mais apropriada é:","alternativas":[{"letra":"A","texto":"prescrever benzodiazepínico de uso contínuo, pois trata-se de transtorno de ansiedade generalizada."},{"letra":"B","texto":"solicitar tomografia de crânio e eletroneuromiografia para afastar lesão estrutural ou miopatia."},{"letra":"C","texto":"reforçar o vínculo, acolher o sofrimento psíquico, encaminhar para avaliação em saúde mental e planejar seguimento na UBS."},{"letra":"D","texto":"iniciar tratamento com anticonvulsivante até que se esclareça o diagnóstico."}],"correta":"C","resposta":"Alternativa: “Solicitar tomografia de crânio e eletroneuromiografia para afastar lesão estrutural ou miopatia” é incorreta. Justificativa: Embora exames complementares possam ter papel em certos casos, não há sinais no exame físico ou na história clínica que justifiquem exames de alta complexidade neste momento. A clínica sugere quadro funcional.\\n\\nAlternativa: “Reforçar o vínculo, acolher o sofrimento psíquico, encaminhar para avaliação em saúde mental e planejar seguimento na UBS” é correta. Justificativa: O quadro é compatível com um episódio de conversão, um transtorno funcional de apresentação neurológica sem substrato orgânico, frequentemente associado a conflitos psicossociais. A conduta mais adequada na APS é o acolhimento, escuta qualificada, vínculo terapêutico e encaminhamento para saúde mental.\\n\\nAlternativa: “Iniciar tratamento com anticonvulsivante até que se esclareça o diagnóstico” é incorreta. Justificativa: Não há indicação de iniciar anticonvulsivantes na ausência de evidência clínica de epilepsia. O uso injustificado pode trazer efeitos adversos e reforçar a medicalização.\\n\\nAlternativa: “Prescrever benzodiazepínico de uso contínuo, pois trata-se de transtorno de ansiedade generalizada” é incorreta. Justificativa: Embora possa haver sofrimento psíquico envolvido, a prescrição de benzodiazepínico contínuo não é recomendada nesse perfil etário e contexto clínico, além de não ser diagnóstico de TAG. O manejo não farmacológico com abordagem psicossocial é prioritário.","needs_distractors":false},{"year":"2025.1","qnum":22,"enunciado":"(UNIGRANRIO Caxias) Um paciente de 22 anos com IMC de 35 chega à unidade de Atenção Primária à Saúde queixando-se de dor abdominal que começou de forma difusa e, nas últimas 12 horas, localizou-se no quadrante inferior direito. Ele também apresenta febre baixa e náuseas, mas sem vômitos. Durante o exame físico, nota-se dor à palpação no ponto de McBurney. Diante desse quadro, qual é o próximo passo mais apropriado para conduzir o diagnóstico nesse cenário?","alternativas":[{"letra":"A","texto":"Iniciar antibióticos de amplo espectro e observar a evolução na unidade de saúde."},{"letra":"B","texto":"Prescrever analgésicos e agendar retorno em 24 horas para reavaliação do quadro."},{"letra":"C","texto":"Realizar um exame ultrassonográfico abdominal na unidade de saúde, se disponível."},{"letra":"D","texto":"Encaminhar o paciente para um serviço de urgência para realização de tomografia computadorizada (TC) do abdômen e pelve."}],"correta":"D","resposta":"Paciente jovem (22 anos), com quadro clínico típico de apendicite aguda: • Dor abdominal que migra para o quadrante inferior direito (ponto de McBurney) • Febre baixa, náuseas • Exame físico sugestivo. Além disso, apresenta obesidade grave (IMC 50), o que dificulta o exame físico e a palpação abdominal confiável, tornando os exames de imagem ainda mais importantes para confirmação diagnóstica.\\n\\n• IMC 35 é um fator que reduz a eficácia do USG , mas não o exclui como exame inicial na APS .\\n\\n• Se o USG for inconclusivo (o que é provável), a tomografia deve ser realizada com urgência .\\n\\n• O raciocínio escalonado (USG ➝ TC se necessário) continua válido , mas deve ser acelerado em obesos mórbidos , devido à maior taxa de complicações, risco anestésico e diagnóstico mais difícil. Base no Sabiston – Tratado de Cirurgia (21ª ed.):\\n\\n“O ultrassom é a modalidade inicial de imagem recomendada em pacientes jovens com suspeita de apendicite, especialmente em serviços de menor complexidade. É rápido, não invasivo, e evita radiação ionizante, sendo útil mesmo em pacientes com obesidade, embora com menor sensibilidade.” Sabiston, 2022, Cap. 48 – Apendicite, p. 1312–1315) Base no Gusso – Tratado de Medicina de Família e Comunidade (3ª ed.):\\n\\n“Na Atenção Primária, diante de um quadro compatível com apendicite aguda, o exame de imagem mais acessível e indicado como primeiro passo é o ultrassom abdominal, que pode confirmar ou afastar a hipótese diagnóstica sem a necessidade imediata de encaminhamento.” GUSSO, G. et al., 2022, vol. 2, cap. 121 – Dor Abdominal Aguda) Distratores:\\n\\n• Encaminhar para TC: embora a TC seja mais sensível e específica, especialmente em pacientes obesos, ela não é o primeiro passo na Atenção Primária, e nem sempre é necessária para casos típicos. Deve ser considerada após ultrassom inconclusivo ou em casos atípicos.\\n\\n• Prescrever analgésico e reavaliar: pode atrasar o diagnóstico e a conduta cirúrgica, especialmente com sinais clínicos claros de apendicite. A observação sem investigação por imagem é inadequada.\\n\\n• Iniciar antibióticos e observar: o tratamento conservador com antibióticos é discutido em contextos hospitalares específicos e sob diagnóstico confirmado, não como conduta inicial na APS sem confirmação diagnóstica.","needs_distractors":false},{"year":"2025.1","qnum":23,"enunciado":"(UNINOVAFAPI) Uma criança de 4 anos é levada pelos pais à Unidade de Pronto Atendimento (UPA) com história de início súbito de dispneia. A mãe refere que a criança apresenta há 24 horas tosse seca e febre baixa (37,7-37,8). Evoluiu há 2 horas com piora da tosse com característica de tosse \\"ladrante\\" (em som de cão), rouquidão progressiva e esforço respiratório. Na avaliação inicial, a criança encontrava-se agitada, com estridor inspiratório audível em repouso, tiragem subcostal e uso de musculatura acessória. A saturação de oxigênio é de 92% em ar ambiente. De acordo com o Protocolo de Atendimento Pediátrico de Emergência (PALS), qual é a classificação do desconforto respiratório apresentado por essa criança?","alternativas":[{"letra":"A","texto":"Insuficiência respiratória do tipo ventilação inadequada sem obstrução."},{"letra":"B","texto":"Desconforto respiratório do tipo obstrutivo de vias aéreas inferiores."},{"letra":"C","texto":"Desconforto respiratório do tipo obstrutivo de vias aéreas superiores."},{"letra":"D","texto":"Desconforto respiratório do tipo doença do parênquima pulmonar."}],"correta":"C","resposta":"Resposta correta:\\n\\nDesconforto respiratório do tipo obstrutivo de vias aéreas superiores. Justificativa da resposta correta:\\n\\nO quadro clínico descrito (tosse metálica, estridor inspiratório e uso de musculatura acessória) é característico de obstrução em vias aéreas superiores, como ocorre em condições como laringotraqueobronquite viral (crupe), epiglotite ou corpo estranho em vias aéreas altas. De acordo com o PALS (Pediatric Advanced Life Support), esses sinais são típicos de obstrução de vias aéreas superiores. Justificativa das alternativas incorretas:\\n\\nObstrução de vias aéreas inferiores:\\n\\nIncorreta. Obstruções inferiores (ex.: bronquiolite, asma) geralmente apresentam sibilância e prolongamento do tempo expiratório. Doença do parênquima pulmonar:\\n\\nIncorreta. Doenças como pneumonia geram alterações na troca gasosa e sinais como estertores, e não estridor inspiratório. Insuficiência respiratória do tipo ventilação inadequada:\\n\\nIncorreta. Esse quadro seria esperado em depressão respiratória central, como intoxicações ou crises convulsivas, sem obstrução das vias aéreas. Disfunção neuromuscular:\\n\\nIncorreta. Disfunções neuromusculares geram hipoventilação por fraqueza muscular, sem estridor e sem tosse latente.","needs_distractors":false},{"year":"2025.1","qnum":24,"enunciado":"(UNIGRANRIO Caxias) Um paciente de 52 anos é admitido no hospital com dor abdominal intensa, febre alta e sinais de sepse. Exames laboratoriais mostram elevações significativas da PCR, amilase e lipase. A tomografia computadorizada do abdômen revela necrose extensa do pâncreas, classificada como grau E na classificação de Balthazar, com áreas de necrose infectada. Qual é a abordagem mais apropriada para o manejo deste paciente?","alternativas":[{"letra":"A","texto":"Administrar antibióticos de amplo espectro e aguardar melhora clínica."},{"letra":"B","texto":"Continuar com tratamento conservador e monitorar para sinais adicionais de infecção."},{"letra":"C","texto":"Realizar drenagem percutânea para descompressão das áreas afetadas."},{"letra":"D","texto":"Proceder com necrosectomia para remoção das áreas necróticas infectadas."}],"correta":"D","resposta":"Uma vez confirmada a presença de necrose infectada e sinais de sepse, tratamento conservador isolado não é suficiente. Embora antibióticos sejam necessários, eles não substituem a remoção cirúrgica do tecido necrótico infectado. A necrosectomia é indicada em casos de necrose pancreática infectada, especialmente quando há sinais de sepse, para remover o tecido morto e tratar a fonte de infecção. A drenagem percutânea pode ser usada para coleções líquidas, mas não é suficiente para remover áreas de necrose sólida infectada.","needs_distractors":false},{"year":"2025.1","qnum":25,"enunciado":"(FACIMPA) Adolescente de 16 anos, encaminhado ao ambulatório por quadro de humor deprimido há 3 meses, insônia inicial, perda de apetite e ideação suicida sem plano definido. Avaliado com Escala de Depressão Infantil (CDI), apresentando pontuação compatível com depressão moderada. Sem comorbidades médicas significativas e sem uso prévio de psicotrópicos. Identifique a medicação mais adequada para iniciar o tratamento farmacológico neste paciente.","alternativas":[{"letra":"A","texto":"Bupropiona, dopaminérgico-adrenergérgico."},{"letra":"B","texto":"Fluoxetina, i nibidor seletivo da recaptação da serotonina."},{"letra":"C","texto":"Imipramina, tricíclico."},{"letra":"D","texto":"Venlafaxina, i nibidor da recaptação de serotonina e norepinefrina."}],"correta":"B","resposta":"Justificativas:\\n\\nFluoxetina.\\n\\nJustificativa: Correta. Fluoxetina é o único antidepressivo SSRI com indicação aprovada para depressão clínica em adolescentes (FDA e diretrizes brasileiras), apresenta perfil de baixo risco cardiotóxico e menor potencial de abuso, iniciando ação em 4–6 semanas. Imipramina.\\n\\nJustificativa: Falsa. Imipramina (TCA) tem eficácia, mas alto risco de cardiotoxicidade em overdose e maior letalidade em tentativas de suicídio, não sendo primeira escolha no adolescente. Venlafaxina.\\n\\nJustificativa: Falsa. Venlafaxina (SNRI), apesar da ação dual, carece de aprovação formal para menores de 18 anos e pode causar hipertensão; seu uso é reservado a falhas de SSRIs e com monitorização rigorosa. Bupropiona Justificativa: Falsa. Bupropiona, dopaminérgico-adrenergérgico, útil em depressão atípica, mas com contraindicação em pacientes com risco de convulsão, não tem indicação registrada em menores de 18 anos; além disso, favorece crises convulsivas, especialmente em pacientes com histórico ou risco convulsivo, sendo inadequada como primeira linha em adolescentes deprimidos.","needs_distractors":false},{"year":"2025.1","qnum":26,"enunciado":"(UNIPTAN) Adolescente de 14 anos, sexo masculino, previamente hígido, é trazido ao pronto- socorro com quadro de hematêmese volumosa iniciada há cerca de 2 horas. A mãe relata episódios recorrentes de dor epigástrica nas últimas semanas. Ao exame, o paciente está pálido, sudorético, com rebaixamento do nível de consciência. Apresenta pulso filiforme, frequência cardíaca de 138 bpm, pressão arterial de 80x40 mmHg, tempo de enchimento capilar superior a 4 segundos e ausência de diurese nas últimas 6 horas. A ausculta cardíaca e pulmonar está sem alterações, e o abdome é flácido, doloroso em epigástrio, sem sinais de peritonite. Considerando o quadro clínico apresentado, qual é a conduta inicial mais adequada e o momento apropriado para a realização da endoscopia digestiva alta?","alternativas":[{"letra":"A","texto":"Encaminhar o paciente diretamente para a sala de endoscopia, com suporte hemodinâmico durante o procedimento, mesmo em choque."},{"letra":"B","texto":"Estabilizar o paciente com expansão volêmica e transfusão conforme necessidade, e realizar endoscopia digestiva alta após estabilização hemodinâmica."},{"letra":"C","texto":"Iniciar antiemético e omeprazol EV, realizar endoscopia digestiva de urgência antes da estabilização hemodinâmica."},{"letra":"D","texto":"Observar em leito de emergência com monitorização, iniciar IBP e realizar endoscopia apenas se houver novo episódio de sangramento."}],"correta":"B","resposta":"Resposta correta:\\n\\nEstabilizar o paciente com expansão volêmica e transfusão conforme necessidade, e realizar endoscopia digestiva alta após estabilização hemodinâmica. Justificativa da alternativa correta:\\n\\nO paciente apresenta sinais de choque hipovolêmico secundário a uma HDA. A estabilização clínica com expansão volêmica (cristaloides) e, se necessário, hemotransfusão é prioritária. A endoscopia digestiva alta deve ser realizada após a estabilização hemodinâmica, idealmente nas primeiras 24 horas, sendo fundamental para diagnóstico e tratamento da etiologia do sangramento. Justificativas para as alternativas incorretas:\\n\\nIncorreta – A endoscopia em paciente instável hemodinamicamente aumenta o risco de complicações; a estabilização é prioritária. Incorreta – O procedimento endoscópico em paciente em choque, sem estabilização prévia, pode ser fatal e contraria as boas práticas clínicas. Incorreta – A simples observação não é adequada em casos de instabilidade hemodinâmica; o paciente necessita de abordagem ativa e precoce.","needs_distractors":false},{"year":"2025.1","qnum":27,"enunciado":"(AFYA Ipatinga) Paciente de 21 anos, sexo masculino, comparece sozinho à Unidade de Pronto Atendimento de sua cidade na sexta-feira à noite. Relata que cometerá suicídio, que sua \\"vida não tem mais sentido\\", que, inclusive, está com uma corda no carro para praticar o seu \\"ato final\\".\\n\\nApresentava-se ansioso e com hálito etílico, nega tentativas prévias e se mostra resistente à intervenção da equipe de saúde. Diante deste quadro, qual é a melhor conduta a ser tomada?","alternativas":[{"letra":"A","texto":"Contactar um familiar e proceder sua internação, mesmo contra sua vontade, devido ao risco de auto-morte."},{"letra":"B","texto":"Iniciar antidepressivo e encaminhar ao serviço de psiquiatria de urgência - CAPS, para uma consulta com psiquiatra."},{"letra":"C","texto":"Iniciar uso do carbonato de lítio em 600 mg/dia e orientar a procurar o CAPS para seguir seu tratamento."},{"letra":"D","texto":"Prescrever antidepressivo e liberá-lo para casa, pois se encontra alcoolizado e querendo chamar a atenção."}],"correta":"A","resposta":"Trata-se de um quadro de risco iminente de suicídio com pensamento estruturado em adulto jovem do sexo masculino, com acesso a meio letal e imediato, sob efeito de álcool, e desacompanhado. Deve, portanto, proceder com internação de forma involuntária com anuência da família, já que nesses casos, o sigilo ético pode ser quebrado tendo em vista a gravidade e risco imediato de morte do indivíduo. Essa situação deve ser considerada uma emergência médica.","needs_distractors":false},{"year":"2025.1","qnum":28,"enunciado":"(UNIREDENTOR) Menina de 7 anos é levada à unidade básica de saúde por edema de início insidioso em região palpebral e, posteriormente, em membros inferiores. A mãe nega febre, hematúria ou queixas urinárias. Ao exame, apresenta pressão arterial normal, sem sinais de infecção ou lesões cutâneas. O exame de urina tipo I evidencia proteinúria maciça (++++) sem hematúria. A dosagem de albumina sérica está em 1,8 g/dL (referência: 3,2 a 5,2) e o colesterol total em 320 mg/dL (referência: menor do que 170). Diante do quadro, qual é o diagnóstico mais provável?","alternativas":[{"letra":"A","texto":"Nefrite pós-estreptocócica."},{"letra":"B","texto":"Síndrome nefrótica idiopática."},{"letra":"C","texto":"Púrpura de Henoch-Schönlein."},{"letra":"D","texto":"Nefropatia por IgA."}],"correta":"B","resposta":"Analisando as alternativas:\\n\\nSíndrome nefrótica idiopática - Alternativa correta:\\n\\nA síndrome nefrótica idiopática é a forma mais comum de glomerulopatia em crianças entre 2 e 8 anos. Caracteriza-se por edema, proteinúria em faixa nefrótica, hipoalbuminemia e hiperlipidemia, sem hematúria ou hipertensão. O quadro clínico e laboratorial da paciente é clássico. Nefrite pós-estreptocócica - Alternativa incorreta:\\n\\nA nefrite pós-estreptocócica geralmente cursa com hematúria macroscópica ou microscópica, hipertensão arterial, edema e complemento sérico reduzido, o que não está presente neste caso. O quadro clínico com proteinúria isolada e sem hipertensão não é típico. Púrpura de Henoch-Schönlein - Alternativa incorreta:\\n\\nA púrpura de Henoch-Schönlein é uma vasculite sistêmica que geralmente cursa com púrpura palpável, dor abdominal, artralgia e, eventualmente, hematúria. O quadro apresentado não mostra manifestações extra-renais nem hematoúria, afastando esse diagnóstico. Nefropatia por IgA - Alternativa incorreta:\\n\\nA nefropatia por IgA costuma cursar com hematúria recorrente, geralmente macroscópica, associada a infecções respiratórias de vias aéreas superiores. A ausência de hematúria e o edema com proteinúria maciça tornam essa hipótese menos provável.","needs_distractors":false},{"year":"2025.1","qnum":29,"enunciado":"(AFYA Palmas) Mulher de 26 anos procura atendimento devido ao surgimento espontâneo de manchas roxas nas pernas e braços há cerca de 7 dias. Ela refere também episódios recentes de sangramento gengival ao escovar os dentes e sangramento nasal leve. Nega febre, perda de peso, sudorese noturna ou dor óssea. Não usa medicamentos regularmente; não apresenta história de doenças autoimunes conhecidas e está com vacinação em dia. Há duas semanas, relata ter tido quadro gripal autolimitado. Ao exame físico, encontra-se em bom estado geral, afebril, sem linfadenomegalia ou hepatoesplenomegalia. Observam-se múltiplas petéquias e equimoses nos membros inferiores e superiores. Não há sinais de sangramentos internos. Exames laboratoriais: hemoglobina: 13,5 g/dL; leucócitos: 6.500/mm³; plaquetas: 12.000/mm³ (muito reduzidas); TAP e TTPa: normais. Qual é a principal hipótese diagnóstica para esta paciente?","alternativas":[{"letra":"A","texto":"Coagulação intravascular disseminada (CIVD)."},{"letra":"B","texto":"Leucemia aguda."},{"letra":"C","texto":"Púrpura trombocitopênica imune (PTI)."},{"letra":"D","texto":"Púrpura de Henoch-Schönlein."}],"correta":"C","resposta":"Resposta correta: Púrpura trombocitopênica imune (PTI). A paciente apresenta púrpura, petéquias e equimoses em contexto de trombocitopenia isolada (plaquetas 12.000/mm³), sem outras alterações hematológicas. A história de infecção viral recente é comum como gatilho para PTI.\\n\\nDistratores:\\n\\nLeucemia aguda geralmente cursa com pancitopenia (anemia, leucopenia e trombocitopenia) associada a sintomas como febre, perda de peso, sudorese noturna e, muitas vezes, linfadenomegalia ou hepatoesplenomegalia. No caso apresentado, a paciente tem hemograma normal, exceto pela plaquetopenia isolada, sem sintomas constitucionais, o que torna leucemia muito pouco provável. Púrpura de Henoch-Schönlein é uma vasculite IgA que se manifesta com púrpura palpável, dor abdominal, artralgia e, às vezes, comprometimento renal. Além disso, as plaquetas são normalmente normais ou elevadas (não reduzidas). Portanto, o quadro clínico e laboratorial não é compatível com essa vasculite. Coagulação intravascular disseminada (CIVD) apresenta alterações graves nos tempos de coagulação (TAP e TTPa prolongados), consumo de fatores de coagulação e sinais clínicos de sepse, trauma grave ou malignidade avançada. No caso, TAP e TTPa estão normais, e não há evidência de um estado clínico grave ou doença de base aguda. Portanto, CIVD é altamente improvável.","needs_distractors":false},{"year":"2025.1","qnum":31,"enunciado":"(ITPAC Porto Nacional) Uma gestante de 28 semanas de gestação procura a unidade básica de saúde apresentando infecção por uma IST não tratada, além de relatar sinais iniciais de trabalho de parto prematuro. Com base nas recomendações atuais da literatura brasileira e protocolos do Ministério da Saúde, qual das condutas a seguir é a mais adequada para reduzir o risco de rotura prematura das membranas e parto prematuro nesta situação?","alternativas":[{"letra":"A","texto":"Realizar o tratamento adequado da IST, promover orientações sobre higiene íntima e monitorar sinais de trabalho de parto prematuro."},{"letra":"B","texto":"Orientar a gestante a evitar relações sexuais até o final da gestação, independentemente do tratamento da IST."},{"letra":"C","texto":"Encaminhar imediatamente para o hospital, sem realizar intervenções na unidade básica, devido ao risco de RPM."},{"letra":"D","texto":"Administrar antibióticos profiláticos de rotina para todas as gestantes com IST, independentemente de sinais de infecção."}],"correta":"A","resposta":"Alternativa: Orientar a gestante a evitar relações sexuais até o final da gestação, independentemente do tratamento da IST. Errada: A recomendação de evitar relações sexuais durante toda a gestação não é uma conduta padrão para prevenir RPM ou parto prematuro, especialmente sem tratar previamente as infecções. A orientação deve focar na realização do tratamento adequado das IST, além de orientações sobre práticas sexuais seguras. A abstinência prolongada sem tratamento não reduz efetivamente o risco de RPM e pode impactar a qualidade de vida da gestante.\\n\\nAlternativa: Realizar o tratamento adequado da IST, promover orientações sobre higiene íntima e monitorar sinais de trabalho de parto prematuro. Correta: O tratamento adequado das IST é fundamental para reduzir o risco de infecção ascendente, que pode levar à RPM e parto prematuro. Orientações sobre higiene íntima ajudam na prevenção de novas infecções e complicações. Monitorar sinais de trabalho de parto prematuro permite intervenção precoce, aumentando as chances de manejo adequado e redução de complicações.\\n\\nAlternativa: Administrar antibióticos profiláticos de rotina para todas as gestantes com IST, independentemente de sinais de infecção. Errada: A administração de antibióticos profiláticos deve ser baseada em diagnóstico de infecção ativa ou risco comprovado, não de forma rotineira para todas as gestantes com IST. Uso indiscriminado de antibióticos pode levar à resistência bacteriana e efeitos adversos. As diretrizes brasileiras recomendam o uso racional de antimicrobianos, com base em avaliação clínica e exames laboratoriais.\\n\\nAlternativa: Encaminhar imediatamente para o hospital, sem realizar intervenções na unidade básica, devido ao risco de RPM. Errada: Encaminhamento imediato pode ser necessário em casos de sinais de complicações, mas a atenção primária deve realizar ações preventivas, tratamento e monitoramento. Encaminhar sem avaliação ou intervenção inicial não é uma conduta adequada e pode atrasar o cuidado necessário. Essa questão exige que o aluno analise a situação clínica, compreenda as recomendações atuais e aplique o conhecimento de forma crítica para selecionar a conduta mais adequada.","needs_distractors":false},{"year":"2025.1","qnum":32,"enunciado":"(UNISL Porto Velho) Em abril de 2024, uma mulher de 50 anos, agricultora, residente na comunidade rural próxima a fragmentos de mata atlântica no interior do estado do Pará, procura a Unidade Básica de Saúde (UBS) apresentando febre alta de início súbito há três dias, mialgia intensa, cefaleia, dor lombar, náuseas e icterícia. No exame físico, encontra-se prostrada, com conjuntivas amareladas e pressão arterial de 90/60 mmHg. Relata-se que há duas semanas ocorreram mortes súbitas de macacos na região. Ela informa ter recebido vacina contra febre amarela há mais de 15 anos, não tendo feito reforço posterior. O município encontra-se em alerta epidemiológico devido à baixa cobertura vacinal (<70%) e registros de casos suspeitos de arboviroses, incluindo dengue e febre amarela. A equipe de saúde local dispõe de recursos laboratoriais limitados e encaminhamento hospitalar dependente de regulação regional. Diante da situação apresentada e considerando o contexto epidemiológico, a vigilância de arboviroses e as diretrizes do SUS para o manejo inicial de casos suspeitos em área de risco, qual deve ser a principal situação diagnóstica e a conduta inicial mais atenta na Atenção Primária, justificando sua escolha com base em princípios de saúde coletiva.","alternativas":[{"letra":"A","texto":"Considerar febre amarela como principais hipóteses, fundamentando-se no contexto de epizootias e baixa cobertura vacinal, realização de notificação imediata à vigilância, estabilização clínica inicial e encaminhamento urgente para hospital de referência, além de desencadear medidas de bloqueio vacinal e investigação ambiental."},{"letra":"B","texto":"Priorizar o diagnóstico de hepatite viral aguda, devido ao quadro de icterícia e sintomas sistêmicos, solicitando sorologias hepáticas e monitorando um paciente na UBS até confirmação laboratorial, comunicando o caso à vigilância apenas após confirmação."},{"letra":"C","texto":"Levantar hipóteses de leptospirose, devido ao contato com ambiente rural e sintomas compatíveis, iniciando antibioticoterapia empírica. O médico deverá solicitar exames laboratoriais básicos para auxiliá-lo no diagnóstico e manter o acompanhamento ambulatorial, notificando o caso somente se houver confirmação laboratorial."},{"letra":"D","texto":"Suspeitar de dengue hemorrágica, uma vez que a região apresente casos recentes de dengue, iniciando hidratação venosa precoce, monitoramento de sinais de choque e notificação imediata, mantendo o paciente em observação na unidade."}],"correta":"A","resposta":"Alternativa correta: Considerar febre amarela como principais hipóteses, fundamentando-se no contexto de epizootias e baixa cobertura vacinal, realização de notificação imediata à vigilância, estabilização clínica inicial e encaminhamento urgente para hospital de referência, além de desencadear medidas de bloqueio vacinal e investigação ambiental. O quadro clínico (febre alta, mialgia, cefaleia, icterícia, hipotensão), associado à história de epizootias em primatas, baixa cobertura vacinal e ausência de reforço vacinal recente, configura um cenário típico de febre amarela silvestre. De acordo com as diretrizes do Ministério da Saúde, em áreas de risco com circulação viral ativa e morte de macacos, todo caso suspeito deve ser imediatamente notificado, estabilizado clinicamente e encaminhado para hospital de referência, visto o risco elevado de evolução para formas graves (insuficiência hepática, renal e choque). Além disso, a vigilância epidemiológica deve ser acionada para investigação ambiental, bloqueio vacinal e ações de controle de vetores, para conter a propagação da doença e proteger a coletividade. Alternativas incorretas:\\n\\nAs demais alternativas não contemplam o contexto epidemiológico nem as medidas de saúde pública preconizadas:\\n\\n- Priorizar o diagnóstico de hepatite viral aguda, devido ao quadro de icterícia e sintomas sistêmicos, solicitando sorologias hepáticas e monitorando um paciente na UBS até confirmação laboratorial, comunicando o caso à vigilância apenas após confirmação: Hepatite viral é diagnóstico diferencial, mas não justifica a conduta de aguardar confirmação laboratorial para notificação, especialmente em contexto de surto.\\n\\n- Suspeitar de dengue hemorrágica, uma vez que a região apresente casos recentes de dengue, iniciando hidratação venosa precoce, monitoramento de sinais de choque e notificação imediata, mantendo o paciente em observação na unidade: embora a dengue seja endêmica, a presença de icterícia e epizootias é direcionada principalmente para febre amarela, e o manejo hospitalar é prioritário.\\n\\n- Levantar hipóteses de leptospirose, devido ao contato com ambiente rural e sintomas compatíveis, iniciando antibioticoterapia empírica. O médico deverá solicitar exames laboratoriais básicos para auxiliá-lo no diagnóstico e manter o acompanhamento ambulatorial, notificando o caso somente se houver confirmação laboratorial. A leptospirose é possível em área rural, mas a associação de sintomas e contexto epidemiológico favorece a febre amarela; a notificação e o encaminhamento não deverão aguardar confirmação laboratorial.","needs_distractors":false},{"year":"2025.1","qnum":33,"enunciado":"(UNIDEP) Um homem de 32 anos, previamente saudável, procura atendimento médico em uma unidade de saúde após retornar de uma viagem a uma área rural da Amazônia, onde permaneceu por 3 semanas. Ele relata início de febre alta, calafrios intensos, dor de cabeça, mialgia, e sudorese há cerca de 5 dias. Refere também náuseas, mal-estar geral e que os episódios febris ocorrem de forma intermitente, geralmente a cada 48 horas. Ao exame físico, o paciente apresenta-se febril (38,8 °C), esplenomegalia leve e estado geral comprometido. Não há sinais de rigidez de nuca ou alterações neurológicas. Considerando as informações do caso, avalie as alternativas abaixo:\\n\\nI) O diagnóstico mais provável é de chikungunya e o exame a ser solicitado é a sorologia para chikungunya.\\n\\nII) O diagnóstico mais provável é de malária e o exame a ser solicitado é a microscopia da gota espessa.\\n\\nIII) A malária é uma doença infecciosa aguda causada pelo Plasmodium.\\n\\nIV) Independente da hipótese diagnóstica, o manejo é apenas sintomático, não sendo necessário uso de medicações específicas. Estão corretas as afirmações contidas nas alternativas:","alternativas":[{"letra":"A","texto":"I e IV"},{"letra":"B","texto":"I e III"},{"letra":"C","texto":"II e IV"},{"letra":"D","texto":"II e III"}],"correta":"D","resposta":"","needs_distractors":false},{"year":"2025.1","qnum":34,"enunciado":"(UNIMA) Gestante, 30 semanas, G2P1, procura atendimento com queixas de contrações uterinas frequentes que se iniciaram há 4 horas. Ao exame: P.A. = 120 x 80 mmHg, F.C. = 100 bpm, afebril. Dinâmica uterina = 3/35\'\'/10\', ao toque: colo uterino com 2 cm de dilatação e 50% de apagamento, sem sinais de infecção. B.C.F. = 140 bpm. Considerando esse quadro, qual é a conduta mais adequada?","alternativas":[{"letra":"A","texto":"Internar, solicitar urocultura e cultura vaginal/retal para estreptococos do grupo B e ultrassonografia, administrar ocitocina para acelerar a dilatação do colo, já que as contrações não estão eficazes."},{"letra":"B","texto":"Internar, solicitar urocultura e cultura vaginal/retal para estreptococos do grupo B e ultrassonografia, administrar tocolítico e também corticoide para maturação pulmonar fetal."},{"letra":"C","texto":"Internar, solicitar cultura vaginal/retal para estreptococos do grupo B e conduzir o trabalho de parto, pois o feto já está viável e não há sinais de sofrimento."},{"letra":"D","texto":"Liberar a paciente com orientação para retorno se as contrações se intensificarem, pois ainda não há dilatação suficiente para internação. Solicitar urocultura e ultrassonografia."}],"correta":"B","resposta":"Alternativa correta: \'internar, solicitar urocultura e cultura vaginal/retal para estreptococos do grupo B e ultrassonografia, administrar tocolítico e também corticoide para maturação pulmonar fetal.\' Paciente apresenta-se em trabalho de parto prematuro (contrações frequentes, apagamento e dilatação do colo) e a conduta padrão é: internar, realizar exames que possam diagnosticar possíveis causas do TPP e viabilidade fetal, administrar tocolítico para inibir as contrações e corticoide para maturação pulmonar (se gestação <32 semanas).\\n\\nIncorretas:\\n\\n– \'Internar, solicitar cultura vaginal/retal para estreptococos do grupo B e conduzir o trabalho de parto, pois o feto já está viável e não há sinais de sofrimento.\' Embora o feto seja potencialmente viável, o ideal é prolongar a gestação com uso de tocolíticos e corticoides, pois a prematuridade aumenta muito a morbidade e mortalidade fetal.\\n\\n- \'Internar, solicitar urocultura e cultura vaginal/retal para estreptococos do grupo B e ultrassonografia, administrar ocitocina para acelerar a dilatação do colo, já que as contrações não estão eficazes\'. A administração de ocitocina é contraindicada neste caso; o objetivo é adiar o parto, não induzi-lo.\\n\\n- Liberar a paciente com orientação para retorno se as contrações se intensificarem, pois ainda não há dilatação suficiente para internação. Solicitar urocultura e ultrassonografia. A paciente está em trabalho de parto prematuro e requer internação e intervenção imediata; não é caso para alta.","needs_distractors":false},{"year":"2025.1","qnum":35,"enunciado":"(AFYA Itabuna) Paciente de 42 anos, com histórico de uso crônico de benzodiazepínicos (diazepam) por 5 anos para \\"alívio de tensão\\", chega à Unidade Básica de Saúde queixando-se de fraqueza muscular, tremores, formigamento nas mãos e episódios de \\"perda temporária da visão\\" sem causa orgânica identificada. Relata crises de ansiedade e insônia ao tentar reduzir a dose. Ao exame, apresenta nistagmo e leve ataxia. Qual é a conduta mais adequada neste contexto?","alternativas":[{"letra":"A","texto":"Encaminhar para neurologista para investigar possíveis doenças neurodegenerativas."},{"letra":"B","texto":"Manter a medicação atual e reforçar orientações sobre hábitos de vida saudável."},{"letra":"C","texto":"Suspender o benzodiazepínico imediatamente e iniciar antipsicótico para controle da agitação."},{"letra":"D","texto":"Reduzir gradualmente o benzodiazepínico, oferecer suporte sintomático e avaliar a abstinência."}],"correta":"D","resposta":"- Correta - Reduzir gradualmente o benzodiazepínico, oferecer suporte sintomático e avaliar abstinência. - A redução gradual previne complicações da abstinência (ex.: convulsões) e aborda sintomas conversivos/ansiosos. Alinhada com diretrizes de desprescrição segura (Duncan/Gusso).\\n\\n- Suspensão abrupta pode desencadear abstinência grave (risco de crises epilépticas).\\n\\n- Ignora a dependência química e a necessidade de desmame.\\n\\n- Sintomas são mais compatíveis com abstinência/conversão; encaminhamento sem manejo inicial é inadequado.","needs_distractors":false},{"year":"2025.1","qnum":36,"enunciado":"(UNIGRANRIO BARRA) Lactente de 2 anos, previamente hígido, com cartão vacinal atualizado é trazido á emergência por ter iniciado há 48 horas febre de 38.5-39º C, tosse e expectoração. Hoje evoluiu com sonolência, taquipneia com tiragem subcostal, e recusa alimentar. O exame físico evidenciou: criança febril 38.7º C, toxêmica, hipohidratada, hipocorada++/4, taquicárdica, hipotensa, com tiragem subcostal. sinais vitais: FC=136bpm, FR=48irpm, perfusão periférica de 4 segundos, SatO2=91% em ar ambiente. Ausculta pulmonar: estertores creptantes em terço médio do hemitórax esquerdo e com redução significativa do múrmurio vesicular à esquerda. Ausculta cardíaca sem alterações. O resultado da gasometria arterial evidenciou lactato= 5,8mmmol/L.( 0,63 a 2,44 mmol/L). O provável diagnóstico e a conduta inicial adequada na primeira hora de atendimento é:","alternativas":[{"letra":"A","texto":"choque séptico, iniciar oxigênio com FiO2 a 60% com máscara com reservatório, 2 acessos venosos periféricos, soro fisiológico 5-10ml/Kg em 1 h, caso necessário repetir até 3 etapas e iniciar aminas vasoativas."},{"letra":"B","texto":"Choque obstrutivo, iniciar oxigênio com FiO2 a 100% com máscara com reservatório, 2 acessos venosos periféricos, soro fisiológico 20ml/Kg, solicitar ecocardiograma para drenagem pericárdica e iniciar aminas vasoativas."},{"letra":"C","texto":"choque séptico, iniciar oxigênio com FiO2 a 100% com máscara com reservatório, 2 acessos venosos periféricos, soro fisiológico 20ml/Kg, caso necessário repetir até 3 etapas e iniciar aminas vasoativas."},{"letra":"D","texto":"choque cardiogênico, iniciar oxigênio com FiO2 a 60% com máscara com reservatório, 2 acessos venosos periféricos, não realizar expansão volumétrica pelo risco de congestão, e iniciar aminas vasoativas."}],"correta":"C","resposta":"Incorreta. Choque séptico, iniciar oxigênio com FiO2 a 60% com máscara com reservatório, 2 acessos venosos periféricos, soro fisiológico 5-10ml/Kg em 1 h e caso necessário iniciar aminas vasoativas. Choque com instabilidade hemodinâmica deve receber oxigênio com FiO2 a 100% e 20ml/kg de soro fisiológico, se necessário repetir até 3 etapas Incorreta. Choque cardiogênico, iniciar oxigênio com FiO2 a 60% com máscara com reservatório, 2 acessos venosos periféricos, e iniciar aminas vasoativas. Choque com instabilidade hemodinâmica deve receber oxigênio com FiO2 a 100% e mesmo no cardiogênico pode ser necessário fazer 5 a 10ml/kg de Soro fisiológico. Correta. Choque séptico, iniciar oxigênio com FiO2 a 100% com máscara com reservatório, 2 acessos venosos periféricos, soro fisiológico 20ml/Kg, caso necessário repetir até 3 etapas e iniciar drogas vasoativas. Choque com instabilidade hemodinâmica deve receber oxigênio com FiO2 a 100% e 20ml/kg de soro fisiológico, se necessário repetir até 3 etapas, caso não haja melhora com expansão iniciar aminas na primeira hora. Incorreta. Choque obstrutivo, iniciar oxigênio com FiO2 a 100% com máscara com reservatório, 2 acessos venosos periféricos, soro fisiológico 20ml/Kg, solicitar ecocardiograma para drenagem pericárdica. Não há abafamento de bulhas que justifique pensar em tamponamento cardíaco.","needs_distractors":false},{"year":"2025.1","qnum":37,"enunciado":"(FIP Guanambi) Menino de 4 anos é levado à UBS por sua mãe, que relata aparecimento de múltiplos hematomas em locais variados do corpo, geralmente após traumas leves ou espontâneos, com maior frequência nos últimos 2 anos. Recentemente, após queda da própria altura, ele apresentou grande hematoma na coxa esquerda. Relata histórico de sangramento prolongado após extração dentária há 3 meses. No exame físico, a criança encontra-se bem, ativa, afebril, normocorada, sem sinais de infecção ou linfonodomegalias. Apresenta hematomas antigos e recentes nos membros inferiores, além de leve aumento de volume no joelho direito, com dor à movimentação. Exames laboratoriais solicitados revelam: tempo de protrombina (TP):\\n\\nnormal; tempo de tromboplastina parcial ativada (TTPA): aumentado; contagem de plaquetas:\\n\\nnormal. O diagnóstico mais provável para este menino é:","alternativas":[{"letra":"A","texto":"leucemia mieloide aguda."},{"letra":"B","texto":"púrpura trombocitopênica idiopática."},{"letra":"C","texto":"Doença von Willebrand."},{"letra":"D","texto":"hemofilia tipo A."}],"correta":"D","resposta":"A PTI cursa com sangramentos mucocutâneos e petéquias, associados à trombocitopenia, o que não está presente neste caso. Os exames mostram contagem de plaquetas normal. Doença hereditária ligada ao X, caracterizada por deficiência do fator VIII da coagulação. TTPA aumentado com TP normal é um achado clássico. A história de sangramento após traumas leves, hematomas extensos e história familiar compatível reforçam o diagnóstico. Doença de von Willebrand, embora também possa cursar com TTPA aumentado e sangramentos, normalmente apresenta sangramentos mucosos mais frequentes e menos hematomas profundos. É mais comum haver sangramento gengival e epistaxe. Leucemia mieloide aguda, apesar de poder causar sangramentos e hematomas, geralmente vem acompanhada de outros sinais sistêmicos (febre, palidez, linfadenopatia, hepatoesplenomegalia) e alterações hematológicas mais amplas, como anemia, leucocitose ou leucopenia, e trombocitopenia, raro em crianças.","needs_distractors":false},{"year":"2025.1","qnum":38,"enunciado":"(UNIGRANRIO Caxias) Um paciente de 45 anos, com histórico de Síndrome da Imunodeficiência Adquirida (SIDA), é admitido no pronto-socorro com sinais de hemorragia digestiva baixa (HDB), incluindo diarreia com sangue vivo e cólicas abdominais. Após estabilização hemodinâmica inicial, qual deve ser o próximo passo para diagnosticar a causa da HDB neste paciente?","alternativas":[{"letra":"A","texto":"Proceder com uma tomografia computadorizada (TC) do abdômen para avaliar possíveis causas."},{"letra":"B","texto":"Iniciar antibióticos de amplo espectro antes dos exames para prevenir infecções oportunistas."},{"letra":"C","texto":"Solicitar exames de fezes para identificar patógenos causadores da diarreia sanguinolenta."},{"letra":"D","texto":"Realizar uma colonoscopia para investigar diretamente a causa do sangramento."}],"correta":"D","resposta":"Comentários sobre as alternativas:\\n\\nCorreta. A colonoscopia é o método diagnóstico de escolha para identificar a causa de HDB, permitindo visualização direta do cólon e, possivelmente, intervenção terapêutica. Embora a TC do abdômen possa ser útil em algumas situações, especialmente se houver suspeita de complicações intra-abdominais, ela não substitui a colonoscopia na identificação direta de fontes de sangramento. O uso empírico de antibióticos pode ser necessário em casos específicos, mas não deve preceder a investigação diagnóstica, a menos que haja sinais claros de infecção. Exames de fezes são importantes para detectar infecções, mas não fornecem informações suficientes para determinar a causa estrutural de uma HDB.","needs_distractors":false},{"year":"2025.1","qnum":39,"enunciado":"(UNIGRANRIO Caxias) Criança de 4 anos com história de lesão infectada em coxa direita que evoluiu com febre de 39ºC, hiperemia, calor e edema em toda a coxa direita foi levada à emergência. A admissão apresentava-se: sonolenta, taquicárdica (FC = 156 bpm), hipotensa, pulsos finos, extremidades frias, perfusão periférica de 5 segundos. Foi iniciado oxigênio a 100% com máscara com reservatório e monitorizada. Com base nas diretrizes do PALS para o tratamento do choque séptico, as metas de tratamento para esta criança são:","alternativas":[{"letra":"A","texto":"corrigir hipoglicemia e manter pressão arterial média acima do 50º percentil para a idade."},{"letra":"B","texto":"iniciar antibiótico na primeira hora e restauração da perfusão periférica <4 segundos."},{"letra":"C","texto":"iniciar antibiótico nas primeiras 3 horas e manter pressão arterial média acima do 10º percentil para idade."},{"letra":"D","texto":"iniciar antibiótico na primeira hora e manter pressão arterial média acima do percentil 5 para idade."}],"correta":"D","resposta":"Iniciar antibiótico nas primeiras 3 horas e manter pressão arterial média acima do 10º percentil para idade. Incorreta. Segundo PALS, choque séptico com hipotensão deve-se administrar antibiótico na primeira hora e manter a pressão arterial média acima do percentil 5 para idade. Iniciar antibiótico na primeira hora e manter pressão arterial média acima do percentil 5 para idade. Correta. Segundo PALS, choque séptico com hipotensão deve-se administrar antibiótico na primeira hora e manter a pressão arterial média acima do percentil 5 para idade. Corrigir hipoglicemia e manter pressão arterial média acima do 50º percentil para a idade. Incorreta. Segundo PALS, os distúrbios metabólicos devem ser corrigidos, mas a PAM deve permanecer acima do percentil 5 para a idade. Iniciar antibiótico na primeira hora e restauração da perfusão periférica <4 segundos. Incorreta. Segundo PALS, choque séptico com hipotensão deve-se administrar antibiótico na primeira hora e restaurar a perfusão periférica para < 2 segundos.","needs_distractors":false},{"year":"2025.1","qnum":40,"enunciado":"(UNIPTAN) Um paciente de 45 anos, previamente hígido, foi submetido a uma colectomia eletiva por adenocarcinoma de cólon. No 5º dia de pós-operatório, apresenta febre persistente (38,7°C), leucocitose e dor abdominal localizada na região do flanco direito. No exame físico, observa-se leve empastamento da parede abdominal nessa região, sem sinais de peritonite difusa. A hipótese diagnóstica mais provável é a de abscesso intra-abdominal ou de parede. Qual é a conduta diagnóstica mais a
