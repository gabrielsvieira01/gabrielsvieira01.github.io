<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · Preparação para a integradora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/styles.css">
<link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="crest">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Banco de questões · 7º período
      </div>
      <h1>Preparação para a <em>integradora</em></h1>
      <p class="subtitle">Faça login para acessar o banco de questões.</p>
    </header>

    <main id="main">
      <div class="login-wrap">
        <form class="login-card" id="loginForm" autocomplete="off">
          <h2>Entrar</h2>
          <p class="login-sub">Use o usuário e a senha fornecidos.</p>

          <div class="login-error" id="loginError"></div>

          <div class="field">
            <label for="username">Usuário</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
          </div>
          <div class="field">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
          </div>

          <button type="submit" class="btn btn-primary">Entrar →</button>
        </form>
      </div>
    </main>

    <p class="footnote">Acesso restrito. Em caso de dúvida, procure o responsável pelo material.</p>
  </div>

  <script src="assets/js/users.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
