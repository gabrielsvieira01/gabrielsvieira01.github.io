por aparente fraqueza do membro inferior esquerdo. Ao teste de força, há resistência volitiva variável com “cedimento” (give-way) quando solicitada força máxima; reflexos tendinosos preservados e simétricos; sensibilidade tátil e dolorosa relatada como normal e sem padrão dermatomal claro; sinal de Babinski ausente; sinais vitais normais; não há relato de febre, cefaleia intensa, traumatismo ou infecção respiratória prévia. Não foram realizados exames complementares no UBS. Diante do caso, a hipótese diagnóstica mais provável seria","alternativas":[{"letra":"A","texto":"Síndrome de Guillain-Barré na fase inicial."},{"letra":"B","texto":"Miastenia gravis com acometimento pseudoperiférico."},{"letra":"C","texto":"Acidente vascular cerebral isquêmico hemisférico."},{"letra":"D","texto":"Transtorno funcional neurológico (sintomas neurológicos funcionais)."}],"correta":"D","resposta":"Resposta Comentada:\\n\\nO quadro apresenta início agudo de perda de função motora isolada em adolescente, frequentemente desencadeado por estresse psicossocial (a discussão na escola). Achados do exame que apontam para transtorno funcional neurológico incluem: inconsistência e variabilidade da fraqueza à prova de força, presença de “give-way” (cedimento) e sinal de Hoover positivo (sugestivo de esforço submáximo voluntário com preservação de ação antagonista), preservação dos reflexos e ausência de distribuição sensitiva em dermátomos, além de ausência de sinais neurológicos centrais, como alteração de linguagem ou sinal piramidal. A presença desses sinais clínicos compatíveis com incongruência entre história e exame é característica de transtornos funcionais neurológicos e torna essa hipótese a mais provável no contexto da UBS, antes de investigações complementares. O manejo inicial inclui reconhecimento, explicação clara e empática do diagnóstico, evitar termos que impliquem “simulação”, e encaminhamento para avaliação neurológica/psiquiátrica e reabilitação funcional. Acidente vascular cerebral isquêmico hemisférico. Argumentos contrários: AVC isquêmico em adolescente é muito menos provável que cause um quadro isolado de fraqueza com sinais inconsistentes; além disso, AVC costuma apresentar déficit focal persistente com padrão neurológico compatível (déficit motor com alteração de tônus, reflexos assimétricos, possíveis alterações de linguagem ou sensoriais em distribuição neuroanatômica), e não a variabilidade/inconsistência observada (give-way, Hoover positivo). Ademais, sinais vitais e história não indicam fatores de risco ou início súbito com progressão típica de isquemia. Em qualquer dúvida clínica sobre AVC, deverá ser considerada neuroimagem urgente, mas no cenário descrito os achados sem suporte anatômico favorecem transtorno funcional. Síndrome de Guillain-Barré na fase inicial. Argumentos contrários: Guillain-Barré tipicamente cursa com fraqueza progressiva, simétrica e ascendente, acometendo frequentemente ambos os membros inferiores, com redução/ausência de reflexos tendinosos (arreflexia) e possível envolvimento sensitivo e autonômico; costuma ter história de infecção recente (dias-semanas) e progressão ao longo de dias. No caso apresentado, a fraqueza é unilateral, os reflexos estão preservados e há inconsistência volitiva — achados incompatíveis com o padrão clássico de Guillain-Barré. Miastenia gravis com acometimento pseudoperiférico Argumentos contrários: Miastenia gravis costuma apresentar fatigabilidade muscular que piora com uso repetido, acometimento ocular (ptose, diplopia) e bulbar em muitos casos; a fraqueza é tipicamente flutuante ao longo do dia e relacionada ao esforço, não mostrando sinais de inconsistência voluntária, como Hoover positivo. Além disso, miastenia raramente se apresenta como fraqueza unilateral isolada do membro inferior como primeiro sinal em adolescentes; os reflexos tendinosos geralmente são preservados, mas a presença de sinal clínico de inconsistência (give-way) e desencadeamento psicossocial próximo apontam mais para transtorno funcional. Investigação com eletromiografia e testes farmacológicos ajudariam a excluir miastenia se houver suspeita.","needs_distractors":false},{"year":"2025.2","qnum":23,"enunciado":"(UNIGRANRIO CAXIAS) Gestante de 29 anos, G2P1A0, com 32 semanas, procura a maternidade por contrações regulares há cerca de 2 horas, a cada 5 minutos, com duração aproximada de 20 segundos. Refere perda de tampão mucoso, sem sangramento, febre ou perda de líquido. Encontra-se estável, com PA 110/70 mmHg e temperatura 36,8 °C. Ausculta fetal com BCF 150 bpm. Ao exame vaginal, apresenta colo uterino com 2 cm de dilatação, 50% de apagamento e bolsa íntegra. Ultrassonografia recente evidencia feto único vivo, peso estimado de 1.700 g, líquido amniótico normal e placenta posterior alta. Qual deve ser a conduta inicial adequada para esse caso?","alternativas":[{"letra":"A","texto":"Realizar cesariana imediata visando prevenir possível sofrimento fetal e reduzir risco materno-fetal associado à prematuridade."},{"letra":"B","texto":"Instituir tocólise e corticosteroide para maturação pulmonar fetal, considerar sulfato de magnésio para neuroproteção e investigar fatores precipitantes antes de definir conduta definitiva."},{"letra":"C","texto":"Manter apenas observação clínica expectante, sem intervenção inicial, e reavaliar a paciente posteriormente somente se ocorrer rotura de membranas ou piora importante do quadro."},{"letra":"D","texto":"Administrar ocitocina para intensificar as contrações, acelerar o trabalho de parto e reduzir o tempo até o nascimento do recém-nascido."}],"correta":"B","resposta":"Justificativas Alternativa Justificativa Realizar cesariana imediata visando prevenir possível sofrimento fetal e reduzir risco materno-fetal associado à prematuridade.— Incorreta Cesárea não está indicada. Não há sofrimento fetal nem contraindicação ao manejo conservador. A cesariana não reduz riscos da prematuridade e não é conduta inicial em TPP estável. Administrar ocitocina para intensificar as contrações, acelerar o trabalho de parto e reduzir o tempo até o nascimento do recém-nascido. — Incorreta Ocitocina está contraindicada em trabalho de parto prematuro sem indicação de interrupção imediata. A conduta é inibir contrações, não estimulá-las. Instituir tocólise e corticosteroide para maturação pulmonar fetal, associar sulfato de magnésio para neuroproteção e investigar fatores precipitantes antes de definir conduta definitiva. — Correta Conduta padrão: tocolíticos (se elegível), corticoterapia antenatal (24–34s), sulfato de magnésio para neuroproteção (até 32–34 semanas) e investigação etiológica (IVU, infecções, etc.). Visa prolongar a gestação e reduzir a morbimortalidade neonatal. Manter apenas observação clínica expectante, sem intervenção inicial, e reavaliar a paciente posteriormente somente se ocorrer rotura de membranas ou piora importante do quadro.— Incorreta Conduta expectante isolada é inadequada. Necessita intervenção imediata (tocolítico + corticoide + MgSO₄) para reduzir complicações da prematuridade. Conduta de \\"esperar romper bolsa\\" é inapropriada e arriscada.","needs_distractors":false},{"year":"2025.2","qnum":24,"enunciado":"(UNISL PORTO VELHO) Criança de 8 anos é trazida à UBS pela mãe, que relata que o filho não interage bem com outras crianças, prefere brincar sozinho e apresenta comportamentos repetitivos, como alinhar objetos e insistir em rotinas específicas. Na escola, tem dificuldade em compreender regras sociais e responde de forma literal às instruções. O desenvolvimento motor foi normal, mas o atraso na fala foi notado até os 4 anos de idade. Considerando o quadro clínico e os principais transtornos mentais da infância que repercutem no desenvolvimento neuropsíquico, o diagnóstico mais provável seria:","alternativas":[{"letra":"A","texto":"Transtorno do espectro autista (TEA), pois o prejuízo na comunicação social e a presença de padrões restritos e repetitivos de comportamento são critérios diagnósticos."},{"letra":"B","texto":"Transtorno de déficit de atenção e hiperatividade (TDAH), pois a dificuldade de interação social e o comportamento repetitivo são manifestações comuns da impulsividade."},{"letra":"C","texto":"Transtorno de ansiedade social, pois a evitação de contato com colegas e o isolamento são característicos dessa condição."},{"letra":"D","texto":"Transtorno opositor desafiador, pois o comportamento inflexível e as dificuldades escolares indicam resistência ativa a regras."}],"correta":"A","resposta":"Alternativa correta: Transtorno do espectro autista (TEA), pois o prejuízo na comunicação social e a presença de padrões restritos e repetitivos de comportamento são critérios diagnósticos. O Transtorno do Espectro Autista (TEA) é um transtorno do neurodesenvolvimento caracterizado por déficits persistentes na comunicação e interação social e por padrões restritos e repetitivos de comportamento, interesses ou atividades, de acordo com o DSM-5-TR (2022). No caso descrito, os atrasos na linguagem, a dificuldade de interação social recíproca, a falta de compreensão de regras sociais implícitas e os comportamentos repetitivos e inflexibilidade de rotinas são achados típicos do TEA. Outros transtornos mentais da infância também cursam com impacto no desenvolvimento neuropsíquico — como o TDAH, o transtorno de ansiedade, o transtorno opositor desafiador e o transtorno específico de aprendizagem —, mas não apresentam simultaneamente prejuízos sociais qualitativos e comportamentos repetitivos como no TEA. A abordagem inicial na UBS envolve identificação precoce, orientação familiar, encaminhamento para equipe multiprofissional (psiquiatria infantil, fonoaudiologia, psicologia e terapia ocupacional) e encaminhamento à rede especializada para confirmação diagnóstica. Alternativas incorretas — justificativa:\\n\\n• Transtorno de déficit de atenção e hiperatividade (TDAH), pois a dificuldade de interação social e o comportamento repetitivo são manifestações comuns da impulsividade: embora TDAH possa causar dificuldades sociais, o quadro central é desatenção/hiperatividade/impulsividade; não explica de forma qualitativa o prejuízo da reciprocidade social nem os padrões restritos e repetitivos típicos do TEA.\\n\\n• Transtorno de ansiedade social, pois a evitação de contato com colegas e o isolamento são característicos dessa condição; a evitação social na ansiedade é por medo de avaliação; não costuma incluir comportamentos estereotipados (alinhar objetos, insistência em rotinas) nem déficits qualitativos de comunicação (uso literal da linguagem).\\n\\n• Transtorno opositor desafiador, pois o comportamento inflexível e as dificuldades escolares indicam resistência ativa a regras: caracteriza-se por comportamento desafiador, hostil e desobediente; não descreve déficits precoces na comunicação social e comportamentos restritos repetitivos.","needs_distractors":false},{"year":"2025.2","qnum":25,"enunciado":"(FACIMPA) L.R.S., 14 anos, estudante, acompanhada da avó ao CAPS infantojuvenil, apresenta há 9 meses episódios recorrentes descritos como “desmaios”, dor abdominal intensa e ocasional urina “avermelhada” em casa. Teve múltiplas idas a prontos-socorros com exames sempre sem alterações relevantes (hemograma, PCR, eletrólitos, função tireoidiana, EEG e RM normais). Em duas visitas, trouxe amostras de urina com coloração rosada, porém no serviço as coletas supervisionadas foram claras, sem hematúria, e com densidade muito baixa. A adolescente demonstra amplo vocabulário médico, solicita exames e internação “para ficar no soro”, mantém contato frequente com a equipe e refere sentir-se “mais tranquila quando está sendo cuidada”. A escola relata frequência regular e desempenho estável; não houve pedidos de atestados prolongados ou benefícios. Em avaliação na unidade, os episódios não ocorreram sob observação contínua. O exame físico é inespecífico, notando-se discretas escoriações lineares recentes em coxa de fácil alcance; em seu estojo havia uma lanceta utilizada para artesanato. A família menciona histórico de procura de diferentes serviços por queixas semelhantes, sem diagnóstico orgânico definido. Com base no caso apresentado, pensando na hipótese diagnóstica mais provável, analise as afirmações abaixo e indique a opção que contempla a correta:\\n\\nI) O transtorno em questão é caracterizado por sintomas motores e/ou sensoriais incompatíveis com uma condição neurológica.\\n\\nII) Nesta condição, o paciente assume uma posição de doente e com necessidade de receber cuidados.\\n\\nIII) Os exames complementares geralmente apresentam achados que sugerem alterações no sistema de condução do impulso nervoso.\\n\\nIV) A presença de exames repetidamente normais e a discrepância entre o relato da paciente e os achados objetivos são característicos.","alternativas":[{"letra":"A","texto":"I, II, III e IV."},{"letra":"B","texto":"II e IV"},{"letra":"C","texto":"I e II."},{"letra":"D","texto":"Apenas I."}],"correta":"B","resposta":"Comentário:\\n\\nO quadro reúne elementos centrais: produção ou falsificação intencional de sinais/sintomas, busca ativa por procedimentos, ausência de incentivos externos claros (p. ex., ganhos financeiros, fuga de responsabilidades), história médica teatral e inconsistências entre relato e achados objetivos (amostras de urina alteradas fora do ambiente supervisionado; coletas no serviço sem alterações; presença de lanceta; escoriações em áreas acessíveis). O objetivo predominante é assumir o papel de doente e receber cuidados, compatível com início na adolescência e alto uso de serviços, conforme critérios descritos nos manuais diagnósticos contemporâneos. A assertiva I tem achados compatíveis com o transtorno conversivo, enquanto a assertiva III não é uma característica do transtorno factício.","needs_distractors":false},{"year":"2025.2","qnum":26,"enunciado":"Durante atendimento na Unidade de Saúde da Família, uma criança de 5 anos apresenta- se com dificuldade respiratória súbita após brincar com pequenas peças plásticas. Está ansiosa, pálida, com tiragem intercostal e estridor inspiratório. FC = 148 bpm, FR = 40 irpm, PA = 90×55 mmHg, SpO₂ = 86% em ar ambiente, enchimento capilar 4 segundos. Considerando a avaliação inicial e as condutas frente às urgências e emergências médicas na APS, qual é a conduta mais adequada?","alternativas":[{"letra":"A","texto":"Suspeitar de choque obstrutivo por corpo estranho, iniciar manobras de desobstrução e acionar o serviço de emergência para transporte imediato."},{"letra":"B","texto":"Prescrever broncodilatador inalatório e corticoterapia oral, orientando retorno em 24 horas para reavaliação clínica."},{"letra":"C","texto":"Solicitar radiografia de tórax para confirmar o diagnóstico antes de qualquer intervenção ou encaminhamento."},{"letra":"D","texto":"Oferecer oxigênio sob máscara, observar a evolução por 30 minutos e encaminhar se não houver melhora clínica."}],"correta":"A","resposta":"CORRETA: \\"Suspeitar de choque obstrutivo por corpo estranho...\\"- A criança apresenta sinais clássicos de choque obstrutivo secundário a obstrução de via aérea por corpo estranho: tiragem intensa, estridor, hipoxemia e perfusão lenta. A conduta correta é reconhecer a emergência, iniciar manobras de desobstrução (compressões torácicas ou abdominais, conforme idade), oferecer oxigênio suplementar e acionar o transporte imediato ao hospital de referência. As metas do tratamento incluem restaurar ventilação eficaz, oxigenação adequada (SpO₂ > 94%) e perfusão tecidual.\\n\\nINCORRETAS:\\n\\n- \\"Oferecer oxigênio sob máscara...\\"- A simples observação frente a sinais de instabilidade hemodinâmica (hipotensão, taquicardia, hipoxemia e enchimento capilar lento) não é conduta segura. O quadro indica emergência respiratória e circulatória iminente.\\n\\n- \\"Prescrever broncodilatador inalatório...\\" - O quadro não é compatível com crise asmática: o início foi súbito e há estridor inspiratório, indicando obstrução alta. O uso de broncodilatador e corticóide não resolve obstrução mecânica e pode atrasar o atendimento emergencial.","needs_distractors":false},{"year":"2025.2","qnum":27,"enunciado":"(UNIGRANRIO Barra) Joana, médica em uma unidade de saúde da família, atende Lucas, um homem de 28 anos, que procura atendimento após uma exposição de risco ao HIV ocorrida há 24 horas. Lucas relata que a camisinha estourou durante a relação sexual com uma pessoa de status sorológico desconhecido. Ele está ansioso e quer saber quais medidas preventivas deve adotar para evitar a infecção por HIV. Com base no contexto apresentado e nas referências sugeridas, qual das alternativas abaixo descreve a abordagem adequada para o manejo preventivo do usuário em questão?","alternativas":[{"letra":"A","texto":"Realizar orientações sobre riscos, prevenção e realizar profilaxia pós-exposição com uso do PEP no mesmo momento do atendimento."},{"letra":"B","texto":"Realizar aconselhamento sobre o uso correto de preservativos e oferecer teste de HIV e outras ISTs em um mês, caso não apresente sintomas."},{"letra":"C","texto":"Informar que medidas preventivas não são necessárias e que ele deve aguardar três meses para realizar o teste sorológico."},{"letra":"D","texto":"Sugerir exame de carga viral a ser coletado na própria unidade e esperar resultados para intervenção profilática."}],"correta":"A","resposta":"Resposta correta: \\"Realizar orientações sobre riscos, prevenção e realizar profilaxia pós- exposição com uso do PEP no mesmo momento do atendimento\\", pois a profilaxia pós- exposição (PEP) deve ser iniciada até 72 horas após a exposição ao HIV e outras ISTs, conforme as diretrizes de saúde pública, complementando com orientação sobre prevenção futura. Essa abordagem garante eficácia na prevenção de infecções e está baseada nas melhores práticas descritas nas referências sugeridas. Alternativa \\"Informar que medidas preventivas não são necessárias e que ele deve aguardar três meses para realizar o teste sorológico\\" (errada): A afirmação de que não são necessárias medidas preventivas é incorreta e contraria as diretrizes estabelecidas na literatura médica. Segundo DUCAN et al. (2022), em casos de exposição ao HIV, é imprescindível a adoção de medidas imediatas para evitar a infecção, que incluem a profilaxia pré-exposição (PeP). A espera de três meses para o teste sorológico também é inadequada, uma vez que os testes podem ser realizados antes desse período, com orientações quanto à janela imunológica. Portanto, a orientação correta é iniciar a PeP o quanto antes. Alternativa \\"Realizar aconselhamento sobre o uso correto de preservativos e oferecer teste de HIV e outras ISTs em um mês caso não apresente sintomas\\" (errada): embora o aconselhamento sobre o uso correto de preservativos seja importante, essa abordagem é insuficiente e não considera a urgência da situação de Lucas, que se apresentou após uma exposição recente ao HIV. Conforme indicado pelas diretrizes de manejo preventivo, é essencial que ele receba a profilaxia pós-exposição (PeP) imediatamente e não em um mês, mesmo que não apresente sintomas. A oferta de testes de HIV e ISTs deve ocorrer imediatamente, junto com a PeP, como parte de um manejo abrangente para a prevenção da infecção, conforme destacado nas referências. Alternativa \\"Sugerir exame de carga viral a ser coletado na própria unidade e esperar resultados para intervenção profilática\\" (errada): A sugestão de realizar um exame de carga viral e esperar os resultados antes de iniciar qualquer intervenção profilática é inadequada. DUCAN et al. (2022) ressaltam que, em situações de exposição ao HIV, as medidas de profilaxia pós-exposição (PeP) devem ser iniciadas o mais rápido possível, preferencialmente dentro de 72 horas após a exposição. Além disso, adiantar a coleta de exames e aguardar resultados pode resultar em atrasos na proteção do paciente, o que vai contra as recomendações de intervenção imediata para prevenção do HIV.","needs_distractors":false},{"year":"2025.2","qnum":28,"enunciado":"(FESAR) Paciente masculino cisgênero, 80 anos, é trazido ao pronto-socorro com fraqueza progressiva, náuseas e oligúria nas últimas 24 horas. Histórico: diabetes tipo 2 em uso de metformina. Ao exame: PA 90/60 mmHg, FC 110 bpm, FR 24 ipm e nível de consciência levemente rebaixado. Solicitada gasometria arterial e eletrólitos, obteve os seguintes resultados:\\n\\nExame Valor Valores de referência pH 7,25 7,35–7,45 PaCO₂ 26 mmHg 35–45 mmHg HCO₃⁻ 11 mEq/L 22–26 mEq/L Na⁺ 138 mEq/L 135–145 mEq/L K⁺ 4,2 mEq/L 3,5–5,0 mEq/L Cl⁻ 105 mEq/L 98–107 mEq/L Lactato sérico 6,0 mmol/L 0,5–2,2 mmol/L Creatinina 2,3 mg/dL 0,6–1,3 mg/dL Com base no caso, analise os achados e identifique o distúrbio ácido-base mais provável e a conduta inicial.","alternativas":[{"letra":"A","texto":"Cetoacidose diabética, caracterizada por acidose metabólica de alto gap; iniciar infusão de insulina, reposição volêmica e monitorização de eletrólitos."},{"letra":"B","texto":"Acidose metabólica de gap normal, geralmente associada à diarreia; tratar com reposição de líquidos e eletrólitos, mantendo monitorização clínica."},{"letra":"C","texto":"Acidose metabólica de alto anion gap, provavelmente por acidose láctica induzida por metformina; suspender a medicação, reanimar com líquidos IV e considerar hemodiálise emergencial."},{"letra":"D","texto":"Acidose respiratória aguda, secundária à insuficiência ventilatória; iniciar suporte ventilatório e ajustar parâmetros respiratórios conforme necessidade."}],"correta":"C","resposta":"Ao analisar, observa-se que:\\n\\nAcidose metabólica: pH 7,25 e HCO₃⁻ 11 mEq/L → confirma. Cálculo do anion gap: AG = Na⁺ − (Cl⁻ + HCO₃⁻) = 138 − (105+11) = 22 mEq/L → elevado. Compensação respiratória: PaCO₂ esperada ≈ 1,5 × 11 + 8 ± 2 = 24,5 ± 2 mmHg → PaCO₂ medida = 26 mmHg → compensação adequada. Causa provável: paciente idoso, insuficiência renal, lactato elevado, uso de metformina → acidose láctica induzida por droga. Conduta inicial: suspender metformina, reanimar com cristaloides, suporte hemodinâmico, considerar hemodiálise. Por que as outras alternativas são incorretas: Cetoacidose diabética: hiperglicemia e cetonemia não relatadas; Acidose de gap normal: AG elevado descarta. Acidose respiratória: PaCO₂ baixo, compatível com compensação, não é primário.","needs_distractors":false},{"year":"2025.2","qnum":29,"enunciado":"(AFYA ITACOATIARA) Mulher de 32 anos procura a Unidade Básica de Saúde informando que seu marido, com quem mantém relação estável há 8 anos, foi recentemente diagnosticado como soropositivo para HIV. Relata que tiveram relação sexual desprotegida (sem preservativo) nas últimas 48 horas, antes da revelação do diagnóstico. Ela está angustiada e deseja saber o que pode ser feito para evitar a infecção. Considerando os protocolos clínicos vigentes do Ministério da Saúde, qual a conduta mais adequada neste caso?","alternativas":[{"letra":"A","texto":"Iniciar imediatamente a PEP com esquema de três antirretrovirais, preferencialmente em até 72 horas após a exposição."},{"letra":"B","texto":"Prescrever a PrEP de forma contínua, pois ela já esteve exposta ao risco de infecção."},{"letra":"C","texto":"Aguardar resultado de testagem rápida para HIV antes de iniciar qualquer tratamento, mesmo que ultrapasse 72 horas."},{"letra":"D","texto":"Não há indicação de intervenção medicamentosa, pois a exposição foi com parceiro fixo e estável."}],"correta":"A","resposta":"Iniciar imediatamente a PEP com esquema de três antirretrovirais, preferencialmente em até 72 horas após a exposição.\\n\\nCorreta: Descreve a conduta recomendada nos Protocolos Clínicos e Diretrizes Terapêuticas (PCDT) do Ministério da Saúde: iniciar profilaxia pós-exposição (PEP) o mais rápido possível, preferencialmente nas primeiras 2 horas, com limite de até 72 horas após a exposição, por 28 dias. O esquema inclui três antirretrovirais combinados. Aguardar resultado de testagem rápida para HIV antes de iniciar qualquer tratamento, mesmo que ultrapasse 72 horas.\\n\\nIncorreta: Aguardar testagem retarda a administração da PEP e compromete sua eficácia. O tratamento deve ser iniciado mesmo com sorologia inicial desconhecida. Prescrever a PrEP de forma contínua, pois ela já esteve exposta ao risco de infecção.\\n\\nIncorreta: A PrEP (profilaxia pré-exposição) é indicada para exposições futuras de risco, não sendo o protocolo inicial após uma exposição confirmada. Não há indicação de intervenção medicamentosa, pois a exposição foi com parceiro fixo e estável.\\n\\nIncorreta: Relação com parceiro fixo não exclui risco de transmissão, especialmente com carga viral detectável e relação desprotegida recente.","needs_distractors":false},{"year":"2025.2","qnum":30,"enunciado":"(FMIT) Um homem de 48 anos, etilista crônico, é admitido no pronto-socorro com dor abdominal intensa em faixa, irradiada para o dorso, associada a náuseas e vômitos há 12 horas. Ao exame físico, apresenta abdome distendido, doloroso à palpação profunda, sem sinais de irritação peritoneal. Os exames laboratoriais mostram amilase e lipase séricas elevadas. O médico suspeita de pancreatite aguda e solicita exames de imagem para avaliar a gravidade do quadro. Qual é o método diagnóstico e de avaliação da gravidade mais apropriado neste momento?","alternativas":[{"letra":"A","texto":"Tomografia computadorizada de abdome com contraste."},{"letra":"B","texto":"Ressonância magnética de abdome."},{"letra":"C","texto":"Dosagem sérica seriada de amilase e lipase."},{"letra":"D","texto":"Ultrassonografia endoscópica com doppler."}],"correta":"A","resposta":"Alternativa: A tomografia é o exame de escolha para avaliar gravidade e complicações da pancreatite aguda, como necrose ou coleções. Deve ser feita após 48–72 horas, quando as alterações são melhor delimitadas.\\n\\nAlternativa: A ressonância é útil quando há contraindicação ao contraste iodado ou dúvida diagnóstica, mas não substitui a TC como primeira escolha em fase aguda. Além disso, não deve ser realizada antes da estabilização do paciente.\\n\\nAlternativa: A ultrassonografia endoscópica é excelente para avaliar microlitíase e pequenas lesões, mas não é indicada de rotina para diagnóstico nem para guiar decisão cirúrgica precoce na pancreatite aguda complicada.\\n\\nAlternativa: Embora úteis para diagnóstico inicial, amilase e lipase não avaliam gravidade. A determinação da extensão inflamatória e complicações requer exames de imagem, principalmente a tomografia contrastada.","needs_distractors":false},{"year":"2025.2","qnum":31,"enunciado":"(UNINOVAFAPI) Sr. Antenor, 78 anos, com histórico de hipertensão e diabetes tipo 2, está internado na enfermaria por quadro de infecção urinária complicada com sepse. Evoluiu com diminuição do débito urinário há 48 horas, aumento progressivo da creatinina (hoje:\\n\\n5,4 mg/dL) e ureia de 160 mg/dL, além de náuseas intensas, confusão mental e edema de membros inferiores. Gasometria com pH 7,21 e bicarbonato 13 mEq/L. Com base no quadro clínico, assinale a alternativa que melhor justifica a indicação de terapia dialítica neste paciente com insuficiência renal aguda.","alternativas":[{"letra":"A","texto":"O tratamento inicial deve ser aumento da hidratação venosa e diurético de alça, sem necessidade de terapia dialítica."},{"letra":"B","texto":"O paciente apresenta apenas alteração laboratorial de ureia e creatinina, sem indicação de diálise no momento."},{"letra":"C","texto":"O paciente apresenta sinais clínicos e laboratoriais de uremia (náuseas, encefalopatia), além de acidose metabólica refratária, que configuram indicações clássicas de início de diálise."},{"letra":"D","texto":"A creatinina elevada é esperada em pacientes diabéticos idosos e não deve indicar diálise."}],"correta":"C","resposta":"O paciente apresenta sinais clínicos e laboratoriais de uremia (náuseas, encefalopatia), além de acidose metabólica refratária, que configuram indicações clássicas de início de diálise. Correta. Este paciente preenche critérios clássicos de diálise conforme o mnemônico AEIOU:\\n\\nA (Acidose): pH 7,21 e bicarbonato < 15 mEq/L; E (Electrolytes): risco potencial; I (Intoxicação): não aplicável; O (Overload - sobrecarga volêmica): edema refratário; U (Uremia): náuseas e encefalopatia. Esses achados indicam insuficiência renal aguda grave com manifestações clínicas, sendo a diálise o tratamento de escolha. O paciente apresenta apenas alteração laboratorial de ureia e creatinina, sem indicação de diálise no momento. Incorreta. A presença de sintomas clínicos importantes (encefalopatia, náuseas, acidose, hipervolemia) é suficiente para indicar diálise, mesmo sem valores laboratoriais extremos. A creatinina elevada é esperada em pacientes diabéticos idosos e não deve indicar diálise. Incorreta. O valor de creatinina não deve ser interpretado isoladamente. O contexto clínico é o que determina a necessidade de diálise. O tratamento inicial deve ser aumento da hidratação venosa e diurético de alça, sem necessidade de terapia dialítica. Incorreta. Já houve falência do tratamento conservador, e há acidose e uremia sintomática, exigindo medidas mais efetivas.","needs_distractors":false},{"year":"2025.2","qnum":32,"enunciado":"(UNIGRANRIO BARRA) Escolar, 7 anos, cuja mãe encontra-se em tratamento para tuberculose pulmonar, iniciou quadro de tosse e febre de 37,8-38 há cerca de 20 dias. Há 10 dias evoluiu com piora do estado geral, recusa alimentar, desconforto respiratório e dor torácica retroesternal. O exame físico evidenciou criança emagrecida, frequência respiratória de 35 inc/min, frequência cardíaca = 120 bpm, pressão arterial abaixo do percentil 5 para idade, perfusão periférica de 4 segundos. Ausculta pulmonar com murmúrio vesicular audível bilateral e estertores creptantes em base direita. A ausculta cardíaca revelou bulhas hipofonéticas. Radiografia de tórax demonstrou: condensação em base direita e aumento de área cardíaca. A provável hipótese diagnóstica e a conduta inicial são:","alternativas":[{"letra":"A","texto":"Tuberculose ganglionar com choque cardiogênico; tratar ambulatorialmente com esquema RIPE e acompanhamento clínico e radiológico seriado sem necessidade de medidas invasivas."},{"letra":"B","texto":"Pneumonia complicada com choque séptico; iniciar antibioticoterapia de amplo espectro, expandir volume vigorosamente e considerar suporte vasopressor enquanto aguarda resposta clínica inicial."},{"letra":"C","texto":"Insuficiência cardíaca aguda por miocardite viral; iniciar suporte inotrópico e imunoglobulina intravenosa, postergando antibioticoterapia e investigação específica para tuberculose."},{"letra":"D","texto":"Choque obstrutivo por tuberculose: internar em unidade com suporte, solicitar ecocardiograma, iniciar esquema RIPE com corticosteroide e realizar pericardiocentese se necessário."}],"correta":"D","resposta":"Justificativas técnicas:\\n\\nAlternativa Correta? Justificativa Pneumonia complicada com choque séptico; iniciar antibioticoterapia de amplo espectro, expandir volume vigorosamente e considerar suporte vasopressor enquanto aguarda resposta clínica inicial. Incorreta Pneumonia bacteriana típica tem febre alta e evolução aguda. Volume vigoroso pode piorar choque obstrutivo no tamponamento. Insuficiência cardíaca aguda por miocardite viral; iniciar suporte inotrópico e imunoglobulina intravenosa, postergando antibioticoterapia e investigação específica para tuberculose. Incorreta Miocardite viral geralmente aguda e febril; adiar TB e iniciar IVIG seria prejudicial. Choque obstrutivo por tuberculose:\\n\\ninternar em unidade com suporte, solicitar ecocardiograma, iniciar esquema RIPE com corticosteroide e realizar pericardiocentese se necessário. Correta Contato, febre arrastada, emagrecimento, cardiomegalia, bulhas hipofonéticas, hipotensão → TB pericárdica + tamponamento → choque obstrutivo. Conduta:\\n\\ninternação + RIPE + corticoide + eco + possível drenagem urgente. Tuberculose ganglionar com choque cardiogênico; tratar ambulatorialmente com esquema RIPE e acompanhamento clínico e radiológico seriado sem necessidade de medidas invasivas. Incorreta Há choque e repercussão cardíaca. Não é TB ganglionar isolada. Não é caso ambulatorial.","needs_distractors":false},{"year":"2025.2","qnum":33,"enunciado":"(AFYA BRAGANÇA) Você está em um ambulatório de revisão cirúrgica e atende um homem de 52 anos, submetido há 7 dias a uma hernioplastia inguinal com tela. Ele refere que a ferida operatória estava bem até o quinto dia, quando notou vermelhidão e calor local, leve dor e pequeno endurecimento ao redor da incisão. Nega febre e secreção purulenta, mas relata mal-estar leve. Ao exame físico: temperatura: 37,6 °C, ferida com hiperemia discreta e induração em cerca de 3 cm ao redor da sutura, sem drenagem purulenta, sem sinais de deiscência. Com base no caso descrito, qual interpretação e conduta são mais adequadas?","alternativas":[{"letra":"A","texto":"Diagnóstico de infecção superficial de ferida operatória; indicar curativo local e antibiótico oral, com acompanhamento ambulatorial."},{"letra":"B","texto":"Diagnóstico de infecção profunda de ferida operatória; indicar antibiótico endovenoso e internação imediata."},{"letra":"C","texto":"Diagnóstico de deiscência de ferida; indicar nova sutura e antibioticoterapia oral, com acompanhamento ambulatorial."},{"letra":"D","texto":"Diagnóstico de reação inflamatória normal ao processo de cicatrização; manter observação sem conduta específica."}],"correta":"A","resposta":"O paciente apresenta sinais locais leves de infecção superficial da ferida operatória:\\n\\nhiperemia, dor leve, calor e induração restrita à pele e subcutâneo, sem drenagem purulenta, febre alta ou sinais sistêmicos. Esses achados caracterizam infecção superficial de ferida operatória, conforme a classificação CDC (Centers for Disease Control and Prevention). Condutas principais:\\n\\nCurativo com limpeza local com soro fisiológico e antisséptico. Antibiótico oral direcionado à flora de pele (geralmente cefalexina ou amoxicilina + clavulanato). Acompanhamento ambulatorial em 48–72h para reavaliação. Orientar paciente sobre sinais de alerta: febre, drenagem purulenta, dor intensa ou aumento da área de vermelhidão. A infecção profunda é a que afeta a aponeurose e camadas musculares, geralmente com gravidade maior que a do caso descrito. A deiscência da ferida corresponde à abertura dos pontos de sutura, o que não foi descrito.","needs_distractors":false},{"year":"2025.2","qnum":34,"enunciado":"(FMIT) Homem de 45 anos procura o pronto-atendimento relatando dor intensa na região anal há três dias, piorando ao sentar-se. Refere febre baixa e sensação de peso local. Ao exame físico, observa-se área eritematosa e endurecida, mas com área de flutuação à palpação no quadrante posterior direito da região perianal, extremamente dolorosa, sem exteriorização de secreção. Com base nesse quadro, qual é a conduta mais adequada para o manejo inicial desse paciente?","alternativas":[{"letra":"A","texto":"Realizar toque retal e, se houver dor intensa, postergar a avaliação até que a inflamação melhore com analgésicos e repouso local."},{"letra":"B","texto":"Solicitar colonoscopia eletiva para investigação de doenças inflamatórias intestinais, iniciando antibioticoterapia profilática."},{"letra":"C","texto":"Iniciar tratamento clínico com anti-inflamatórios e banho de assento, reservando a drenagem apenas se ocorrer fistulização espontânea."},{"letra":"D","texto":"Indicar drenagem cirúrgica imediata do abscesso, associada a analgesia e antibioticoterapia de cobertura para germes anaeróbios e gram-negativos."}],"correta":"D","resposta":"Alternativa: Indicar drenagem cirúrgica imediata do abscesso, associada a analgesia e antibioticoterapia de cobertura para germes anaeróbios e gram-negativos. Comentário: Essa conduta está correta. O quadro é compatível com abscesso perianal, cuja terapêutica é drenagem cirúrgica precoce. O uso de antibióticos é complementar em casos com febre, celulite extensa ou imunossupressão. Não se deve aguardar a supuração espontânea, mas drenar o abscesso.\\n\\nAlternativa: Iniciar tratamento clínico com anti-inflamatórios e banho de assento, reservando a drenagem apenas se ocorrer fistulização espontânea. Comentário: Conduta incorreta. O tratamento clínico isolado não é eficaz em abscessos perianais, pois há coleção purulenta que necessita drenagem. A espera por fistulização pode agravar o quadro e levar a complicações.\\n\\nAlternativa: Realizar toque retal e, se houver dor intensa, postergar a avaliação até que a inflamação melhore com analgésicos e repouso local. Comentário: Conduta inadequada. Embora o toque retal seja parte da avaliação, ele pode ser desnecessário em casos evidentes e dolorosos. A prioridade é aliviar o quadro com drenagem, e não adiar o exame.\\n\\nAlternativa: Solicitar colonoscopia eletiva para investigação de doenças inflamatórias intestinais, iniciando antibioticoterapia profilática. Comentário: Conduta incorreta. A colonoscopia não é indicada na fase aguda de abscesso perianal. O exame pode ser considerado posteriormente, caso haja suspeita de doença de base (como doença de Crohn), após resolução do processo infeccioso.","needs_distractors":false},{"year":"2025.2","qnum":35,"enunciado":"(FMIT) Uma criança de 4 anos é levada ao pronto atendimento com história de tosse e febre há dois dias, apresentando piora progressiva do padrão respiratório nas últimas horas. Ao exame físico, a criança está em posição de tripé, com batimento de asa nasal, tiragem subcostal, frequência respiratória de 48 irpm, saturação periférica de oxigênio (SpO₂) de 88% em ar ambiente e frequência cardíaca de 140 bpm. A ausculta pulmonar revela sibilos difusos e murmúrio vesicular globalmente diminuído. Considerando o quadro descrito, qual deve ser a conduta inicial mais adequada para esta criança, considerando o manejo do desconforto e da insuficiência respiratória?","alternativas":[{"letra":"A","texto":"Administrar sedativo leve para reduzir o esforço respiratório, realizar gasometria arterial e radiografia de tórax."},{"letra":"B","texto":"Ofertar oxigenoterapia com máscara de Venturi em concentração fixa de 21% e observar evolução clínica nas primeiras horas."},{"letra":"C","texto":"Iniciar oxigenoterapia suplementar com máscara não reinalante, monitorizar sinais vitais e preparar suporte ventilatório, se necessário."},{"letra":"D","texto":"Colocar a criança em decúbito dorsal, iniciar antibioticoterapia empírica intravenosa e aguardar resposta inicial antes de outras intervenções."}],"correta":"C","resposta":"Iniciar oxigenoterapia suplementar com máscara não reinalante, monitorar sinais vitais e preparar suporte ventilatório, se necessário. Certa O quadro é compatível com insuficiência respiratória aguda com hipoxemia (SpO₂ 88%), sinais de esforço respiratório importante (tripé, tiragem, BAN) e sibilância. A conduta imediata inclui oxigênio suplementar com alta fração inspirada (máscara não reinalante ou cânula de alto fluxo), monitorização contínua e preparo para suporte ventilatório avançado se não houver resposta inicial. Trata-se de emergência respiratória e requer intervenção rápida para evitar falência respiratória. Administrar sedativo leve para reduzir o esforço respiratório, realizar gasometria arterial e radiografia de tórax. Errada. Sedação em criança com esforço respiratório grave pode precipitar apneia e parada respiratória, sendo contraindicação sem via aérea protegida. Gasometria e radiografia podem ser úteis, porém não devem atrasar o suporte ventilatório e a oxigenoterapia. A prioridade é intervenção imediata. Ofertar oxigenoterapia com máscara de Venturi em concentração fixa de 21% e observar evolução clínica nas primeiras horas. Errada. Máscara de Venturi a 21% fornece apenas ar ambiente, inadequada para hipoxemia grave. A criança necessita de FiO₂ elevada e estabilização imediata. A conduta proposta representa atraso potencialmente fatal. Colocar a criança em decúbito dorsal, iniciar antibioticoterapia empírica intravenosa e aguardar resposta inicial antes de outras intervenções. Errada. Decúbito dorsal piora a mecânica respiratória em desconforto respiratório. Antibioticoterapia pode ser necessária posteriormente, mas não constitui medida inicial prioritária. A resposta clínica não deve ser aguardada sem suporte ventilatório adequado.","needs_distractors":false},{"year":"2025.2","qnum":36,"enunciado":"(IESVAP) Mulher, 42 anos, residente de área urbana, procura a Unidade Básica de Saúde relatando febre alta há três dias, associada a dor intensa nas articulações dos punhos, tornozelos e joelhos, além de erupção cutânea leve no tronco. Relata que seus vizinhos também apresentaram sintomas semelhantes recentemente. Ao exame físico, há edema articular e limitação de movimento devido à dor, sem sinais de artrite purulenta. A equipe de saúde suspeita de arbovirose. Com base nas Diretrizes do Ministério da Saúde (2023) e nas características clínicas das arboviroses, qual a conduta mais adequada na Atenção Primária à Saúde diante desse quadro?","alternativas":[{"letra":"A","texto":"Prescrever corticosteroide oral precoce para evitar cronificação das artralgias e solicitar PCR para Zika vírus."},{"letra":"B","texto":"Considerar o diagnóstico de Chikungunya, orientar hidratação, repouso, uso de paracetamol ou dipirona para controle da dor e febre e acompanhamento ambulatorial."},{"letra":"C","texto":"Diagnosticar como dengue, evitar qualquer analgésico, iniciar hidratação vigorosa venosa e comunicar vigilância epidemiológica apenas após confirmação laboratorial."},{"letra":"D","texto":"Solicitar sorologia IgM para Chikungunya, iniciar anti-inflamatórios não esteroides (AINEs) e encaminhar para hospital de referência devido ao risco de choque."}],"correta":"B","resposta":"Prescrever corticosteroide oral precoce para evitar cronificação das artralgias e solicitar PCR para Zika vírus. Incorreta. Corticosteroides são contraindicados na fase aguda da Chikungunya, pois podem agravar o quadro e aumentar o risco de complicações. Seu uso é reservado à fase subaguda ou crônica (após 14 dias), e somente se persistirem artralgias importantes. O quadro clínico não sugere Zika, pois a dor articular na Zika é leve e predomina o exantema. Solicitar sorologia IgM para Chikungunya, iniciar AINEs e encaminhar para hospital de referência devido ao risco de choque. Incorreta. O quadro não sugere dengue grave nem risco de choque hipovolêmico. A Chikungunya raramente cursa com choque, diferentemente da Dengue. O uso de AINEs deve ser evitado na fase aguda, enquanto houver possibilidade de coinfecção com dengue, devido ao risco de sangramento. Considerar o diagnóstico de Chikungunya, orientar hidratação, repouso, uso de paracetamol ou dipirona para controle da dor e febre e acompanhamento ambulatorial. O diagnóstico de Chikungunya é essencialmente clínico e epidemiológico, especialmente em surtos. O manejo inicial na APS inclui: Hidratação oral adequada; Repouso relativo; analgésicos e antitérmicos seguros (dipirona, paracetamol); Evitar AINEs e corticoides nas primeiras 2 semanas; Acompanhamento clínico para monitorar dor articular persistente (fase subaguda/crônica). Comunicação à vigilância epidemiológica é obrigatória diante de caso suspeito. Diagnosticar como dengue, evitar qualquer analgésico, iniciar hidratação venosa e comunicar vigilância apenas após confirmação laboratorial. Incorreta. A clínica (intensa dor articular e edema) é mais compatível com Chikungunya do que com Dengue. O diagnóstico e notificação devem ser clínicos e imediatos, sem necessidade de confirmação laboratorial para notificar. A hidratação venosa só se indica em sinais de alarme ou desidratação grave, o que não ocorre aqui.","needs_distractors":false},{"year":"2025.2","qnum":37,"enunciado":"(AFYA IPATINGA) Durante uma visita domiciliar, o médico da Unidade Básica de Saúde (UBS) avalia um idoso de 75 anos. A família relata febre, tosse produtiva e prostração há 5 dias. Ele tem histórico de Hipertensão Arterial Sistêmica e é tabagista (20 maços-ano). Ao exame físico, apresenta-se sonolento, PA: 88 x 54 mmHg; FC: 118 bpm; FR: 28 irpm; temperatura axilar 38,9 °C e StO₂: 90% em ar ambiente. A ausculta pulmonar revela roncos e crepitações difusas na base esquerda. Assinale a alternativa que representa a condição clínica provável do paciente e a conduta adequada nesse momento.","alternativas":[{"letra":"A","texto":"Sepse de foco pulmonar: iniciar ressuscitação volêmica com cristaloides na UBS enquanto aguarda transferência para UPA."},{"letra":"B","texto":"Pneumonia adquirida na comunidade: indicar internação hospitalar para início de tratamento com antibiótico e corticoide sistêmico."},{"letra":"C","texto":"Exacerbação aguda de DPOC: iniciar tratamento ambulatorial com corticoide, broncodilatador e antibiótico via oral."},{"letra":"D","texto":"Choque séptico: encaminhar o paciente à UPA para início de tratamento com antibiótico venoso e suporte hemodinâmico com drogas vasoativas."}],"correta":"A","resposta":"A sepse é uma condição grave caracterizada por uma infecção suspeita ou confirmada que leva à disfunção de um ou mais órgãos. No caso do paciente, há um provável foco de infecção nos pulmões, e os sinais de disfunção orgânica desse paciente incluem:\\n\\nsaturação de oxigênio (StO₂) igual ou inferior a 90% alteração do nível de consciência pressão arterial sistólica (PAS) igual ou inferior a 90 mmHg Choque séptico é definido pela presença de hipotensão não responsiva à utilização de fluídos. Em um cenário de UBS, deve-se iniciar a ressuscitação volêmica enquanto aguarda a transferência para UPA.","needs_distractors":false},{"year":"2025.2","qnum":38,"enunciado":"(UNIFIPMOC) Na UBS, médico atende paciente de 42 anos, auxiliar de serviços gerais, que comparece após ser encaminhada pela equipe de enfermagem devido à “falta de vontade de viver”. Relata tristeza persistente há cerca de 4 meses, com insônia terminal, fadiga, perda do interesse pelas atividades habituais e pensamentos recorrentes de que “sua vida não tem mais sentido”. Nega plano suicida definido, mas afirma ter pensado “em tomar todos os comprimidos de casa”. Apresenta histórico de transtorno depressivo recorrente, tendo usado fluoxetina 20 mg/dia por 6 meses há dois anos, com melhora. Parou o medicamento por conta própria há 1 ano. Nega uso atual de álcool ou drogas ilícitas. Pressão arterial 120/70 mmHg, frequência cardíaca 76 bpm, demais elementos do exame físico sem alterações. A conduta mais adequada é:","alternativas":[{"letra":"A","texto":"encaminhar diretamente ao pronto-socorro psiquiátrico, pois qualquer relato de ideação suicida é emergência, sem necessidade de iniciar tratamento na UBS."},{"letra":"B","texto":"reiniciar fluoxetina 20 mg/dia e manter seguimento mensal, uma vez que a ausência de plano suicida definido descarta risco imediato."},{"letra":"C","texto":"retomar fluoxetina em dose inicial de 10 mg/dia por 1 semana, aumentar para 20 mg/dia conforme tolerância, estabelecer vínculo terapêutico, monitorar ideação suicida semanalmente."},{"letra":"D","texto":"prescrever amitriptilina 25 mg à noite para melhorar o sono e o humor, evitando encaminhamento precoce, pois antidepressivos tricíclicos têm boa resposta terapêutica inicial."}],"correta":"C","resposta":"A alternativa \\"Reiniciar fluoxetina 20 mg/dia e manter seguimento mensal, uma vez que a ausência de plano suicida definido descarta risco imediato\\" está incorreta, uma vez que a ausência de plano suicida não elimina o risco. O acompanhamento mensal é insuficiente, pois nas primeiras semanas o risco de suicídio pode aumentar após início do antidepressivo. A alternativa \\"Prescrever amitriptilina 25 mg à noite para melhorar o sono e o humor, evitando encaminhamento precoce, pois antidepressivos tricíclicos têm boa resposta terapêutica inicial\\" está incorreta, pois a amitriptilina não é recomendada na atenção primária em pacientes com ideação suicida, devido à alta letalidade em overdose e aos efeitos adversos anticolinérgicos. A alternativa \\"Retomar fluoxetina em dose inicial de 10 mg/dia por 1 semana, aumentar para 20 mg/dia conforme tolerância, estabelecer vínculo terapêutico, monitorar ideação suicida semanalmente\\" está correta, visto que a fluoxetina é segura e eficaz na atenção primária, especialmente em pacientes que já responderam previamente. Iniciar em dose baixa e monitorar semanalmente é a conduta mais segura e alinhada às diretrizes do Ministério da Saúde e da OMS. A alternativa \\"Encaminhar diretamente ao pronto-socorro psiquiátrico, pois qualquer relato de ideação suicida é emergência, sem necessidade de iniciar tratamento na UBS\\" está incorreta, já que a ideação suicida sem plano estruturado pode ser acompanhada na UBS com monitoramento ativo. Encaminhar de imediato rompe o vínculo e não é necessário nesse caso\\".","needs_distractors":false},{"year":"2025.2","qnum":39,"enunciado":"(IESVAP) Mulher de 30 anos, G2P1A1, é admitida na maternidade com história de febre há 48 horas, dor pélvica intensa e eliminação de secreção vaginal fétida após aborto incompleto há três dias. Na admissão, apresenta PA 85/45 mmHg, FC 125 bpm, FR 28 irpm, T 39°C, pele fria e pegajosa, enchimento capilar lento (>4 s) e nível de consciência rebaixado. Os exames laboratoriais iniciais mostram:\\n\\nNa⁺ = 128 mEq/L K⁺ = 3,0 mEq/L HCO₃⁻ = 15 mEq/L Lactato = 5,5 mmol/L Creatinina = 2,1 mg/dL Hemoglobina = 8,8 g/dL Leucócitos = 18.000/mm³ com desvio à esquerda. O ultrassom pélvico evidencia conteúdo uterino compatível com restos ovulares. Considerando o quadro clínico e laboratorial apresentado, qual hipótese diagnóstica e conduta inicial são mais adequadas para essa paciente?","alternativas":[{"letra":"A","texto":"Hiponatremia e anemia leve sem repercussão hemodinâmica, conduta expectante e acompanhamento ambulatorial."},{"letra":"B","texto":"Insuficiência renal aguda isolada por desidratação, tratada apenas com hidratação oral e observação clínica."},{"letra":"C","texto":"Choque séptico secundário a aborto infectado, com necessidade de reposição volêmica imediata com cristaloides, antibioticoterapia intravenosa de amplo espectro e correção dos distúrbios eletrolíticos."},{"letra":"D","texto":"Sepse por aborto infectado, requerendo antibiótico oral e correção eletrolítica após estabilização térmica."}],"correta":"C","resposta":"Sepse por aborto infectado, requerendo antibiótico oral e correção eletrolítica após estabilização térmica. Errada. Paciente apresenta instabilidade hemodinâmica grave (PA < 90 mmHg, lactato elevado) → choque séptico. Antibiótico oral e espera pela estabilização térmica não são adequados. Choque séptico secundário a aborto infectado, com necessidade de reposição volêmica imediata com cristaloides, antibioticoterapia intravenosa de amplo espectro e correção dos distúrbios eletrolíticos. Correta. Esta é a conduta recomendada pelo Ministério da Saúde e protocolos internacionais para choque séptico obstétrico. Insuficiência renal aguda isolada por desidratação, tratada apenas com hidratação oral e observação clínica. Errada. A IRA é secundária à hipoperfusão por choque séptico, não é isolada. Hidratação oral não seria suficiente. Hiponatremia e anemia leve sem repercussão hemodinâmica, conduta expectante e acompanhamento ambulatorial. Errada. Paciente apresenta instabilidade hemodinâmica grave e acidose metabólica, com risco imediato de morte. Conduta expectante seria inapropriada e perigosa. Conclusão Hipótese diagnóstica: Choque séptico secundário a aborto infectado. Conduta inicial adequada: reposição volêmica rápida com cristaloides; antibioticoterapia intravenosa de amplo espectro (ex.: cefalosporina de 3ª geração + metronidazol ou esquema recomendado por protocolos obstétricos); correção de distúrbios eletrolíticos e suporte hemodinâmico; avaliação e eventual esvaziamento uterino após estabilização inicial.","needs_distractors":false},{"year":"2025.2","qnum":40,"enunciado":"(ITPAC PORTO NACIONAL) Durante o acompanhamento em uma Unidade Básica de Saúde, uma criança de 9 anos é trazida pela mãe, que relata dificuldade de concentração, agitação excessiva e baixo rendimento escolar. A professora menciona que o aluno interrompe constantemente as atividades e tem dificuldade de seguir instruções. A equipe multiprofissional (médico, enfermeiro e psicólogo) realiza a avaliação inicial e descarta outras causas clínicas (como distúrbios da visão, audição e epilepsia). A mãe relata que a criança dorme mal e passa horas em jogos eletrônicos. Não há histórico de uso de substâncias, mas o pai refere comportamento ansioso e impulsivo desde a infância. Diante do quadro, qual deve ser o plano de cuidado mais adequado para essa criança na UBS, considerando os principais transtornos mentais da infância com repercussões no desenvolvimento neuropsíquico?","alternativas":[{"letra":"A","texto":"Solicitar avaliação neurológica e prescrever benzodiazepínico de curta duração para reduzir a hiperatividade noturna."},{"letra":"B","texto":"Encaminhar diretamente para o psiquiatra infantil e suspender o acompanhamento na UBS até avaliação especializada."},{"letra":"C","texto":"Iniciar tratamento farmacológico com metilfenidato, sem necessidade de suporte psicossocial, pois a farmacoterapia é suficiente para controle do comportamento."},{"letra":"D","texto":"Implementar um plano de cuidado interdisciplinar, incentivo à rotina estruturada e higiene do sono, acompanhamento e encaminhamento ao psiquiatra infantil quando necessário."}],"correta":"D","resposta":"O encaminhamento direto ao psiquiatra sem continuidade do cuidado na UBS interrompe o vínculo e desconsidera a atenção integral e longitudinal preconizada pela Atenção Primária à Saúde. A UBS deve atuar no manejo inicial, orientação familiar e acompanhamento, integrando-se à Rede de Atenção Psicossocial (RAPS). O tratamento do TDAH não se baseia exclusivamente em farmacoterapia. A abordagem deve ser multidimensional, incluindo intervenções psicossociais, estratégias educacionais e apoio familiar. Medicamentos podem ser indicados, mas sob avaliação de especialista. Essa alternativa reflete o plano de cuidado recomendado pelas diretrizes clínicas:\\n\\nabordagem interdisciplinar, psicoeducação, terapia cognitivo-comportamental, orientações para rotina estruturada e promoção da saúde mental no ambiente familiar e escolar. A UBS tem papel central no acolhimento, acompanhamento e articulação com a RAPS. Essa conduta favorece o desenvolvimento neuropsíquico saudável e o manejo de comorbidades, como ansiedade e transtornos de conduta. Uso de benzodiazepínicos em crianças com TDAH é contraindicado, pois pode agravar a desatenção e causar dependência. Além disso, a avaliação neurológica só é indicada quando há sinais neurológicos associados (como convulsões), o que não ocorre neste caso.","needs_distractors":false},{"year":"2025.2","qnum":41,"enunciado":"(BANCO AFYA) Gestante de 30 anos, G2P1, 34 semanas, previamente saudável, procura a maternidade por cefaleia intensa, escotomas visuais e dor em epigástrio iniciados há algumas horas. Relata edema em mãos e face progressivo nos últimos dias, com dificuldade para retirar anéis. No exame, apresenta PA 170×110 mmHg, FC 98 bpm, BCF 145 bpm, hiper-reflexia patelar e edema com cacifo em dorso das mãos e região periorbital. Nega sangramento vaginal e mantém movimentos fetais. Qual mecanismo explica o achado clínico desta paciente?","alternativas":[{"letra":"A","texto":"Edema por compressão uterina sobre veias abdominais profundas, aumento da resistência ao retorno venoso e estase circulatória, com hiperemia local associada à posição materna."},{"letra":"B","texto":"Edema por vasodilatação periférica acentuada, aumento fisiológico do volume sanguíneo e maior pressão hidrostática capilar, com retenção líquida compatível com adaptação normal da gestação."},{"letra":"C","texto":"Edema por disfunção endotelial, aumento da permeabilidade vascular e extravasamento de proteínas para o interstício, com redução da pressão oncótica plasmática típica da pré- eclâmpsia."},{"letra":"D","texto":"Edema por ativação acentuada do sistema renina-angiotensina-aldosterona, maior reabsorção renal de sódio e água e vasodilatação renal própria das modificações fisiológicas tardias da gestação."}],"correta":"C","resposta":"Justificativas resumidas Alternativa Análise Edema por disfunção endotelial, aumento da permeabilidade vascular e extravasamento de proteínas para o interstício, com redução da pressão oncótica plasmática típica da pré-eclâmpsia.— Correta Pré-eclâmpsia → lesão endotelial, ↑ permeabilidade, perda proteica, ↓ oncótica → edema. Sintomas neurológicos e PA grave reforçam. Edema por vasodilatação periférica acentuada, aumento fisiológico do volume sanguíneo e maior pressão hidrostática capilar, com retenção líquida compatível com adaptação normal da gestação. — Errada Descreve adaptação fisiológica da gestação; edema leve, sem sintomas graves ou hipertensão acentuada. Edema por ativação acentuada do sistema renina- angiotensina-aldosterona, maior reabsorção renal de sódio e água e vasodilatação renal própria das modificações fisiológicas tardias da gestação. — Errada RAAS está reduzido na pré- eclâmpsia, não hiperativado; não explica sinais de gravidade. Edema por compressão uterina sobre veias abdominais profundas, aumento da resistência ao retorno venoso e estase circulatória, com hiperemia local associada à posição materna. — Errada Compressão mecânica → edema dependente (MMII), sem cefaleia, hiperreflexia ou hipertensão grave.","needs_distractors":false},{"year":"2025.2","qnum":42,"enunciado":"(UNIPTAN) Homem de 42 anos, agricultor, residente na zona rural do norte de Minas Gerais, procura a Unidade Básica de Saúde relatando palpitações intermitentes, fadiga aos esforços e edema vespertino de membros inferiores há alguns meses. Refere ter morado em casa de taipa na infância e relata que sua mãe “teve o mesmo problema no coração”. Ao exame físico, apresenta pressão arterial de 100x60 mmHg, pulso irregular e bulhas cardíacas com extrassístoles. O eletrocardiograma mostra bloqueio de ramo direito e hemibloqueio anterior esquerdo. Qual deve ser a conduta mais apropriada na Atenção Primária à Saúde para este paciente, considerando a hipótese diagnóstica e os determinantes de saúde envolvidos?","alternativas":[{"letra":"A","texto":"Solicitar sorologia para Trypanosoma cruzi por dois métodos distintos, encaminhar ao cardiologista para avaliação e manter acompanhamento multiprofissional na APS."},{"letra":"B","texto":"Solicitar sorologia para Trypanosoma cruzi e iniciar imediatamente benznidazol em dose empírica, independentemente do resultado."},{"letra":"C","texto":"Prescrever antibiótico de amplo espectro e encaminhar ao pronto atendimento devido à suspeita de miocardite infecciosa bacteriana."},{"letra":"D","texto":"Solicitar ecocardiograma e iniciar tratamento com corticoide e diurético até confirmação diagnóstica."}],"correta":"A","resposta":"Justificativa:\\n\\nO paciente apresenta sinais compatíveis com cardiopatia chagásica crônica, sendo prioritário confirmar o diagnóstico por sorologia com dois testes de metodologias diferentes (ELISA, imunofluorescência indireta, hemaglutinação indireta). Após confirmação, deve-se garantir seguimento conjunto entre APS e atenção especializada, com abordagem integral dos determinantes sociais e medidas de prevenção secundária e terciária. Por que as outras alternativas estão incorretas:\\n\\nSolicitar sorologia para Trypanosoma cruzi e iniciar imediatamente benznidazol em dose empírica, independentemente do resultado.\\n\\n- O tratamento etiológico com benznidazol é indicado após confirmação sorológica, não de forma empírica na fase crônica. Prescrever antibiótico de amplo espectro e encaminhar ao pronto atendimento devido à suspeita de miocardite infecciosa bacteriana.\\n\\n- O quadro não sugere miocardite bacteriana, e antibióticos não têm papel na doença de Chagas. Solicitar ecocardiograma e iniciar tratamento com corticoide e diurético até confirmação diagnóstica.\\n\\n- O uso de corticoides não é indicado, e o ecocardiograma, embora útil, não substitui a sorologia para diagnóstico etiológico.","needs_distractors":false},{"year":"2025.2","qnum":43,"enunciado":"(BANCO AFYA) Uma gestante de 29 semanas em trabalho de parto prematuro evolui com nascimento vaginal. O recém-nascido (RN) não chora ao nascer e apresenta tônus diminuído e respiração irregular, sendo realizado clampeamento imediato do cordão devido à instabilidade do recém-nascido. Peso de nascimento: 1180g. O bebê é levado ao berço aquecido, com temperatura axilar inicial de 36,3 °C e pele úmida. Colocado touca e saco plástico. Mantém gemência e algum esforço ventilatório espontâneo. Qual é a conduta inicial adequada para este recém-nascido?","alternativas":[{"letra":"A","texto":"Realizar secagem vigorosa do corpo e cabeça para estímulo, colocar manta aquecida e touca simples, administrar oxigênio suplementar de rotina e evitar pressão positiva inicial."},{"letra":"B","texto":"Deixar sob calor radiante e iniciar oxigênio a 40% com máscara, realizar aspiração rotineira das vias aéreas e iniciar massagem cardíaca sincronizada com ventilação positiva."},{"letra":"C","texto":"Iniciar ventilação invasiva imediata e surfactante precoce para todos os prematuros <34 semanas, manter apenas calor radiante e evitar o uso de saco plástico devido ao risco de hipertermia."},{"letra":"D","texto":"Manter o RN envolto em saco plástico até o pescoço sem secagem prévia, usar touca dupla e calor radiante, posicionar a cabeça, monitorizar temperatura desde o início e ventilação positiva."}],"correta":"D","resposta":"Justificativas detalhadas Manter o RN envolto em saco plástico até o pescoço sem secagem prévia, usar touca dupla e calor radiante, posicionar a cabeça, monitorar temperatura desde o início e ventilação positiva. Certa. SBP 2022 para <34 semanas — medidas adicionais iniciais:\\n\\nSaco plástico até o pescoço sem secar Touca dupla Calor radiante Monitorização térmica contínua Posição neutra CPAP precoce se respiração irregular e movimentos espontâneos presentes → VPP só se falha ventilatória clara / FC <100 / apneia Temperatura de 36,3 °C reforça que manta não substitui saco plástico e não confunde o candidato. Realizar secagem vigorosa do corpo e cabeça, colocar manta aquecida e touca simples, administrar oxigênio suplementar de rotina e evitar pressão positiva inicial para reduzir risco de barotrauma. ERRADA Secagem vigorosa não se faz em <34s sob risco de hipotermia. Manta não substitui barreira térmica selada. Oxigênio suplementar rotineiro incorreto. CPAP precoce reduz VPP e intubação — não evitar. Deixar sob calor radiante e iniciar oxigênio a 40% com máscara, realizar aspiração rotineira das vias aéreas e iniciar massagem cardíaca sincronizada com ventilação positiva. Errada. Calor radiante isolado é insuficiente. Aspiração não é rotineira. Esperar apneia é atraso terapêutico. Iniciar ventilação invasiva imediata e surfactante precoce para todos os prematuros <34 semanas, manter apenas calor radiante e evitar o uso de saco plástico devido ao risco de hipertermia. Errada. Surfactante não é universal na sala. Saco plástico é recomendado. CPAP precoce preferível à intubação imediata.","needs_distractors":false},{"year":"2025.2","qnum":44,"enunciado":"(AFYA ABAETETUBA) Uma mulher de 36 anos procura o pronto atendimento com febre (38,7 °C), calafrios, dor lombar esquerda e mal-estar há 24 horas. Relata disúria e urgência miccional nos últimos dias. Ao exame físico: Giordano positivo à esquerda, FC 102 bpm, PA 118/76 mmHg, sem sinais de choque. Exames laboratoriais: leucocitose (14.800/mm³), urina tipo I com piúria (+++) e nitrito positivo. Não há comorbidades e a paciente tolera via oral. Considerando o caso acima, após coleta de urocultura, assinale a alternativa que indica a conduta terapêutica inicial mais adequada.","alternativas":[{"letra":"A","texto":"Internação e antibioticoterapia endovenosa com ceftriaxona até resultado da urocultura."},{"letra":"B","texto":"Encaminhar para avaliação cirúrgica imediata devido à dor lombar intensa e febre alta."},{"letra":"C","texto":"Tratamento ambulatorial com antibiótico oral (ciprofloxacino ou cefalexina), hidratação e controle sintomático."},{"letra":"D","texto":"Suspender antibiótico e aguardar cultura, pois o quadro pode ser apenas cistite febril."}],"correta":"C","resposta":"A alternativa correta é a que indica “Tratamento ambulatorial com antibiótico oral (ciprofloxacino ou cefalexina), hidratação e controle sintomático.” A paciente apresenta pielonefrite aguda não complicada, pois é jovem, estável hemodinamicamente e tolera a via oral. Nessas condições, o tratamento pode ser realizado ambulatorialmente, com antibióticos orais eficazes contra bacilos entéricos gram-negativos, como ciprofloxacino (500 mg VO 12/12 h) ou cefalexina (500 mg VO 6/6 h), por 7 a 14 dias, além de hidratação e analgesia. A urocultura é essencial para confirmar o agente e ajustar a terapia conforme o antibiograma. As demais alternativas estão incorretas:\\n\\nA alternativa que indica “Internação e antibioticoterapia endovenosa com ceftriaxona até resultado da urocultura” é incorreta. Essa conduta é reservada para casos complicados (gestantes, idosos frágeis, obstrução, vômitos, sepse ou comorbidades graves), o que não se aplica à paciente descrita. A alternativa que indica “Suspender antibiótico e aguardar cultura, pois o quadro pode ser apenas cistite febril” é incorreta. O quadro clínico (febre, dor lombar, Giordano positivo) caracteriza pielonefrite, e o início imediato do antibiótico é fundamental para evitar complicações. A alternativa que indica “Encaminhar para avaliação cirúrgica imediata devido à dor lombar intensa e febre alta” é incorreta. Não há indícios de abscesso, obstrução ou sepse que justifiquem abordagem cirúrgica emergencial.","needs_distractors":false},{"year":"2025.2","qnum":45,"enunciado":"(AFYA PALMAS) Homem, 50 anos, trabalhador rural, procura a Unidade Básica de Saúde (UBS) com febre alta há seis dias, cefaleia intensa, mialgia em dorso e panturrilhas, náuseas e dois episódios de vômitos escuros. Relata que esteve em área de mata há cerca de duas semanas para atividade agrícola, onde moradores relataram morte recente de macacos. Não apresenta cartão de vacina. Ao exame: T 38,7 °C (VR = 36,0 °C e 37,5 °C) , FC 104 bpm (VR = 60 e 100 bpm) , PA 105/68 mmHg (VC = menor que 120/80 mmHg) , icterícia ++/4+ e hepatomegalia dolorosa. Testes rápidos para dengue e hepatites virais não reagentes. Exames laboratoriais:\\n\\nPlaquetas: 82.000/mm³ ( 150.000 - 450.000/mm³) Bilirrubina total: 7,2 mg/dL ( até 1,2 mg/dL) AST (TGO): 860 U/L ( 5 - 40 U/L) ALT (TGP): 210 U/L ( 7 - 56 U/L) Creatinina: 1,8 mg/dL ( 0,7 - 1,3 mg/dL Tempo de protrombina: alargado ( 10 - 14 segundos Qual é a conduta adequada, na Atenção Primária de Saúde (APS), diante deste caso?","alternativas":[{"letra":"A","texto":"Administrar vitamina K para coagulopatia, orientar repouso domiciliar e agendar retorno ambulatorial para controle clínico."},{"letra":"B","texto":"Solicitar sorologia confirmatória específica, observar evolução clínica e definir conduta após o resultado dos exames."},{"letra":"C","texto":"Encaminhar como febre amarela grave, iniciar estabilização clínica e acionar vigilância para bloqueio vacinal na área."},{"letra":"D","texto":"Prescrever antibiótico direcionado para leptospirose, manter hidratação venosa na UBS e reavaliar a evolução clínica."}],"correta":"C","resposta":"Correta:\\n\\nQuadro clínico e laboratorial compatível com febre amarela na forma grave (ictero- hemorrágica): febre + icterícia + plaquetopenia + alteração de TGO/TGP (AST muito maior que ALT) + disfunção renal + contexto epidemiológico com exposição silvestre + ausência de vacinação. No manejo da APS, a prioridade é estabilização inicial, notificação imediata e encaminhamento urgente para unidade de referência, além de acionar bloqueio vacinal comunitário como política pública de vigilância.\\n\\nIncorretas:\\n\\nA conduta não depende de confirmação laboratorial. Em doenças de vigilância imediata, o SUS atua pelo critério clínico-epidemiológico e a investigação não pode atrasar as ações de controle e proteção coletiva. Embora leptospirose seja diferencial, a combinação de exposição silvestre + epizootias + lesão hepática intensa favorece febre amarela. Ficar apenas no tratamento antimicrobiano atrasa o manejo adequado. Não há espaço para manejo ambulatorial. Há sinais de gravidade e risco de evolução rápida para insuficiência hepática e choque. Requer nível hospitalar imediato.","needs_distractors":false},{"year":"2025.2","qnum":46,"enunciado":"(FESAR) Um paciente de 35 anos é admitido no setor de emergência após sofrer um acidente automobilístico de alta velocidade. Ao exame primário (ABCDE) inicial, você observa que o paciente está agitado, com estridor inspiratório progressivo e utiliza musculatura acessória para respirar. A frequência respiratória é de 28 incursões por minuto, superficial, e a saturação de oxigênio (SpO 2) em ar ambiente é de 88%. Há evidências de hematoma na região anterior do pescoço e crepitação subcutânea. O paciente está consciente, mas ansioso e com dificuldade para falar frases completas. Qual das seguintes opções representa a conduta mais apropriada e a interpretação correta dos achados clínicos neste momento, considerando os princípios do ATLS para manejo de vias aéreas e região cervical?","alternativas":[{"letra":"A","texto":"Tentar a intubação orotraqueal com visualização direta da laringe utilizando um laringoscópio com lâmina Macintosh, mantendo a imobilização cervical com colar e blocos laterais. Se a intubação for bem-sucedida, conectar o paciente a um ventilador mecânico e monitorar a adequação da ventilação com gasometria arterial e EtCO₂."},{"letra":"B","texto":"Preparar para cricotireoidostomia cirúrgica de emergência, considerando a presença de estridor, hematoma cervical e crepitação, que sugerem obstrução das vias aéreas superiores possivelmente relacionada a lesão laríngea ou traqueal. A intubação orotraqueal pode ser difícil ou impossível neste cenário e agravar a lesão."},{"letra":"C","texto":"Administrar oxigênio suplementar com máscara não reinalante a 15 L/min e monitorar continuamente a SpO₂ e o dióxido de carbono ao final da expiração (EtCO₂). A agitação pode ser secundária à hipoxemia, e a oxigenoterapia agressiva pode melhorar a ventilação e a oxigenação antes de considerar procedimentos invasivos. A monitorização do EtCO₂ ajudará a confirmar a adequação da ventilação."},{"letra":"D","texto":"Realizar imediatamente intubação orotraqueal com sequência rápida de intubação (SRI), garantindo imobilização cervical manual em linha reta durante o procedimento. A SpO2 baixa e o estridor indicam falha iminente das vias aéreas, tornando a intubação a prioridade máxima, mesmo antes da confirmação da lesão cervical por imagem."}],"correta":"B","resposta":"Resposta correta: preparar para cricotireoidostomia cirúrgica de emergência, considerando a presença de estridor, hematoma cervical e crepitação, que sugerem obstrução das vias aéreas superiores possivelmente relacionada a lesão laríngea ou traqueal. A intubação orotraqueal pode ser difícil ou impossível neste cenário e agravar a lesão. Explicação detalhada:\\n\\nEstridor inspiratório progressivo, uso de musculatura acessória e dificuldade para falar frases completas: são sinais clássicos de obstrução das vias aéreas superiores, indicando um comprometimento significativo do fluxo de ar. Hematoma cervical e crepitação subcutânea: sugerem lesão direta na laringe ou traqueia, com possível extravasamento de ar para os tecidos subcutâneos. Tentar a intubação orotraqueal em um cenário como este pode ser extremamente difícil, traumático e até mesmo impossível, podendo piorar a lesão existente ou levar à perda completa das vias aéreas. A agitação e a SpO₂ de 88% em ar ambiente reforçam a hipóxia secundária à inadequação da ventilação. Embora a oxigenoterapia seja importante, neste caso, a obstrução mecânica é a principal causa da hipoxemia, e a oxigenação isolada não resolverá o problema. A cricotireoidostomia cirúrgica de emergência: é o procedimento de escolha em situações de \\"não se consegue intubar, não se consegue ventilar\\" (cannot intubate, cannot ventilate - CICV) causadas por obstrução das vias aéreas superiores acima da laringe. A rapidez na realização deste procedimento pode ser crucial para salvar a vida do paciente. Por que as outras opções estão incorretas:\\n\\nIntubação orotraqueal imediata com SRI: embora a intubação seja frequentemente necessária em pacientes traumatizados, tentar a intubação em um cenário de provável lesão laríngea ou traqueal com sinais de obstrução significativa pode ser perigoso e infrutífero. A SRI não resolve o problema mecânico da obstrução. Oxigenoterapia com máscara não reinalante e monitorização de EtCO 2: a oxigenoterapia é um componente importante do manejo, mas não aborda a causa da obstrução. A monitorização do EtCO₂ é útil para confirmar a adequação da ventilação APÓS o estabelecimento de uma via aérea segura, o que ainda não ocorreu neste paciente. Tentar intubação orotraqueal com visualização direta: dada a alta probabilidade de lesão das vias aéreas superiores e obstrução, tentar a intubação orotraqueal pode ser arriscado e atrasar a realização de um procedimento que garanta uma via aérea definitiva (cricotireoidostomia).","needs_distractors":false},{"year":"2025.2","qnum":47,"enunciado":"(AFYA ITABUNA) Sr. Antônio, 74 anos, foi submetido a uma colectomia direita eletiva por neoplasia há 3 dias. Encontra-se internado na enfermaria cirúrgica e evoluiu nas últimas 6 horas com rebaixamento do nível de consciência, hipotensão arterial (PA 84x50 mmHg), taquicardia (FC 122 bpm), taquipneia (FR 26 irpm) e febre de 38,9 °C. O débito urinário caiu para 15 mL/h. Apresenta abdome discretamente distendido e doloroso à palpação. Exames laboratoriais mostram:\\n\\nLeucograma: 17.500/mm³ Lactato: 3,2 mmol/L Creatinina: 2,1 mg/dL (basal: 1,1 mg/dL) PCR: 165 mg/L Gasometria: pH 7,31; HCO₃⁻: 18 mEq/L; BE: -5 SatO₂: 92% em ar ambiente Com base no caso acima, assinale a alternativa que apresenta o diagnóstico mais provável e a conduta inicial adequada.","alternativas":[{"letra":"A","texto":"Obstrução intestinal pós-operatória; indicar reabordagem cirúrgica imediata."},{"letra":"B","texto":"Choque séptico; iniciar antibiótico empírico, expansão com cristaloide e considerar vasopressor se necessário."},{"letra":"C","texto":"Insuficiência renal aguda pós-operatória; realizar hemodiálise e manter observação."},{"letra":"D","texto":"Sepse grave; iniciar oxigenoterapia, sonda vesical de demora e analgesia."}],"correta":"B","resposta":"O paciente apresenta disfunção de múltiplos órgãos (renal, neurológica) e hipotensão persistente com lactato elevado (>2 mmol/L), caracterizando choque séptico (definição atual do Sepsis-3). A conduta imediata deve incluir:\\n\\nExpansão volêmica com cristaloides (30 mL/kg nas primeiras 3 horas). Coleta de culturas e início imediato de antibiótico de amplo espectro. Considerar vasopressor (noradrenalina) se não responder à hidratação. Monitoramento em ambiente com suporte intensivo, se possível.","needs_distractors":false},{"year":"2025.2","qnum":48,"enunciado":"(FESAR) Homem de 34 anos procura a Unidade Básica de Saúde com febre alta há cinco dias, cefaleia, mialgia intensa em panturrilhas, náuseas e olhos “amarelados” há um dia. Relata ter ajudado na limpeza de casa após enchente recente, com acúmulo de lixo, esgoto e presença de ratos. Trabalha como coletor de resíduos. Ao exame: paciente prostrado, ictérico, com sufusão conjuntival, PA 90/60 mmHg, FC 104 bpm, temperatura 38,5 °C. Fígado palpável e doloroso a 3 cm do rebordo costal direito. Sem sinais meníngeos. Exames disponíveis na UBS:\\n\\nLeucocitose discreta, plaquetopenia leve; TGO/TGP elevadas; Creatinina 2,1 mg/dL; Urina com proteína e hemoglobina. Com base nas informações clínicas, laboratoriais e epidemiológicas, assinale a alternativa que apresenta a conduta mais adequada para o cenário da atenção primária.","alternativas":[{"letra":"A","texto":"Considerar dengue grave como principal hipótese, indicar repouso, hidratação oral e uso de analgésicos, reservando antibioticoterapia apenas após confirmação laboratorial."},{"letra":"B","texto":"Tratar empiricamente como hepatite viral aguda, mantendo acompanhamento ambulatorial e solicitando sorologia específica apenas se houver piora clínica."},{"letra":"C","texto":"Presumir intoxicação alimentar, instituir tratamento sintomático, orientar retorno se persistirem sintomas e não realizar notificação, pois não há confirmação diagnóstica."},{"letra":"D","texto":"Suspeitar de leptospirose, iniciar antibioticoterapia precoce e hidratação oral vigorosa, notificar o caso imediatamente e encaminhar ao hospital devido a sinais de gravidade."}],"correta":"D","resposta":"O paciente apresenta quadro compatível com leptospirose, uma zoonose bacteriana causada pela Leptospira interrogans , transmitida pela urina de roedores, especialmente após enchentes ou contato com água e lama contaminadas.\\n\\nElementos-chave do caso:\\n\\nExposição epidemiológica: limpeza após enchente + presença de ratos. Quadro clínico: febre alta, cefaleia, mialgia intensa em panturrilhas, icterícia e sufusão conjuntival (sinal clássico da forma grave).\\n\\nExames: plaquetopenia leve, elevação de transaminases, aumento da creatinina e proteinúria/hematúria — indicativos de comprometimento hepatorrenal (síndrome de Weil). Sinais de gravidade: hipotensão, icterícia, prostração → necessidade de internação hospitalar. Conduta na Atenção Básica:\\n\\nIniciar antibioticoterapia precoce (penicilina cristalina EV ou doxiciclina em casos leves, conforme protocolo). Garantir hidratação adequada. Notificar imediatamente (doença de notificação compulsória). Encaminhar ao hospital, pois há sinais de forma grave (icterícia + insuficiência renal + hipotensão).","needs_distractors":false},{"year":"2025.2","qnum":49,"enunciado":"(UNIPTAN) Uma paciente de 65 anos, admitida na UTI com diagnóstico de pneumonia, apresenta evolução com sonolência, náuseas e vômitos. Seu sódio sérico é de 112 mEq/L, osmolaridade plasmática de 260 mOsm/kg e osmolaridade urinária de 500 mOsm/kg. O exame físico revela normovolemia. Após a análise minuciosa do quadro clínico e dos exames laboratoriais, qual das condutas abaixo é mais apropriada para manejar imediatamente esse caso de hiponatremia?","alternativas":[{"letra":"A","texto":"Iniciar restrição hídrica rigorosa e monitorar a evolução do sódio, sem qualquer outra intervenção nas primeiras 24 horas."},{"letra":"B","texto":"Iniciar correção com solução salina hipertônica 3%, visando aumento de 4-6 mEq/L do sódio sérico nas primeiras 6 horas, monitorando clínica e laboratorialmente e evitando correção excessiva."},{"letra":"C","texto":"Administrar diuréticos de alça associados à reposição de sódio, independentemente da etiologia da hiponatremia."},{"letra":"D","texto":"Administrar solução salina isotônica 0,9% até que o sódio atinja valores normais, para evitar complicações neurológicas."}],"correta":"B","resposta":"- A correção rápida para valores normais (<24h) aumenta expressivamente o risco de mielinólise pontina central, uma complicação grave e irreversível.\\n\\n- Embora a restrição hídrica seja parte do manejo em hiponatremias euvolêmicas (como a SIADH), em pacientes sintomáticos graves a correção com solução hipertônica é fundamental para reduzir complicações neurológicas agudas.\\n\\n- Solução salina isotônica
