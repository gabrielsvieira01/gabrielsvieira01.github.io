<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preparação para a integradora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0a0d12;
    --bg-elev-1: #11161e;
    --bg-elev-2: #161c26;
    --bg-elev-3: #1d2532;
    --border: rgba(255, 255, 255, 0.06);
    --border-strong: rgba(255, 255, 255, 0.12);
    --text-primary: #e8e6e3;
    --text-secondary: #a8a39e;
    --text-muted: #6b6660;
    --accent: #5eead4;
    --accent-soft: rgba(94, 234, 212, 0.12);
    --accent-glow: rgba(94, 234, 212, 0.35);
    --success: #34d399;
    --success-bg: rgba(52, 211, 153, 0.12);
    --error: #f87171;
    --error-bg: rgba(248, 113, 113, 0.12);
    --year-2023: #c084fc;
    --year-2024-1: #fbbf24;
    --year-2024-2: #fb923c;
    --year-2025-1: #5eead4;
    --year-2025-2: #f472b6;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
    font-weight: 400;
    font-size: 16.5px;
    line-height: 1.65;
    color: var(--text-primary);
    background: var(--bg-base);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -20%, rgba(94, 234, 212, 0.08), transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(192, 132, 252, 0.05), transparent 60%);
    background-attachment: fixed;
  }

  /* Subtle grain texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.025;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='noiseFilter'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23noiseFilter)'/></svg>");
  }

  .app {
    position: relative;
    z-index: 2;
    max-width: 860px;
    margin: 0 auto;
    padding: 56px 28px 80px;
  }

  /* HEADER */
  .header {
    margin-bottom: 56px;
    text-align: center;
  }
  .crest {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    margin-bottom: 28px;
  }
  .crest svg { color: var(--accent); }
  .crest::before, .crest::after {
    content: '';
    width: 40px; height: 1px;
    background: var(--border-strong);
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 380;
    font-variation-settings: 'opsz' 144, 'SOFT' 30;
    font-size: clamp(2.1rem, 5.4vw, 3.4rem);
    line-height: 1.05;
    letter-spacing: -0.025em;
    margin: 0 0 18px;
    color: var(--text-primary);
  }
  h1 em {
    font-style: italic;
    font-variation-settings: 'opsz' 144, 'SOFT' 100;
    color: var(--accent);
  }
  .subtitle {
    color: var(--text-secondary);
    font-size: 15px;
    max-width: 540px;
    margin: 0 auto;
    line-height: 1.55;
  }

  /* PROGRESS BAR */
  .progress {
    margin: 40px auto 0;
    max-width: 520px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .progress-meta .score {
    color: var(--accent);
  }
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent) 0%, #a7f3d0 100%);
    border-radius: 999px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--accent-glow);
  }

  /* CARD */
  .card {
    margin-top: 48px;
    background: var(--bg-elev-1);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 40px 44px 36px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 24px 60px -20px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.03) inset;
    animation: cardEnter 0.55s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
  }
  @keyframes cardEnter {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border);
  }
  .year-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: var(--bg-elev-3);
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text-primary);
  }
  .year-badge .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px currentColor;
  }
  .year-badge[data-year="2023.2"] .dot { color: var(--year-2023); background: currentColor; }
  .year-badge[data-year="2024.1"] .dot { color: var(--year-2024-1); background: currentColor; }
  .year-badge[data-year="2024.2"] .dot { color: var(--year-2024-2); background: currentColor; }
  .year-badge[data-year="2025.1"] .dot { color: var(--year-2025-1); background: currentColor; }
  .year-badge[data-year="2025.2"] .dot { color: var(--year-2025-2); background: currentColor; }

  .qnum {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
  }
  .qnum strong {
    color: var(--text-secondary);
    font-weight: 500;
  }

  .enunciado {
    font-family: 'Fraunces', serif;
    font-weight: 380;
    font-variation-settings: 'opsz' 14, 'SOFT' 30;
    font-size: 17.5px;
    line-height: 1.62;
    color: var(--text-primary);
    margin-bottom: 32px;
    letter-spacing: -0.005em;
  }
  .enunciado p {
    margin: 0 0 1.05em;
  }
  .enunciado p:last-child { margin-bottom: 0; }

  /* ALTERNATIVES */
  .alts {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .alt {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 16px 18px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    width: 100%;
    color: var(--text-primary);
    font-family: inherit;
    font-size: 15.5px;
    line-height: 1.55;
  }
  .alt:hover:not(:disabled) {
    background: var(--bg-elev-3);
    border-color: var(--border-strong);
    transform: translateX(2px);
  }
  .alt:disabled { cursor: default; }
  .alt-letter {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--bg-elev-3);
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    margin-top: 1px;
    transition: all 0.18s ease;
  }
  .alt:hover:not(:disabled) .alt-letter {
    color: var(--accent);
    border-color: var(--accent);
  }
  .alt-text { flex: 1; padding-top: 1px; }

  /* States */
  .alt.selected {
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .alt.selected .alt-letter {
    background: var(--accent);
    color: #0a0d12;
    border-color: var(--accent);
  }
  .alt.correct {
    border-color: var(--success);
    background: var(--success-bg);
  }
  .alt.correct .alt-letter {
    background: var(--success);
    color: #0a0d12;
    border-color: var(--success);
  }
  .alt.incorrect {
    border-color: var(--error);
    background: var(--error-bg);
  }
  .alt.incorrect .alt-letter {
    background: var(--error);
    color: #0a0d12;
    border-color: var(--error);
  }
  .alt.faded { opacity: 0.45; }

  /* ACTION BAR */
  .actions {
    margin-top: 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }
  .hint {
    color: var(--text-muted);
    font-size: 12.5px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }
  .hint kbd {
    display: inline-block;
    padding: 1px 6px;
    background: var(--bg-elev-3);
    border: 1px solid var(--border-strong);
    border-radius: 4px;
    font-size: 10.5px;
    font-family: inherit;
    color: var(--text-secondary);
    margin: 0 2px;
  }
  .btn {
    padding: 11px 22px;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    background: var(--bg-elev-3);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: all 0.18s ease;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn:hover:not(:disabled) {
    background: var(--bg-elev-2);
    border-color: var(--text-secondary);
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-primary {
    background: var(--accent);
    color: #0a0d12;
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn-primary:hover:not(:disabled) {
    background: #6ef0d8;
    border-color: #6ef0d8;
    box-shadow: 0 0 24px var(--accent-glow);
  }

  /* COMMENTARY */
  .commentary {
    margin-top: 28px;
    padding: 24px 24px 22px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--accent);
    border-radius: 12px;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .commentary-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .commentary-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .commentary-title::before {
    content: '';
    width: 14px;
    height: 1px;
    background: var(--accent);
  }
  .verdict {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 4px 11px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .verdict.correct {
    color: var(--success);
    background: var(--success-bg);
    border: 1px solid rgba(52, 211, 153, 0.3);
  }
  .verdict.incorrect {
    color: var(--error);
    background: var(--error-bg);
    border: 1px solid rgba(248, 113, 113, 0.3);
  }
  .commentary-body {
    font-family: 'Fraunces', serif;
    font-weight: 380;
    font-variation-settings: 'opsz' 14, 'SOFT' 30;
    font-size: 15.5px;
    line-height: 1.62;
    color: var(--text-primary);
  }
  .commentary-body p { margin: 0 0 0.9em; }
  .commentary-body p:last-child { margin: 0; }
  .commentary-body .correct-tag {
    color: var(--success);
    font-weight: 500;
    font-style: italic;
  }

  /* FINISHED SCREEN */
  .finished {
    text-align: center;
    padding: 60px 20px;
    animation: cardEnter 0.6s ease both;
  }
  .finished h2 {
    font-family: 'Fraunces', serif;
    font-weight: 380;
    font-variation-settings: 'opsz' 144, 'SOFT' 50;
    font-size: clamp(2rem, 4.5vw, 2.8rem);
    margin: 0 0 16px;
    letter-spacing: -0.02em;
  }
  .finished h2 em {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: 'opsz' 144, 'SOFT' 100;
  }
  .finished .score-line {
    font-size: 17px;
    color: var(--text-secondary);
    margin-bottom: 12px;
  }
  .finished .score-num {
    font-family: 'Fraunces', serif;
    font-size: 4rem;
    font-weight: 300;
    color: var(--accent);
    line-height: 1;
    margin: 24px 0 8px;
    font-variation-settings: 'opsz' 144;
  }
  .finished .score-pct {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    margin-bottom: 36px;
  }

  /* FOOTER NOTE */
  .footnote {
    margin-top: 56px;
    text-align: center;
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
  }
  .footnote .sep { margin: 0 8px; color: var(--border-strong); }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .app { padding: 36px 16px 60px; }
    .card { padding: 28px 22px 26px; border-radius: 14px; }
    .card-head { flex-direction: column; align-items: flex-start; gap: 10px; }
    .enunciado { font-size: 16.5px; }
    .alt { padding: 14px 14px; font-size: 14.5px; }
    .actions { flex-direction: column-reverse; align-items: stretch; }
    .actions .btn { width: 100%; justify-content: center; }
    .hint { text-align: center; }
  }
</style>
</head>

  <div class="app">
    <header class="header">
      <div class="crest">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>

      </div>

      <div class="progress">
        <div class="progress-meta">
          <span><span id="progressIdx">0</span> / <span id="progressTotal">248</span></span>

        <div class="progress-bar">
          <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>

    <main id="main">

    </p>
  </div>

---infecção aguda ---infecção recente --- não infectada.","needs_distractors":false},{"year":"2023.2","qnum":3,"enunciado":"Você está em uma Unidade Básica de Saúde e atende um paciente do sexo masculino, de 25 anos, assintomático, sem história de diagnóstico ou tratamento de qualquer doença nos últimos 5 anos, que traz resultados de exames realizados durante avaliação para doação de sangue, que mostram os seguintes resultados:\\n\\nSorologia anti HIV: Amostra não reagente; Triagem para Sífilis: Quimioluminescência - Reagente; VDRL - Reagente 1:8;\\n\\nHbSAg - Não reagente; Anti HbSAg - Reagente; Anti HCV - Não reagente; Frente a esses resultados, qual deve ser a interpretação CORRETA e orientação para o paciente?","alternativas":[{"letra":"A","texto":"Diagnóstico de sifilis terciária - tratamento com Penicilina Benzatina 2.400.000 Ul intramuscular 1 vez por semana, por 3 semanas consecutivas; paciente infectado pelo vírus da hepatite B."},{"letra":"B","texto":"Resultados provavelmente falso positivos para sífilis; indicado complementação com exame fta- abs; paciente imune à hepatite B."},{"letra":"C","texto":"Diagnóstico de sífilis latente indeterminada - tratamento com Penicilina Benzayina 2.400.00 UI intra muscular 1 vez por semana, por 3 semanas consecutivas; paciente imune à hepatite B."},{"letra":"D","texto":"Resultados falso positivo para sífilis; paciente imune à hepatite B."}],"correta":"C","resposta":"Diagnóstico de sífilis latente indeterminada - tratamento com Penicilina Benzayina 2.400.00 UI intra muscular 1 vez por semana, por 3 semanas consecutivas; paciente imune à hepatite B.","needs_distractors":false},{"year":"2023.2","qnum":4,"enunciado":"Mulher de 50 anos procura assistência médica com quadro de poliartrite simétrica das mãos, dos punhos, dos tornozelos e dos pés, de intensidade dolorosa 6/10, com início há 12 dias. Os exames laboratoriais mostram: Hemograma = normal; VHS = 80mm (VR<15 mm); PCR = 12 mg/dL (VR<0,5 mmg/dL); fator reumatoide e anti-CCP = negativos; RT -PCR para vírus Chikungunya = detectável. Considerando-se a fase da doença infecciosa em que essa paciente se encontra, para o tratamento das manifestações articulares descritas recomenda-se o uso de:","alternativas":[{"letra":"A","texto":"Opioide potente e/ou glicocorticoide."},{"letra":"B","texto":"Glicorticoide e/ou anti-inflamatório não hormonal."},{"letra":"C","texto":"Analgésico comum e/ou opioide fraco."},{"letra":"D","texto":"Salicilato e/ou analgésico comum."}],"correta":"C","resposta":"Analgésico comum e/ou opioide fraco.","needs_distractors":false},{"year":"2023.2","qnum":5,"enunciado":"Paciente de 25 anos, foi a UPA devido lesões em pele que lembrava \\"alergia\\" que iniciou há 2 dias. Relata prurido leve pelo corpo. História de relação sexual desprotegida com frequência. Pensando que o quadro acima refere-se a sífilis secundária, assinale o exame laboratorial que se espera encontrar nesse paciente:","alternativas":[{"letra":"A","texto":"VDRL 1/128, FTABS IgM Positivo e FTABS IgG Positivo."},{"letra":"B","texto":"VDRL Negativo, FTABS IgM Negativo e FTBAS IgG Negativo."},{"letra":"C","texto":"VDRL Negativo, FTABS IgM Positivo e FTABS IgG Positivo."},{"letra":"D","texto":"VDRL 1/64, FTABS IgM Negativo e FTABS IgG Positivo."}],"correta":"A","resposta":"VDRL 1/128, FTABS IgM Positivo e FTABS IgG Positivo.","needs_distractors":false},{"year":"2023.2","qnum":6,"enunciado":"Paciente de 27 anos, casado, veio à consulta queixando-se de corrimento uretral purulento acompanhado de desconforto uretral, quadro iniciado há 1 semana. Informou não fazer uso de preservativo nas relações sexuais. Com base no quadro, assinale a assertiva correta.","alternativas":[{"letra":"A","texto":"As parceiras devem ser tratadas sempre que os sintomas persistirem após 7 dias da instituição do tratamento."},{"letra":"B","texto":"Os dois principais agentes etiológicos são Trichomonas vaginalis e Chlamydia trachomatis."},{"letra":"C","texto":"Se o corrimento uretral não for confirmado ao exame físico, o paciente deve ser reavaliado em 48 horas antes de iniciar o tratamento."},{"letra":"D","texto":"Não havendo disponibilidade laboratorial para microscopia e cultura, deve-se tratar o paciente empiricamente para clamídia e gonorreia."}],"correta":"D","resposta":"Não havendo disponibilidade laboratorial para microscopia e cultura, deve-se tratar o paciente empiricamente para clamídia e gonorreia.","needs_distractors":false},{"year":"2023.2","qnum":7,"enunciado":"Mulher de 75 anos, sem comorbidades, internada por um quadro de pneumonia, já em melhora clínica, em d6 de ceftriaxona, evolui com presença de hematomas extensos de formação espontânea em membros superiores e flanco esquerdo. Sem outros sangramentos. Não fez uso de heparina na internação. Paciente nega história de sangramentos anteriores, já foi submetida a 3 cirurgias sem intercorrências e nega distúrbios hemorrágicos na família.\\n\\nExames: Hb 13g/dl Leuco 6400 Plaq 160 000; INR- 0,9 (VR: 0,8- 1,2), TTpa: 46s ( VR: 24-40) Ratio:1,8 (VR:0,8-1,3). Diante do exposto, qual a principal hipótese diagnóstica e qual o próximo passo da investigação?","alternativas":[{"letra":"A","texto":"CIVD – solicitar fibrinogênio;"},{"letra":"B","texto":"Deficiência de vitamina k – dosar os fatores dependentes de vitamina k e investigar função hepática"},{"letra":"C","texto":"Hemofilia hereditária A – dosar o fator VIII"},{"letra":"D","texto":"Hemofilia adquirida – teste da mistura"}],"correta":"D","resposta":"Paciente idosa com quadro clínico compatível com distúrbio de hemostasia secundária ( hematomas) e laboratorialmente sugere um distúrbio de via intrínseca da coagulação (aumento de ttpa). a) Incorreto.Na CIVD seria esperado um consumo de plaquetas, tap, ttpa e fibrinogênio. b) Incorreto. Deficiência de vitamina k – inicialmente haveria o alargamento do TAP (via extrínseca) e posteriormente alargamento de TAP e Ttpa. c) Correta. Paciente idosa, sem história de distúrbios hemorrágicas anteriores e sem história de hemofilia – a favor de causas adquiridas. Com distúrbio de hemostasia secundária, via intrínseca (alargamento de ttpa). Próximo passo seria fazer o teste da mistura para avaliar a presença de inibidor ou deficiência de fator. d) Incorreta – paciente mulher, sem distúrbios hemorrágicos prévios e sem caso na família – diminui a possibilidade de hemofilia hereditária.","needs_distractors":false},{"year":"2023.2","qnum":8,"enunciado":"Homem de 52 anos de idade, representante comercial, sai em viagens de negócios. Certo dia, em um hotel, numa noite quente de verão, não consegue dormir. Abre então a janela para que o quarto fique mais arejado. De repente, como uma percepção imediata, acredita ser herdeiro legítimo de Napoleão Bonaparte. Desse momento em diante, tenta de todas as formas provar a todos que têm direito legítimo ao trono da França. Em seu exame do estado mental não se observa nenhuma alteração relevante a não ser a crença firme de que é herdeiro do Imperador, mesmo assim continua trabalhando normalmente como representante comercial “até eu provar na justiça que sou herdeiro de Napoleão, aí vou exigir meus direitos” – relata às pessoas. Assinale a alternativa de diagnóstico mais provável:","alternativas":[{"letra":"A","texto":"Esquizofrenia."},{"letra":"B","texto":"Transtorno bipolar do humor, fase maníaca."},{"letra":"C","texto":"Transtorno delirante persistente."},{"letra":"D","texto":"Transtorno psicótico agudo."}],"correta":"C","resposta":"O caso descreve a evolução de um transtorno delirante persistente. O delírio nasce pronto, de forma súbita. Não há outras alterações no exame mental do paciente a não ser a crença delirante, persistente de ser herdeiro de Napoleão Bonaparte. Suas atividades continuam normais, inclusive no trabalho, porém a crença no direito de herança do Imperador persiste.","needs_distractors":false},{"year":"2023.2","qnum":9,"enunciado":"Um menino de 4 meses é levado ao pronto atendimento por sua mãe, que refere não saber o que aconteceu com a criança. Esta apresenta choro irritado alternando sonolênica, com alteração do nível de consciência, sem febre e sem fraturas ou lesões na pele. Ao exame de fundo de olho, detecta-se hemorragia retiniana. Qual é o provável diagnóstico?","alternativas":[{"letra":"A","texto":"Queda da cama"},{"letra":"B","texto":"Síndrome do bebê sacudido"},{"letra":"C","texto":"Intoxicação medicamentosa"},{"letra":"D","texto":"Meningite"}],"correta":"B","resposta":"Trata-se da Síndrome do bebê sacudido a qual caracteriza-se por lesões do sistema nervoso central em crianças < 3anos de idade, provocadas por chacoalhamento.","needs_distractors":false},{"year":"2023.2","qnum":10,"enunciado":"Uma jovem de 19 anos tem consumido compulsivamente grandes quantidades de comida, muito mais do que a maioria das pessoas em circunstâncias semelhantes. Envergonha-se disso e teme ficar obesa. Por esse motivo, induz vômitos 3 a 4 vezes por semana. Esse comportamento se intensifica quando está sob estresse, e a paciente sente que não tem controle sobre ele. Os resultados de seu exame físico são normais, incluindo o peso. Aponte a alternativa de melhor hipótese diagnóstica.","alternativas":[{"letra":"A","texto":"Anorexia nervosa purgativa."},{"letra":"B","texto":"Transtorno evitativo alimentar."},{"letra":"C","texto":"Bulimia nervosa."},{"letra":"D","texto":"Transtorno de compulsão alimentar periódica."}],"correta":"C","resposta":"Essa paciente tem todos os sinais básicos de bulimia. Ela come compulsivamente e, durante esses episódios, come mais do que uma pessoa normal comeria nas mesmas circunstâncias. Ela está extremamente envergonhada por agir dessa maneira e se esforça ao máximo para esconder esse comportamento. Sente que seu comportamento está fora de controle e desenvolve comportamentos purgativos indevidos (nesse caso, vômito) para não engordar por causa da ingestão excessiva de comida.","needs_distractors":false},{"year":"2023.2","qnum":11,"enunciado":"Paciente masculino, 59 anos com diagnóstico de diabetes e hipertensão arterial de longa data, com mau controle glicêmico e pressórico. É atendido com queixa de cansaço, adinamia, náuseas, vômitos. Ao exame : PA=170 x 110 mmHg; edema de membros inferiores. Trazia os seguintes exames: Hemoglobina: 8,3g; ureia= 192mg/dL; creatinina=9,5mg/dL; PTH = 300 pg/mL. Na doença renal crônica, espera-se também os seguintes distúrbios metabólicos:\\n\\n> -","alternativas":[{"letra":"A","texto":"Hipocalcemia, hiperfosfatemia, hipocalemia e acidose metabólica."},{"letra":"B","texto":"Hipercalcemia, hipofosfatemia, hipercalemia e alcalose metabólica."},{"letra":"C","texto":"Hipocalcemia, hiperfosfatemia, hipercalemia e alcalose metabólica."},{"letra":"D","texto":"Hipocalcemia, hiperfosfatemia, hipercalemia e acidose metabólica."}],"correta":"D","resposta":"AS COMPLICAÇOES DA DOENÇA RENAL CRONICA AVANÇADA INCLUEM DISTURBIOS ELETROLITICOS E ACIDO-BASICOS, A CITAR: HIPOCALCEMIA, HIPERFOSFATEMIA (ENVOLVIDOS NA FISIOPATOLOGIA DO HIPERPARATIREOIDISMO SECUNDARIO), HIPERCALEMIA E ACIDOSE METABOLICA.","needs_distractors":false},{"year":"2023.2","qnum":12,"enunciado":"Analise as afirmativas sobre doença renal crônica (DRC) a seguir e assinale a opção que contém as afirmativas corretas:\\n\\nI- Doença renal crônica é definida, apenas, através do ritmo de filtração glomerular (RFG) abaixo de 60 ml/min/1,73m2 persistente por 3 meses.\\n\\nII- Consiste em uma doença silenciosa, tendo como principais causas hipertensão arterial sistêmica e diabetes mellitus.\\n\\nIII- A DRC pode ser classificada através do ritmo de filtração glomerular em 5 estágios e quanto mais avançado o estágio, maior o risco de desenvolvimento de doenças cardiovasculares e progressão para a doença renal crônica terminal.\\n\\nIV- São algumas complicações relacionadas a doença renal crônica: anemia megaloblástica, hiperparatireoidismo primário, síndrome metabólica.","alternativas":[{"letra":"A","texto":"II e IV"},{"letra":"B","texto":"II, III e IV"},{"letra":"C","texto":"II e III"},{"letra":"D","texto":"I, II e III"}],"correta":"C","resposta":"Doença renal crônica é definida, através do ritmo de filtração glomerular (RFG) abaixo de 60 ml/min/1,73m2 persistente por 3 meses ou pela presença de alguma marcador de dano renal persistente por 3 meses. Consiste em uma doença assintomática até seus estágios avançados. É classificada em 5 estágios por seu RFG, e quanto mais avançado o estágio, maior o risco de desenvolvimento de doenças cardiovasculares e progressão para a doença renal crônica terminal. São algumas complicações relacionadas a doença renal crônica: anemia, hiperparatireoidismo secundario, síndrome uremica.","needs_distractors":false},{"year":"2023.2","qnum":13,"enunciado":"Quais dos seguintes são componentes essenciais para o diagnóstico de Transtorno do Espectro Autista (TEA), de acordo com o Manual Diagnóstico e Estatístico de Transtornos Mentais - 5ª Edição (DSM-5)?","alternativas":[{"letra":"A","texto":"Ressonância magnética para identificar anormalidades estruturais no sistema nervoso central"},{"letra":"B","texto":"Exame de laboratoriais de triagem para avaliar os níveis de hormônios e eventuais carências vitamínicas."},{"letra":"C","texto":"Observação clínica de comportamentos sociais, comunicativos e restritos/repetitivos."},{"letra":"D","texto":"Eletroencefalograma (EEG) para medir a atividade elétrica cerebral."}],"correta":"C","resposta":"O diagnóstico de TEA é baseado principalmente em critérios clínicos e observação de comportamentos característicos. Não existem exames de laboratoriais, EEG ou ressonância magnética específicos para o diagnóstico do TEA. O DSM-5 estabelece critérios específicos que incluem deficiências na comunicação social e padrões restritos e repetitivos de comportamento, interesses ou atividades.","needs_distractors":false},{"year":"2023.2","qnum":14,"enunciado":"Sobre os distúrbios de hemostasia, assinale V ou F. ( ) A hemostasia primária é responsável por formação do tampão plaquetário. São exemplos de distúrbios de hemostasia primária: Púrpura Trombocitopênica Imune e defeitos qualitativos das plaquetas. O principal exame de triagem deste distúrbio é o hemograma. ( ) Diante de um quadro plaquetopenia isolada, a possibilidade de uma pseudoplaquetopenia induzida por EDTA deve ser considerada. A fim de investigar esta possibilidade, deve-se coletar novo hemograma em tubo de citrato. ( ) Paciente com história de extração dentária que durante o procedimento não apresentou sangramento relevante. Mas mesmo após cessar o sangramento, voltou a sangrar, deve-se suspeitar de distúrbio de hemostasia primária. ( ) A hemostasia secundária é responsável por formar rede de fibrina para estabilizar o tampão plaquetário. Além de realizar a fibrinólise. ( ) Os fatores dependentes de vitamina k são: II, VII, IX, X.","alternativas":[{"letra":"A","texto":"Todas as alternativas são verdadeiras"},{"letra":"B","texto":"V-V-F-V-F"},{"letra":"C","texto":"V-V-F-F-V"},{"letra":"D","texto":"V-V-V-F-F"}],"correta":"C","resposta":"1 item – verdadeiro 2 item – verdadeiro 3 item- falso – O paciente ressangrar após uma extração dentária é uma característica típica de distúrbio de hemostasia secundária. 4 item – falso – A fibrinólise participa da hemostasia terciaria 5 item – verdadeiro.","needs_distractors":false},{"year":"2023.2","qnum":15,"enunciado":"Um menino de 4 anos é trazido para consulta médica devido a preocupações dos pais em relação ao seu desenvolvimento. Eles observaram que ele tem dificuldade em fazer contato visual, parece não responder ao seu nome e frequentemente realiza movimentos repetitivos, como balançar as mãos ou brinquedos. Ele não demonstra interesse em brincar com outras crianças e, muitas vezes, fica agitado em ambientes ruidosos ou lotados. No entanto, ele tem um grande interesse em alinhar objetos em linha reta e é capaz de repetir de forma precisa sequências de palavras ou frases que ouve. Qual é o diagnóstico mais provável?","alternativas":[{"letra":"A","texto":"Transtorno de Ansiedade Generalizada (TAG)"},{"letra":"B","texto":"Transtorno Opositivo-Desafiador (TOD)"},{"letra":"C","texto":"Transtorno de Déficit de Atenção e Hiperatividade (TDAH)."},{"letra":"D","texto":"Transtorno do Espectro Autista (TEA)"}],"correta":"D","resposta":"O caso clínico descreve características típicas do TEA, incluindo dificuldade na interação social, comportamentos repetitivos e interesses restritos. O diagnóstico do TEA é geralmente feito com base em observações clínicas e critérios específicos estabelecidos nos manuais de diagnóstico, como o DSM-5.","needs_distractors":false},{"year":"2023.2","qnum":16,"enunciado":"Um homem de 64 anos foi submetido a uma cirurgia de fratura do quadril há três dias antes. Na noite anterior teve alucinações visuais onde dizia que formigas estavam subindo nas paredes e na sua cama, além de delírios de perseguição (paranoia), se encontrava alternadamente desorientado e torporoso. No exame da manhã seguinte, está orientado para pessoa e lugar, mas não para tempo, com restante do exame do estado mental normal. Não tem história anterior de doença psiquiátrica. Assinale a alternativa de hipótese diagnóstica mais provável.","alternativas":[{"letra":"A","texto":"Esquizofrenia."},{"letra":"B","texto":"Demência."},{"letra":"C","texto":"Depressão psicótica."},{"letra":"D","texto":"Delírium."}],"correta":"D","resposta":"Esse paciente, que não tem história de psicose, começou a ter alucinações visuais e paranoia três dias depois de se submeter a uma cirurgia ortopédica do quadril. Unidades de terapia intensiva e/ou procedimentos cirúrgicos maiores são fatores de risco para delirium, sobretudo em pacientes geriátricos.","needs_distractors":false},{"year":"2023.2","qnum":17,"enunciado":"Uma mulher de 48 anos é levada ao setor de emergência. Ela não responde a perguntas, está desorientada e agitada, tropeça pela sala (ataxia) e nota-se presença de oftalmoplegia (estrabismo e incoordenação motora ocular). No exame físico, você percebe que ela cheira a álcool e não coopera durante o exame. Aponte a alternativa qual seria o tratamento inicial mais apropriado?","alternativas":[{"letra":"A","texto":"Glicose."},{"letra":"B","texto":"Tiamina."},{"letra":"C","texto":"Benzodiazepínicos."},{"letra":"D","texto":"Dissulfiram."}],"correta":"B","resposta":"O tratamento mais apropriado é a administração de tiamina. Essa paciente apresenta encefalopatia de Wernicke, caracterizada pela tríade delirium, ataxia e oftalmoplegia. A tiamina deve ser administrada antes da glicose quando se desconfia de que o paciente sofra desse transtorno.","needs_distractors":false},{"year":"2023.2","qnum":18,"enunciado":"Um morador de rua psicótico de 54 anos é levado ao setor de emergência pela polícia para avaliação médica após ser detido por comportamento agressivo e conduta inadequada. Ele apresenta história de alcoolismo e abuso de substância, além de não dispensar cuidados adequados às condições de diabetes e hipertensão. Aponte quais dos sintomas a seguir são mais específicos para um diagnóstico de esquizofrenia em oposição a outras etiologias de psicose.","alternativas":[{"letra":"A","texto":"Alucinações auditivas."},{"letra":"B","texto":"Depressão."},{"letra":"C","texto":"Sintomas catatônicos."},{"letra":"D","texto":"Crença de ter um poder alienígena."}],"correta":"D","resposta":"Ainda que todos esses sintomas possam ser observados em vários transtornos psicóticos, a presença de um delírio bizarro é mais específica da esquizofrenia. Apenas um sintoma psicótico é necessário para diagnosticar esquizofrenia quando existem delírios bizarros, alucinações auditivas comentando sobre o paciente ou duas ou mais vozes conversando entre si.","needs_distractors":false},{"year":"2023.2","qnum":19,"enunciado":"Um paciente com Doença Renal Crônica (DRC) com Ritmo de Filtração Glomerular (RFG) de 32 ml/ min/1,73 m2, com a Relação Albumina/Creatinina acima de 300 mg/g, é classificado de acordo com KDIGO, da seguinte forma:","alternativas":[{"letra":"A","texto":"Pelo RFG estimado possui DRC Estágio 3B e pela albuminúria estágio A3"},{"letra":"B","texto":"Pelo RFG estimado possui DRC Estágio 3A e pela albuminúria estágio A2"},{"letra":"C","texto":"Pelo RFG estimado possui DRC Estágio 4 e pela albuminúria estágio A3"},{"letra":"D","texto":"Pelo RFG estimado possui DRC Estágio 3B e pela albuminúria estágio A1"}],"correta":"A","resposta":"SEGUNDO KDIGO A DRC PODE SER CLASSIFICADA PELO RITMO DE FIKTRAÇAO GLOMERULAR EM CINCO ESTAGIOS E DE ACORDO COM A ALBUMINURIA EM 3 ESTAGIOS, CONFORMA TABELA A SEGUIR:","needs_distractors":false},{"year":"2023.2","qnum":20,"enunciado":"Um homem de 39 anos tenta cometer suicídio ingerindo uma overdose de comprimidos de amitriptilina. Ele é levado às pressas para a sala de emergência, onde fracassa a tentativa de ressuscitação. Assinale a alternativa correspondente onde haja um fator predisponente, precipitante e protetor, respectivamente.","alternativas":[{"letra":"A","texto":"Sexo masculino, idade jovem, presença de transtorno mental."},{"letra":"B","texto":"Sexo masculino, ruptura de relação amorosa, ausência de transtornos mentais."},{"letra":"C","texto":"Sexo masculino, separação conjugal, ruptura de relação amorosa."},{"letra":"D","texto":"Ausência de transtornos mentais, sexo masculino, ruptura de relação amorosa."}],"correta":"B","resposta":"O enunciado demonstra um caso de automorte (suicídio) consumada por overdose de um antidepressivo tricíclico (amitriptilina). A atividade foi pensada para que o aluno identifique os fatores predisponentes, precipitante e protetores de um eventual caso como este. Entre fatores predisponentes ao risco de suicídio tem-se o sexo masculino, a ruptura de uma relação amorosa pode ter sido um fator precipitante, dentre vários outros que per si podem precipitar o suicídio e um possível fator protetor do suicídio que é a ausência de transtornos mentais.","needs_distractors":false},{"year":"2023.2","qnum":21,"enunciado":"Mulher de 43 anos, admitida em consulta ginecológica portando ultrassonografia transvaginal que evidencia mioma uterino de 30mm, classificação FIGO 5. Não tem queixas álgicas ou de sangramento uterino anormal. Tem antecedente de dois partos cesareanos e já laqueada. Qual a conduta mais adequada:","alternativas":[{"letra":"A","texto":"Miomectomia por laparotomia"},{"letra":"B","texto":"Expectante"},{"letra":"C","texto":"Histerectomia"},{"letra":"D","texto":"Miomectomia histeroscópica"}],"correta":"B","resposta":"A paciente em questão apresenta um mioma de tamanho pequeno e de localização intramural/subserosa, e assintomático, não necessitando assim de conduta ativa.","needs_distractors":false},{"year":"2023.2","qnum":22,"enunciado":"Na injúria renal aguda, em casos avançados, recorre-se à realização de terapia renal substitutiva. São indicações de diálise de urgência na injúria renal aguda:","alternativas":[{"letra":"A","texto":"Hipocalemia e acidose respiratória."},{"letra":"B","texto":"Síndrome urêmica e acidose metabólica refratária"},{"letra":"C","texto":"Clearance de creatinina < 10 ml/min e atrofia renal."},{"letra":"D","texto":"Urina concentrada e fadiga."}],"correta":"B","resposta":"São indicações clássicas, bem consagradas na literatura, de diálise de urgência:\\n\\nSíndrome urêmica Hipercalemia e acidose metabólica refratárias ao tratamento Hipervolemia refratária Intoxicação grave por substância dialisável","needs_distractors":false},{"year":"2023.2","qnum":23,"enunciado":"Um homem de 21 anos é levado ao setor de emergência depois de exibir um comportamento bizarro e perigoso. Há pelo menos um ano apresenta delírios e alucinações auditivas. As alucinações consistem em várias vozes comentando seu comportamento e lhe dando ordens. Esses sintomas o levaram a ter um comportamento antissocial e irregular. Ele nega uso atual de drogas ou problemas clínicos. Um exame do estado mental evidencia diversas anormalidades. É observada negligência no cuidado com a aparência, na higiene e no comportamento (paranoia), e seu afeto é embotado. Por vezes, seus processos de pensamento são desorganizados, e ele relata alucinações auditivas e delírios.","alternativas":[{"letra":"A","texto":"Transtorno delirante persistente."},{"letra":"B","texto":"Transtorno esquizoafetivo."},{"letra":"C","texto":"Transtorno de conduta."},{"letra":"D","texto":"Esquizofrenia."}],"correta":"D","resposta":"Esse paciente demonstra os dois principais critérios diagnósticos para esquizofrenia: delírios (pensa que as pessoas não são quem dizem ser) e alucinações auditivas. As alucinações seguem o padrão das observadas na esquizofrenia, já que existem várias vozes falando entre si e há tanto comentários sobre o paciente como comandos. No exame do estado mental, também revela desorganização nas associações de pensamento.","needs_distractors":false},{"year":"2023.2","qnum":24,"enunciado":"M.S.S, 58 anos, comparece em consulta em unidade básica de saúde com queixa de sangramento uterino anormal há alguns meses. Na avaliação da paciente identifica-se como história ginecológica: Menarca: 10 anos, Sexarca: 22anos, história anterior de irregularidade menstrual durante o menacme, G1P0A1, Casada, Sexualmente ativa, Menopausa: 55 anos, episódios de sinusorragia nos últimos meses, última citologia oncótica há 5 anos, e última mamografia há 4 anos; e História patológica pregressa de hipertensão arterial, diabetes e obesidade; Diante do quadro, assinale a alternativa correta.","alternativas":[{"letra":"A","texto":"Caso a paciente realize uma ultrassonografia transvaginal e seja evidenciado uma espessura endometrial de 8mm, está excluída a hipótese de patologias endometriais."},{"letra":"B","texto":"Levando em consideração o quadro clínico da paciente, é dispensável exames de imagem, deve ser iniciado Terapia de reposição hormonal, pois trata-se de sangramento por atrofia."},{"letra":"C","texto":"A paciente tem fatores de risco para patologias endometriais, incluindo câncer de endométrio, e o padrão ouro para essa avaliação seria com curetagem semiótica."},{"letra":"D","texto":"Diante do quadro apresentado é importante definir a causa do sangramento uterino, não podendo ser excluído patologias endometriais, entre elas câncer de endométrio; exames complementares iniciais como ultrassonografia transvaginal e Papanicolau, além do exame ginecológico são imprescindíveis para o manejo do quadro."}],"correta":"D","resposta":"Todo quadro de sangramento uterino anormal ocorrido pós menopausa deve ser cuidadosamente avaliado, pensando-se nos possíveis diagnósticos, entre eles câncer de colo uterino, doenças endometriais, ou atrofia urogenital. No quadro em questão, a paciente além de apresentar sangramento pós-menopausa, tem múltiplos fatores de risco para doenças endometriais, e deve ser considerado como hipótese diagnóstico, hoje temos como padrão ouro para avaliação endometrial a coleta de biópsia por visão direta com histeroscopia, principalmente se houver espessamento endometrial.","needs_distractors":false},{"year":"2023.2","qnum":25,"enunciado":"Uma jovem de 15 anos apresenta-se no consultório de um psiquiatra extremamente abaixo do peso. Nega ter qualquer problema além de estar um pouco deprimida estando chateada por ser levada ao psiquiatra. Vê a si mesma como acima do peso, apesar da magreza visível. Os pais observam que ela tem restringido cada vez mais o consumo de calorias. Está amenorreica nos últimos meses. Qual principal hipótese diagnóstica?","alternativas":[{"letra":"A","texto":"Anorexia nervosa tipo purgativa."},{"letra":"B","texto":"Bulimia nervosa."},{"letra":"C","texto":"Transtorno da perversão alimentar."},{"letra":"D","texto":"Anorexia nervosa tipo restritiva."}],"correta":"D","resposta":"Essa paciente satisfaz todos os quatro critérios para anorexia nervosa: em primeiro lugar ela se recusa a manter seu peso corporal acima de um nível normal mínimo para sua idade. Em segundo, apresenta distúrbio na percepção de forma e peso de seu corpo e negação da gravidade de seu estado. Em terceiro, seu medo intenso de ganhar peso é compatível com anorexia nervosa. Por fim, a perda de peso provocou amenorreia. Não está interessada em tratamento psiquiátrico e nega haver algo de errado com ela além de um humor levemente deprimido, o que em geral se observa em pacientes com anorexia. Essa paciente apresenta o tipo restritivo do transtorno.","needs_distractors":false},{"year":"2023.2","qnum":26,"enunciado":"Na definicação da síndrome de munchausen por procuração, considera-se:","alternativas":[{"letra":"A","texto":"A criança apenas simula a própria doença"},{"letra":"B","texto":"A criança simula ou provoca a própria doença"},{"letra":"C","texto":"Um dos pais simula ou provoca doença em seu filho"},{"letra":"D","texto":"Um dos pais apenas simula doença em seu filho"}],"correta":"C","resposta":"Na síndrome de Munchausen causada por terceiro ou por procuração é uma forma de violência na qual o paciente é trazido para cuidados médicos, mas os sintomas e sinais que apresentam são inventados, simulados ou provocados por cuidadores.","needs_distractors":false},{"year":"2023.2","qnum":27,"enunciado":"No diagnóstico de abuso e maus-tratos contra criança, é correto afirmar que:","alternativas":[{"letra":"A","texto":"As lesões consequentes normalmente são bem evidenciadas e mantém boa correlação com história contada na anamnese da criança"},{"letra":"B","texto":"Queimadura, fraturas e equimoses são, respecticvamente manifestações mais comuns de abuso na infância"},{"letra":"C","texto":"A demora em procurar atendimento pode ser um fator de suspeita de abuso ou neglicência por parte dos pais ou responsáveis"},{"letra":"D","texto":"É necessário, por parte do pediatra, ter certeza do diagnóstico de abuso físico para fazer a notificação às autoridaddes policiais e jurídicas de proteção à infância"}],"correta":"C","resposta":"A demora em procurar atendimento pode ser um fator de suspeita de abuso ou neglicência por parte dos pais ou responsáveis","needs_distractors":false},{"year":"2023.2","qnum":28,"enunciado":"Qual das seguintes afirmações é verdadeira em relação ao tratamento com psicoestimulantes no Transtorno de Déficit de Atenção e Hiperatividade (TDAH)?","alternativas":[{"letra":"A","texto":"Os psicoestimulantes são considerados a primeira linha de tratamento no TDAH."},{"letra":"B","texto":"A sonolência é um efeito adverso comum durante o uso de psicoestimulantes."},{"letra":"C","texto":"Os psicoestimulantes são usados exclusivamente em crianças com TDAH, não sendo indicados para adultos pelo risco de abuso."},{"letra":"D","texto":"Apesar de bom nível de evidência no tratamento de TDAH, os psicoestimulantes devem ser desencorajados pelo risco de abuso e dependência."}],"correta":"A","resposta":"Os psicoestimulantes, como o metilfenidato e as anfetaminas, são frequentemente considerados a primeira linha de tratamento no TDAH, devido à sua eficácia comprovada em melhorar os sintomas de desatenção, hiperatividade e impulsividade. Eles podem ser usados tanto em crianças quanto em adultos com TDAH.","needs_distractors":false},{"year":"2023.2","qnum":29,"enunciado":"As hemofilias são um grupo de doenças caracterizadas por distúrbios hemorrágicos que ocorrem por deficiência de um dos fatores de coagulação. Sobre este tema, assinale a alternativa correta.","alternativas":[{"letra":"A","texto":"A mulher portadora da mutação para hemofilia poderá transmitir a doença para 25%dos seus filhos do sexo masculino e o estado de portadora para 50% de suas filhas."},{"letra":"B","texto":"Ao atender um paciente com hemofilia e sangramento em articulação, deve-se avaliar se esse paciente já faz reposição do fator de coagulação deficiente de forma profilática. Caso este paciente já esteja em esquema de reposição profilática do fator, não deve ser administrado doses adicionais deste fator."},{"letra":"C","texto":"As hemofilias são distúrbios da hemostasia secundária, no qual, caracteristicamente ocorre o aumento do tempo de protrombina (TAP)."},{"letra":"D","texto":"As manifestações clínicas da doença irão depender da quantidade de fator basal que o paciente possui. Em formas leves da doença, em que o paciente possui entre 5- 40% de fator, sangramentos espontâneos são raros."}],"correta":"D","resposta":"a) As hemofilias são distúrbios da hemostasia secundária, onde ocorre deficiência de algum fator de coagulação da via intrínseca da cascata de coagulação, por esse motivo, nos exames de triagem de coagulação ocorre o aumento isolado do ttpa. b) A mulher portadora da mutação para hemofilia poderá transmitir a doença para 50% dos seus filhos do sexo masculino e o estado de portadora para 50% de suas filhas. c) A base do tratamento das hemofilias é a reposição do fator deficiente. Que pode ser feita de forma profilática e sob demanda. Então, um paciente com hemoartrose deve receber reposição de fator sob demanda, independente de já fazer reposição profilática. Tal medida é essencial para evitar artropatias e deformidades permanentes. d) Correta.","needs_distractors":false},{"year":"2023.2","qnum":30,"enunciado":"Mulher de 35 anos, admitida em consulta ginecológica portando ultrassonografia transvaginal que evidencia mioma uterino de 25mm, classificação FIGO 1. Não tem queixas álgicas, porém relata sangramento uterino anormal, com fluxo intenso. Nuligesta com desejo gestacional. Qual a conduta mais adequada","alternativas":[{"letra":"A","texto":"Histerectomia"},{"letra":"B","texto":"Expectante"},{"letra":"C","texto":"Miomectomia por laparotomia"},{"letra":"D","texto":"Miomectomia histeroscópica"}],"correta":"D","resposta":"A paciente em questão, apresenta sangramento uterino anormal, associado provavelmente ao mioma de localização submucosa, além disso tem desejo gestacional. Necessita de conduta que preserve sua fertilidade. A melhor opção seria a intervenção via histeroscópica.","needs_distractors":false},{"year":"2023.2","qnum":31,"enunciado":"Leiomioma ou mioma é um tumor benigno da musculatura uterina. Acomete aproximadamente 20 a 25% das mulheres A classificação mais utilizada é a que se refere à sua localização na camada uterina: submucosos, intramurais e subserosos. Sobre os miomas, informe se é verdadeiro (V) ou falso (F) o que se afirma a seguir e assinale a alternativa com a sequência correta. ( ) Os miomas subserosos, aqueles junto ao endométrio, podem apresentar-se como uma pequena projeção na cavidade até a formação de pedículos que, dependendo do tamanho, podem ultrapassar o canal cervical. Na maioria das vezes, determinam sangramento na forma de menorragia, metrorragia ou perdas pré e pós-menstruais. ( ) Os miomas intramurais são os mais frequentes e, durante o seu crescimento, podem projetar-se para o endométrio ou para a serosa. O sangramento uterino anormal resulta da alteração da contratilidade uterina que acompanha esse tipo de miomatose. ( ) Os miomas submucosos não causam sangramentos, mas apresentam, como possível complicação, a compressão de órgãos pélvicos. A torção com sofrimento vascular é rara. No diagnóstico diferencial, tumores ovarianos devem ser lembrados.","alternativas":[{"letra":"A","texto":"F – V – V"},{"letra":"B","texto":"F – V – F"},{"letra":"C","texto":"V – V – F"},{"letra":"D","texto":"V – F – F"}],"correta":"B","resposta":"Os miomas submucosos são aqueles em contato direto com endométrio e mais associados a sintomas de sangramento uterino anormal, já os miomas intramuraus ssão os mais comuns e podem se projetar tanto para serosa quanto mucosa do útero, e os miomas subserosos são os que se projetam para fora do útero, com maior capacidade de crescimento e menor risco de sangramento uterino anormal.","needs_distractors":false},{"year":"2023.2","qnum":32,"enunciado":"Paciente idoso, hipertenso, diabético e tabagista foi submetido a um procedimemto de correção de fratura de fêmur evoluindo em pós operatório com infecção de ferida operatória e choque séptico. Evolui, após alguns dias, com piora gradual da função renal. Qual seria a provável causa da lesão renal aguda?","alternativas":[{"letra":"A","texto":"Ateroembolismo renal"},{"letra":"B","texto":"Desidratação"},{"letra":"C","texto":"Necrose tubular aguda"},{"letra":"D","texto":"Rabdomiólise"}],"correta":"C","resposta":"Paciente com quadro clássico de choque séptico com evolução para IRA, secundária a necrose tubular aguda secundária ao choque/sepse.","needs_distractors":false},{"year":"2023.2","qnum":33,"enunciado":"Paciente de 32 anos comparece a consulta com queixas de petéquias em membros inferiores. Nega episódios semelhantes anteriores. Nega doenças hematológicas na família. Nega perda de peso, febre ou sudorese noturna. Não foi identificado ao exame físico visceromegalias ou linfonodomegalias. Atualmente, paciente não apresenta sangramento ativo. Foi solicitado hemograma da paciente. Hb= 12,6g/dL, Leucócitos: 4.567 com 80% de neutrófilos, ausência de blastos; plaquetas = 9.000/mm3. Sobre o caso clínico, assinale a alternativa correta.","alternativas":[{"letra":"A","texto":"A principal diagnóstica é púrpura trombocitopênica trombótica (PTT). Deve ser solicitado a dosagem de ADAMST13 e encaminhar a paciente para plasmaferese."},{"letra":"B","texto":"A principal hipótese diagnóstica é púrpura trombocitopênica imune (PTI). A paciente deve, obrigatoriamente, ser submetida a um mielograma para confirmar o diagnóstico."},{"letra":"C","texto":"A maioria dos adultos com o mesmo diagnostico desta paciente irá evoluir para forma crônica da doença."},{"letra":"D","texto":"Essa paciente deve ser internada e receber transfusão de Concentrado de Plaquetas para profilaxia de sangramento de sistema nervoso central."}],"correta":"C","resposta":"a) A principal hipótese diagnostica para essa paciente é PTI. A realização de mielograma não é obrigatória para diagnóstico de PTI, sendo indicada com maior frequência em pacientes idosos ou com clínica sugestiva de doenças oncohemtologicas (sintomas B, visceromegalias, linfonodomegalias). b) A história e exames do caso não são compatíveis com PTT. c) A transfusão de plaquetas deve ser evitada em pacientes com PTI, já que a paciente possui autoanticorpos contra plaquetas. O efeito da transfusão é temporário. A paciente deve receber terapia imussupressora. d) A maioria dos casos de PTI em adultos irá cronificar.","needs_distractors":false},{"year":"2023.2","qnum":34,"enunciado":"Um homem de 25 anos, que está em tratamento para esquizofrenia queixa-se de lentificação, sialorreia e torcicolo que surgiu abruptamente, sendo bastante doloroso, relata também que não consegue deixar de olhar para cima. Sua temperatura é de 36,9ºC. Taquicardia. Assinale qual dos seguintes medicamentos tem maior probabilidade de ser responsável pelos sintomas?","alternativas":[{"letra":"A","texto":"Aripiprazol"},{"letra":"B","texto":"Haloperidol"},{"letra":"C","texto":"Olanzapina"},{"letra":"D","texto":"Quetiapina"}],"correta":"B","resposta":"Possivelmente esse paciente esteja apresentando quadro de distonia aguda causada pelo uso do Haloperidol, caracterizado por lentificação, sialorreia, torcicolo e crise oculógira.","needs_distractors":false},{"year":"2023.2","qnum":35,"enunciado":"Quais dos seguintes critérios são essenciais para o diagnóstico de Transtorno de Déficit de Atenção e Hiperatividade (TDAH), de acordo com o Manual Diagnóstico e Estatístico de Transtornos Mentais - 5ª Edição (DSM-5)?","alternativas":[{"letra":"A","texto":"Anamnese e observação clínica de déficits significativos na atenção e/ou hiperatividade- impulsividade que afetam o funcionamento em dois ou mais ambientes."},{"letra":"B","texto":"Exame de laboratoriais de triagem para avaliar os níveis de hormônios e eventuais carências vitamínicas."},{"letra":"C","texto":"Resultados de testes neuropsicológicos que mostram déficits de atenção e hiperatividade"},{"letra":"D","texto":"Exame de ressonância magnética para descartar anormalidades estruturais do lobo frontal."}],"correta":"A","resposta":"O diagnóstico de TDAH é baseado principalmente em critérios clínicos, de acordo com o DSM-5. Não existem testes neuropsicológicos específicos, exames de imagem ou EEG que possam diagnosticar o TDAH por si só. Os critérios clínicos incluem déficits significativos na atenção e/ou hiperatividade-impulsividade que afetam o funcionamento em dois ou mais ambientes, como na escola e em casa.","needs_distractors":false},{"year":"2023.2","qnum":36,"enunciado":"A Púrpura Trombocitopênica Trombótica (PTT) é considerada uma emergência médica, potencialmente fatal. Sobre este assunto, assinale a alternativa incorreta.","alternativas":[{"letra":"A","texto":"A plasmaférese terapêutica é a base do tratamento. Esta deve ser indicada o mais precocemente possível para os indivíduos que possuem risco intermediário e alto pelo escore de PLASMIC."},{"letra":"B","texto":"O escore de Plasmic permite estimar a probabilidade pré-teste do diagnóstico da PTT, sendo a presença dos esquizócitos um critérios obrigatório para a aplicação do escore."},{"letra":"C","texto":"As alterações laboratoriais esperadas nos casos PTT são: anemia com presença de esquizócitos, plaquetopenia, reticulopenia, aumento de bilirrubina indireta, aumento DHL, redução de haptoglobina e coombs direto positivo."},{"letra":"D","texto":"A PTT se caracteriza pela redução da atividade de ADAMTS 13 EM < 10%, esta protease é responsável por clivar os multímeros do fator de Von Willebrand. Estes multímeros se acumulam e são responsáveis pela formação de microtrombos plaquetários."}],"correta":"C","resposta":"a) Correta b) Incorreta – PTT caracteriza-se por anemia hemolítica (RETICULOCITOSE, redução de haptoglobina, aumento de bilirrubina indireta e DHL) com coombs direto NEGATIVO. Além de presença de esquizócitos e plaquetopenia. c) Correta d) Correta","needs_distractors":false},{"year":"2023.2","qnum":37,"enunciado":"A anafilaxia é considerada uma reação alérgica grave que tipicamente acomete dois ou mais órgãos ou sistemas e apresenta uma evolução rápida, podendo ser letal em até 5 a 30 minutos do início dos sintomas. Qual dos medicamentos listados abaixo é indispensável e o único reconhecido como salvador de vida no tratamento dessa patologia?","alternativas":[{"letra":"A","texto":"adrenalina intramuscular"},{"letra":"B","texto":"prometazina intramuscular"},{"letra":"C","texto":"difenidramina intravenosa"},{"letra":"D","texto":"metilprednisolona intravenosa"}],"correta":"A","resposta":"A adrenalina é o medicamento de escolha na anafilaxia e deverá ser administrada pura (sem diluição) na dose de 0,01 mg/kg até 0,3 mg (crianças) a 0,5 mg (adolescentes e adultos) por dose, no vasto lateral da coxa.","needs_distractors":false},{"year":"2023.2","qnum":38,"enunciado":"Lucas, 7 anos, previamente hígido, chegou à emergência com quadro de desconforto respiratório súbito após ter entrado em uma casa que estava sendo pintada. Foi admitido em estado geral regular, dispneico, afebril, hidratado, corado, consciente e orientado. Ausculta respiratória revela sibilos difusos, FR = 36 irpm e SatO2 = 94% em ar ambiente. O aparelho cardiovascular revela RCR em 2T, BNF, sem sopros, FC = 140 bpm e PA = 90x50 mmHg. O abdome é depressível, com ruídos hidroaéreos presentes. A pele revela lesões urticariformes na face, no tronco e no dorso. Presença de angioedema em lábio superior. Diante da suspeita diagnóstica, qual deve ser a primeira conduta medicamentosa?","alternativas":[{"letra":"A","texto":"salbutamol inalatório na dose de 2 jatos."},{"letra":"B","texto":"difenidramina intravenosa na dose de 25 mg/kg."},{"letra":"C","texto":"metilprednisolona intravenosa na dose de 2 mg/kg."},{"letra":"D","texto":"adrenalina intramuscular 1: 1.000 na dose de 0,01 mg/kg."}],"correta":"D","resposta":"A adrenalina é o medicamento de escolha na anafilaxia e deverá ser administrada pura (sem diluição) na dose de 0,01 mg/kg até 0,3 mg (crianças) a 0,5 mg (adolescentes e adultos) por dose, no vasto lateral da coxa. Todos os outros medicamentos devem ser feitos após a administração dessa","needs_distractors":false},{"year":"2023.2","qnum":39,"enunciado":"Com relação à reanimação do recém-nascido na sala de parto, de acordo com as Diretrizes de 2016 (atualização 2021) da Sociedade Brasileira de Pediatria, assinale a alternativa correta:","alternativas":[{"letra":"A","texto":"o balão autoinflável conectado ao reservatório e à fonte de oxigênio com fluxo adequado, sem Blender, fornece concentração de oxigênio a 30%."},{"letra":"B","texto":"a massagem cardíaca está indicada quando, após 30 segundos de ventilação com pressão positiva com técnica adequada e oxigênio suplementar, a frequência cardíaca é menor do que 100 bpm."},{"letra":"C","texto":"a massagem cardíaca, quando indicada, deve ser aplicada de forma assíncrona, acompanhada de ventilação por máscara facial, com 3 compressões para cada ventilação."},{"letra":"D","texto":"a frequência cardíaca é um dos principais parâmetros a serem avaliados durante a reanimação neonatal e suas modificações refletem a resposta das manobras da reanimação no recém- nascido."}],"correta":"D","resposta":"O balão autoinflável conectado ao reservatório e à fonte de oxigênio com fluxo adequado, sem Blender, fornece concentração de oxigênio próxima a 100%. A massagem cardíaca, quando indicada, deve ser aplicada de forma síncrona (coordenada), acompanhada de ventilação por tubo orotraqueal, com 3 compressões para cada ventilação. A massagem cardíaca está indicada quando, após 30 segundos de ventilação com pressão positiva e oxigênio suplementar, com técnica adequada, a frequência cardíaca é menor do que 60 bpm.","needs_distractors":false},{"year":"2023.2","qnum":40,"enunciado":"Você é chamado para atender, na sala de parto, um Recém-Nascido (RN) com 28 semanas e 2 dias de idade gestacional e peso estimado de 950g, cuja mãe foi encaminhada para cesárea de emergência por descolamento prematuro de placenta. Com relação aos procedimentos de reanimação desse recém-nascido e tomando como normas as Diretrizes de 2016 (atualização de 2021) da Sociedade Brasileira de Pediatria, considere as seguintes afirmativas abaixo:\\n\\nI – Existem evidências de que o clampeamento de cordão entre 1 a 3 minutos após a extração completa do concepto pelo obstetra é benéfica para esse RN, caso ele tenha começado a respirar ou chorar e esteja ativo. II – Para diminuir a perda de calor, é importante manter a sala de parto com temperatura entre 23o C e 26oC, após secá-lo em campos previamente aquecidos, envolver seu corpo em saco plástico transparente e colocar touca dupla (plástico e lã ou algodão). III – Se indicada, a ventilação com pressão positiva deve ser iniciada com concentração de oxigênio de 30%, a qual deve ser titulada de acordo com a monitoração da saturação arterial de O2 pré-ductal, de acordo com o alvo para o tempo de vida, evitando hipóxia e hiperóxia. IV – A ventilação com pressão positiva, quando indicada, deve ser realizada preferencialmente com ventilador mecânico manual em T, cujo uso parece vantajoso quando comparado ao balão autoinflável, por ser um equipamento capaz de fornecer pressão inspiratória e PEEP de modo confiável. Está(ão) correta(s):","alternativas":[{"letra":"A","texto":"I, II, III e IV"},{"letra":"B","texto":"I e II"},{"letra":"C","texto":"I, II e IV"},{"letra":"D","texto":"III e IV"}],"correta":"D","resposta":"O RN pré-termo menor de 34 semanas deve ter seu cordão umbilical clampeado após 30 segundos (ou entre 30 segundos e 60 segundos) se nascer vigoroso (respirando ou chorando e ativo) e não após 60 segundos, como citado na afirmativa I. O RN pré-termo menor de 34 semanas deve ter seu corpo colocado dentro de um saco plástico transparente, sem secá-lo previamente, o que torna incorreta a afirmativa II.","needs_distractors":false},{"year":"2023.2","qnum":41,"enunciado":"A aspiração traqueal sob visualização direta, na suspeita de aspiração meconial na sala de parto, está corretamente indicada na seguinte situação abaixo:","alternativas":[{"letra":"A","texto":"aos recém-nascidos de risco para aspiração meconial, sem melhora após 30 segundos de ventilação com pressão positiva."},{"letra":"B","texto":"apenas na presença de apneia ao nascimento, antes de estimular a ventilação, nos recém- nascidos de risco para aspiração meconial."},{"letra":"C","texto":"em todos os casos de líquido amniótico meconial, pelo alto risco do desenvolvimento da síndrome de aspiração meconial."},{"letra":"D","texto":"a aspiração direta da traqueia deve ser realizada antes da aspiração de boca e narinas, nos recém-nascidos de risco para aspiração meconial."}],"correta":"A","resposta":"A aspiração traqueal sob visualização direta deve ser restrita aos pacientes que nasceram não vigorosos (não respiram ou não choram e/ou apresentam hipotonia) passaram pelos passos iniciais da reanimação – o que inclui a aspiração de boca e narinas – realizaram ventilação com pressão positiva por 30 segundos e não apresentaram melhora.","needs_distractors":false},{"year":"2023.2","qnum":42,"enunciado":"Uma criança de 4 anos, pesando 16 kg, compareceu ao serviço de pronto-atendimento pediátrico com história de febre e coriza havia 24 horas. Seis horas antes do comparecimento à unidade de saúde, associaram-se ao quadro dor torácica, tosse e dificuldade para respirar. O exame físico revelou que a criança estava em regular estado geral, sonolenta, com frequência respiratória = 55 irpm, frequência cardíaca = 165 bpm, temperatura axilar = 36,4oC, taquidispneica com tiragem intercostal e subcostal moderadas e retração de fúrcula esternal. A saturação em ar ambiente, medida pelo oxímetro de pulso, foi de 89%. A ausculta pulmonar revelou murmúrio vesicular reduzido em ambos os campos pulmonares e sibilos inspiratórios e expiratórios difusos. A mãe informou que a criança tem diagnóstico prévio de bronquite asmática. Segundo o caso descrito, qual deve ser a conduta imediata mais adequada?","alternativas":[{"letra":"A","texto":"administração de sulfato de magnésio na dose de 50 mg/kg, endovenoso."},{"letra":"B","texto":"administração de salbutamol inalatório e metilprednisolona endovenosa com reavaliação após 1 hora."},{"letra":"C","texto":"administração de salbutamol e brometo de ipratrópio inalatórios e metilprednisolona endovenosa."},{"letra":"D","texto":"administração de corticoide inalatório em baixa dosagem e sulfato de magnésio isotônico para nebulização."}],"correta":"C","resposta":"Paciente com quadro de exacerbação de asma grave, necessita de administração de beta-2 de curta duração (salbutamol), que, para a idade e gravidade, seriam 6 jatos. E, devido à gravidade, associa-se o uso do brometo de ipratrópio e corticosteroide (metilprednisolona endovenosa). Não há indicação do uso de sulfato de magnésio (endovenoso ou nebulizado) como tratamento de primeira linha.","needs_distractors":false},{"year":"2023.2","qnum":43,"enunciado":"Paciente 68 anos comparece à consulta queixando-se de prolapso intermitente e desconforto em região anal. Refere que aparece ao esforço evacuatório e que esse prolapso só com auxílio de pressão digital. Diante do exposto, estamos frente a um quadro de doença hemorroidária:","alternativas":[{"letra":"A","texto":"Externa Grau III"},{"letra":"B","texto":"Externa Grau II"},{"letra":"C","texto":"Interna Grau II"},{"letra":"D","texto":"Interna Grau III"}],"correta":"D","resposta":"As hemorroidas internas são classificadas de acordo com o prolapso. Grau I - Ausência de prolapso. Grau II - Prolapso com redução espontânea. Grau III - Prolapso com necessidade de redução manual. Grau IV -Prolapso irredutível.","needs_distractors":false},{"year":"2023.2","qnum":44,"enunciado":"Um paciente de 87 anos chegou ao seu plantão queixando-se de dor abdominal de início há quatro dias, associada à febre, sem vômitos. Refere ser hipertenso e diabético, com uso de medicação via oral para controle destas. Ao exame apresentava-se estável hemodinamicamente, abdome pouco doloroso à palpação em quadrante inferior esquerdo, com descompressão brusca negativa. Realizou exames laboratoriais que evidenciaram leucócitos 18.600 e PCR 22 mg/dL. A tomografia de abdome com contraste, mostrou espessamento do cólon sigmoide (onde existem divertículos) e borramento da gordura adjacente. Nessa situação hipotética, a melhor conduta será:","alternativas":[{"letra":"A","texto":"Videolaparoscopia para lavagem da cavidade."},{"letra":"B","texto":"Retossigmoidectomia associada a anastomose primária."},{"letra":"C","texto":"Antibioticoterapia e colonoscopia após seis semanas."},{"letra":"D","texto":"Retossigmoidectomia associada a colostomia terminal."}],"correta":"C","resposta":"O paciente apresenta quadro de diverticulite aguda não complicada (Hinchey 1A). A TC mostra borramento de gordura peridiverticular, sem ainda a formação de um abscesso. Neste caso, como não há presença de complicações, não está indicada intervenção cirúrgica. A conduta gira em torno da antibioticoterapia e após a resolução do quadro inflamatório inicial, deve-se realizar a colonoscopia.","needs_distractors":false},{"year":"2023.2","qnum":45,"enunciado":"Paciente jovem chega ao consultório com queixa de saída de secreção perianal. Ao examiná-lo você constatou se tratar de fístula perianal. Sobre este tema e, de acordo com a regra de Goodsall-Salmon, é correto afirmar que:","alternativas":[{"letra":"A","texto":"Fístulas com orifícios externos nos quadrantes anteriores apresentam trajetos lineares e orifíciosinternos e externos correspondentes."},{"letra":"B","texto":"Fístulas com orifícios externos nos quadrantes anteriores apresentam trajetos curvos e o orifício externo está sempre na linha média anterior (12h)."},{"letra":"C","texto":"Fístulas com orifícios externos nos quadrantes posteriores apresentam trajetos lineares e orifícios internos e externos correspondentes."},{"letra":"D","texto":"Não existe correlação entre a posição do orifício externo e a localização do orifício interno, podendo este último estar localizado em qualquer ponto da linha pectínea."}],"correta":"A","resposta":"A regra de Goodsall-Salmon determina o trajeto fistuloso e ponto do orifício interno baseado na posição do orifício externo. A regra traz que, caso o orifício externo esteja localizado na metade anterior, o trajeto será retilíneo e o orifício interno será correspondente ao trajeto. Porém, se o orifício externo estiver na metade posterior, o trajeto será curvilíneo tendendo a linha média, estando o orifício interno neste segmento.","needs_distractors":false},{"year":"2023.2","qnum":46,"enunciado":"Homem de 32 anos, queixa-se de dor em epigástrio, que após algumas horas, migrou para quadrante inferior direito do abdome, acompanhada de náusea, anorexia e febre. Ao exame apresentou abdome plano, depressível, doloroso à palpação superficial e profunda em fossa ilíaca direita, com descompressão brusca positiva. Sinais vitais: TAX: 38,7ºC, PA:\\n\\n110x80mmHg, FC: 105bpm, FR: 19irpm.\\n\\nConsiderando-se o diagnóstico mais provável, assinale alternativa correta.","alternativas":[{"letra":"A","texto":"As radiografias de abdome em decúbito dorsal horizontal e em ortostase devem ser realizadas de rotina para elucidação deste diagnóstico."},{"letra":"B","texto":"A ressonância magnética é o exame de imagem com maior acurácia diagnóstica, mas tem a desvantagem do tempo necessário e dos custos para a sua realização."},{"letra":"C","texto":"A ultrassonografia de abdome é considerada o exame padrão-ouro para diagnosticar tal condição."},{"letra":"D","texto":"Exames de imagem podem ser dispensados neste caso, devido alta probabilidade de se tratar de uma condição cirúrgica, a qual deve ser indicada com base na anamnese e no exame físico."}],"correta":"D","resposta":"O custo da ressonância magnética é um fator limitante, no entanto o exame de maior acurácia é a tomografia computadorizada com contraste venoso. Este paciente pontua 7 na escala de Alvarado, o que já indica uma alta probabilidade de se tratar de um quadro de apendicite aguda, desta forma, a cirurgia deve ser indicada com base em anamnese e exame físico.","needs_distractors":false},{"year":"2023.2","qnum":47,"enunciado":"Homem, 30 anos, com dor abdominal de forte intensidade há 24 horas, mais intensa à esquerda, acompanhada de distensão abdominal e vômitos fecalóides. Ao exame físico o paciente se encontrava taquicárdico, com distensão abdominal importante, sem irritação peritoneal e observou-se presença de hérnia inguinal esquerda, irredutível às manobras, com dor importante a manipulação. Realizou radiografia simples de abdome que evidenciou distensão de alças de intestino delgado, com a presença de níveis hidroaéreos. O exame laboratorial mostrou leucocitose com desvio a esquerda. Durante a fase de hidratação e início de antibioticoterapia, você foi informado que a hérnia havia reduzido de forma espontânea e ao examinar novamente o paciente, confirma a redução espontânea do material herniado. Qual a melhor conduta diante dessa nova situação?","alternativas":[{"letra":"A","texto":"Manter o paciente em observação e após 06 horas, se mantiver o atual exame físico, dar alta para o domicílio com antibiótico oral."},{"letra":"B","texto":"Dar alta para o domicílio com orientações dietéticas."},{"letra":"C","texto":"Dar alta para domicílio e orientar procurar o serviço de cirurgia geral ambulatorialmente."},{"letra":"D","texto":"Encaminhar o paciente para cirurgia de urgência, apesar da redução espontânea da hérnia."}],"correta":"D","resposta":"Paciente com hérnia irredutível há 24h, apresentando sinais de obstrução intestinal e sepse. A associação de tempo de evolução, obstrução e repercussão sistêmica indica que não é possível excluir um quadro de hérnia estrangulada, com sofrimento de alças intestinal. Desta forma, é mandatório realizar exploração cirúrgica, para confirmar a viabilidade das alças e realizar o reparo da hérnia. Todas as outras opções, que envolvem somente observação, estão incorretas pelo alto risco de perfuração intestinal.","needs_distractors":false},{"year":"2023.2","qnum":48,"enunciado":"Homem 47 anos queixava-se de abaulamento em região inguinal esquerda, que piorava aos esforços. Foi submetido a hernioplastia inguinal esquerda e, na visita do 1º dia pós-operatório, conversando com a cirurgiã que o operou, descobriu que tinha uma hérnia indireta com anel inguinal interno alargado, porém com parede posterior preservada. Assim sendo, a alternativa que traz a correta classificação de Nyhus para o defeito supracitado é:","alternativas":[{"letra":"A","texto":"Nyhus tipo II."},{"letra":"B","texto":"Nyhus tipo I."},{"letra":"C","texto":"Nyhus tipo III A."},{"letra":"D","texto":"Nyhus tipo IV C."}],"correta":"A","resposta":"Classificação de Nyhus: Tipo I: hérnia indireta com anel inguinal profundo normal (até 2 cm); - Tipo II: hérnia indireta com anel inguinal interno alargado, porém com parede posterior preservada; -Tipo III: defeito na parede posterior, podendo ser subdividida em: IIIA: hérnia direta;\\n\\nIIIB: hérnia indireta com alargamento importante do anel interno ou destruição da parede posterior; IIIC: hérnia femoral; Tipo IV: hérnia recidivada, podendo ser: IVA: direta; IVB: indireta;\\n\\nIVC: femoral; IVD: mista.","needs_distractors":false},{"year":"2023.2","qnum":49,"enunciado":"Paciente 72 anos, chega ao hospital, com queixa de dor abdominal de início agudo, de forte intensidade, que começou há cerca de 4 horas. Nega vômitos e febre. Ao exame: abdome distendido levemente doloroso à palpação, sem sinais de irritação peritoneal, RHA diminuídos. Quando monitorizado, apresentou sinais de fibrilação atrial. Gasometria mostra Ph:7.31, Lactato 27mg/dL. O diagnóstico mais provável para esse paciente é:","alternativas":[{"letra":"A","texto":"Oclusão intestinal baixa"},{"letra":"B","texto":"Apendicite aguda"},{"letra":"C","texto":"Úlcera péptica perfurada"},{"letra":"D","texto":"Isquemia mesentérica"}],"correta":"D","resposta":"Paciente idosa com dor abdominal de início súbito, de forte intensidade, há quatro horas que se apresenta desproporcional ao exame físico, somado ao fato de possuir uma arritmia cardíaca, nos leva ao diagnóstico mais provável de isquemia mesentérica.","needs_distractors":false},{"year":"2023.2","qnum":50,"enunciado":"Homem, 57 anos, chega ao pronto-socorro referindo dor abdominal difusa e um episódio de evacuação com sangue vivo há 1dia. Ao exame: PA = 130 x 80 mmHg; FC = 78 bpm; FR = 14irpm; Saturação de oxigênio em ar ambiente = 98%; abdome: plano, normotenso, sem visceromegalia e sem irritação peritoneal; toque retal: sem sangue em dedo de luva ou massa palpável. Hematócrito = 34%; hemoglobina = 11,6 g/dl; Endoscopia digestiva alta: normal. Neste momento, a próxima conduta é:","alternativas":[{"letra":"A","texto":"Realizar Ultrassonografia de abdome total."},{"letra":"B","texto":"Realizar radiografia de abdome em ortostase e decúbito."},{"letra":"C","texto":"Realizar Colonoscopia."},{"letra":"D","texto":"Pesquisar sangue oculto nas fezes."}],"correta":"C","resposta":"Paciente com um quadro de hematoquezia, estável hemodinamicamente, em que a EDA foi normal, deve-se suspeitar de hemorragia digestiva baixa cujo diagnóstico pode ser feito através de colonoscopia.","needs_distractors":false},{"year":"2023.2","qnum":51,"enunciado":"Idoso de 75 anos comparece ao seu plantão queixando-se de dor e distensão abdominal a 1 dia, de início súbito. Refere também episódios de vômitos e sudorese fria. Relata que sua frequência evacuatória é de 1 evacuação a cada 5 dias. Ao exame físico: consciente, orientado, fásico, desidratado (1+/4+), normocorado, sudoreico. Abdome distendido com ruídos hidroaéreos aumentados, dor à palpação difusa e sem sinais de peritonite. Realizou radiografia de abdome que evidenciou sinal do “grão de café”. Baseado no diagnóstico mais provável, a conduta terapêutica imediata é:","alternativas":[{"letra":"A","texto":"Hemicolectomia direita."},{"letra":"B","texto":"Laparotomia exploradora."},{"letra":"C","texto":"Colonoscopia descompressiva."},{"letra":"D","texto":"Antibioticoterapia."}],"correta":"C","resposta":"Paciente idoso com dor e distensão abdominal acompanhado de vômitos sem sinais de peritonite ao exame físico nos fala a favor de um abdome agudo obstrutivo. A radiografia simples de abdome evidenciou o clássico sinal do \\"grão de café\\", que é muito típico de volvo de sigmoide. Logo, a conduta é, inicialmente, menos invasiva com a descompressão por colonoscopia. A laparotomia exploradora com ressecção do trecho acometido pelo volvo está indicada em casos refratários ao tratamento endoscópico ou com necrose ou perfuração de alça.","needs_distractors":false},{"year":"2023.2","qnum":52,"enunciado":"Uma paciente de 67 anos, tabagista de longa data e alcoólatra, em tratamento para artrite reumatoide e relato de automedicação com antiinflamatório não esteroidalhá 30 dias, deu entrada no serviço de urgência e emergência há duas horas, referindo dor abdominal difusa. Ao exame: Consciente, orientada, taquicárcica, taquipneica, abdome rígido, doloroso à palpação difusamente, com sinais de irritação peritoneal. Qual a principal hipótese diagnóstica e conduta adequada ao caso?","alternativas":[{"letra":"A","texto":"Abdome agudo vascular; iniciar anticoagulação plena."},{"letra":"B","texto":"Abdome agudo perfurativo; estabilização clínica e endoscopia digestiva alta."},{"letra":"C","texto":"Abdome agudo hemorrágico; solicitar ultrassom e exames laboratoriais."},{"letra":"D","texto":"Abdome agudo perfurativo; estabilização clínica e laparotomia."}],"correta":"D","resposta":"Quadro clínico típico de abdome agudo perfurativo, por provável úlcera péptica perfurada, cujos fatores de riscos que podem ser elencados nesse caso são: idade, tabagismo, alcoolismo, uso crônico de medicação, portanto a conduta mais adequada é laparotomia exploradora.","needs_distractors":fals
