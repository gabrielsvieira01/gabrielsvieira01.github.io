 pode ser ineficaz ou até contraproducente na hiponatremia euvolêmica secundária à secreção inapropriada de ADH (SIADH), pois pode agravar a retenção hídrica.\\n\\n- A recomendação atual, diante de sintomas graves (neurológicos), é correção inicial com solução salina hipertônica visando elevação gradual e segura do sódio, evitando correções rápidas e monitorando continuamente o paciente.\\n\\n- Diuréticos de alça são recomendados em algumas situações específicas, mas o uso indiscriminado, especialmente sem conhecer a etiologia, pode trazer riscos e não são primeira linha na emergência sintomática.","needs_distractors":false},{"year":"2025.2","qnum":50,"enunciado":"(UNINOVAFAPI) Mulher de 23 anos, descobriu recentemente que estava grávida e iniciou o pré-natal na UBS do seu bairro. Ela retorna para sua segunda consulta com idade gestacional de 13 semanas e 4 dias, trazendo exames laboratoriais solicitados pela enfermeira: Toxoplasmose IgG e IgM: não reagentes; Teste rápido para HIV: não reagente; Teste rápido para sífilis - HBsAg: não reagente; Anti- HBsAg: não reagente;\\n\\nVDRL: 1:32; Glicemia de jejum: 79mg/dl. Qual a conduta que deve ser efetivada neste caso?","alternativas":[{"letra":"A","texto":"Prescrever benzilpenicilina benzatina, 2,4 milhões UI, IM, semanal, por três semanas."},{"letra":"B","texto":"Prescrever penicilina G benzatina, ceftriaxona ou doxiciclina, para a paciente."},{"letra":"C","texto":"Solicitar FTA-ABS para acompanhamento da paciente."},{"letra":"D","texto":"Indicar abstinência sexual durante o tratamento medicamentoso."}],"correta":"A","resposta":"Comentário: A benzilpenicilina benzatina é o medicamento de escolha e a única droga com eficácia durante a gestação, devendo ser prescrita da seguinte forma: 2,4 milhões UI, IM, (1,2 milhão UI em cada glúteo), semanal, por três semanas, para que o tratamento seja considerado adequado. Os parceiros sexuais deverão ser tratados para sífilis independentemente do resultado dos seus exames. O VDRL é um exame com alta sensibilidade para sífilis, enquanto o FTA-ABS é o exame com alta especificidade. No entanto, com teste rápido positivo já é indicado tratamento da gestante, não devendo aguardar resultado de nenhum outro exame devido aos riscos possíveis para o feto. O FTA-ABS, por ser muito específico, descarta a doença quando é negativo.","needs_distractors":false}]';
  const QUESTIONS = JSON.parse(QUESTIONS_JSON);

  // --- State ---
  const state = {
    order: [],     // shuffled indices into QUESTIONS
    idx: 0,        // current position in order
    selected: null,
    answered: false,
    score: 0,
    answers: [],   // per-question record: {qid, selectedLetter, correctLetter, isCorrect}
  };

  // --- Utils ---
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function toParagraphs(text) {
    if (!text) return '';
    return text.split(/\n\s*\n/).map(p => p.trim()).filter(Boolean)
      .map(p => '<p>' + escapeHtml(p) + '</p>').join('');
  }

  // --- Init ---
  function init() {
    // Build shuffled order; ALSO shuffle the alternative order within each question
    const indices = Array.from({length: QUESTIONS.length}, (_, i) => i);
    state.order = shuffle(indices);
    // Pre-shuffle alternatives per question for this session
    state.altOrders = {};
    QUESTIONS.forEach((q, i) => {
      const altIdx = Array.from({length: q.alternativas.length}, (_, j) => j);
      state.altOrders[i] = shuffle(altIdx);
    });
    document.getElementById('progressTotal').textContent = QUESTIONS.length;
    render();
  }

  // --- Render ---
  function render() {
    const main = document.getElementById('main');
    if (state.idx >= state.order.length) {
      renderFinished(main);
      return;
    }
    const qi = state.order[state.idx];
    const q = QUESTIONS[qi];
    const altOrder = state.altOrders[qi];

    document.getElementById('progressIdx').textContent = state.idx + (state.answered ? 1 : 0);
    document.getElementById('scoreCount').textContent = state.score;
    document.getElementById('progressFill').style.width =
      ((state.idx + (state.answered ? 1 : 0)) / QUESTIONS.length * 100) + '%';

    const altsHtml = altOrder.map((origIdx, displayIdx) => {
      const a = q.alternativas[origIdx];
      const displayLetter = String.fromCharCode(65 + displayIdx); // A, B, C, D
      const isCorrect = a.letra === q.correta;
      const isSelected = state.selected === origIdx;

      let cls = 'alt';
      if (state.answered) {
        if (isCorrect) cls += ' correct';
        else if (isSelected) cls += ' incorrect';
        else cls += ' faded';
      } else if (isSelected) {
        cls += ' selected';
      }

      return `
        <button class="${cls}" data-orig="${origIdx}" data-display="${displayIdx}" ${state.answered ? 'disabled' : ''}>
          <span class="alt-letter">${displayLetter}</span>
          <span class="alt-text">${escapeHtml(a.texto)}</span>
        </button>`;
    }).join('');

    let commentaryHtml = '';
    if (state.answered) {
      const selectedAlt = q.alternativas[state.selected];
      const correctAlt = q.alternativas.find(a => a.letra === q.correta);
      const isCorrect = selectedAlt && selectedAlt.letra === q.correta;
      // Find the *displayed* letter for the correct alternative
      const correctDisplayIdx = altOrder.findIndex(origIdx => q.alternativas[origIdx].letra === q.correta);
      const correctDisplayLetter = String.fromCharCode(65 + correctDisplayIdx);

      const respHtml = q.resposta && q.resposta.trim()
        ? toParagraphs(q.resposta)
        : '<p>' + escapeHtml(correctAlt.texto) + '</p>';

      commentaryHtml = `
        <div class="commentary">
          <div class="commentary-head">
            <span class="commentary-title">Resposta comentada</span>
            <span class="verdict ${isCorrect ? 'correct' : 'incorrect'}">
              ${isCorrect ? '✓ Acertou' : '✗ Errou'} · Gabarito: ${correctDisplayLetter}
            </span>
          </div>
          <div class="commentary-body">${respHtml}</div>
        </div>`;
    }

    const buttonHtml = state.answered
      ? `<button class="btn btn-primary" id="nextBtn">${state.idx + 1 >= state.order.length ? 'Ver resultado' : 'Próxima questão'} →</button>`
      : `<button class="btn btn-primary" id="confirmBtn" ${state.selected === null ? 'disabled' : ''}>Confirmar resposta</button>`;

    main.innerHTML = `
      <article class="card" id="card">
        <div class="card-head">
          <span class="year-badge" data-year="${q.year}">
            <span class="dot"></span>
            Integradora ${q.year}
          </span>
          <span class="qnum">Questão <strong>${state.idx + 1}</strong>/${QUESTIONS.length} · Fonte Q${q.qnum}</span>
        </div>
        <div class="enunciado">${toParagraphs(q.enunciado)}</div>
        <div class="alts" id="alts">${altsHtml}</div>
        ${commentaryHtml}
        <div class="actions">
          <span class="hint">${state.answered ? 'Pressione <kbd>Enter</kbd> para continuar' : 'Use <kbd>1</kbd>–<kbd>4</kbd> ou <kbd>A</kbd>–<kbd>D</kbd> e <kbd>Enter</kbd>'}</span>
          ${buttonHtml}
        </div>
      </article>`;

    // Bind events
    document.querySelectorAll('.alt').forEach(btn => {
      btn.addEventListener('click', () => {
        if (state.answered) return;
        state.selected = parseInt(btn.dataset.orig, 10);
        render();
      });
    });

    const confirmBtn = document.getElementById('confirmBtn');
    if (confirmBtn) confirmBtn.addEventListener('click', confirmAnswer);
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn) nextBtn.addEventListener('click', nextQuestion);
  }

  function confirmAnswer() {
    if (state.selected === null) return;
    const qi = state.order[state.idx];
    const q = QUESTIONS[qi];
    const selectedAlt = q.alternativas[state.selected];
    const isCorrect = selectedAlt.letra === q.correta;
    if (isCorrect) state.score++;
    state.answers.push({
      year: q.year,
      qnum: q.qnum,
      selectedLetter: selectedAlt.letra,
      correctLetter: q.correta,
      isCorrect,
    });
    state.answered = true;
    render();
    // scroll to commentary
    setTimeout(() => {
      const c = document.querySelector('.commentary');
      if (c) c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }

  function nextQuestion() {
    state.idx++;
    state.selected = null;
    state.answered = false;
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderFinished(main) {
    document.getElementById('progressIdx').textContent = QUESTIONS.length;
    document.getElementById('progressFill').style.width = '100%';
    const total = state.order.length;
    const pct = total > 0 ? Math.round(state.score / total * 100) : 0;
    main.innerHTML = `
      <div class="finished">
        <h2>Sessão <em>concluída</em></h2>
        <p class="score-line">Você completou todas as questões deste banco.</p>
        <div class="score-num">${state.score}<span style="color: var(--text-muted); font-size: 0.4em;"> / ${total}</span></div>
        <div class="score-pct">${pct}% de acertos</div>
        <button class="btn btn-primary" onclick="location.reload()">Recomeçar com nova ordem ↻</button>
      </div>`;
  }

  // --- Keyboard shortcuts ---
  document.addEventListener('keydown', (e) => {
    if (state.idx >= state.order.length) return;
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.key === 'Enter') {
      e.preventDefault();
      if (state.answered) nextQuestion();
      else if (state.selected !== null) confirmAnswer();
      return;
    }

    if (state.answered) return;

    // 1-4 or A-D
    let displayIdx = -1;
    if (e.key >= '1' && e.key <= '4') {
      displayIdx = parseInt(e.key, 10) - 1;
    } else {
      const k = e.key.toUpperCase();
      if (k >= 'A' && k <= 'D') displayIdx = k.charCodeAt(0) - 65;
    }
    if (displayIdx >= 0) {
      e.preventDefault();
      const qi = state.order[state.idx];
      const altOrder = state.altOrders[qi];
      if (displayIdx < altOrder.length) {
        state.selected = altOrder[displayIdx];
        render();
      }
    }
  });

  // --- Boot ---
  init();
</script>
</body>
</html>
