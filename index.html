e},{"year":"2024.1","qnum":1,"enunciado":"Uma adolescente de 15 anos é atendida na Unidade Básica de Saúde, apresentando queixas de insônia persistente, redução do apetite associada a episódios frequentes de dor epigástrica e um marcante afastamento social nas últimas semanas. A mãe relata que a filha \\"sempre foi saudável\\" e expressa preocupação com a possibilidade de uma doença física subjacente. Ao examinar a adolescente, observa-se um comportamento notavelmente evasivo quando questionada sobre a escola e suas relações sociais. Além disso, quando solicitado, ela hesita em permitir um exame físico, especialmente na região abdominal, onde são observadas múltiplas equimoses de diferentes estágios de cicatrização. A adolescente evita fazer contato visual e responde a perguntas de maneira breve, muitas vezes olhando para a mãe antes de responder. Com base no cenário apresentado, qual a hipótese diagnóstica que mais se encaixa diante dos sinais e sintomas relatados?","alternativas":[{"letra":"A","texto":"Possibilidade de maus-tratos: considerar os sinais físicos e comportamentais como indicativos de possíveis maus-tratos, priorizando a criação de um ambiente seguro para a adolescente expressar suas preocupações e a notificação das autoridades competentes para investigação apropriada."},{"letra":"B","texto":"Distúrbio gastrointestinal funcional: tratar os sintomas digestivos como decorrentes de estresse e ansiedade, prescrevendo modificações dietéticas e orientações sobre manejo do estresse."},{"letra":"C","texto":"Transtorno alimentar: focar na redução do apetite e perda de peso, encaminhando para serviço especializado em transtornos alimentares para avaliação e seguimento."},{"letra":"D","texto":"Insônia primária: tratar a insônia como queixa principal, orientando higiene do sono e avaliando a necessidade de medicação hipnótica de curto prazo."}],"correta":"A","resposta":"Resposta correta: Possibilidade de Maus-tratos: Considerar os sinais físicos e comportamentais como indicativos de possíveis maus tratos, priorizando a criação de um ambiente seguro para a adolescente expressar suas preocupações e a notificação das autoridades competentes para investigação apropriada. Este cenário sugere que, além de abordar as queixas orgânicas apresentadas, é crucial avaliar a segurança e o bem-estar da adolescente, considerando os sinais de alerta para maus-tratos. Demais alternativas incorretas:\\n\\nDistúrbio Gastrointestinal Funcional: Essa opção foca apenas nos sintomas gastrointestinais, considerando-os como relacionados a estresse e ansiedade. Embora esses sintomas possam estar presentes, eles não explicam a totalidade do quadro clínico, especialmente as equimoses e o comportamento evasivo. Transtorno Alimentar: Essa alternativa se concentra na redução do apetite e perda de peso. Novamente, apesar de ser uma possibilidade, não explica os sinais de trauma físico evidentes, como as equimoses. Insônia Primária: Foca apenas na insônia seria uma simplificação excessiva do caso, ignorando outros sinais sérios como as equimoses e o comportamento durante a consulta.","needs_distractors":true},{"year":"2024.1","qnum":2,"enunciado":"Paciente masculino, 32 anos, em avaliação pré-operatória para correção de varicocele foi encaminhado ao hematologista para avaliação após alterações no exames de risco cirúrgico. Segundo o anestesiologista, o tempo de tromboplastina parcialmente ativada (TTPA) estava além do limite de referência e seria necessário o parecer do hematologista antes do agendamento cirúrgico. Com base no caso acima, assinale a alternativa correta.","alternativas":[{"letra":"A","texto":"A possibilidade de hemofilia A deve ser levantada, devendo-se dosar a atividade do fator VIII frente a tal hipótese."},{"letra":"B","texto":"Doença de von Willebrand deve ser a principal hipótese, sendo recomendada a dosagem do fator V de Leiden para confirmação diagnóstica."},{"letra":"C","texto":"Deficiência de vitamina K é a causa mais provável, devendo-se iniciar reposição com fitomenadiona antes do procedimento cirúrgico."},{"letra":"D","texto":"Trata-se de coagulopatia adquirida por hepatopatia, sendo recomendada a dosagem dos fatores dependentes de vitamina K (II, VII, IX e X)."}],"correta":"A","resposta":"O TTPa avalia a via intrínseca da coagulação, enquanto o TP (RNI) avalia a via extrínseca. Assim, o TTPa, se isoladamente alterado, sugere alteração dos fatores VIII ou IX ou XI ou XII. A hemofilia A é marcada por deficiência do fator VIII e a B por deficiência do fator IX. A mutação do fator V de Leiden é condição trombofílica e não altera o TTPa.","needs_distractors":true},{"year":"2024.1","qnum":3,"enunciado":"Paciente feminino, 65 anos, procura o serviço de saúde queixando-se de edema em membros inferiores há 6 meses, acompanhado de fadiga e oligúria. Refere perda ponderal de três quilos nos últimos 6 meses, associado a náuseas e inapetência, que surgiram há cerca de 1 mês. Paciente hipertensa há 20 anos, fazendo uso irregular de losartana 50mg. Nega uso de outras medicações. No exame físico: PA MSD: 150×95 mmHg. PA MSE: 145×90 mmHg. Aparelho respiratório:\\n\\nestertores crepitantes em bases pulmonares. Vascular periférico: edema bilateral em MMII (++/IV), de consistência mole e sem sinais flogísticos. O hemograma revelou eritropenia (3,6 milhões/mm³) e anemia (Hb = 9,5 g/dL; hematócrito = 30%). Glicemia = 90 mg/dL. O sumário de urina revelou proteinúria e cilindrúria. O exame de urina 24 horas revelou volume urinário de 500 mL, proteinúria (relação albumina-creatinina = 250mg/g) e clearance de creatinina igual 17,0 ml/min/1,73m². Sódio = 130 mEq/L, potássio = 6,0 mEq/L, cálcio = 8,0 mg/L, fósforo = 5,5 mg/dL, ureia = 150 mg/dL e creatinina sérica = 4,0 mg/dL. A radiografia de tórax evidenciou presença de infiltrado pulmonar intersticial em lobo inferior de ambos os pulmões. A gasometria arterial apresentou os seguintes resultados: pH = 7,2; [HCO3 –] = 20 mEq/L; pCO2 = 37 mmHg; base excess (BE) = -3,0; ânion gap (AG) = 10. Diante desses dados e considerando a taxa de filtração glomerular, o paciente se encontra em qual estágio da doença renal crônica ?","alternativas":[{"letra":"A","texto":"Estágio G4."},{"letra":"B","texto":"Estágio G2."},{"letra":"C","texto":"Estágio G3a."},{"letra":"D","texto":"Estágio G5."}],"correta":"A","resposta":"A SBD endossa o estadiamento proposto pela KDIGO para a DRC, que combina estágios de perda de função renal baseados na TFG e na excreção urinária de albumina (EUA), utilizando os dois parâmetros de forma complementar.","needs_distractors":true},{"year":"2024.1","qnum":4,"enunciado":"Mulher, de 32 anos, procura serviço de urgência com relato lesões de pele < 2 mm de diâmetro, sem relevo e coloração marrom-arroxeadas em membros inferiores há 48 horas. Nega episódios semelhantes anteriores ou doenças hematológicas na família. Nega perda de peso, febre ou sudorese noturna. Não foi identificado ao exame físico visceromegalias ou linfonodomegalias. Foi solicitado hemograma da paciente. Hb= 12,1g/dL, Leucócitos: 6.567 com 60% de neutrófilos, ausência de blastos e plaquetas = 12.000/mm3. Qual principal hipótese diagnóstica e conduta mais adequada para o caso?","alternativas":[{"letra":"A","texto":"Púrpura Trombocitopênica Imune – solicitar sorologias (anti-HIV, hepatite B, C), pesquisa de doenças autoimunes, investigar medicamentos em uso, além de iniciar prednisona 1mg/kg."},{"letra":"B","texto":"Púrpura de Henoch-Schönlein – solicitar biópsia renal e iniciar prednisona 2mg/kg associada a ciclofosfamida."},{"letra":"C","texto":"Trombocitopenia induzida por heparina (HIT) – suspender qualquer heparina e iniciar anticoagulação alternativa com fondaparinux."},{"letra":"D","texto":"Coagulação intravascular disseminada – solicitar D-dímero, fibrinogênio e TAP/TTPa, além de transfusão de plaquetas e plasma fresco."}],"correta":"A","resposta":"O quadro clínico mostra uma mulher de 32 anos com petéquias, sem outros sangramentos que em hemograma apresenta plaquetopenia sem nenhuma outra alteração associada. Não apresenta sangramentos anteriores e nem história familiar de sangramentos - o que diminui a possibilidade de causas hereditárias. Além disso paciente não possui sinais de alarme para doenças onco hematológicas. Então, a principal hipótese é púrpura trombocitopênica imune, esta patologia não necessita de exames confirmatórios, sendo portanto um diagnóstico de exclusão, desta forma, o mielograma não é obrigatório. O tratamento deve ser feito com imunossupressão com corticoide, sendo prednisona 1mg/kg uma das opções. Essa paciente não tem indicação de transfusão de plaquetas já que este procedimento deve ser evitado nestes pacientes e esta não possui sangramentos importantes que justificassem tal transfusão. A púrpura trombocitopenica trombótica apresenta anemia hemolítica com presença de esquizócitos + plaquetopenia.","needs_distractors":true},{"year":"2024.1","qnum":5,"enunciado":"Paciente, feminino, 52 anos, procura UBS referindo sangramento genital há 03 meses, em pequena quantidade, sem outras queixas. Informa que a menopausa foi aos 45 anos e não faz uso de terapia hormonal. Realizado exame ginecológico, sem alterações. Solicitado ultrassonografia transvaginal que evidenciou útero com volume de 51 cm³ (referência 50-90 cm³) e eco endometrial de 6 mm (referência até 4 mm) . Assinale a alternativa que apresenta a conduta mais adequada a ser seguida.","alternativas":[{"letra":"A","texto":"Solicitar a histeroscopia ambulatorial."},{"letra":"B","texto":"Iniciar terapia hormonal com estrogênio conjugado para controle do sangramento."},{"letra":"C","texto":"Indicar histerectomia total imediata por alto risco de neoplasia endometrial."},{"letra":"D","texto":"Realizar ablação endometrial ambulatorial como medida diagnóstica e terapêutica."}],"correta":"A","resposta":"O sangramento na pós-menopausa deve sempre ser valorizado e investigado. O enunciado da questão já nos fornece a investigação inicial com a ultrassonografia transvaginal, demonstrando um endométrio de 6 mm. O padrão-ouro para a investigação é a histeroscopia ambulatorial, onde é possível olhar a cavidade endometrial e biopsiar áreas suspeitas. Não devemos indicar imediatamente a histerectomia sem saber a causa deste sangramento e não devemos medicar a paciente com estrogênio, pois o mesmo está implicado na gênese das hiperplasias de endométrio.","needs_distractors":true},{"year":"2024.1","qnum":6,"enunciado":"Paciente feminina, 16 anos, vai à consulta psiquiátrica, devido à queixa inicial de ansiedade. Está acompanhada dos pais, os quais relatam, na ausência da paciente, que observaram mudança no comportamento alimentar. Afirmam que a paciente passou a comer escondida, muito rapidamente, em grandes quantidades e demonstra vergonha quando é vista nessa situação, aparentando tristeza após alimentar-se e comer até se sentir desconfortável. Dentre os tipos de Transtornos Alimentares, o provável diagnóstico é:","alternativas":[{"letra":"A","texto":"Compulsão alimentar."},{"letra":"B","texto":"Anorexia nervosa restritiva."},{"letra":"C","texto":"Bulimia nervosa."},{"letra":"D","texto":"Transtorno alimentar restritivo-evitativo (TARE)."}],"correta":"A","resposta":"Os episódios de compulsão alimentar estão associados a três (ou mais) dos seguintes critérios:\\n\\n1. comer muito e mais rapidamente do que o normal; 2. comer até sentir-se incomodamente repleto; 3. comer grandes quantidades de alimentos, quando não está fisicamente faminto; 4. comer sozinho por embaraço devido à quantidade de alimentos que consome; 5. sentir repulsa por si mesmo, depressão ou demasiada culpa após comer excessivamente. Acentuada angústia relativa à compulsão alimentar.","needs_distractors":true},{"year":"2024.1","qnum":7,"enunciado":"Uma gestante, com 38 semanas de idade gestacional, G4P3A0, com histórico de partos por via vaginal prévios, é admitida na sala de parto com contrações uterinas regulares a cada 3 minutos, duração de 60 segundos e intensidade moderada. Informa início do trabalho de parto há 5 horas. No exame físico, apresenta dilatação cervical de 8 centímetros e bolsa amniótica íntegra. O monitoramento fetal mostra uma frequência cardíaca fetal normal e reativa. Qual é a conduta mais adequada neste momento?","alternativas":[{"letra":"A","texto":"Encorajar a paciente a continuar com a respiração profunda e técnicas de relaxamento enquanto aguarda a dilatação completa."},{"letra":"B","texto":"Realizar amniotomia imediata para acelerar o trabalho de parto."},{"letra":"C","texto":"Indicar cesariana de emergência por suspeita de desproporção céfalo-pélvica."},{"letra":"D","texto":"Iniciar ocitocina endovenosa para potencializar as contrações uterinas."}],"correta":"A","resposta":"Esse caso clínico descreve uma gestante multípara em trabalho de parto ativo, com dilatação cervical de 8 centímetros, contrações regulares, bolsa amniótica íntegra e monitoramento fetal normal. Para escolher a melhor conduta, é importante considerar o manejo adequado do trabalho de parto ativo. Cesariana de Emergência: Não é indicado neste momento. A paciente está em trabalho de parto ativo, e a cesariana não é necessária, pois não há indicação de sofrimento fetal agudo ou complicações maternas. Continuar técnicas de relaxamento: Esta é uma opção viável. Como a dilatação cervical está avançada e o trabalho de parto está progredindo bem, encorajar a paciente a continuar com técnicas de respiração e relaxamento pode ajudar a lidar com a dor e facilitar a progressão do trabalho de parto. Analgesia Epidural: Embora a analgesia epidural seja uma opção para alívio da dor durante o trabalho de parto, administrá-la imediatamente pode não ser necessário neste momento. A paciente está bem progressão do trabalho de parto, e a dor é de intensidade moderada. A decisão de administrar analgesia epidural deve ser baseada na preferência da paciente e no progresso do trabalho de parto.\\n\\nAmniotomia: A amniotomia pode ser considerada se houver necessidade de acelerar o trabalho de parto, mas não é a escolha mais apropriada neste momento. A paciente já está com uma boa dilatação cervical e progressão do trabalho de parto, então a amniotomia pode não ser necessária.","needs_distractors":true},{"year":"2024.1","qnum":8,"enunciado":"Um homem, de 35 anos, chega à unidade de pronto atendimento com queixa de sentimentos de desesperança, tristeza profunda e falta de interesse em suas atividades cotidianas há mais de 6 meses. Ele relata dificuldade em dormir e concentração reduzida. O paciente também menciona pensamentos recorrentes sobre ser um fardo para sua família e amigos. Ao avaliar esse caso, considere as seguintes asserções e a relação proposta entre elas.\\n\\nI. O paciente apresenta síndrome depressiva que é um fator de risco significativo para o suicídio, especialmente quando associada a pensamentos de desesperança e ideação suicida. PORQUE II. Na abordagem deste paciente psiquiátrico em uma unidade de pronto atendimento, é crucial considerar aspectos éticos e legais, como o direito à privacidade e confidencialidade, garantindo a segurança do paciente e de terceiros. A respeito dessas asserções, assinale a opção correta.","alternativas":[{"letra":"A","texto":"As asserções I e II são proposições verdadeiras, mas a II não é uma justificativa da I."},{"letra":"B","texto":"As asserções I e II são proposições verdadeiras, e a II é uma justificativa correta da I."},{"letra":"C","texto":"A asserção I é uma proposição verdadeira, e a II é uma proposição falsa."},{"letra":"D","texto":"As asserções I e II são proposições falsas."}],"correta":"A","resposta":"A asserção I é verdadeira, pois a síndrome depressiva está fortemente associada ao risco de suicídio, especialmente quando acompanhada de ideação suicida e sentimentos de desesperança. A asserção II também é verdadeira, pois a abordagem do paciente psiquiátrico em uma unidade de pronto atendimento requer consideração cuidadosa de aspectos éticos e legais, incluindo o direito à privacidade e confidencialidade do paciente, bem como a garantia da segurança do paciente e de terceiros.","needs_distractors":true},{"year":"2024.1","qnum":9,"enunciado":"Considere uma criança do sexo masculino, 7 anos de idade, com queixas dos pais de dificuldade de atenção e agitação. Apresenta baixo engajamento a atividades cognitivas, troca frequente de atividades, fácil distração com estímulos externos e dificuldade de se concentrar em atividades que exijam maior esforço mental. O conjunto dos elementos apresentados afetam o seu funcionamento em dois ambientes (casa e escola). Considerando a possibilidade diagnóstica de Transtorno de Déficit de Atenção e Hiperatividade (TDAH) assinale o que deve ser levado em consideração na elaboração de um plano terapêutico?","alternativas":[{"letra":"A","texto":"É recomendável acompanhamento com psicoterapia (terapia cognitivo comportamental) e psicopedagogia visando reversão de comportamentos indesejáveis e promoção de adaptações pedagógicas seguindo um plano individual de intervenção."},{"letra":"B","texto":"Iniciar imediatamente metilfenidato em dose plena, sem necessidade de avaliação multidisciplinar adicional."},{"letra":"C","texto":"Encaminhar exclusivamente para neuropediatra para realização de eletroencefalograma e ressonância magnética."},{"letra":"D","texto":"Orientar apenas mudanças disciplinares rígidas em casa e na escola, sem necessidade de acompanhamento psicológico."}],"correta":"A","resposta":"Os psicoestimulantes, como o metilfenidato e as anfetaminas, são frequentemente considerados a primeira linha de tratamento no TDAH, devido à sua eficácia comprovada em melhorar os sintomas de desatenção, hiperatividade e impulsividade. Eles podem ser usados tanto em crianças quanto em adultos com TDAH. A ANVISA aprovou o uso de metilfenidato para tratamento de crianças com TDAH acima de 6 anos. É recomendável acompanhamento com psicoterapia (terapia cognitivo comportamental) e psicopedagogia visando reversão de comportamentos indesejáveis e promoção de adaptações pedagógicas seguindo um plano individual de intervenção.","needs_distractors":true},{"year":"2024.1","qnum":10,"enunciado":"Paciente de 38 anos, sexo feminino, procura o atendimento de emergência apresentando quadro de disúria e polaciúria há 05 dias e há 01 dia com dor lombar à direita, de forte intensidade, e vômitos. Ao exame físico encontrava-se em regular estado geral, corada, desidratada 1+/4+, com FC: 110 bpm, temperatura axilar 38,5 ºC, PA: 110/70 mmHg. Abdome flácido, doloroso à palpação superficial e profunda em hipogastro, sem massas ou visceromegalias e punho percussão lombar positiva à direita. Realizados exames que seguem abaixo:\\n\\nHemograma: Hemoglobina 13,7g/dL; Hematocrito 41%; leucócitos 18.640mm3; segmentados 13420; bastões 2170; plaquetas 310.000μl.\\n\\nEAS: piócitos 17.0000; hemácias 8; nitrito positivo e bactérias presentes. Urocultura em andamento. Paciente foi internada para tratamento. Assinale a alternativa que contem a conduta correta para a paciente:","alternativas":[{"letra":"A","texto":"Dieta livre, SF 0,9% 500 ml EV 8/8 h, Ceftriaxone 1 g EV de 12/12 h, ondansetrona endovenosa de 8/8 h se náuseas ou vômitos, dipirona endovenosa de 6/6 h se dor ou febre."},{"letra":"B","texto":"Alta hospitalar com ciprofloxacino oral 500mg de 12/12h por 7 dias e retorno ambulatorial."},{"letra":"C","texto":"Dieta livre, hidratação oral, sulfametoxazol-trimetoprim oral 12/12h por 7 dias e analgesia com paracetamol."},{"letra":"D","texto":"Dieta zero, SF 0,9% 1000ml EV em bolus, vancomicina + meropenem EV e analgesia com morfina."}],"correta":"A","resposta":"O caso exposto se refere ao diagnóstico de pielonefrite. A paciente em questão apresenta sinais clínicos da doença, como sintomas urinários, associado a febre, dor lombar, náuseas e vômitos. Ao exame físico foi observada a manobra de Giordano positiva. Estes dados associados aos exames, que demonstram leucocitose com desvio a esquerda e exame de urina com leucocitúria, presença de bactérias e nitrito positivo, corroboram com a hipótese diagnóstica. Frente a isso, é necessário o tratamento com antibioticoterapia, e como a paciente em questão apresenta vômitos e desidratada, o tratamento hospitalar com antibioticoterapia endovenosa é a opção de escolha, sendo portanto a alternativa \\"Dieta livre, SF 0,9% 500 ml EV 8/8 h, Ceftriaxone 1 g EV de 12/12 h, ondansetrona endovenosa de 8/8 h se náuseas ou vômitos, dipirona endovenosa de 6/6 h se dor ou febre.\\" correta.","needs_distractors":true},{"year":"2024.1","qnum":11,"enunciado":"Um homem, de 58 anos, chega ao pronto-socorro relatando episódios de melena nas últimas 48 horas. Ele tem um histórico de cirrose hepática devido ao consumo crônico de álcool. Nos últimos dias, notou-se palidez e fadiga crescente. Ao exame físico, o paciente está taquicardíaco (110 bpm) e hipotenso (90/60 mmHg), com palidez cutaneomucosa evidente. Não há icterícia ou alterações hepáticas à palpação. Os exames laboratoriais mostram:\\n\\nHemoglobina: 7 g/dL Hematócrito: 21% Leucócitos: 12.000/mm³ Plaquetas: 100.000/mm³ Ureia: 50 mg/dL (elevada) Creatinina: 1,2 mg/dL Tempo de protrombina (TP): 16 segundos (controle: 11 segundos) Baseado no cenário clínico e nos resultados laboratoriais fornecidos, qual é a abordagem inicial mais apropriada para o manejo deste paciente?","alternativas":[{"letra":"A","texto":"Realizar transfusão de concentrado de hemácias e terapia com inibidores de bomba de prótons."},{"letra":"B","texto":"Realizar paracentese diagnóstica e iniciar antibioticoterapia empírica com norfloxacino."},{"letra":"C","texto":"Iniciar betabloqueador (propranolol) oral e encaminhar para endoscopia eletiva em 30 dias."},{"letra":"D","texto":"Indicar TIPS (shunt portossistêmico intra-hepático transjugular) como primeira medida terapêutica."}],"correta":"A","resposta":"A abordagem inicial para um paciente com evidências clínicas e laboratoriais de hemorragia digestiva alta e anemia aguda deve incluir a estabilização hemodinâmica e medidas para controlar a fonte da hemorragia. A transfusão de concentrado de hemácias é indicada devido à anemia aguda significativa e ao estado hemodinâmico comprometido do paciente, visando restaurar a capacidade de transporte de oxigênio do sangue. A terapia com inibidores de bomba de prótons por via intravenosa é recomendada para reduzir a acidez gástrica e promover a estabilidade dos coágulos, auxiliando na prevenção de mais sangramentos, especialmente em pacientes com risco de hemorragia por varizes esofágicas ou úlcera péptica. Justificativa das alternativas incorretas:\\n\\nA administração de concentrado de plaquetas não é indicada nesse cenário sem evidência de trombocitopenia severa ou disfunção plaquetária ativa. Embora a terapia com inibidores de bomba de prótons seja parte importante do manejo, por si só não aborda a necessidade imediata de correção da anemia aguda e estabilização hemodinâmica e a endoscopia digestiva alta é crucial para identificar a fonte da hemorragia e potencialmente tratá-la, mas deve ser realizada após a estabilização inicial do paciente. A administração de fluidos cristaloides, como a solução de Ringer lactato, é importante para a ressuscitação volêmica, mas deve ser acompanhada por outras medidas para corrigir a anemia e controlar o sangramento.","needs_distractors":true},{"year":"2024.1","qnum":12,"enunciado":"Criança de 3 anos é trazida pela mãe, uma jovem de 16 anos, à consulta na Unidade de Pronto Atendimento porque está sonolenta. Segundo a mãe, a criança apresenta choro fraco. Negou queda ou traumatismo craniano. Ao exame: hipoativo, hiporresponsivo, bradicárdico e bradipneico. Ao exame ocular nota-se pequenas hemorragias retinianas. Qual a principal hipótese e o exame que deve ser solicitado para sua confirmação?","alternativas":[{"letra":"A","texto":"Síndrome do bebê sacudido e tomografia computadorizada de crânio."},{"letra":"B","texto":"Crise convulsiva afebril e eletroencefalograma."},{"letra":"C","texto":"Meningite bacteriana e punção lombar com análise de líquor."},{"letra":"D","texto":"Intoxicação medicamentosa acidental e dosagem sérica de toxinas."}],"correta":"A","resposta":"Trata-se de um caso de maus-tratos, cursando em uma “síndrome do bebê sacudido”. Atualmente, a “síndrome do bebê sacudido” é uma das principais causas evitáveis de traumas cranianos fatais em crianças menores de 2 anos. Trata-se de lesão craniana e/ou de estruturas intracranianas em menores de 5 anos decorrentes de sacudidas violentas e/ou impacto abrupto que envolve impacto e/ou esmagamento das estruturas cerebrais da criança causada por aceleração, desaceleração e força de rotação. O diagnóstico precoce é essencial; o sinal de alerta mais importante é a inconsistência entre a história clínica e o exame físico. Os achados físicos mais frequentes são: hematoma subdural, hemorragias na retina e fraturas cranianas, de costelas e outras. O quadro mais “leve” apresenta palidez, olhar letárgico, vômitos, irritabilidade e/ou sonolência. O quadro mais grave pode apresentar coma, parada cardiorrespiratória, apneia, bradicardia, hemorragias retiniana, convulsões e/ou sinais de hipertensão intracraniana, evidenciados pela tomografia computadorizada de crânio. A TC de crânio também pode apresentar sinais de fraturas cranianas. Radiografia de crânio não estabelece o diagnóstico. Os casos leves de síndrome do bebê sacudido não costumam mostrar sintomas de alerta. No entanto, a criança pode manifestar problemas de saúde posteriores ou transtornos do comportamento.","needs_distractors":true},{"year":"2024.1","qnum":13,"enunciado":"Um homem, de 45 anos, apresenta-se à Unidade de Pronto Atendimento referindo dor lombar intensa à direita. Ele relata episódios prévios de litíase renal, mas sem intervenção cirúrgica. A tomografia computadorizada sem contraste revela a presença de um cálculo de 8 mm no ureter proximal direito com sinais de hidronefrose moderada. O paciente relata dor persistente, apesar do tratamento analgésico adequado e, tem um episódio de febre de 38,5°C, sugerindo uma possível infecção do trato urinário superior associada. Exames laboratoriais mostram leucocitose e leve elevação da creatinina sérica. Considerando o quadro clínico e os achados radiológicos do paciente, qual é a abordagem terapêutica inicial mais apropriada para esse caso?","alternativas":[{"letra":"A","texto":"Implante de cateter duplo J e tratamento da infeção."},{"letra":"B","texto":"Litotripsia extracorpórea por ondas de choque (LECO) de urgência."},{"letra":"C","texto":"Antibioticoterapia ambulatorial e seguimento em 30 dias para avaliação cirúrgica."},{"letra":"D","texto":"Nefrolitotomia percutânea imediata para retirada do cálculo."}],"correta":"A","resposta":"Implante de cateter duplo J e tratamento da infecção é a abordagem correta porque:\\n\\nO paciente apresenta um quadro de cálculo ureteral de 8 mm com hidronefrose e sinais de infecção (febre, leucocitose, elevação da creatinina sérica), indicando uma situação urgente que pode evoluir para urosepsis se não tratada adequadamente. A prioridade é aliviar a obstrução urinária para permitir a drenagem da urina, aliviando a pressão sobre o rim afetado e tratando a infecção. O implante de um cateter duplo J permite essa drenagem, e o tratamento da infecção (geralmente com antibióticos) é fundamental para resolver o quadro infeccioso e inflamatório. Por que as outras alternativas estão incorretas:\\n\\nLitotripsia extracorpórea por ondas de choque (LEOC):\\n\\nA LEOC é um tratamento não invasivo para cálculos renais menores e localizados no rim, que não requer cirurgia. No entanto, não é a abordagem mais adequada em casos de obstrução associada a sinais de infecção, pois não alivia imediatamente a obstrução. Nefrolitotomia percutânea (NLP):\\n\\nA NLP é indicada para cálculos renais grandes (geralmente maiores que 2 cm) localizados no rim. Não é a escolha ideal para cálculos ureterais, especialmente em um contexto de infecção aguda e obstrução. Cirurgia aberta para remoção do cálculo:\\n\\nA cirurgia aberta é muito raramente usada hoje em dia devido ao desenvolvimento de técnicas menos invasivas e mais seguras. Seria considerada apenas em casos muito complexos que não podem ser resolvidos com métodos menos invasivos. Além disso, a cirurgia aberta não aborda imediatamente a necessidade de aliviar a obstrução urinária e tratar a infecção.","needs_distractors":true},{"year":"2024.1","qnum":14,"enunciado":"Paciente, de 49 anos, vem a consulta no ambulatório de ginecologia com queixa de sangramento vaginal volumoso que evolui com hemoglobina de 8,9 e ferritina de 11. Já fez uso de anticoncepcionais orais diversos, assim como reposições de ferro oral, mas sem repercussão clínica significativa. É obesa e já fez uso de tamoxifeno. Assinale a alternativa que contém o diagnóstico mais provável e o tratamento mais adequado para o caso em questão.","alternativas":[{"letra":"A","texto":"O uso de tamoxifeno, assim como a presença de obesidade são fatores de risco para o crescimento de pólipos endometriais e a polipectomia é um tratamento eficaz."},{"letra":"B","texto":"O uso de tamoxifeno está associado à atrofia endometrial, e a conduta indicada é apenas o seguimento clínico."},{"letra":"C","texto":"A presença de pólipo endometrial é contraindicação absoluta à polipectomia histeroscópica, sendo necessária histerectomia."},{"letra":"D","texto":"Pólipos endometriais em pacientes em uso de tamoxifeno são sempre benignos, dispensando avaliação anatomopatológica."}],"correta":"A","resposta":"O enunciado não menciona o uso de DIU, mas é uma pergunta que deve ser feita na anamnese. O DIU de cobre de fato pode gerar sangramento excessivo, mas pode ser tirado ambulatorialmente sem necessidade de histeroscopia. A obesidade e o uso prévio de tamoxifeno são fatores de risco para pólipos e o método de escolha para o tratamento dos pólipos sintomáticos é a histeroscopia cirúrgica com polipectomia. O sangramento da paciente pode ser justificado sim por miomas, porém a história e os fatores de risco apresentados não têm ligação com o surgimento, além de não haver correlação de leiomioma com adenocarcinoma. A paciente não tem clínica sugestiva de adenomiose (menstruação dolorosa).","needs_distractors":true},{"year":"2024.1","qnum":15,"enunciado":"Um paciente de 35 anos chega à unidade de saúde com febre intermitente, calafrios, sudorese profusa e dor de cabeça intensa. Ele relata que há duas semanas retornou de uma viagem a uma região endêmica para malária. Durante o exame físico, o médico observa icterícia leve e esplenomegalia. Com base nessas informações e nos seus conhecimentos sobre malária, analise as afirmações abaixo.\\n\\nI. O médico deverá solicitar uma contagem de plaquetas e um esfregaço de sangue periférico para identificação de Plasmodium spp. Se confirmada a malária, iniciar tratamento com antipalúdicos. Se não confirmada, investigar outras causas de febre.\\n\\nII. Prescrever antipiréticos e orientar repouso, monitorando a evolução dos sintomas. Caso a febre persista por mais de 48 horas, realizar uma punção lombar para descartar meningite.\\n\\nIII. Encaminhar o paciente para um especialista em doenças tropicais para avaliação mais detalhada. Aguardar resultados de exames laboratoriais antes de iniciar qualquer tratamento. É correto o que se afirma em:","alternativas":[{"letra":"A","texto":"I."},{"letra":"B","texto":"II."},{"letra":"C","texto":"III."},{"letra":"D","texto":"I e II."}],"correta":"A","resposta":"A abordagem correta para um paciente com sinais clínicos de malária, especialmente vindo de uma região endêmica, é realizar testes específicos para confirmar o diagnóstico. A contagem de plaquetas e o esfregaço de sangue periférico são essenciais para identificar a presença de parasitas Plasmodium spp. Se confirmada a malária, o tratamento com antipalúdicos deve ser iniciado imediatamente. Caso contrário, outras causas de febre devem ser investigadas.","needs_distractors":true},{"year":"2024.1","qnum":16,"enunciado":"Manoel, 60 anos comparece a sua UBS com relato que manteve relação extra conjugal com uma conhecida, Mariana, há 1 dia. Ele relata preocupação, pois ouviu boatos em sua vizinhança de que Mariana tinha “doenças da rua”. Ao ser indagado, Manoel relata que não usou preservativos e que não se recorda direito dos fatos pois estava alcoolizado. Frente ao caso, a conduta mais adequada seria","alternativas":[{"letra":"A","texto":"iniciar PEP após teste rápido para HIV negativo e solicitar rastreio para demais ISTs."},{"letra":"B","texto":"iniciar tratamento empírico para sífilis com penicilina benzatina sem necessidade de testes diagnósticos."},{"letra":"C","texto":"aguardar resultado do teste de HIV em 30 dias antes de iniciar qualquer profilaxia."},{"letra":"D","texto":"iniciar PrEP (profilaxia pré-exposição) com tenofovir e emtricitabina por 6 meses."}],"correta":"A","resposta":"Estamos frente a um caso de um paciente que preenche critérios de eleição para receber profilaxia pós exposição. O início da terapia pós exposição deve ser realizado, preferencialmente, nas primeiras duas horas após exposição e, no máximo, 72 horas após. A contraindicação para o início da terapia é em pacientes que já tenham o diagnóstico de HIV, logo se o teste rápido positivar o paciente deixa de ser um candidato a terapia. Vale ressaltar que as sorologias solicitadas de demais ISTs não devem atrasar o início da terapia PEP.","needs_distractors":true},{"year":"2024.1","qnum":17,"enunciado":"Um menino, de 7 anos, é levado ao consultório pediátrico pelos pais devido à edema periorbital e periférico progressivo há cerca de duas semanas. Os pais relatam que o menino também tem apresentado urina espumosa e perda de apetite, recentemente. Não há histórico de febre, infecções recentes ou trauma. Ao exame físico, são observados edema periorbital e periférico e ascite. A análise de urina revela proteinúria de 24 horas maciça (> 3,5 g/dia), relação proteína/creatinina urinária > 3,5 g/dia e lipidúria. A função renal é normal. Qual é o diagnóstico mais provável para este paciente?","alternativas":[{"letra":"A","texto":"Síndrome Nefrótica."},{"letra":"B","texto":"Síndrome Nefrítica."},{"letra":"C","texto":"Insuficiência cardíaca congestiva."},{"letra":"D","texto":"Hipoalbuminemia secundária à desnutrição protéico-calórica."}],"correta":"A","resposta":"Esse caso clínico descreve um menino, de 7 anos, com edema progressivo nos membros e periorbital, urina espumosa, proteinúria maciça e lipidúria. É importante diferenciar a síndrome nefrótica de outras condições com manifestações semelhantes em crianças. Síndrome Nefrótica: A síndrome nefrótica é uma condição caracterizada por proteinúria maciça (> 3,5 g/dia), hipoalbuminemia, edema periférico e lipidúria. Os sintomas descritos são consistentes com esta condição. Glomerulonefrite Aguda: A glomerulonefrite aguda geralmente se apresenta com hematúria, hipertensão arterial, oligúria e sinais de infecção recente, como faringite estreptocócica. Não é comum manifestar-se com proteinúria maciça e hipoalbuminemia significativa. Insuficiência Renal Crônica: A insuficiência renal crônica pode causar proteinúria, mas geralmente está associada a outros achados, como alterações na função renal e crescimento inadequado. Além disso, a proteinúria maciça é menos comum na insuficiência renal crônica em comparação com a síndrome nefrótica. Proteinúria Benigna: A proteinúria benigna é uma condição autolimitada e assintomática que geralmente não causa edema ou hipoalbuminemia significativa.","needs_distractors":true},{"year":"2024.1","qnum":18,"enunciado":"Você atende em uma Unidade Básica de Saúde uma adolescente de 16 anos com seu filho nascido há 14 dias em maternidade pública de sua cidade. A criança nasceu de parto normal, com 2980Kg em boas condições, está em aleitamento materno exclusivo e nas últimas 24 horas apresentou 02 vômitos com sangue. A mãe relata dores importantes quando vai amamentar principalmente em mama esquerda. Está intercalando fórmula láctea com leite materno com a ajuda da avó pois a mãe se apresenta desanimada, com pouca interação com recém-nascido e com aspecto entristecido. Afirma que não consegue dormir bem pois a criança chora bastante. O exame físico da criança é normal e o exame das mamas revela presença de fissura em mama direita discreta e outra fissura em mama esquerda de maior tamanho com discreto sangramento local. A mãe nega febre e não há hiperemia na região das mamas. Diante de tal situação, assinale a alternativa que apresenta a melhor conduta a ser tomada.","alternativas":[{"letra":"A","texto":"Encaminhamento para avaliação psicológica e uso de antidepressivos + Cefalexina oral por 7 a 10 dias + bolsa de gelo local + esvaziamento da mama + manter aleitamento materno."},{"letra":"B","texto":"Apenas orientação sobre amamentação e compressas frias, sem necessidade de antibioticoterapia ou avaliação psicológica."},{"letra":"C","texto":"Suspensão imediata do aleitamento materno + amoxicilina-clavulanato oral por 14 dias + observação dos sintomas depressivos."},{"letra":"D","texto":"Internação psiquiátrica compulsória + drenagem cirúrgica da mama + suspensão do aleitamento materno definitivamente."}],"correta":"A","resposta":"Trata-se de uma mastite, situação que mais comumente ocorre após 2 a 3 semanas. É uma situação com potencial risco infeccioso e formação de abscesso mamário, por isso a indicação de antimicrobianos. O uso de bolsa de gelo ajuda a reduzir o processo inflamatório e é importante o esvaziamento da mama para evitar ingurgitamento mamário e causar mais dor. Por fim é indicado a manutenção da amamentação com a pega adequada pelo recém-nascido. Há necessidade de avaliação rápida de psicólogo uma vez que a mãe apresenta sinais sugestivos de depressão pós-parto, bem como iniciar antidepressivos para uma resposta mais rápida e retorno dos cuidados adequados ao RN. O apoio da família também é fundamental, sendo a mesma orientada para tal.","needs_distractors":true},{"year":"2024.1","qnum":19,"enunciado":"Mulher, 28 anos, primigesta, deu à luz um bebê saudável por parto vaginal, há três dias. Ela se apresenta ao consultório médico para uma consulta pós-parto de rotina. Durante o exame físico, os lóquios são observados, com características fisiológicas, no momento. A paciente relata sentir-se bem, sem febre ou dor pélvica. Com base no caso clínico, os lóquios evidenciados, apresentam como características:","alternativas":[{"letra":"A","texto":"aspecto sanguinolento com mudança gradual para uma cor esbranquiçada ou amarelada, nos próximos dias."},{"letra":"B","texto":"aspecto amarelado desde o início, sem alteração de cor nos próximos dias."},{"letra":"C","texto":"aspecto purulento com odor fétido, indicando endometrite puerperal."},{"letra":"D","texto":"aspecto serossanguíneo apenas até o segundo dia, com cessação completa após 72 horas do parto."}],"correta":"A","resposta":"Os lóquios são a descarga vaginal normal que ocorre após o parto devido ao processo de cicatrização do útero. No puerpério normal, os lóquios passam por várias fases, refletindo o processo de involução uterina. Nos primeiros dias após o parto, os lóquios são predominantemente sanguinolentos devido à presença de sangue residual do processo de cicatrização do útero. Com o tempo, a descarga muda de cor para uma tonalidade esbranquiçada ou amarelada, refletindo a transição para fases mais tardias do puerpério. Lóquios verdes e malcheirosos são sinais de infecção uterina, não são características normais do puerpério. Os lóquios não são predominantemente amarelados no puerpério normal, e uma resposta inflamatória significativa não é esperada. Lóquios claros e aquosos não são indicativos do puerpério normal. Com 72 horas pós-parto é esperado secreção sanguinolenta.","needs_distractors":true},{"year":"2024.1","qnum":20,"enunciado":"Gestante, 25 anos, em consulta de pré-natal, na UBS, apresenta nos exames avaliados, titulação do VDRL de 1:8. Não relata história de sífilis prévia ou tratamento prévio para sífilis. A conduta mais apropriada para essa gestante é:","alternativas":[{"letra":"A","texto":"Solicitar um teste treponêmico para confirmar o diagnóstico de sífilis."},{"letra":"B","texto":"Iniciar imediatamente penicilina benzatina 2.400.000 UI em dose única sem necessidade de testes confirmatórios."},{"letra":"C","texto":"Considerar resultado falso positivo e repetir o VDRL em 30 dias sem necessidade de tratamento."},{"letra":"D","texto":"Encaminhar a gestante para infectologista e aguardar avaliação especializada antes de qualquer conduta."}],"correta":"A","resposta":"Iniciar imediatamente o tratamento com penicilina benzatina: Não é apropriado iniciar o tratamento sem confirmação do diagnóstico de sífilis. A titulação de VDRL de 1:8 pode ser positiva em outras condições não relacionadas à sífilis, e o tratamento com penicilina deve ser reservado para casos confirmados. Solicitar um teste treponêmico para confirmar o diagnóstico de sífilis: Esta é a conduta mais apropriada. Os testes treponêmicos são mais específicos e podem confirmar o diagnóstico de sífilis. Uma vez que o teste treponêmico seja positivo, confirma-se o diagnóstico de sífilis e o tratamento adequado pode ser iniciado. Repetir o teste de VDRL em 4 semanas para verificar se houve aumento da titulação:","needs_distractors":true},{"year":"2024.1","qnum":21,"enunciado":"Um paciente, de 35 anos, com Síndrome da Imunodeficiência Adquirida apresenta-se com enterorragia na UBS. Sua PA inicial é 80x60mmHg e a FC = 120bpm. Após ressuscitação com volume, a pressão sobe a 120x80mmHg e a FC = 80bpm. O médico de família faz o encaminhamento para a UPA. Uma sonda nasogástrica é passada e não há saída de sangue do estômago. O próximo passo para o manejo desse paciente é","alternativas":[{"letra":"A","texto":"colonoscopia."},{"letra":"B","texto":"endoscopia digestiva alta."},{"letra":"C","texto":"arteriografia mesentérica seletiva."},{"letra":"D","texto":"cintilografia com hemácias marcadas com tecnécio-99m."}],"correta":"A","resposta":"A sonda nasogástrica sem débito sanguinolento confirma que não há sangramento alto com chance de acerto de cerca de 85%. Nesse caso, diante de um paciente com suposta HDB e estabilizado, é indicada a colonoscopia como próximo exame diagnóstico e potencialmente terapêutico. A Cintilografia não tem potencial de tratamento e, assim como a arteriografia requer um volume de sangramento mínimo persistente para localizar a fonte. São exames que ficam reservados para o insucesso da colonoscopia. A laparotomia exploradora é conduta de exceção para casos que persistem sangrando a despeito de todas as outras medidas.","needs_distractors":true},{"year":"2024.1","qnum":22,"enunciado":"Paciente, de 6 anos, sexo feminino, com história prévia de hepatopatia, é admitida no pronto- socorro com hematemese e hematoquezia. Ao exame encontrava-se com palidez intensa, sonolenta com oscilação do nível de consciência, frequência cardíaca de 150 bpm, pressão arterial sistólica de 70 mmHg, frequência respiratória de 24 irpm, temperatura axilar de 37,2°C, tempo de enchimento capilar de 4 segundos e saturação de oxigênio de 93% em ar ambiente. Ausculta pulmonar e ausculta cardíaca sem alterações. Abdome apresentava sons hidroaéreos normais e ausência de massas palpáveis ou sinais de peritonite. Assinale a alternativa que apresenta o provável diagnóstico e a conduta inicial mais apropriada para esta paciente de acordo com o *Pediatric Advanced Life Support (PALS) 2022.","alternativas":[{"letra":"A","texto":"Choque hipovolêmico hemorrágico hipotensivo. Realizar uma avaliação primária ABCDE; iniciar a administração de fluidos intravenosos e medidas para controle do sangramento, como administração de terapia vasoativa e transfusão de hemocomponentes conforme necessidade, antes de qualquer intervenção endoscópica ou exame de imagem."},{"letra":"B","texto":"Choque cardiogênico. Realizar ecocardiograma de urgência e iniciar drogas vasoativas (noradrenalina) antes de qualquer reposição volêmica."},{"letra":"C","texto":"Choque séptico. Iniciar antibioticoterapia de amplo espectro e droga vasoativa, e encaminhar diretamente para a endoscopia digestiva alta diagnóstica e terapêutica."},{"letra":"D","texto":"Choque distributivo neurogênico. Realizar tomografia de crânio de urgência e iniciar corticoterapia em altas doses antes de qualquer outra intervenção."}],"correta":"A","resposta":"Trata-se de um choque hipovolêmico de causa hemorrágica em paciente hipotenso, onde a provável causa é por varizes de esôfago sangrantes decorrente de uma hipertensão portal por hepatopatia crônica como referido enunciado. Nesse caso a abordagem inicial de acordo com o protocolo PALS 2022, seria a alternativa que enfatiza a avaliação primária ABCDE e o início das medidas para controle do sangramento, como administração de terapia vasoativa e transfusão de hemocomponentes conforme necessário como nos casos de hipotensão refratária a reposição volêmica. Lembrando que no choque hipovolêmico de causa hemorrágica a transfusão sanguínea deve ser sempre considerada de acordo com o volume estimado de perda sanguínea. A administração de fluidos é importante, mas a prioridade deve ser a estabilização hemodinâmica e o controle do sangramento, com a realização de endoscopia digestiva alta como parte do manejo definitivo das varizes esofágicas sangrantes após estabilização do quadro inicial e não imediatamente. Já a tomografia computadorizada não é indicada como abordagem inicial para pacientes com hemorragia digestiva alta. O controle dos vômitos e a profilaxia com antibióticos podem ser importantes em determinadas situações, mas não são a primeira conduta a ser realizada em pacientes com hemorragia digestiva alta. A terapia vasoativa e a monitorização hemodinâmica são importantes em pacientes instáveis, mas não devem ser a primeira linha de conduta antes da avaliação primária ABCDE e da reposição volêmica, e sim em casos refratários a volume.","needs_distractors":true},{"year":"2024.1","qnum":23,"enunciado":"Uma mulher de 50 anos, casada, costureira, faz uso de Diazepam (20 mg/dia), diariamente, há 15 anos. A medicação foi prescrita no início em unidades de emergência e desde então vem sendo utilizada pela paciente. A paciente não apresenta sinais e sintomas condizentes com transtornos de ansiedade, mas refere não conseguir dormir sem o uso da medicação. Ao consultar sua Médica de Família e Comunidade (MFC), ambas decidem pela retirada da medicação. Qual deve ser a proposta terapêutica?","alternativas":[{"letra":"A","texto":"Retirada gradual da droga visando evitar a precipitação de efeitos colaterais."},{"letra":"B","texto":"Suspensão imediata do diazepam e substituição por antidepressivo (sertralina) para tratamento do quadro de base."},{"letra":"C","texto":"Manter a dose atual de diazepam indefinidamente, pois a dependência já está estabelecida e a tentativa de retirada é contraindicada."},{"letra":"D","texto":"Aumentar a dose de diazepam para 30mg/dia visando melhor controle dos sintomas ansiosos crônicos."}],"correta":"A","resposta":"Alternativa incorreta: Retirada gradual da droga e uso de flumazenil visando prevenir sintomas de abstinência. Após longos períodos de uso de benzodiazepínicas, a sua retirada do esquema terapêutico deve ser lenta e gradual, para evitar a precipitação de sinais e sintomas de abstinência. O flumazenil é uma droga utilizada durante a intoxicação por benzodiazepínicos. Alternativa incorreta: Encaminhamento ao psiquiatra, visto que a dose utilizada é alta e requer manuseio por especialista. O manejo do uso de benzodiazepínicos, assim como sua forma adequada de desprescrição devem fazer parte das habilidades do médico da família, principalmente por ser um medicamento amplamente prescrito por diversas especialidades médicas, sob diversos contextos. Sua faixa terapêutica é entre 5mg ao dia até 60mg ao dia, podendo ser maior em casos específicos. Alternativa correta: Retirada gradual da droga visando evitar a precipitação de efeitos colaterais. A deprescrição deve ser lenta e gradual, podendo levar meses para sua retirada completa nos casos com uso mais prolongado. Alternativa incorreta: Retirada abrupta da droga, pois estudos demonstram que a retirada gradual aumenta a possibilidade de recaídas. A forma correta de retirada é exatamente a oposta, como explicado acima. A retirada deve ser feita em regime ambulatorial, exceto para pacientes que tenham história de abstinência severa, convulsões ou comorbidades importantes. Deve-se trocar o BZD em uso por um de tempo de meia-vida mais longo. A dose não deve ultrapassar o equivalente a 40 mg de diazepam. Divide-se essa dose em 3 tomadas fixas ao longo do dia, e faz-se a redução de 10 a 15% da dose por semana. As tomadas devem ser supervisionadas, e o medicamento deve ficar preferencialmente com algum familiar do paciente. Uma sugestão é a troca do diazepam por clonazepam, visto que este tem apresentação em solução oral, podendo ser titulado em gotas para facilitar a retirada.","needs_distractors":true},{"year":"2024.1","qnum":24,"enunciado":"Um homem de 45 anos chega ao pronto-socorro com queixas de febre alta nos últimos dois dias, dor abdominal intensa no quadrante superior direito e icterícia. O paciente relata que a dor é contínua, piora com a ingestão de alimentos gordurosos e não se alivia com o uso de analgésicos comuns. Além disso, ele menciona um episódio semelhante há cerca de um ano, que se resolveu espontaneamente. No exame físico, observa-se icterícia mucocutânea, sensibilidade à palpação no hipocôndrio direito sem sinais de peritonite e febre de 38,9°C. Exames laboratoriais mostram leucocitose, bilirrubinas totais de 5,2 mg/dL (normal < 1,2 mg/dL), fosfatase alcalina elevada e transaminases levemente elevadas. A ultrassonografia abdominal revela vesícula de paredes finas e conteúdo anecoico, dilatação das vias biliares intra e extra-hepáticas com presença de imagem hiperecóica com sombra acústica digital no colédoco. Com base nas informações apresentadas, qual é o diagnóstico mais provável deste paciente?","alternativas":[{"letra":"A","texto":"Colangite."},{"letra":"B","texto":"Colecistite aguda."},{"letra":"C","texto":"Hepatite viral aguda."},{"letra":"D","texto":"Abscesso hepático piogênico."}],"correta":"A","resposta":"Resposta correta: Colangite.\\n\\nExplicação: O paciente apresenta a tríade clássica de Charcot, que inclui dor abdominal no quadrante superior direito, febre e icterícia, altamente sugestiva de colangite. A dilatação das vias biliares observada na ultrassonografia suporta ainda mais esse diagnóstico. A colangite é uma infecção das vias biliares que requer tratamento imediato para evitar complicações graves. Justificativas das erradas:\\n\\nPancreatite aguda geralmente apresenta dor abdominal epigástrica que irradia para as costas, com níveis significativamente elevados de amilase e lipase, o que não é o caso. Hepatite viral aguda tende a apresentar mal-estar, anorexia e níveis muito elevados de transaminases, diferentemente do apresentado. Colecistite aguda é caracterizada por dor no quadrante superior direito, febre e leucocitose, mas sem icterícia significativa ou dilatação das vias biliares na ausência de cálculos.","needs_distractors":true},{"year":"2024.1","qnum":25,"enunciado":"Mulher, de 42 anos, conhecida da equipe da UBS vem apresentando hemorroidas desde sua última gestação. Sempre sintomática, inclusive já tendo apresentado anteriormente quadro de trombose hemorroidária, é pouco responsiva a todos os tratamentos clínicos já feitos. Ao exame apresenta botões hemorroidários externos. Tendo em vista o quadro clínico apresentado, qual é a conduta mais adequada a ser realizada?","alternativas":[{"letra":"A","texto":"Hemorroidectomia."},{"letra":"B","texto":"Tratamento clínico com fibras dietéticas, banhos de assento e pomadas tópicas indefinidamente."},{"letra":"C","texto":"Ligadura elástica das hemorroidas em ambulatório como primeira opção terapêutica."},{"letra":"D","texto":"Escleroterapia com polidocanol como única conduta indicada nesse caso."}],"correta":"A","resposta":"A questão aborda o tema hemorroidas e os tratamentos preconizados. Sabe-se que, num primeiro momento, a recomendação é modificação da dieta, aumentando a ingesta de fibras e a hidratação hídrica e o uso de produtos tópicos. Esta etapa já foi superada no caso descrito. Caso a paciente realize o tratamento adequadamente e não obtenha resposta, deve ser encaminhada ao coloproctologista para condução cirúrgica do caso. Importante salientar que as complicações, como prolapso e trombose, também são fatores que indicam tratamento cirúrgico. A ligadura elástica é uma alternativa somente para as hemorroidas internas.","needs_distractors":true},{"year":"2024.1","qnum":26,"enunciado":"Gestante chega a maternidade em período expulsivo franco, com sangramento vaginal de grande volume. Refere idade gestacional de 32 semanas. Após as medidas de estabilização térmica, posicionamento e aspiração de vias aéreas superiores, o recém nascido apresentava-se com respiração irregular e frequência cardíaca de 80 batimentos por minuto. A conduta imediata é:","alternativas":[{"letra":"A","texto":"ventilação com pressão positiva com bolsa-valva e máscara com O2 a 30%."},{"letra":"B","texto":"compressões torácicas com frequência de 120 por minuto, sem necessidade de ventilação prévia."},{"letra":"C","texto":"intubação orotraqueal imediata sem tentativa prévia de ventilação não invasiva."},{"letra":"D","texto":"aspiração de vias aéreas inferiores com cânula traqueal antes de qualquer outra intervenção."}],"correta":"A","resposta":"Assim, com base no ILCOR e iniciar a ventilação do RNPT <34 semanas com concentração de O2 de 30%, titulando-se a fração inspirada do gás de acordo com a monitoração da SatO2 pré- ductal.","needs_distractors":true},{"year":"2024.1","qnum":27,"enunciado":"João, um menino de 5 anos, é levado à UBS pelos pais devido a episódios recorrentes de sangramento, especialmente após pequenos traumas ou procedimentos dentários. Ele também apresenta hematomas de forma frequente, mesmo sem história de lesões evidentes. Ao exame observa-se múltiplos hematomas em diferentes estágios, principalmente em áreas de trauma leve, como joelhos e cotovelos. Além disso, os pais relatam que João teve um episódio de sangramento prolongado após uma extração dentária simples. Trazem resultados de exames solicitados em consulta anterior que revelam uma diminuição significativa dos níveis de fator VIII da coagulação. Analisando o quadro clínico e os resultados dos exames, o diagnóstico mais provável seria","alternativas":[{"letra":"A","texto":"Hemofilia A."},{"letra":"B","texto":"Doença de von Willebrand."},{"letra":"C","texto":"Púrpura trombocitopênica imune."},{"letra":"D","texto":"Deficiência de vitamina K."}],"correta":"A","resposta":"O quadro clínico de João, juntamente com a diminuição dos níveis de fator VIII da coagulação, são altamente sugestivos de hemofilia A, um distúrbio hemorrágico hereditário causado por deficiência do fator VIII de coagulação. Os episódios de sangramento recorrente após traumas leves, juntamente com hematomas frequentes e sangramento prolongado após procedimentos invasivos, são indicativos de hemofilia. A anemia falciforme, trombocitopenia imune primária e doença de von Willebrand são descartadas, com base no quadro clínico e nos resultados dos exames.","needs_distractors":true},{"year":"2024.1","qnum":28,"enunciado":"Você é um(a) pediatra em uma Unidade Básica de Saúde e recebeu para avaliação um paciente de 8 anos, acompanhado de seus pais. Eles expressam preocupações com o desenvolvimento social e comunicativo do filho. Segundo relatos, ele demonstra dificuldades significativas em estabelecer contato visual, participar de jogos ou atividades em grupo, e parece não entender regras sociais implícitas. Além disso, o paciente apresenta comportamentos repetitivos e uma necessidade intensa de aderir a rotinas, ficando extremamente perturbado com qualquer mudança. Não há atrasos notáveis no desenvolvimento da linguagem. Com base nessas informações, qual é o diagnóstico mais provável e quais os critérios diagnósticos importantes a serem considerados?","alternativas":[{"letra":"A","texto":"Transtorno do Espectro Autista (TEA): Dificuldades significativas na comunicação social e padrões de comportamento restritivos e repetitivos, sem atrasos da linguagem."},{"letra":"B","texto":"Transtorno de Déficit de Atenção e Hiperatividade (TDAH): predominância de desatenção sem comprometimento da interação social."},{"letra":"C","texto":"Transtorno opositivo-desafiador (TOD): padrão persistente de comportamento desafiador sem alteração na comunicação."},{"letra":"D","texto":"Mutismo seletivo: incapacidade de falar em situações sociais específicas com preservação da linguagem em outros contextos."}],"correta":"A","resposta":"O caso descrito apresenta características clássicas do TEA, incluindo dificuldades na comunicação social e comportamentos restritivos e repetitivos. A ausência de atrasos significativos na linguagem descarta condições como o atraso geral do desenvolvimento e enfatiza a natureza específica do espectro autista, em linha com os critérios diagnósticos estabelecidos no DSM-5 e na CID-11 para o TEA.","needs_distractors":true},{"year":"2024.1","qnum":29,"enunciado":"Uma mulher, de 31 anos, previamente saudável, chega ao pronto-socorro devido a dor epigástrica súbita e intensa e vômitos nas últimas 4 horas. Ela relata que a dor irradia para as costas e começou quando ela estava jantando e bebendo em uma cervejaria local. Sua temperatura é de 37,9°C, o pulso é de 98/min, a respiração é de 19/min e a pressão arterial é de 110/60 mm Hg. O exame abdominal mostra dor na palpação epigástrica sem irritação peritonial. A peristalse está diminuída. Estudos laboratoriais mostram:\\n\\nHematócrito 43% Contagem de leucócitos 9.000/mm3 Na+ 140 mEq/L K+ 4,5 mEq/L Ca2+ 9,0 mg/dL Lipase 980 U/L (N = 14–280) Amilase 152 U/L Alanina aminotransferase (ALT, GPT) 140 U/L A ressuscitação com fluidos intravenosos e a terapia analgésica são iniciadas. Qual o próximo exame está indicado na avaliação desta paciente?","alternativas":[{"letra":"A","texto":"Ultrassonografia do abdômen."},{"letra":"B","texto":"Endoscopia digestiva alta."},{"letra":"C","texto":"Colangiopancreatografia retrógrada endoscópica (CPRE) imediata."},{"letra":"D","texto":"Tomografia computadorizada de abdome com contraste de urgência."}],"correta":"A","resposta":"Dor epigástrica súbita e intensa que se irradia para as costas, vômitos, aumento dos níveis séricos de amilase e lipase sérica três vezes acima do intervalo de referência normal indicam pancreatite aguda. Em pacientes com pancreatite aguda, após tratamento inicial com reposição volêmica intravenosa e analgesia, o próximo passo é avaliar a causa subjacente para planejar tratamento adicional e prevenir recorrência. A causa mais comum de pancreatite aguda é a obstrução biliar. A ultrassonografia abdominal é uma modalidade de imagem altamente sensível para detecção de cálculos biliares no ducto biliar e pancreático e deve ser realizada em todos os pacientes com pancreatite aguda. É importante distinguir a pancreatite biliar de uma etiologia não biliar para orientar o tratamento; a pancreatite biliar é tratada com colecistectomia com ou sem CPRE prévia.\\n\\nDistratores:\\n\\nUma tomografia computadorizada abdominal com contraste é indicada para suspeita de pancreatite aguda apenas quando o diagnóstico é incerto (por exemplo, enzimas pancreáticas minimamente elevadas, sintomas inespecíficos), há características sugestivas de complicações (por exemplo, febre persistente e leucocitose, sem melhora clínica ( após > 7 dias) ou evidência de falência de órgãos após 48–72 horas de terapia), ou para avaliar a etiologia subjacente se os estudos diagnósticos de rotina forem negativos. Nesse ponto, um teste diagnóstico diferente deve ser realizado. Uma radiografia simples de abdome e uma radiografia de tórax são recomendadas como modalidade de imagem inicial em pacientes com abdome agudo com suspeita de perfuração intestinal ou obstrução intestinal. A radiografia não é, entretanto, a modalidade de imagem preferida para confirmar o diagnóstico de pancreatite aguda, que esse paciente provavelmente tem, nem para avaliar a etiologia subjacente. CPRE urgente e esfincterotomia (dentro de 24 horas do início dos sintomas) são recomendadas na pancreatite aguda somente quando há evidência de coledocolitíase (ou seja, CBD dilatado e/ou cálculo no CBD; bilirrubina, ALP e GGT elevadas) e/ou colangite aguda (isto é, febre, icterícia, sinal de Murphy; leucocitose, bilirrubina elevada, ALP e GGT). Esse paciente requer avaliação adicional antes que uma decisão de realizar a CPRE possa ser tomada.","needs_distractors":true},{"year":"2024.1","qnum":30,"enunciado":"Em um dia de trabalho rotineiro na UBS, a médica da unidade atende um paciente apresentando tosse seca há cerca de 01 mês, associada à inapetência e sudorese vespertina. Tabagista de longa data, refere ter saído da reclusão (penitenciária) há cerca de 45 dias. Diante do quadro exposto e da história social, a médica acredita tratar-se de um quadro de tuberculose pulmonar e segue com os procedimentos necessários para diagnóstico e tratamento. Assinale a alternativa que apresenta o meio de diagnóstico e acompanhamento de cura do paciente:","alternativas":[{"letra":"A","texto":"Baciloscopia e Cultura para diagnóstico e Baciloscopia mensal para acompanhamento."},{"letra":"B","texto":"Cultura de escarro apenas, com acompanhamento por radiografia de tórax mensal."},{"letra":"C","texto":"Teste rápido molecular (TRM-TB) para diagnóstico e baciloscopia trimestral para acompanhamento."},{"letra":"D","texto":"Radiografia de tórax para diagnóstico e PPD (Mantoux) mensal para acompanhamento do tratamento."}],"correta":"A","resposta":"","needs_distractors":true},{"year":"2024.1","qnum":31,"enunciado":"Um homem de 65 anos, procura a UBS para um exame de rotina de manutenção da saúde, sendo portador de SIDA, controlada. Nos últimos 6 meses, ele teve um aumento na frequência de evacuações e fezes com sangue ocasionais, além de perda de peso importante. Ele tem hipertensão arterial. Ele fuma um maço de cigarros por dia há 30 anos. Sua temperatura é de 36,5°C, o pulso é de 75/min e a pressão arterial é de 128/75 mm Hg. O exame cardíaco não mostra sopros, atritos ou galopes. Os pulmões estão limpos à ausculta. O abdômen é macio, sem visceromegalias. O exame retal digital mostra uma grande hemorróida interna, grau I. O teste de sangue oculto nas fezes é positivo. Assinale a alternativa que indica o próximo passo mais apropriado .","alternativas":[{"letra":"A","texto":"Colonoscopia."},{"letra":"B","texto":"Pesquisa de sangue oculto nas fezes em três amostras seriadas."},{"letra":"C","texto":"Retossigmoidoscopia flexível."},{"letra":"D","texto":"Enema opaco (clister opaco) com bário."}],"correta":"A","resposta":"Mudanças nos hábitos intestinais e hematoquezia em um homem idoso com histórico de tabagismo devem levantar suspeita de um câncer colorretal. A colonoscopia é o teste diagnóstico padrão ouro para câncer colorretal porque permite a visualização direta e a biópsia de pólipos e lesões suspeitas. Dada a idade deste paciente (> 65 anos), histórico de tabagismo e mudança recente nos hábitos fecais com hematoquezia, o câncer colorretal é o diagnóstico mais preocupante e deve ser descartado. Embora a hemorróida interna não tenha prioridade sobre o diagnóstico e tratamento do câncer colorretal, ela merece intervenção neste paciente para prevenir a progressão e porque pode estar contribuindo para sua hematoquezia. Como é uma hemorróida interna grau I, a terapia conservadora (por exemplo,laxantes, aconselhamento dietético) também seria necessária. BMJ Best Practice - Hemorroidas - última atualização 03 jan 2020","needs_distractors":true},{"year":"2024.1","qnum":32,"enunciado":"Paciente masculino, 68 anos, 70 kg, é internado na enfermaria cirúrgica após realizar ressecção transuretral de próstata. O procedimento foi realizado há 24 horas, sem intercorrências. O plantão médico do andar foi acionado após crise convulsiva única presenciada pela enfermagem. Não há história previa de crise convulsiva. Realizado tomografia de crânio, que não evidenciou alterações agudas. No momento da avaliação encontrava-se sonolento, cooperativo, confuso, sem déficits motores. Sinais vitais sem anormalidades. Os exames coletados na urgência evidenciaram sódio sérico de 118 mEq/l. Exames do pré-operatório com íons dentro dos valores de referência. Baseado no caso clínico, assinale a resposta correta.","alternativas":[{"letra":"A","texto":"Deve-se prescrever uma solução com 150ml de NaCl 20% e 850ml de água bidestilada e infundir a 30ml/h, com reavaliação do sódio em 3-6 horas."},{"letra":"B","texto":"Restrição hídrica absoluta de 500 ml/dia e aguardar correção espontânea do sódio nas próximas 24-48 horas."},{"letra":"C","texto":"Administração de solução salina hipertônica a 3% em bolus de 100 ml, repetindo a cada hora até correção do sódio."},{"letra":"D","texto":"Administração de furosemida endovenosa em altas doses associada à reposição de potássio para correção da hiponatremia."}],"correta":"A","resposta":"A reposição de Na em contexto de hiponatremia aguda, com história de exposição a solução hiponatremica, como a RTU, demanda reposição de NaCl 3%. Tal solução pode ser montada com 150ml de NaCl 20% + 850 ml de água bidestilada. Por se tratar de caso grave, pode-se calcular o déficit de Na e estimar reposição de 34ml/h por 24h. É aceitável reposição a 30ml/h com reavaliação a cada 3-6 horas por trata-se de caso grave.","needs_distractors":true},{"year":"2024.1","qnum":33,"enunciado":"Paciente masculino, 24 anos, procura a UBS com relato de perda significativa de peso e fadiga extrema. O paciente relata uma perda de peso não intencional de aproximadamente 15 kg nos últimos 6 meses. Refere sentir-se extremamente cansado e com pouca energia, mesmo para realizar atividades cotidianas. Apresenta preocupação excessiva com o peso e a forma do corpo. Descreve uma dieta muito restritiva, evitando alimentos que considera \\"engordativos\\" e praticando jejuns prolongados. Relata episódios de exercícios físicos intensos após comer, como forma de \\"compensar\\" a ingestão calórica. Admite sentir um medo intenso de ganhar peso, mesmo estando visivelmente abaixo do peso ideal. História Médica Pregressa: Sem antecedentes médicos relevantes. Não faz uso de medicamentos regularmente. História Familiar: Mãe com histórico de transtorno alimentar na adolescência. Pai com histórico de depressão. Exame Físico: Peso: 52 kg (Índice de Massa Corporal - IMC: 16.0 kg/m²). Pele pálida e seca; Presença de lanugo (pelos finos e macios) nas costas e braços; Frequência cardíaca: 45 bpm (bradicardia). Pressão arterial: 90/60 mmHg (hipotensão) Avaliação Psicológica: O paciente exibe comportamentos perfeccionistas e autocríticos. Relata baixa autoestima e uma percepção distorcida da imagem corporal, sentindo-se \\"gordo\\" apesar do baixo peso. Nega comportamentos bulímicos, como vômitos autoinduzidos ou uso de laxantes. Com base no caso clínico acima e na melhor hipótese diagnóstica, podemos afirmar que:","alternativas":[{"letra":"A","texto":"inúmeros pacientes apresentam-se temerosos em desenvolver caracteres sexuais secundários, tentando retornar seus corpos a estágios pré-puberais."},{"letra":"B","texto":"pacientes apresentam-se eufóricos com a perda de peso e procuram ativamente o serviço de saúde para acompanhamento."},{"letra":"C","texto":"a perda ponderal é sempre acompanhada de aumento de apetite e hiperfagia compensatória."},{"letra":"D","texto":"trata-se de um quadro tipicamente de início após os 40 anos de idade, com predomínio no sexo masculino."}],"correta":"A","resposta":"A prevalência dessa fase bulímica durante a evolução de uma anorexia nervosa é de cerca de 30% e não tão alta quanto 70%, portanto está afirmativa está INCORRETA. Embora saibamos que a etiologia da anorexia nervosa é multifatorial, não podemos afirmar que a etiologia está bem definida, afirmativa INCORRETA. O tratamento da anorexia nervosa é muito difícil; geralmente se faz com psicoterapia e, quando necessário o uso de medicações, inicia-se de fato com antidepressivos, mas do tipo inibidores da recaptação da serotonina e não os tricíclicos ou inibidores da MAO, está afirmativa está INCORRETA. A anorexia se inicia geralmente nos primeiros anos da puberdade e está associada ao medo e apreensão do desenvolvimento de caracteres sexuais secundários. Essa afirmativa está CORRETA.","needs_distractors":true},{"year":"2024.1","qnum":34,"enunciado":"Mulher, de 38 anos, chega ao pronto atendimento com cólica abdominal persistente há 2 dias, acompanhada de náuseas, vômitos e parada de eliminação de gases e fezes. Nega febre. Relata antecedente de cirurgia abdominal após acidente automobilístico. Ao exame físico: lúcida e orientada, FC: 110 bpm, PA: 140 x 70 mmHg, FR: 36 ipm. Abdome muito distendido, hipertimpânico, não depressível, doloroso difusamente à palpação profunda, ruídos hidroaéreos aumentados, presença de cicatriz mediana infra e supraumbilical e sem irritação peritonial. Em relação ao caso clínico descrito acima, qual a melhor conduta a ser realizada?","alternativas":[{"letra":"A","texto":"Jejum e sonda nasogástrica aberta."},{"letra":"B","texto":"Laparotomia exploradora imediata sem tentativa prévia de tratamento clínico conservador."},{"letra":"C","texto":"Colonoscopia descompressiva como conduta inicial em todos os casos de obstrução intestinal."},{"letra":"D","texto":"Antibioticoterapia empírica de amplo espectro e dieta líquida sem restrições."}],"correta":"A","resposta":"O mais importante da questão acima é a descrição do caso clínico que frisa a presença de cirurgia abdominal previa. A questão envolve o reconhecimento de que, em paciente com quadro obstrutivo descrito, com antecedente de manipulação cirúrgica abdominal previa, a principal hipótese a ser estabelecida é a de abdômen agudo obstrutivo secundário a bridas intestinais, principalmente envolvendo alças de delgado. Essa hipótese diagnóstica torna-se mais contundente quando temos fornecidas as informações da \\"importante distensão abdominal\\", \\"da presença de ruídos aumentados\\" e dos vômitos precoces. O tratamento prioritário, nessa situação, é o jejum via oral, somado à passagem de sonda nasogástrica para drenagem do conteúdo estagnado.","needs_distractors":true},{"year":"2024.1","qnum":35,"enunciado":"Paciente gestante, com 33 semanas e 4 dias, compareceu a Unidade de Saúde da Família com queixa de \\"saída de líquido pela vagina\\" há mais ou menos 4 horas. Informa que há 15 dias iniciou fluxo vaginal cremoso com odor fétido e prurido, e que o parceiro encontra-se sem queixas. Ao exame: PA 100x70 mmHg; Fundo uterino 30cm; BCF 140 bpm; Contrações uterinas ausentes. Ao exame especular: presença de fluxo espesso, amarelado em fundo de saco com odor fétido acentuado; Colo uterino hiperemiado fluindo líquido claro sem grumos pelo OE (orifício externo do colo) compatível com líquido amniótico, em pequena quantidade, que aumenta com manobra de valsalva. Assinale a alternativa que apresenta as condutas corretas para essa paciente.","alternativas":[{"letra":"A","texto":"Encaminhar à maternidade de referência com relatório médico e descrição do exame realizado."},{"letra":"B","texto":"Iniciar antibioticoterapia oral na UBS e manter a gestante em domicílio com orientações de retorno se piora."},{"letra":"C","texto":"Solicitar ultrassonografia obstétrica de urgência na UBS antes de qualquer encaminhamento."},{"letra":"D","texto":"Realizar toque vaginal repetido para avaliação da dilatação cervical antes do encaminhamento."}],"correta":"A","resposta":"Alternativa correta: Fazer encaminhamento à maternidade de referência com relatório médico e descrição do exame realizado. O Risco obstétrico do caso se deve a RPM em gestação abaixo de 36 semanas, devendo a paciente ser referenciada à maternidade com relatório médico e descrição do exame. Alternativa incorreta: Tratar com metronidazol creme vaginal por 7 dias, encaminhar para casa com orientação de repouso. Reavaliar após tratamento. Em caso de perda de LA a USG obstétrica para avaliação fetal pode ser realizada após avaliação em serviço de referência e não como solicitação ambulatorial. Alternativa incorreta: Tratar vulvovaginite por fungos com fluconazol oral dose única e encaminhar a maternidade se persistir perda de líquido. É contraindicado o uso de antifúngico oral na gestação. Alternativa incorreta: Solicitar USG obstétrica para avaliação fetal e optar por internamento. Mesmo sendo quadro de vaginose devido perda de LA e gestação pré-termo a paciente deve ser encaminhada para serviço de maternidade.","needs_distractors":true},{"year":"2024.1","qnum":36,"enunciado":"Maria, 27 anos, G2P1A0, chega à Unidade Básica de Saúde (UBS) com queixa dor abdominal e lombar intensa que persiste há horas, inicialmente apresentou secreção vaginal de odor forte e, posteriormente, houve um episódio de sangramento. Relata estar também com febre (39ºC) e mal estar. Data da última menstruação há aproximadamente 8 semanas, gravidez confirmada por teste de BHCG há 2 semanas, quando teve um episódio de corrimento vaginal amarelo esverdeado. Qual a conduta emergencial mais adequada a ser adotada na UBS?","alternativas":[{"letra":"A","texto":"Realizar exame especular para identificar a presença de produtos de concepção e, em seguida, encaminhar para centro de referência em abortamento."},{"letra":"B","texto":"Prescrever misoprostol oral em domicílio e orientar retorno apenas se sangramento intenso."},{"letra":"C","texto":"Realizar curetagem uterina imediatamente na UBS, sem necessidade de encaminhamento a serviço especializado."},{"letra":"D","texto":"Aguardar resolução espontânea do quadro por 48 horas antes de qualquer intervenção."}],"correta":"A","resposta":"De acordo com a clínica da paciente, e perante a suspeita de aborto infectado, devemos realizar o exame especular e ter a certeza de que a pacientes está com saída de restos ovulares ou secreção purulenta pelo orifício externo no colo do útero. Confirmando o caso, devido à gravidade dessa condição, a mulher deve ser imediatamente encaminhada ao hospital para monitorização/restabelecimento dos sinais vitais, realização de exames, antibioticoterapia intravenosa e esvaziamento uterino com técnica apropriada, de acordo com a IG e as condições clínicas da mulher.","needs_distractors":true},{"year":"2024.1","qnum":37,"enunciado":"Gestante, com 33 semanas de gravidez, foi admitida para avaliação no pronto atendimento de uma maternidade de alto risco, com queixa de contrações. Acompanhada pela equipe do pré- natal de alto risco devido a parto prematuro prévio às 35 semanas com bolsa rota. Relata tratamento de infecção urinaria com nitrofurantoina por 7 dias, havendo terminado a medicação há 2 dias. Nega febre e perda de líquido. Refere movimentação fetal presente. PA: 100 x 60 mmHg; FC 72 bpm; BCF: 136 bpm, Dinâmica uterina: 3 contrações de 25 segundos em 10 minutos, colo do útero dilatado 3 cm, 80% apagado, bolsa íntegra, feto cefálico e alto. Podemos afirmar que a paciente:","alternativas":[{"letra":"A","texto":"está em trabalho de parto prematuro e deve receber corticóide para \\"amadurecimento\\" pulmonar do bebê e penicilina."},{"letra":"B","texto":"está em trabalho de parto a termo e deve aguardar evolução espontânea sem intervenções farmacológicas."},{"letra":"C","texto":"deve ser indicada cesariana imediata sem administração de corticoide ou antibioticoprofilaxia."},{"letra":"D","texto":"deve receber apenas tocolíticos (nifedipina ou indometacina) sem necessidade de corticoide ou antibioticoprofilaxia."}],"correta":"A","resposta":"A paciente em questão se encontra em trabalho de parto pré-termo, apresenta dois fatores de risco para TPPT: Parto pré-termo prévio e ITU nessa gestação. Deve ser internada para assistência obstétrica, receber penicilina profilática e corticoide para maturação pulmonar.","needs_distractors":true},{"year":"2024.1","qnum":39,"enunciado":"Pedro, 18 anos, vem à consulta na Unidade Básica de Saúde com sua mãe porque não consegue deambular sem apoio. Está sentindo bastante dor abdominal. A dor iniciou há 3 dias na região periumbilical. Relata episódios de náuseas, hipofagia e vários picos febris. Houve melhora parcial no uso de Buscopan composto. Ao exame físico o paciente chora de dor, principalmente à palpação do abdome inferior. O sinal de Giordano foi negativo. A pressão do paciente está 90/60 mmHg, temperatura de 39,5 graus e com frequência cardíaca de 118 bpm. Marque a alternativa que melhor representa a conduta mais apropriada de acordo com o diagnóstico sindrômico do paciente.","alternativas":[{"letra":"A","texto":"Trata-se de um abdome agudo com possibilidade de ser apendicite, assim o paciente deve ser encaminhado ao serviço terciário."},{"letra":"B","texto":"Trata-se provavelmente de gastroenterite viral, devendo ser orientada hidratação oral e dieta leve em domicílio."},{"letra":"C","texto":"Trata-se de adenite mesentérica autolimitada, com indicação apenas de analgesia e observação domiciliar."},{"letra":"D","texto":"Trata-se de constipação intestinal funcional, sendo recomendado o uso de laxante osmótico e enema evacuativo."}],"correta":"A","resposta":"O paciente não refere dor lombar, elemento importante ao quadro de nefrolitíase, estando o item a incorreto. No item com gastroenterite como possibilidade diagnóstica em um quadro clínico que não menciona diarreia, estando também incorreto. Diante de um quadro abdominal súbito em um paciente com critérios de gravidade (febre que não melhora, taquicardia e dificuldade de deambular devido ao peritonismo). Nas uretrites teríamos descargas penianas purulentas e disúria e o item e está incorreto.","needs_distractors":true},{"year":"2024.1","qnum":40,"enunciado":"Seis dias após uma cirurgia para câncer de cólon, um homem de 67 anos apresenta evolução com vômitos persistentes há 4 dias. Sua temperatura é de 37,0°C, o pulso é de 90/min, a respiração é de 12/min e a pressão arterial é de 114/62 mm Hg. O exame mostra diminuição do turgor da pele e mucosas secas. O abdômen é flácido; não há defesa ou rebote. Estudos séricos mostram:\\n\\nUreia 36 mg/dL Creatinina 1,1 mg/dL Glicose 100 mg/dL Osmolalidade 313 mOsmol/kg A análise de gases no sangue arterial em ar ambiente mostra:\\n\\npH 7,51 PCO2 52 mmHg PO2 80 mmHg HCO3- 40 mmol/L Com base na apresentação clínica, qual é o distúrbio eletrolítico mais provável do paciente?","alternativas":[{"letra":"A","texto":"Hipocalemia."},{"letra":"B","texto":"Hipernatremia."},{"letra":"C","texto":"Hipomagnesemia."},{"letra":"D","texto":"Hipercalcemia."}],"correta":"A","resposta":"Este paciente apresenta vômitos persistentes e desidratação (por exemplo, diminuição do turgor da pele, membranas mucosas secas, aumento da osmolalidade sérica) após cirurgia. Sua gasometria é consistente com alcalose metabólica (aumento de pH e HCO3-) com compensação respiratória (aumento de pCO2). A alcalose metabólica é o resultado da depleção de volume (alcalose de contração) e da perda de H+ gástrico. O achado característico associado ao vômito persistente ou à aspiração nasogástrica (NG) excessiva é a alcalose metabólica hipocalêmica e hipoclorêmica. A hipocalemia na alcalose de contração é causada por vários mecanismos. O principal fator é a ativação do SRAA induzida pela hipovolemia e a liberação de aldosterona, que promove a excreção renal de K+ e H+ e, assim, contribui ainda mais
