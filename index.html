 aguda classe III, paciente deve ser submetido a transfusão de concentrado de hemácias, independente do valor de hemoglobina e hematócrito."}],"correta":"D","resposta":"Paciente idosa com histórico de abuso de AINE evolui com hemorragia digestiva aguda, com sinal de instabilidade hemodinâmica, hemorragia classe III. Deve ser transfundida imediatamente independente do valor de hb/ht, já que esses parâmetros irão demorar cerca de 1-2h após a hemorragia para apresentar alterações.","needs_distractors":false},{"year":"2024.2","qnum":27,"enunciado":"(FESAR) Criança de 7 anos, acompanhada dos pais, foi levada a Unidade Básica de Saúde devido a um inchaço generalizado que se iniciou de forma gradual e piorou nos últimos dias. Ao exame físico, a criança apresentava bom estado geral, mas os exames laboratoriais revelaram proteinúria, hematúria microscópica e albuminemia. Analise as hipóteses diagnósticas abaixo, e assinale a alternativa que contenha a causa mais provável para o caso de glomerulonefrite apresentado por essa criança.","alternativas":[{"letra":"A","texto":"Por lesões mínimas."},{"letra":"B","texto":"Rapidamente progressiva."},{"letra":"C","texto":"Difusa aguda."},{"letra":"D","texto":"Membranoproliferativa."}],"correta":"A","resposta":"CORRETA. Glomerulonefrite por lesões mínimas é a principal causa de síndrome nefrótica em crianças. Caracteriza-se por proteinúria maciça, edema e, geralmente, ausência de hematúria macroscópica. A histologia renal poderá mostrar alterações mínimas nas lesões glomerulares. INCORRETA. Rapidamente progressiva é uma doença grave, com rápida progressão para insuficiência renal. Caracteriza-se por hematúria macroscópica, proteinúria e cilindros hemáticos. O edema pode estar presente, mas não é a manifestação predominante. INCORRETA. A glomerulonefrite difusa aguda pós-estreptocócica (GNDA) é uma doença grave, com rápida progressão para insuficiência renal. Caracteriza-se por hematúria macroscópica, proteinúria e cilindros hemáticos. O edema pode estar presente, mas não é a manifestação predominante. INCORRETA. A glomerulonefrite membranoproliferativa se caracteriza por uma apresentação clínica mista, combinando elementos da síndrome nefrítica e da síndrome nefrótica, além da depleção dos níveis séricos de complemento.","needs_distractors":false},{"year":"2024.2","qnum":28,"enunciado":"(FACIMPA) Uma paciente cisgênero de 50 anos comparece à Unidade Básica de Saúde (UBS), após um intenso período chuvoso, que a fez sair de sua casa, devido às enchentes locais. Apresentou sintomas como febre alta, cefaleia intensa, dor muscular (principalmente nas panturrilhas), náuseas e icterícia leve, iniciados há cinco dias. Ela relata histórico de dependência de benzodiazepínicos, fazendo uso diário da medicação há mais de 5 anos. A paciente mora em uma área de risco para inundações e diz que teve contato com água de enchente alguns dias antes de o quadro iniciar. Diante do caso clínico, considerando a suspeita de leptospirose, qual é a conduta mais adequada a ser realizada na UBS?","alternativas":[{"letra":"A","texto":"Encaminhar imediatamente a paciente para internação hospitalar, pois o quadro de icterícia e uso de benzodiazepínicos pode predispor a insuficiência hepática aguda"},{"letra":"B","texto":"Suspender o uso de benzodiazepínicos imediatamente para evitar interação medicamentosa com antibióticos, promovendo a interrupção abrupta do uso durante o tratamento da leptospirose."},{"letra":"C","texto":"Tratar os sintomas com analgésicos e antipiréticos, orientando retorno em 48 horas para avaliação da progressão do quadro, considerando o uso crônico de benzodiazepínicos."},{"letra":"D","texto":"Iniciar tratamento empírico com antibióticos e solicitar exames laboratoriais para confirmar o diagnóstico de leptospirose, respeitando a gravidade do quadro clínico."}],"correta":"D","resposta":"O tratamento empírico com antibióticos é uma conduta recomendada diante da suspeita de leptospirose, especialmente em pacientes expostos a áreas de risco como enchentes. A instituição precoce de antibióticos, como doxiciclina ou penicilina, é fundamental para reduzir complicações. Exames laboratoriais, como sorologia e hemograma, devem ser solicitados para confirmar o diagnóstico, mas o tratamento não deve ser adiado. A gravidade do quadro clínico, incluindo a febre e a icterícia, justifica essa abordagem. O encaminhamento para internação hospitalar pode ser necessário em casos de leptospirose grave, que cursam com insuficiência renal ou hepática, mas não há, até o momento, sinais de insuficiência hepática aguda. A icterícia leve e o uso de benzodiazepínicos devem ser monitorados, mas a internação imediata não é mandatória apenas com base nesse achado, a menos que haja piora clínica significativa. Embora o tratamento dos sintomas seja importante, a conduta de apenas prescrever analgésicos e antipiréticos sem iniciar o tratamento específico pode deixar a infecção evoluir. O uso de benzodiazepínicos, por si só, não contraindica o uso de antibióticos, e é essencial tratar a infecção de base para evitar complicações graves, como a forma íctero-hemorrágica da leptospirose. A suspensão abrupta de benzodiazepínicos pode levar a sintomas de abstinência, como crises de ansiedade e convulsões, que podem complicar o quadro clínico da paciente. Além disso, não há evidências de que os antibióticos indicados para o tratamento da leptospirose tenham interações significativas com benzodiazepínicos. Qualquer ajuste no uso dessa medicação deve ser feito com cuidado e gradual, considerando o histórico de dependência.","needs_distractors":false},{"year":"2024.2","qnum":29,"enunciado":"(AFYA PARAIBA) Paciente sexo feminino, 65 anos de idade chega ao hospital referindo evacuações com sangue. Relata que o quadro iniciou há cerca de 10 dias com 4 (quatro) episódios de evacuações com sangramento de coloração vermelho vivo em pequena quantidade. Relata que apresentou outros episódios de evacuações sem sangue. Ao exame apresenta PA 120 x 80 mmHg, FC de 60 bpm e o exame anorretal ectoscopico estava normal, com ausência de lesões, fissuras ou hemorroidas e o toque retal revelou a presença de sangue vermelho vivo na luva em pequena quantidade. Em relação ao caso em questão, analise as assertivas abaixo:\\n\\nI. A principal hipótese diagnóstica é de ulcera péptica gastroduodenal complicada com hemorragia.\\n\\nII. A paciente necessita de colonoscopia para diagnóstico do local do sangramento pois está estável.\\n\\nIII. A melhor conduta é realizar um exame de scan com hemácias marcadas para localizar o sangramento ativo.\\n\\nIV. A paciente deve ser internada para reposição de sangue, medicação anticoagulante e antibioticoterapia profilática. É correto apenas o que se afirma apenas em:","alternativas":[{"letra":"A","texto":"III e IV."},{"letra":"B","texto":"IV."},{"letra":"C","texto":"II."},{"letra":"D","texto":"I e II."}],"correta":"C","resposta":"Resposta correta - O sangramento é pequeno e intermitente e o paciente está estável e a melhor conduta é realizar uma colonoscopia para diagnóstico.\\n\\nDistratores:\\n\\nO paciente apresenta uma hemorragia digestiva baixa, persistente em pequena quantidade. O scan seria indicado em caso de sangramento ativo em maior intensidade e a cirurgia em caso de instabilidade. Não há indicação de anticoagulantes.","needs_distractors":false},{"year":"2024.2","qnum":30,"enunciado":"(UNIFIPMOC) J.A.B., um menino de 3 anos de idade, foi levado à Unidade Básica de Saúde (UBS) por sua mãe devido a episódios frequentes de sangramento. Desde os 2 anos, o paciente sempre aparece com equimoses e hematomas inexplicáveis em diferentes partes do corpo após quedas leves. Nos últimos meses, ele também teve sangramentos nas gengivas durante a escovação e um episódio de sangramento nasal que durou mais de 30 minutos. Não possui histórico de comorbidades conhecidas, não faz uso de medicações contínuas. A história familiar mostra que o pai tem diagnóstico de doença hematológica e faz acompanhamento no Hemocentro. Durante a consulta, foram solicitados exames laboratoriais que mostraram os seguintes resultados: Tempo de protrombina (TP): 12 segundos (VR: 11 a 14 segundos), Tempo de tromboplastina parcial ativada (PTTa): 60 segundos (VR: 25 a 40 segundos), Contagem de plaquetas: 250.000/mm³ (VR: 150.000 a 450.000/mm³ ) . Considerando o o caso apresentado, analise as assertivas que seguem.\\n\\nI. Os resultados de contagem de plaquetas e do PTTa sugerem que a condição de J.A.B. está relacionado com a hemostasia secundária, e não a hemostasia primária.\\n\\nII . A presença de sangramentos frequentes nas gengivas e hematomas após traumas leves indica uma possível trombocitopatia, sendo necessário realizar um teste de função plaquetária mais detalhado para confirmar essa hipótese.\\n\\nIII . Considerando o histórico familiar de hemorragias e o resultado do PTTa, a hipótese diagnóstica mais provável para J.A.B. é a hemofilia, indicando uma deficiência de fator de coagulação (VIII e IX). É correto apenas o que se afirma em","alternativas":[{"letra":"A","texto":"II e III."},{"letra":"B","texto":"I e III."},{"letra":"C","texto":"I, II e III."},{"letra":"D","texto":"I e II."}],"correta":"B","resposta":"Justificativa:\\n\\nOs resultados de contagem de plaquetas e do PTTa sugerem que a condição de J.A.B. está relacionada com a hemostasia secundária, e não com a hemostasia primária.\\n\\nJustificativa: Esta afirmativa é correta . O PTTa elevado sugere um problema na hemostasia secundária, que envolve a coagulação e os fatores de coagulação. A contagem de plaquetas está dentro do intervalo normal, o que indica que a hemostasia primária (que depende da função plaquetária e da integridade vascular) não é a causa dos sangramentos. A presença de sangramentos frequentes nas gengivas e hematomas após traumas leves indica uma possível trombocitopatia, sendo necessário realizar um teste de função plaquetária mais detalhado para confirmar essa hipótese.\\n\\nJustificativa: Esta afirmativa é falsa . Embora a trombocitopatia possa causar sangramentos, a contagem de plaquetas normal e o PTTa elevado são mais indicativos de um problema com os fatores de coagulação. Portanto, a necessidade de um teste de função plaquetária pode não ser a abordagem mais indicada neste caso. Considerando o histórico familiar de hemorragias e o resultado do PTTa, a hipótese diagnóstica mais provável para J.A.B. é a hemofilia, indicando uma deficiência de fator de coagulação (VIII e IX).\\n\\nJustificativa: Esta afirmativa é correta . O histórico familiar e o aumento do PTTa são consistentes com a hemofilia, que é uma condição hereditária caracterizada pela deficiência de fatores de coagulação, especificamente os fatores VIII (hemofilia A) e IX (hemofilia B).\\n\\nConclusão: Portanto, a análise correta é que apenas as assertivas I e III estão corretas. A alternativa correta é I e III .","needs_distractors":false},{"year":"2024.2","qnum":31,"enunciado":"(UNITPAC) Paciente de 42 anos é trazida ao pronto-socorro por seu marido relatando que ela está apresentando comportamento depressivo severo há meses. Nas últimas semanas, ela se isolou, perdeu interesse em atividades diárias, e verbalizou várias vezes a vontade de morrer. Na manhã do dia anterior tentou ingerir uma grande quantidade de medicamentos com o objetivo de tirar a própria vida, sendo socorrida a tempo pelo marido. No pronto-socorro, a paciente recusa ajuda, dizendo que não quer continuar vivendo e que \\"ninguém pode obrigá-la a receber tratamento\\". Diante do quadro descrito, analise a asserção e a razão a seguir e assinale a alternativa correta. ASSERÇÃO: O psiquiatra pode proceder com a internação involuntária da paciente, mesmo sem seu consentimento, uma vez que ela apresenta risco iminente à sua própria vida. PORQUE RAZÃO: O Código de Ética Médica permite a internação involuntária de pacientes psiquiátricos sem consentimento, desde que haja um risco significativo para a vida do paciente ou de terceiros, e a decisão seja comunicada às autoridades competentes.","alternativas":[{"letra":"A","texto":"A asserção é verdadeira e a razão é falsa."},{"letra":"B","texto":"A asserção e a razão são verdadeiras, mas a razão não justifica a asserção."},{"letra":"C","texto":"A asserção é falsa e a razão é verdadeira."},{"letra":"D","texto":"A asserção e a razão são verdadeiras, e a razão justifica a asserção."}],"correta":"D","resposta":"A paciente apresenta uma tentativa recente de suicídio e um quadro de depressão grave com ideação suicida, o que configura risco iminente à sua vida. Nesses casos, o psiquiatra tem o respaldo legal e ético para realizar a internação involuntária, conforme a Lei 10.216/2001, que trata da proteção e dos direitos das pessoas com transtornos mentais. A internação involuntária é indicada quando o paciente não tem discernimento para avaliar a necessidade de tratamento e apresenta risco significativo. A decisão deve ser comunicada ao Ministério Público ou outra autoridade competente. A razão, portanto, complementa e justifica a asserção.","needs_distractors":false},{"year":"2024.2","qnum":32,"enunciado":"(UNITPAC) Um paciente do sexo masculino, 42 anos, chega ao ambulatório de ortopedia às 8h da manhã com queixa de dor lombar intensa. Como parte do tratamento para o quadro álgico, ele utilizou de forma inadvertida uma quantidade excessiva de anti-inflamatórios. Posteriormente, passou a apresentar edema facial e edema em membros inferiores 2+/4+, além de dispneia progressiva, que atualmente ocorre aos médios esforços. Devido à piora clínica, o ortopedista encaminhou o paciente para uma unidade de pronto atendimento (UPA), onde ele foi atendido apenas às 20h. Na UPA, foi medida a creatinina, que apresentou valor de 2,3 mg/dL (sua creatinina basal era de 1,1 mg/dL). A médica responsável decidiu deixá-lo em observação e orientou a coleta de urina em um saco coletor para monitoramento do débito urinário. Na manhã seguinte, às 9h, a creatinina foi repetida e chegou a 2,5 mg/dL. Durante o período de observação (das 20h às 9h), o volume total de urina coletado foi de 460 mL. O paciente tem 80 kg e 1,75 de estatura. Com base nesses achados, o médico realizou a classificação da função renal segundo os critérios da KDIGO. Com base nos dados clínicos e laboratoriais apresentados, marque a alternativa que apresenta o melhor julgamento clínico e a correta classificação da lesão renal do paciente segundo o KDIGO.","alternativas":[{"letra":"A","texto":"O paciente apresenta injúria renal aguda (IRA), estágio 1, dado o aumento da creatinina, mas sem alterações significativas no débito urinário. A classificação é adequada para uma IRA inicial e não há necessidade de intervenção urgente."},{"letra":"B","texto":"A suspeita principal é de estágio 3 de injúria renal aguda (IRA), dado o quadro de edema e dispneia. Uma vez que a creatinina aumentou para 2,5 mg/dL, o caso já configura um estágio avançado da IRA, sugerindo necessidade de terapia renal substitutiva."},{"letra":"C","texto":"O paciente apresenta um quadro clínico compatível com insuficiência cardíaca descompensada, que justifica os edemas e a dispneia. A alteração na creatinina é secundária à má perfusão renal, e não há necessidade de classificar como IRA."},{"letra":"D","texto":"O paciente apresenta injúria renal aguda (IRA), estágio 2, de acordo com os critérios KDIGO.\\n\\nDeve-se dar continuidade ao monitoramento urinário e investigar a progressão da IRA com base no uso abusivo de anti-inflamatórios."}],"correta":"D","resposta":"Segundo os critérios da KDIGO, a IRA estágio 2 é definida por um aumento da creatinina sérica de 2 a 3 vezes o valor basal ou pela redução do débito urinário para menos de 0,5 mL/kg/h por 12 horas ou mais. No caso, a creatinina subiu de 1,1 mg/dL para 2,5 mg/dL (mais que o dobro), e o débito urinário foi 460 mL em cerca de 13 horas, o que sugere oligúria. O estágio 1 exige um aumento da creatinina para 1,5 a 2 vezes o valor basal, o que não é o caso, pois a creatinina subiu mais do que o dobro. O débito urinário também sugere estágio mais avançado. O estágio 3 exige um aumento da creatinina para 3 vezes o valor basal ou mais, ou creatinina ≥4,0 mg/dL. No caso, a creatinina não atingiu esses valores. Embora edemas e dispneia sejam sintomas comuns na insuficiência cardíaca, o uso abusivo de anti-inflamatórios e a elevação progressiva da creatinina indicam uma IRA primária, não insuficiência cardíaca como diagnóstico principal. A alternativa responde à questão: \\" O paciente apresenta injúria renal aguda (IRA), estágio 2, de acordo com os critérios KDIGO. Deve-se dar continuidade ao monitoramento urinário e investigar a progressão da IRA com base no uso abusivo de anti-inflamatórios.\\", uma vez que reflete o diagnóstico de IRA com a correta classificação (estágio 2), de acordo com os critérios KDIGO. As demais alternativas apresentam classificações incorretas ou diagnósticos inadequados frente aos achados clínicos e laboratoriais apresentados no caso.","needs_distractors":false},{"year":"2024.2","qnum":33,"enunciado":"(UNITPAC) Um homem, de 56 anos, é admitido no pronto-socorro com dor abdominal de início súbito e progressivo, há cerca de 12 horas. Ele relata episódios de vômito bilioso e distensão abdominal. O paciente tem histórico de duas cirurgias abdominais prévias: uma apendicectomia e uma colectomia parcial por diverticulite. No exame físico, o abdome está distendido, com timpanismo à percussão e ruídos hidroaéreos aumentados. A palpação revela dor difusa. Não há sinais de febre ou icterícia. Uma radiografia abdominal revela níveis hidroaéreos múltiplos e distensão de alças intestinais. Com base no caso acima, levando em consideração os achados qual é a principal hipótese diagnóstica?","alternativas":[{"letra":"A","texto":"Íleo biliar."},{"letra":"B","texto":"Íleo adinâmico."},{"letra":"C","texto":"Obstrução intestinal por bridas."},{"letra":"D","texto":"Isquemia colônica."}],"correta":"C","resposta":"","needs_distractors":false},{"year":"2024.2","qnum":34,"enunciado":"(AFYA ITABUNA) Homem, 32 anos, procura atendimento médico por febre e dor abdominal em hipocôndrio direito há 1 dia. Antecedentes pessoais: litíase biliar e esteatose hepática diagnosticadas por ultrassonografia há seis meses. Exame físico: icteríco +++/4+; desidratado +/4+; corado; T = 38°C; FR = 26irpm; FC= 120bpm; abdome: dor a palpação em hipocôndrio direito no rebordo costal, Sinal de Murphy negativo, descompressão brusca dolorosa ausente. ALT=250UI/L; AST=300 UI/L; bilirrubina direta=6,7 mg/dl; bilirrubina indireta=0,6 mg/dl; gamaGT=336 mg/dl; fosfatase alcalina=680 UI/L; leucócitos=16.400 mm3; (Bastonete 8%, Segmentado 71%, Linfócitos 15%, monócitos 4% eosinófilos 2%) HB=13,1 g/dl; Ht=40%. Qual alternativa contém o diagnóstico mais provável ?","alternativas":[{"letra":"A","texto":"Pancreatite aguda."},{"letra":"B","texto":"Colangite aguda."},{"letra":"C","texto":"Hepatite aguda."},{"letra":"D","texto":"Colecistite aguda."}],"correta":"B","resposta":"A paciente já possui diagnóstico de colelitíase e está evoluindo com icterícia devido ao aumento da bilirrubina direta. Nesses casos, é importante considerar a possibilidade de coledocolitíase, ou seja, obstrução da via biliar por cálculo, que é a principal causa de colangite aguda. Como a paciente ainda apresenta sinais de inflamação sistêmica, como febre, taquicardia e leucocitose com desvio à esquerda, o diagnóstico mais provável é colangite aguda. A pancreatite aguda pode ser uma complicação da colelitíase, mas o padrão da dor abdominal é diferente e, geralmente, não está associada à icterícia. A dor é intensa, localizada na região epigástrica, em faixa, irradiando para o dorso, e é comum o paciente apresentar vômitos. Pacientes com hepatite aguda, por sua vez, geralmente apresentam hepatomegalia, fadiga, mal-estar e desconforto em hipocôndrio direito, além de elevação das transaminases e bilirrubinas. Como a paciente já tem diagnóstico de colelitíase e está ictérica com padrão obstrutivo (aumento da bilirrubina direta), a hipótese de hepatite é menos provável. Na colecistite aguda, por outro lado, a icterícia não costuma ser tão pronunciada, e um sinal clássico no exame físico é o sinal de Murphy, caracterizado pela interrupção abrupta da inspiração profunda durante a palpação do quadrante superior direito.","needs_distractors":false},{"year":"2024.2","qnum":35,"enunciado":"(AFYA ITABUNA) Mulher, 28 anos de idade, 2 partos normais, marido vasectomizado, refere que seus ciclos menstruais permanecem regulares de 30 dias, mas sua menstruação vem aumentando em duração e quantidade há 6 meses, inclusive com aparecimento de cólica (que não apresentava antes). O exame clínico geral é normal. O toque vaginal, não doloroso, identifica útero em anteversoflexão, volume e forma normais, regiões anexiais sem alterações. Qual é a principal hipótese diagnóstica?","alternativas":[{"letra":"A","texto":"Istmocele."},{"letra":"B","texto":"Miomatose uterina."},{"letra":"C","texto":"Endometrite."},{"letra":"D","texto":"Adenomiose."}],"correta":"D","resposta":"Os principais sintomas da adenomiose são o sangramento menstrual intenso e a dismenorreia, correspondendo a alternativa correta. A paciente apresenta exame físico com útero de volume e forma normais. Em geral, a miomatose provoca aumento do volume uterino com forma irregular (nodular). A endometrite (doença inflamatória pélvica) é um quadro infeccioso, geralmente agudo. Nesse caso, a paciente refere uma história de seis meses sem sintomas infecciosos (febre). Além disso, o toque vaginal não é doloroso. A istmocele é uma “falha” na musculatura uterina, localizada no istmo, geralmente associada à cicatriz prévia de uma cesárea, mas essa paciente teve dois partos normais. A Síndrome dos Ovários Policísticos é um distúrbio hormonal que afeta as mulheres em idade reprodutiva e caracterizada pela presença de cistos nos ovários associada a i rregularidade menstrual ou ausência de menstruação, a cne, e xcesso de pelos no corpo, principalmente em locais como face e seio, obesidade e infertilidade, não correspondendo ao caso clínico.","needs_distractors":false},{"year":"2024.2","qnum":36,"enunciado":"(FMIT) Adolescente de 17 anos é levada ao posto de saúde com histórico de preocupação excessiva com o peso e episódios de ingestão alimentar exagerada. Ela relatou períodos de perda de controle durante a alimentação, seguidos por comportamentos compensatórios para evitar ganho de peso, como vômitos autoinduzidos e uso excessivo de laxantes. Durante a consulta demonstrou que sua autoavaliação está extremamente influenciada pelo peso e forma corporal. Com base no DSM-5-TR, qual é o diagnóstico mais provável para esta paciente?","alternativas":[{"letra":"A","texto":"Anorexia nervosa do tipo purgativo."},{"letra":"B","texto":"Bulimia nervosa."},{"letra":"C","texto":"Anorexia nervosa do tipo restritivo."},{"letra":"D","texto":"Transtorno de compulsão alimentar."}],"correta":"B","resposta":"O principal diagnóstico diferencial aqui é relacionado à anorexia com componente purgativo e a bulimia. No entanto, na anorexia, os aspectos principais são o baixo peso, a restrição alimentar e a imagem corporal que é gravemente distorcida. Na bulimia há prejuízo na autoavaliação, mas há consciência plena da forma e pesos corporais. Usualmente a anorexia é um quadro de gravidade muito mais extrema e pode se configurar em grave risco à integridade e à saúde.","needs_distractors":false},{"year":"2024.2","qnum":37,"enunciado":"(UNIREDENTOR) Um pediatra está de plantão na sala de parto e é chamado para atender um recém-nascido pré-termo de 35 semanas de idade gestacional. O recém-nascido nasce sem movimento dos membros e sem choro, indicando uma possível necessidade de reanimação. À observação inicial, o recém-nascido não apresenta respiração espontânea e está hipotônico. Considerando a condição clínica do recém-nascido e as diretrizes de 2022 para reanimação neonatal, assinale a alternativa que descreve a sequência de procedimentos imediatos mais apropriada para o caso.","alternativas":[{"letra":"A","texto":"Esperar 60 segundos para clampear o cordão umbilical e, então, levá-lo à mesa de reanimação, onde deve ser aquecido, posicionado, seco e aspirado se necessário."},{"letra":"B","texto":"Realizar ventilação com pressão positiva com bolsa-válvula-máscara e O ₂ a 21%, monitorando a resposta e ajustando conforme a saturação alvo para a faixa etária."},{"letra":"C","texto":"Realizar estímulo tátil no dorso de forma delicada, no máximo 2 vezes, e proceder com clampeamento imediato do cordão umbilical."},{"letra":"D","texto":"Realizar intubação orotraqueal e ventilação com pressão positiva com bolsa-válvula-máscara e O₂ a 21%, monitorando a resposta respiratória e realizando ajustes conforme necessário."}],"correta":"C","resposta":"Alternativas:\\n\\nRealizar intubação orotraqueal e ventilação com pressão positiva com O ₂ a 21%.\\n\\nJustificativa : Incorreta. A intubação orotraqueal é indicada em casos em que a ventilação com máscara e bolsa não é eficaz ou em condições especiais (por exemplo, em casos de mecônio espesso e ineficácia de outras manobras). No caso descrito, o primeiro passo apropriado é a ventilação com bolsa e máscara, especialmente em um recém-nascido pré-termo de 35 semanas. Realizar ventilação com pressão positiva com bolsa-válvula-máscara e O ₂ a 21%, monitorando a resposta e ajustando conforme a saturação alvo para a faixa etária.\\n\\nJustificativa : Correta. De acordo com as diretrizes de 2022, a ventilação com pressão positiva com bolsa e máscara é indicada em recém-nascidos que não respiram espontaneamente e apresentam tônus muscular reduzido. A concentração inicial de oxigênio recomendada para recém-nascidos de mais de 32 semanas é de 21% (ar ambiente), com ajustes baseados na oximetria para atingir os alvos de saturação estabelecidos. A alternativa está correta e segue as diretrizes atualizadas de 2022. A reanimação inicial de um recém-nascido de 35 semanas que não apresenta respiração espontânea e hipotonia deve iniciar com ventilação com pressão positiva com bolsa- válvula-máscara e ar ambiente (O ₂ a 21%), ajustando conforme necessário de acordo com a saturação alvo para recém-nascidos pré-termo. Realizar estímulo tátil no dorso de forma delicada, no máximo 2 vezes, e proceder com clampeamento imediato do cordão umbilical.\\n\\nJustificativa : Incorreta. Embora o estímulo tátil possa ser realizado inicialmente para incentivar a respiração, o clampeamento imediato do cordão umbilical não é recomendado se o bebê está hipotônico e sem respiração. O clampeamento tardio (após 30 a 60 segundos) é preferido, sempre que possível, para permitir melhor perfusão, especialmente em casos de prematuridade. Esperar 60 segundos para clampear o cordão umbilical e, então, levá-lo à mesa de reanimação, onde deve ser aquecido, posicionado, seco e aspirado se necessário.\\n\\nJustificativa : Incorreta. Embora o clampeamento tardio seja recomendado quando possível, a ausência de respiração e o tônus reduzido justificam a necessidade de intervenção imediata com ventilação com pressão positiva. A reanimação neonatal deve começar o quanto antes, não sendo recomendado aguardar 60 segundos em um recém-nascido com esses sinais.","needs_distractors":false},{"year":"2024.2","qnum":38,"enunciado":"(UNIPTAN) Gestante, 28 anos, G2P1A0, em início do pré-natal, apresenta resultado de sorologia para toxoplasmose IgG negativo e IgM positivo. Restante dos exames não apresentam alterações. US obstétrico mostra feto sem alterações, com crescimento adequado para a idade gestacional. Iniciada espiramicina e solicitada nova sorologia. A nova sorologia, com 24 semanas de gestação, apresenta IgG e IgM negativos para toxoplasmose. Assinale a alternativa que apresente o diagnóstico provável e a conduta adequada.","alternativas":[{"letra":"A","texto":"Toxoplasmose tardia. Manter paciente em pré-natal de risco habitual."},{"letra":"B","texto":"Toxoplasmose aguda. Encaminhar para pré-natal de alto risco."},{"letra":"C","texto":"Toxoplasmose aguda. Associar pirimetamina."},{"letra":"D","texto":"IgM falso positivo. Suspender espiramicina."}],"correta":"D","resposta":"ALTERNATIVA CORRETA: IgM falso positivo – suspender espiramicina. No segundo exame da paciente, o IgM veio negativo e o IgG manteve se negativo, portanto, trata se de falso positivo de IgM. Para confirmar a infecção o IgG tinha que se positivar. DEMAIS ALTERNATIVAS:\\n\\n\\"Toxoplasmose aguda – associar pirimetamina.\\" Justificativa da incorreção : A toxoplasmose aguda seria confirmada se houvesse um IgM positivo acompanhado de um IgG positivo subsequente, sugerindo infecção recente. No entanto, no novo exame, ambos IgG e IgM são negativos, o que indica ausência de infecção aguda ou imunidade. Associar pirimetamina seria indicado apenas em caso de toxoplasmose confirmada, geralmente após 18 semanas e com infecção ativa. Neste caso, como o IgM parece ter sido um falso positivo, não há indicação para o uso de pirimetamina. \\"Toxoplasmose tardia – manter paciente em pré-natal de risco habitual.\\" Justificativa da incorreção : O termo \\"toxoplasmose tardia\\" não se aplica corretamente aqui. A toxoplasmose tardia normalmente se refere à infecção adquirida no terceiro trimestre, que aumenta o risco de transmissão vertical, mas com menor gravidade fetal. Contudo, no caso de Ana Lúcia, o exame atual mostra IgG e IgM negativos, indicando que ela não adquiriu toxoplasmose. Portanto, essa alternativa está incorreta. \\"Toxoplasmose aguda – encaminhar para pré-natal de alto risco.\\" Justificativa da incorreção : O encaminhamento para pré-natal de alto risco seria apropriado em casos de toxoplasmose confirmada ou suspeita fortemente confirmada. No entanto, como a nova sorologia mostra tanto IgG quanto IgM negativos, não há evidências de infecção recente ou aguda por toxoplasmose. Portanto, o pré-natal de alto risco não é indicado, e essa alternativa está incorreta.","needs_distractors":false},{"year":"2024.2","qnum":39,"enunciado":"(UNINOVAFAPI) Um recém-nascido (RN) com 38 semanas de idade gestacional nasceu de parto cesáreo devido a descolamento prematuro de placenta com grande sangramento em cavidade uterina. O RN necessitou de reanimação avançada, com intubação traqueal para realizar massagem cardíaca sincronizada com a ventilação com pressão positiva. Foram conferidos e corrigidos os possíveis erros dos procedimentos realizados. Na reavaliação, o monitor cardíaco indicava frequência cardíaca de 22 bpm e o RN encontrava-se em apneia. Realizado cateterismo venoso umbilical de emergência. Baseado nas diretrizes de reanimação neonatal da Sociedade Brasileira de Pediatria 2022, o próximo procedimento da reanimação desse bebê deve ser:","alternativas":[{"letra":"A","texto":"administrar atropina por via endovenosa."},{"letra":"B","texto":"iniciar expansão volumétrica por via endovenosa."},{"letra":"C","texto":"administrar epinefrina por via endovenosa."},{"letra":"D","texto":"administrar atropina por via endotraqueal."}],"correta":"C","resposta":"Durante a reanimação avançada de recém-nascidos (RN) com 34 ou mais semanas de idade gestacional o uso de medicações está indicado quando a frequência cardíaca (FC) permanece abaixo de 60 bpm e o RN já recebe massagem cardíaca aplicada de forma sincronizada com a ventilação com pressão positiva (VPP) por cânula traqueal e fornecimento de oxigênio a uma fração inspiratória (FiO 2) de 100% com técnica adequada. As drogas utilizadas durante a reanimação neonatal em sala de parto são a epinefrina e o expansor de volume (soro fisiológico 0,9%). A primeira medicação que deve ser administrada é a epinefrina (CORRETA) , preferencialmente por via endovenosa (veia umbilical). O expansor de volume é a segunda medicação a ser administrada via endovenosa (INCORRETA) , quando há sinais de choque ou sangramento. A atropina é uma medicação que não está indicada durante a reanimação de recém-nascidos com bradicardia em sala de parto (INCORRETAS) .","needs_distractors":false},{"year":"2024.2","qnum":40,"enunciado":"(AFYA ITABUNA) Paciente de sexo feminino, de 45 anos é atendida no pronto atendimento do Hospital do Exército com história de dor abdominal, em andar superior do abdome, em faixa, acompanhada de vários episódios de vômitos, há 12 horas da entrada. Ao exame físico apresenta-se hemodinamicamente estável, com dor difusa à palpação abdominal, pior em epigástrio e mesogástrio, descompressão brusca negativa. Os exames laboratoriais mostram amilase 1030 U/L. Quais exames laboratoriais iniciais devem ser solicitados para auxílio na avaliação de gravidade do caso, segundo os Critérios da International Association of Pancreatology / American Pancreatic Association / American College of Gastroenterology ?","alternativas":[{"letra":"A","texto":"Glicemia, TGO, TGP, fosfatase alcalina."},{"letra":"B","texto":"Glicemia, leucograma, DHL, AST."},{"letra":"C","texto":"Glicemia, bilirrubinas, fosfatase alcalina."},{"letra":"D","texto":"Glicemia, Lipase, gama- GT."}],"correta":"B","resposta":"Resposta Comentada: Para diagnóstico de pancreatite aguda, o doente deverá preencher dois dos três critérios seguintes:\\n\\nClínico: dor abdominal quadrante superior associada a náuseas e vômitos.\\n\\nLaboratorial: aumento de amilase e/ou lipase acima de três vezes o limite superior da normalidade.\\n\\nImagem: alterações típicas de pancreatite aguda nos exames de imagem. Ou seja: podemos concluir que o paciente fecha critérios para pancreatite aguda (clínico + laboratorial). Na admissão deve ser solicitado Leucograma, glicemia, LDH e AST, pois fazem parte dos critérios admissionais de Ranson e servirão para predizer a gravidade do quadro.","needs_distractors":false},{"year":"2024.2","qnum":41,"enunciado":"(FMIT) Homem, 25 anos, da entrada no pronto-socorro com queixa de dor lombar à direita de forte intensidade com irradiação para região escrotal. Ele nega febre. Após analgesia, paciente é submetido a tomografia computadorizada de abdome sem contraste que evidencia a presença de um cálculo de 22 mm alocado em ureter distal. Analise a situação acima e assinale a alternativa que contém a conduta correta nesse caso:","alternativas":[{"letra":"A","texto":"A nefrolitotomia aberta é a melhor terapia viável para o tratamento desse tipo de cálculo, apesar de estar associada a maiores complicações."},{"letra":"B","texto":"A nefrolitotripsia percutânea é uma excelente opção terapêutica por ser pouco invasiva e efetiva para o tratamento de cálculos ureterais maiores que 2 cm."},{"letra":"C","texto":"A ureterolitotripsia endoscópica é a opção terapêutica mais adequada nesse caso devido a localização e o tamanho do cálculo."},{"letra":"D","texto":"A melhor opção terapêutica para esse paciente é a prescrição de terapia expulsiva com bloqueadores alfa adrenérgicos."}],"correta":"C","resposta":"A terapia expulsiva com alfa adrenérgicos está indicada apenas para pacientes com cálculo menores que 1 cm. A litotripsia endoscópica é o tratamento comumente mais utilizado para o tratamento de cálculos > 2 cm, especialmente aqueles localizados na porção mais distal do ureter. Para cálculos > 2 cm localizados na pelve renal ou em ureter proximal e nefrolitotomia percutânea também é uma opção viável. Atualmente a nefrolitotomia aberta é utilizada apenas em casos refratários ou para remoção de cálculos coraliformes, devido ao maior risco de complicações pós operatórias.","needs_distractors":false},{"year":"2024.2","qnum":42,"enunciado":"(IESVAP) Uma paciente de 18 anos, gestante no primeiro trimestre, chega à sala de parto com queixa de dor abdominal intensa, febre alta, calafrios e sangramento vaginal. O exame físico revela útero doloroso à palpação, secreção vaginal purulenta e sinais de peritonite. Os exames laboratoriais mostram leucocitose com desvio à esquerda e elevação dos marcadores inflamatórios. Qual é a conduta inicial mais adequada para o manejo desta paciente?","alternativas":[{"letra":"A","texto":"Administração de tocolíticos, monitoramento fetal contínuo e hidratação intravenosa."},{"letra":"B","texto":"Administração de antifúngicos, realização de ultrassonografia e suporte nutricional."},{"letra":"C","texto":"Observação clínica, administração de antipiréticos e repouso absoluto."},{"letra":"D","texto":"Administração de antibióticos de amplo espectro, curetagem uterina e suporte hemodinâmico."}],"correta":"D","resposta":"Alternativas:\\n\\nAdministração de antibióticos de amplo espectro, curetagem uterina e suporte hemodinâmico.\\n\\nJustificativa : Correta. O quadro clínico é sugestivo de infecção uterina grave, possivelmente um aborto séptico, que pode evoluir rapidamente para sepse. A conduta inicial apropriada inclui a administração de antibióticos de amplo espectro para combater a infecção, curetagem uterina para remover o conteúdo infectado e suporte hemodinâmico para estabilizar a paciente. Este manejo é crítico para evitar complicações graves, como choque séptico. A alternativa está correta, pois aborda as prioridades no manejo de um quadro de infecção uterina grave: a administração de antibióticos de amplo espectro e a curetagem uterina, associados ao suporte hemodinâmico. Este manejo reduz o risco de complicações, especialmente a progressão para choque séptico, seguindo as práticas recomendadas em emergências obstétricas com suspeita de infecção. Observação clínica, administração de antipiréticos e repouso absoluto.\\n\\nJustificativa : Incorreta. Dada a gravidade dos sintomas, como dor abdominal intensa, febre alta e sinais de peritonite, a simples observação e uso de antipiréticos não são suficientes. Esta conduta negligencia a necessidade de antibióticos imediatos e intervenções para remoção do conteúdo uterino infectado, o que coloca a paciente em risco de piora rápida. Administração de tocolíticos, monitoramento fetal contínuo e hidratação intravenosa.\\n\\nJustificativa : Incorreta. Tocolíticos são usados para inibir contrações uterinas em casos de trabalho de parto prematuro iminente, mas não são apropriados para uma infecção intrauterina com risco de sepse. A hidratação intravenosa pode ser útil, mas não é suficiente para o manejo de uma infecção grave. A prioridade é o tratamento da infecção e estabilização hemodinâmica. Administração de antifúngicos, realização de ultrassonografia e suporte nutricional.\\n\\nJustificativa : Incorreta. A administração de antifúngicos é inadequada, pois o quadro clínico e os exames laboratoriais são mais indicativos de infecção bacteriana. A ultrassonografia pode auxiliar na avaliação do útero, mas não substitui a necessidade de antibióticos e de curetagem. O suporte nutricional é importante em longo prazo, mas não é prioritário neste contexto agudo.","needs_distractors":false},{"year":"2024.2","qnum":43,"enunciado":"(UNIREDENTOR) Adolescente, feminina, cisgênero, 15 anos, foi diagnosticada com depressão maior há seis meses. Ela tem apresentado humor persistentemente deprimido, dificuldade em dormir, queda acentuada no rendimento escolar e distúrbios alimentares. Recentemente começou a expressar pensamentos suicidas e relatou planejamento inicial para tentar tirar a própria vida. Após avaliação clínica cuidadosa, sua equipe médica considerou que a paciente apresenta risco elevado de suicídio. Qual a conduta terapêutica mais apropriada nesse caso?","alternativas":[{"letra":"A","texto":"Intervenção psicoterapêutica intensiva (terapia cognitivo comportamental) e acompanhamento domiciliar com suporte familiar."},{"letra":"B","texto":"Introdução de antidepressivo tricíclico e alta com orientação para a família monitorar o uso da medicação."},{"letra":"C","texto":"Introduzir um antidepressivo da classe dos inibidores seletivos da recaptação de serotonina (ISRS) sem acompanhamento psicoterapêutico imediato."},{"letra":"D","texto":"Internação psiquiátrica imediata, associada à estabilização com antidepressivos da classe dos inibidores seletivos da recaptação de serotonina (ISRS) e monitoramento contínuo."}],"correta":"D","resposta":"Em casos de risco elevado de suicídio, como no caso da paciente, a hospitalização imediata é necessária para garantir a segurança da paciente. A estabilização com antidepressivos, preferencialmente inibidores seletivos da recaptação de serotonina (ISRS) devido ao melhor perfil de segurança em adolescentes, deve ser associada a um acompanhamento contínuo em ambiente controlado. O monitoramento constante e o suporte multidisciplinar são essenciais para prevenir tentativas de suicídio, especialmente nas fases iniciais do tratamento medicamentoso.","needs_distractors":false},{"year":"2024.2","qnum":44,"enunciado":"(FACIMPA) Uma criança de 7 anos é trazida à Unidade Básica de Saúde (UBS) por sua mãe, preocupada com o comportamento do filho na escola. A mãe relata que a criança tem dificuldade em manter a atenção durante as atividades escolares, distrai-se facilmente, e muitas vezes age impulsivamente, interrompendo a fala de colegas e professores. Além disso, a criança está constantemente inquieta, movendo-se frequentemente durante as aulas e em casa. A mãe também comenta que seu filho tem dificuldade em seguir instruções e frequentemente esquece materiais escolares, mesmo após ser lembrado. Considerando o caso descrito, qual das alternativas abaixo representa a melhor abordagem terapêutica para essa criança?","alternativas":[{"letra":"A","texto":"Uso de antipsicóticos atípicos, como clozapina e olanzapina, e intervenção psicossocial intensa."},{"letra":"B","texto":"Prescrição de ansiolíticos, como benzodiazepínicos, como clonazepam, e terapia de exposição gradual."},{"letra":"C","texto":"Uso de metilfenidato, um psicoestimulante, associado à terapia comportamental cognitiva (TCC)."},{"letra":"D","texto":"Terapia comportamental cognitiva (TCC) sem uso de medicação, associada a técnicas de mindfulness."}],"correta":"C","resposta":"Uso de metilfenidato, um psicoestimulante, associado à terapia comportamental cognitiva (TCC):\\n\\nO tratamento de primeira linha para crianças com sintomas de TDAH geralmente inclui uma combinação de intervenções farmacológicas e não farmacológicas. O metilfenidato, um estimulante, é uma das medicações mais frequentemente prescritas para o manejo dos sintomas de desatenção e hiperatividade, promovendo melhorias no foco e controle de impulsos. A TCC ajuda a criança a desenvolver estratégias de enfrentamento, controlar impulsos e melhorar o comportamento em casa e na escola. Esta combinação é amplamente respaldada por evidências e é recomendada em diretrizes de tratamento para TDAH. Prescrição de ansiolíticos, como benzodiazepínicos, como clonazepam, e terapia de exposição gradual Ansiedade e TDAH são condições distintas, apesar de algumas comorbidades. Ansiolíticos podem ser usados para tratar transtornos de ansiedade, mas não são indicados como primeira linha para TDAH. A terapia de exposição gradual é uma técnica utilizada principalmente em transtornos de ansiedade, como fobias, e não tem aplicabilidade direta na modificação dos sintomas de desatenção e impulsividade. Terapia comportamental cognitiva (TCC) sem uso de medicação, associada a técnicas de mindfulness Embora as intervenções comportamentais sejam eficazes, o uso isolado sem medicação é menos eficaz no controle dos sintomas nucleares de TDAH, especialmente em casos mais graves. As técnicas de mindfulness podem complementar o tratamento, mas não substituem terapias mais estabelecidas, como a TCC e o uso de medicamentos estimulantes. Portanto, esta abordagem seria incompleta para a maioria das crianças com sintomas moderados a graves de TDAH. Uso de antipsicóticos atípicos, como clozapina e olanzapina, e intervenção psicossocial intensa Antipsicóticos atípicos são indicados como primeira linha para transtornos psiquiátricos como esquizofrenia ou transtorno bipolar, e não para TDAH. Além disso, eles têm um perfil de efeitos colaterais significativo, o que os torna inadequados para o manejo de crianças com TDAH, exceto em casos com comorbidades severas, como agressividade extrema. A intervenção psicossocial intensa pode ser útil, mas não seria o tratamento primário para o caso apresentado.","needs_distractors":false},{"year":"2024.2","qnum":45,"enunciado":"(UNIFIPMOC) Mulher de 54 anos comparece à consulta com o médico da UBS por apresentar sangramento vaginal intermitente há 2 meses. Conta que sua última menstruação aconteceu há quase 3 anos e, desde então, nunca havia apresentado episódios de sangramento. Nega terapia hormonal. Nega comorbidades prévias e atuais. Possui parceiro sexual único. Ao retorno, traz ultrassonografia endovaginal que revelou imagem hiperecogênica de 7 mm com vascularização única e espessura endometrial de 3 mm. Diante do caso, a conduta mais adequada é?","alternativas":[{"letra":"A","texto":"Solicitar uma histeroscopia para avaliação e possível remoção da imagem hiperecogênica (pólipo), considerando o sangramento intermitente e a vascularização observada."},{"letra":"B","texto":"Realizar curetagem uterina para biópsia endometrial, devido ao sangramento vaginal em uma mulher na pós-menopausa."},{"letra":"C","texto":"Solicitar ultrassonografia endovaginal de acompanhamento em 6 meses, visto que a espessura endometrial é de 3 mm, e observar a evolução do quadro."},{"letra":"D","texto":"Realizar histerectomia total, devido ao risco de malignidade associado à imagem hiperecogênica e ao sangramento vaginal persistente."}],"correta":"A","resposta":"Justificativa:\\n\\nRealizar uma curetagem uterina para biópsia endometrial, devido ao sangramento vaginal em uma mulher na pós-menopausa.\\n\\nJustificativa: Esta afirmação é falsa . A curetagem uterina é um procedimento realizado sem visão direta, o que pode não permitir a polipectomia adequada. Solicitar uma histeroscopia para avaliação e possível remoção da imagem hiperecogênica (pólipo), considerando o sangramento intermitente e a vascularização observada.\\n\\nJustificativa: Esta afirmação é verdadeira . A histeroscopia é o melhor método para realizar a exérese do pólipo endometrial, sendo o exame padrão ouro para a avaliação da cavidade uterina. Solicitar ultrassonografia endovaginal de acompanhamento em 6 meses, visto que a espessura endometrial é de 3 mm, e observar a evolução do quadro.\\n\\nJustificativa: Esta afirmação é falsa . Acompanhamento sem investigação não é apropriado, dado o sangramento. Realizar uma histerectomia total, devido ao risco de malignidade associado à imagem hiperecogênica e ao sangramento vaginal persistente.\\n\\nJustificativa: Esta afirmação é falsa . A histerectomia é um procedimento de maior morbidade, e não há indicação de ser realizada por causa de um pólipo endometrial.","needs_distractors":false},{"year":"2024.2","qnum":46,"enunciado":"(UNISL PVH) Um adolescente de 16 anos, sem histórico de doenças neurológicas prévias, comparece à UBS acompanhado pela mãe, que relata que há 2 semanas o filho apresentou episódios de fraqueza súbita nos membros inferiores, levando-o a cair várias vezes ao chão. Não houve perda de consciência, mas o adolescente relata formigamento nas pernas antes dos episódios de queda. No exame físico, os reflexos tendinosos estão normais, e não há sinais de atrofia muscular ou alteração de força objetiva nos membros inferiores. A ressonância magnética cerebral e da coluna lombar solicitada previamente foram normais. Durante o exame, o paciente exibe episódios de fraqueza nos quais os joelhos se dobram, mas sem lesões associadas às quedas. A mãe menciona que o filho tem se mostrado muito ansioso e estressado com questões escolares. Com base no quadro clínico descrito, qual é o diagnóstico mais provável e o próximo passo adequado?","alternativas":[{"letra":"A","texto":"Síndrome conversiva: encaminhar para avaliação psicológica e suporte psicoterápico."},{"letra":"B","texto":"Miastenia gravis: iniciar teste com edrofônio (Tensilon) e tratamento com imunoglobulina."},{"letra":"C","texto":"Esclerose múltipla: solicitar análise do líquido cefalorraquidiano para confirmação."},{"letra":"D","texto":"Neuropatia periférica: encaminhar para eletroneuromiografia dos membros inferiores."}],"correta":"A","resposta":"Síndrome conversiva (transtorno de conversão); encaminhar para avaliação psicológica e iniciar suporte psicoterápico.\\n\\nJustificativa: O quadro clínico apresentado é sugestivo de síndrome conversiva, caracterizada por sintomas neurológicos (como fraqueza ou formigamento) que não podem ser explicados por uma condição neurológica ou médica, e frequentemente associada a fatores de estresse psicológico. O fato de o exame físico ser normal, sem alterações neurológicas objetivas (reflexos preservados, ausência de atrofia ou déficits de força) e exames de imagem normais (ressonância magnética), sugere que a causa dos sintomas é funcional. A história de ansiedade e estresse escolar também reforça o diagnóstico. A conduta adequada inclui encaminhamento para avaliação psicológica e suporte psicoterápico, visando tratar o transtorno subjacente.\\n\\nDistratores:\\n\\nEsclerose múltipla normalmente apresenta achados de imagem ou exames complementares alterados, além de sinais neurológicos objetivos. Miastenia gravis apresenta fraqueza muscular que piora com o esforço, mas o exame físico frequentemente mostra sinais específicos, como ptose palpebral ou dificuldade na elevação dos membros. Neuropatia periférica causaria déficits sensoriais e motores com exames clínicos e eletroneuromiográficos alterados.","needs_distractors":false},{"year":"2024.2","qnum":47,"enunciado":"(UNIFIPMOC) A.B.L, sexo feminino, com 58 anos de idade, comparece ao pronto-socorro com queixas de febre, calafrios, dor lombar intensa do lado direito e náuseas há 1 dia. Ela é diabética tipo 2, com uso de Metformina 850 mg 3x/dia e Dapaglifozina 10 mg 1x/dia (HbA1c do último mês, igual a 8,9%), e relata que, nos últimos dias, apresentou quadro de polaciúria e algúria, melhorado parcialmente com uso de Fenazopiridina. Ao exame físico, apresenta sensibilidade à palpação na região lombar direita. Sinais vitais indicam: PA: 115x75 mmHg, FC: 102 bpm; FR: 18 irpm, Tax:\\n\\n38,9ºC, SatO2 em ar ambiente: 97%. A análise de urina mostra leucocitúria, hematúria e nitrito positivo, glicemia: 279 mg/dL. A urocultura foi realizada e o resultado sairá em breve. Diante desse quadro, qual a conduta mais apropriada a ser adotada pela equipe médica de plantão?","alternativas":[{"letra":"A","texto":"A internação está indicada, pois a hipótese diagnóstica mais provável costuma afetar pacientes diabéticos de forma grave, apesar da paciente apresentar um bom controle glicêmico."},{"letra":"B","texto":"Considerando a hipótese diagnóstica mais provável e sua condição de diabética, faz-se necessário internar a paciente para tratamento intravenoso com a possibilidade de uso de Ceftriaxona 1g de 12/12 horas."},{"letra":"C","texto":"A paciente deve ser internada para realizada de exames laboratoriais complementares, como urocultura, e para tratamento com antibiótico, sendo uma sugestão permitente, a Nitrofurantoína 100 mg de 6/6 horas."},{"letra":"D","texto":"A paciente deve ser tratada ambulatorialmente com Ciprofloxacino 500 mg de 12/12 horas por 7 dias, já que seu diabetes está controlado e não apresenta sinais de gravidade."}],"correta":"B","resposta":"Justificativa:\\n\\nA paciente deve ser tratada ambulatorialmente com Ciprofloxacino 500 mg de 12/12 horas por 7 dias, já que seu diabetes está controlado e não apresenta sinais de gravidade.\\n\\nJustificativa: Esta alternativa é falsa . Embora a paciente tenha diabetes controlada, o quadro clínico sugere uma infecção urinária alta (pielonefrite) devido à febre, dor lombar e sinais de infecção. O tratamento ambulatorial não é recomendado para pielonefrite complicada (paciente diabética), que geralmente requer internação para garantir a administração intravenosa de antibióticos e monitoramento. Considerando a hipótese diagnóstica mais provável e sua condição de diabética, faz-se necessário internar a paciente para tratamento intravenoso com a possibilidade de uso de Ceftriaxona 1g de 12/12 horas.\\n\\nJustificativa: Esta alternativa é verdadeira . Dada a apresentação clínica da paciente e sua condição de diabética, a internação é indicada. A ceftriaxona é uma escolha apropriada para o tratamento intravenoso de pielonefrite aguda, especialmente em pacientes com fatores de risco, como diabetes. A paciente deve ser internada para realização de exames laboratoriais complementares, como urocultura, e para tratamento com antibiótico, sendo uma sugestão permitente, a Nitrofurantoína 100 mg de 6/6 horas.\\n\\nJustificativa: Esta alternativa é falsa . Embora a internação e a realização de exames laboratoriais sejam necessárias, a nitrofurantoína não é o antibiótico de escolha para pielonefrite. Ela é mais indicada para infecções do trato urinário inferior. A urocultura é importante, mas não deve atrasar o início do tratamento antibiótico em um caso de pielonefrite. A internação está indicada, pois a hipótese diagnóstica mais provável costuma afetar pacientes diabéticos de forma grave, apesar da paciente apresentar um bom controle glicêmico.\\n\\nJustificativa: Esta alternativa é falsa . Embora seja verdade que a pielonefrite possa ser grave em pacientes diabéticos, a ênfase na condição de controle glicêmico é irrelevante para a decisão de internação. A internação deve ser baseada na gravidade do quadro clínico, que neste caso são claros. Ademais, a paciente possui um mau controle glicêmico.","needs_distractors":false},{"year":"2024.2","qnum":48,"enunciado":"(FESAR) Uma primigesta de 32 semanas, comparece à emergência obstétrica com queixa de perda de líquido transvaginal. Ao exame físico, observa-se rotura das membranas ovulares com saída de líquido amniótico límpido. A paciente refere corrimento vaginal amarelado há 3 dias, disúria e dispareunia há 2 dias. A infecção intrauterina é uma importante causa identificável de rotura das membranas ovulares. Qual seria a principal infecção sexualmente transmissível (IST) possivelmente associada à rotura prematura de membranas nesta paciente e qual a estratégia preventiva mais eficaz para essa condição?","alternativas":[{"letra":"A","texto":"Clamídia trachomatis: Uso profilático de azitromicina 1g VO por 03 dias em gestantes de alto risco."},{"letra":"B","texto":"Neisseria gonorrhoeae: Rastreamento e tratamento precoce em gestantes e seus parceiros."},{"letra":"C","texto":"Trichomonas vaginalis: Tratamento com secnidazol 1 g VO dose única para ambos os parceiros."},{"letra":"D","texto":"Herpes simples vírus: Uso de aciclovir profilático em gestantes com história de herpes genital."}],"correta":"B","resposta":"A gonorreia é uma IST altamente associada à RPM, aumentando o risco em até 8 vezes. O rastreamento e tratamento precoce da gestante e seus parceiros são cruciais para prevenir a RPM e outras complicações obstétricas.\\n\\nLembre-se:\\n\\nO diagnóstico de ISTs em gestantes deve ser feito com base em história clínica, exame físico e testes laboratoriais específicos. O tratamento oportuno das ISTs reduz significativamente o risco de RPM e outras complicações obstétricas. A educação em saúde sexual e reprodutiva, incluindo o uso correto de preservativos, é fundamental para prevenir ISTs e seus desdobramentos.","needs_distractors":false},{"year":"2024.2","qnum":49,"enunciado":"(AFYA SANTA INÊS) Uma paciente de 25 anos de idade, primigesta, comparece à sua primeira consulta de pré-natal no primeiro trimestre de gestação. A data da última menstruação (DUM) foi há aproximadamente 10 semanas. Durante o exame físico, ao realizar a manobra de Leopold, o medico não consegue ter certeza das medidas, mas consegue auscultar os batimentos cardiofetais em dorso esquerdo. No entanto, a paciente relata histórico de múltiplos parceiros sexuais e uso inconsistente de preservativos. Na UBS dispomos de todos os testes rápidos para sífilis, hiv, hepatite B e C, e podemos solicitar todos que serão necessários para o período gestacional. Com base nesse cenário, qual é a melhor abordagem diagnóstica para a sífilis na gestante?","alternativas":[{"letra":"A","texto":"Solicitar o teste não treponêmico e esperar o resultado, caso positivo realizar o tratamento com 3 doses da penicilina benzatina, 1,2 milhões em cada glúteo por 3 semanas."},{"letra":"B","texto":"Realizar o teste treponêmico e caso positivo, iniciar o tratamento com 3 doses da penicilina benzatina com 1,2 milhões de unidade em cada glúteo por 3 semanas."},{"letra":"C","texto":"Solicitar o teste VDRL para sífilis e esperar o resultado, caso positivo realizar o tratamento, com 3 doses da penicilina benzatina, 1,2 milhões em cada glúteo por 3 semanas."},{"letra":"D","texto":"Realizar o teste rápido, caso seja positivo, o médico deve solicitar uma contraprova com VDRL, caso este venha positivo, realizar o tratamento com 3 doses de penicilina benzatina por 3 semanas."}],"correta":"B","resposta":"Em caso de gestante, devido ao risco de transmissão ao feto, o tratamento deve ser iniciado com apenas um teste positivo (reagente), sem precisar aguardar o resultado do segundo teste.","needs_distractors":false},{"year":"2024.2","qnum":50,"enunciado":"(UNIREDENTOR) R.C.V, 25 anos, G2P1, com história de parto normal anterior com 35 semanas há 1 ano 3 meses, é atendida na emergência da maternidade com queixa de dor em baixo ventre e relato de barriga ficando dura. No dia do atendimento ela estava com IG de 33 semanas e 1 dia calculado pela ultrassonografia de primeiro trimestre. Relata ter realizado procedimento dentário há 3 dias. Ao exame físico: FU = 33 cm AU = 2/10’/50” TU = normal BCF= 128bpm MAF = presente. Toque vaginal: colo 3 cm dilatado, apagado 70%, bolsa íntegra, apresentação cefálica. De acordo com sua hipótese diagnóstica, marque a alternativa correta:","alternativas":[{"letra":"A","texto":"Internar, administrar nifedipina, betametasona IM para maturação pulmonar fetal, solicitar hemograma completo, EAS com urocultura, ultrassonografia obstétrica e cultura para estreptococo B, além de antibioticoprofilaxia."},{"letra":"B","texto":"Liberar para casa com uso de progesterona micronizada 200 mg via vaginal à noite até 37 semanas, para prevenção do parto prematuro, solicitar hemograma completo, EAS com urocultura ambulatorialmente."},{"letra":"C","texto":"Internar, administrar nifedipina, hidrocortisona EV por 24 horas, solicitar hemograma completo, EAS com urocultura, ultrassonografia obstétrica e cultura para estreptococo B, além de antibioticoprofilaxia."},{"letra":"D","texto":"Internar, hidratar com Sl FSL 0,9% em bolus, realizar interrupção imediata da gestação por cesariana devido ao risco de trabalho de parto prematuro, solicitar histopatológico placentário para investigação do caso."}],"correta":"A","resposta":"Justificativa detalhada:\\n\\nLiberar para casa com uso de progesterona micronizada 200 mg via vaginal à noite até 37 semanas, para prevenção do parto prematuro. Falsa. O uso de progesterona micronizada é uma estratégia preventiva para pacientes de risco, mas não é indicada quando o trabalho de parto prematuro já está em curso, como no caso dessa paciente com dinâmica uterina ativa (2 contrações em 10 minutos) , colo dilatado (3 cm) e apagamento cervical (70%). O manejo adequado exige internação e medidas para inibir o trabalho de parto, além de assegurar a maturação pulmonar fetal e investigar potenciais infecções. Internar, realizar interrupção imediata da gestação por cesariana devido ao risco de trabalho de parto prematuro. Falsa. A cesariana imediata não é indicada neste caso, já que não há sinais de sofrimento fetal (BCF = 128 bpm), e a paciente ainda está em uma fase inicial de trabalho de parto prematuro. O manejo correto neste cenário é a tocolítica associada à corticoterapia para permitir o prolongamento da gestação e a maturação pulmonar fetal, além de prevenir infecções. Internar, administrar nifedipina sublingual, hidrocortisona intravenosa por 24 horas, solicitar hemograma completo, EAS com urocultura, ultrassonografia obstétrica e cultura para estreptococo B, além de antibioticoprofilaxia. Falsa. Embora a internação e o uso de nifedipina para inibição da contratilidade uterina estejam corretos, a hidrocortisona não é a escolha adequada para maturação pulmonar fetal. A corticoterapia para maturação pulmonar deve ser feita com betametasona ou dexametasona , conforme as diretrizes obstétricas. O restante da conduta, incluindo exames e antibioticoprofilaxia, está correto, mas o erro no tipo de corticóide faz com que esta alternativa seja incorreta. Internar, administrar nifedipina sublingual, betametasona intramuscular para maturação pulmonar fetal, solicitar hemograma completo, EAS com urocultura, ultrassonografia obstétrica e cultura para estreptococo B, além de antibioticoprofilaxia. Correta. Esta alternativa descreve o manejo mais adequado para o caso, que inclui:\\n\\nInternação: necessária para monitoramento e controle do trabalho de parto prematuro. Tocolíticos (nifedipina): utilizados para inibir as contrações uterinas e prolongar a gestação. Corticoterapia (betametasona): para maturação pulmonar fetal, especialmente em gestações entre 24 e 34 semanas com risco iminente de parto prematuro. Exames laboratoriais: hemograma, EAS e urocultura para investigar possíveis infecções, especialmente após procedimento dentário recente, que pode ser um foco infeccioso. Cultura para estreptococo do grupo B e antibioticoprofilaxia: essenciais para prevenir infecções neonatais caso o parto ocorra.","needs_distractors":false},{"year":"2025.1","qnum":1,"enunciado":"(UNIGRANRIO Caxias) Um paciente de 60 anos em tratamento com Marevan (varfarina) para trombose venosa profunda está programado para uma colecistectomia eletiva. Considerando a necessidade de suspensão do Marevan antes do procedimento cirúrgico, qual é a conduta mais adequada para manejar o risco de tromboembolismo?","alternativas":[{"letra":"A","texto":"Suspender o Marevan 1 dia antes da cirurgia e substituir por aspirina."},{"letra":"B","texto":"Continuar com o Marevan até o dia da cirurgia sem realizar terapia ponte."},{"letra":"C","texto":"Suspender o Marevan 3 dias antes da cirurgia e não iniciar nenhuma terapia ponte."},{"letra":"D","texto":"Suspender o Marevan 5 dias antes da cirurgia e iniciar terapia ponte com heparina de baixo peso molecular (HBPM)."}],"correta":"D","resposta":"Suspender o Marevan 5 dias antes permite que o INR normalize, e a terapia ponte com HBPM é usada para reduzir o risco de tromboembolismo em pacientes de alto risco (alternativa correta). Manter o Marevan até o dia da cirurgia pode aumentar o risco de sangramento durante o procedimento. Suspender o Marevan 3 dias antes pode não ser suficiente para normalizar o INR, e a ausência de terapia ponte aumenta o risco de tromboembolismo. A aspirina não é uma substituição adequada para a varfarina em termos de prevenção de tromboembolismo em pacientes de alto risco.","needs_distractors":false},{"year":"2025.1","qnum":2,"enunciado":"(UNIPTAN) Recém-nascido de parto vaginal, com idade gestacional de 37 semanas e 4 dias, sem complicações no pré-natal, apresentou-se hipotônico e sem respiração espontânea ao nascer. O cordão umbilical foi clampeado imediatamente e o recém-nascido foi levado para a mesa de reanimação neonatal, onde foram realizados os passos iniciais de reanimação. Posteriormente, observou-se que o recém-nascido apresentava frequência cardíaca de 80 bpm. Assinale a alternativa que apresenta a conduta imediata a ser tomada.","alternativas":[{"letra":"A","texto":"Monitorizar o paciente com oxímetro e monitor cardíaco e iniciar a VPP em ar ambiente."},{"letra":"B","texto":"Encaminhar o RN para o berçário com cateter de O2."},{"letra":"C","texto":"Encaminhar o paciente para realização de contato pele a pele com a mãe."},{"letra":"D","texto":"Monitorizar o paciente com oxímetro e monitor cardíaco e iniciar a VPP com oxigênio a 100%."}],"correta":"A","resposta":"Se, após a realização dos passos iniciais, a FC for < 100 bpm ou o RN não apresentar movimentos respiratórios regulares, enquanto um profissional de saúde inicia a VPP, o outro fixa o sensor do oxímetro e os três eletrodos do monitor cardíaco. No RN > 34 semanas, a VPP deve ser iniciada com ar ambiente (O2 a 21%).","needs_distractors":false},{"year":"2025.1","qnum":3,"enunciado":"(UNIPTAN) Você está de plantão no pronto-socorro quando é chamado para avaliar um adolescente de 15 anos que chegou à emergência com queixa de vômitos com sangue parcialmente digerido (hematêmese) de grande volume, iniciados há cerca de 3 horas. O paciente relata dor epigástrica e episódios prévios de fezes enegrecidas nos últimos dois dias. Ao exame físico, apresenta-se pálido, sudorético, letárgico, com pulso filiforme, enchimento capilar > 3 segundos, FC: 138 bpm, PA: 82x46 mmHg, FR: 28 irpm e saturação de O ₂ de 94% em ar ambiente. Ausência de sinais de trauma. O provável diagnóstico e a conduta adequada são:","alternativas":[{"letra":"A","texto":"choque hipovolêmico; administrar cristaloides e transfundir hemoderivados, caso a instabilidade hemodinâmica se mantenha, e preparar para endoscopia digestiva alta."},{"letra":"B","texto":"choque distributivo; administrar antibióticos de amplo espectro, vasopressina e realizar infusão de noradrenalina."},{"letra":"C","texto":"choque cardiogênico secundário à hemorragia; administrar diuréticos, e uso precoce de inotrópicos e cronotrópicos."},{"letra":"D","texto":"choque neurogênico causando vasodilatação; corrigir volemia após a endoscopia digestiva para evitar diluição de fatores de coagulação."}],"correta":"A","resposta":"O paciente apresenta sinais clínicos de choque hipovolêmico hemorrágico (taquicardia, hipotensão, má perfusão periférica, rebaixamento do nível de consciência), secundário a uma hemorragia digestiva alta (HDA). As metas do tratamento do choque hipovolêmico devem ser:\\n\\n• Restaurar a volemia com fluidos intravenosos (inicialmente cristaloides, 20 mL/kg em bolus), • Assegurar perfusão tecidual adequada (monitorando pressão arterial, perfusão periférica, diurese e nível de consciência), • Corrigir a causa subjacente, no caso, a HDA (endoscopia após estabilização hemodinâmica), • Transfusão de hemoderivados, como concentrado de hemácias, se houver sinais de instabilidade refratária ou queda de hemoglobina. No contexto pediátrico, é essencial realizar uma abordagem rápida e sistemática, com suporte de vida imediato (via aérea, respiração e circulação – ABC), seguido da estabilização volêmica e diagnóstico definitivo.","needs_distractors":false},{"year":"2025.1","qnum":4,"enunciado":"(AFYA Itabuna) Paciente feminina de 75 anos, hipertensa há 20 anos, diabética tipo 2 há 15 anos, com histórico de insuficiência renal crônica em acompanhamento ambulatorial. Nos últimos meses, apresenta cansaço progressivo, edema de membros inferiores e alterações nos exames laboratoriais. Os resultados mais recentes são: Creatinina sérica: 2,5 mg/dL, Ureia: 80 mg/dL, Taxa de Filtração Glomerular (TFG) estimada: 35 mL/min/1,73 m² e Albuminúria: 350 mg/g de creatinina. Considerando os critérios de classificação da Doença Renal Crônica, qual é o estágio mais apropriado para essa paciente?","alternativas":[{"letra":"A","texto":"G4 A1"},{"letra":"B","texto":"G1 A3"},{"letra":"C","texto":"G2 A2"},{"letra":"D","texto":"G3b A3"}],"correta":"D","resposta":"A classificação da Doença Renal Crônica é baseada em dois parâmetros principais: a Taxa de Filtração Glomerular (TFG) e o grau de albuminúria. Neste caso, a TFG estimada é de 35 mL/min/1,73 m², o que corresponde ao estágio G3b (TFG entre 30 e 44 mL/min/1,73 m²). A albuminúria é de 350 mg/g de creatinina, enquadrando-se no estágio A3 (albuminúria > 300 mg/g). Portanto, a classificação correta é G3b A3.","needs_distractors":false},{"year":"2025.1","qnum":5,"enunciado":"(AFYA Santa Inês) Um homem de 47 anos, previamente saudável, apresenta febre persistente há 18 dias, com picos diários de até 39,5°C, sudorese noturna e mal-estar progressivo. Foi avaliado por três serviços sem definição diagnóstica. Fez uso empírico de amoxicilina-clavulanato por 10 dias, sem resposta. Hoje, procurou a emergência com quadro de rebaixamento do nível de consciência, PA 88/56 mmHg, FC 130 bpm, FR 30 irpm, temperatura 38,8°C e lactato de 4,2 mmol/L. Exame físico: sem lesões cutâneas, sem linfadenomegalia ou rigidez de nuca. USG abdominal: esplenomegalia leve. Tomografia de tórax e abdome sem alterações significativas.\\n\\nPCR: 280 mg/L. Sorologias para HIV, VHB, VHC, EBV e CMV negativas. Considerando os critérios clínicos de febre de origem indeterminada (FOI) e a apresentação com possível choque séptico sem foco definido, qual hipótese diagnóstica deve ser priorizada neste momento e qual a conduta mais apropriada?","alternativas":[{"letra":"A","texto":"Brucelose - iniciar rifampicina e doxiciclina empiricamente antes de novas coletas."},{"letra":"B","texto":"Tuberculose miliar - iniciar investigação com lavado broncoalveolar e exames de escarro, mantendo antibioticoterapia de amplo espectro."},{"letra":"C","texto":"Endocardite infecciosa subaguda - solicitar ecocardiograma transesofágico e postergar início de antibióticos."},{"letra":"D","texto":"Linfoma oculto - realizar PET-CT eletivo após estabilização hemodinâmica."}],"correta":"B","resposta":"Brucelose — iniciar rifampicina e doxiciclina empiricamente antes de novas coletas. Incorreta. Embora a brucelose possa cursar com febre prolongada e sintomas inespecíficos, é rara em áreas urbanas e geralmente associada à exposição ocupacional ou consumo de laticínios não pasteurizados. A conduta empírica sem confirmação, especialmente com antibióticos que interferem em culturas, não é indicada inicialmente. Linfoma oculto — realizar PET-CT eletivo após estabilização hemodinâmica. Incorreta. Linfomas podem se apresentar como FOI, mas em paciente com sinais de choque séptico e disfunção orgânica, a prioridade é estabilizar e excluir infecção grave. PET-CT não é exame de urgência e não deve preceder antibióticoterapia. Tuberculose miliar — iniciar investigação com lavado broncoalveolar e exames de escarro, mantendo antibioticoterapia de amplo espectro. Correta. A tuberculose miliar é causa clássica de febre de origem indeterminada (FOI), podendo evoluir para sepse com disfunção de múltiplos órgãos. A ausência de sinais localizatórios e a presença de esplenomegalia devem levantar alta suspeita, mesmo com TC torácica inicialmente negativa. Lavado broncoalveolar (se viável) e escarro são úteis mesmo sem sintomas respiratórios. A cobertura antimicrobiana empírica deve ser mantida até a exclusão de infecção bacteriana. Endocardite infecciosa subaguda — solicitar ecocardiograma transesofágico antes de iniciar antibióticos. Incorreta. A endocardite deve ser considerada, mas a instabilidade hemodinâmica não permite aguardar exame complementar. Hemoculturas devem ser colhidas, mas os antibióticos devem ser iniciados imediatamente, especialmente se houver risco de evolução para choque séptico.","needs_distractors":false},{"year":"2025.1","qnum":6,"enunciado":"(FESAR) Uma paciente de 28 anos, G3P2A1 (duas gestações anteriores, sendo um aborto espontâneo), comparece ao pronto-socorro com história de sangramento vaginal fétido, dor abdominal intensa e febre de 39°C há 48 horas. Relata ter realizado uma tentativa de interrupção da gestação de 10 semanas em domicílio há 5 dias, com uso de ervas e manipulação instrumental. No exame físico, apresentava-se taquicárdica (130 bpm), hipotensa (PA: 80/50 mmHg), taquipneica (FR: 28 irpm) e com abdome doloroso à palpação, principalmente em região hipogástrica, com sinais de irritação peritoneal. No exame ginecológico, observa-se sangramento vaginal purulento e odor fétido, com orifício cervical entreaberto e tecido ovular parcialmente exteriorizado. Qual a abordagem inicial mais adequada para a paciente?","alternativas":[{"letra":"A","texto":"Administrar antipiréticos, iniciar antibioticoterapia de amplo espectro por via oral e solicitar ultrassonografia transvaginal para avaliar a retenção de restos ovulares antes de decidir sobre o esvaziamento uterino."},{"letra":"B","texto":"Realizar laparotomia exploradora imediata para remoção de tecido infectado e investigar possível perfuração uterina, seguido de antibioticoterapia de amplo espectro e reposição volêmica vigorosa."},{"letra":"C","texto":"Instituir antibioticoterapia intravenosa de amplo espectro, reposição volêmica vigorosa com cristaloides, coletar exames laboratoriais incluindo eletrólitos e hemoculturas, antipiréticos e, após estabilização, realizar esvaziamento uterino (aspiração manual intrauterina ou curetagem)."},{"letra":"D","texto":"Iniciar antibioticoterapia de amplo espectro (dose única), iniciar reposição volêmica vigorosa, realizar curetagem uterina imediata e monitorizar eletrólitos e função renal após o procedimento."}],"correta":"C","resposta":"Justificativa da resposta correta:\\n\\nA resposta correta é \\"Instituir antibioticoterapia intravenosa de amplo espectro, reposição volêmica vigorosa com cristaloides, coletar exames laboratoriais incluindo eletrólitos e hemoculturas, antipiréticos e, após estabilização, realizar esvaziamento uterino (aspiração manual intrauterina ou curetagem).\\". A paciente apresenta um quadro de aborto infectado com sinais claros de sepse (taquicardia, hipotensão, taquipneia, febre, sinais de irritação peritoneal). O manejo inicial da sepse, independentemente da causa, prioriza o suporte hemodinâmico e a antibioticoterapia precoce. Antibioticoterapia de amplo espectro intravenosa: essencial para combater a infecção polimicrobiana comum em abortos infectados. A via intravenosa garante níveis séricos adequados rapidamente em um quadro de sepse. Reposição volêmica vigorosa com cristaloides: a hipotensão é um sinal de hipovolemia relativa ou absoluta na sepse. A reposição rápida com cristaloides (como Ringer Lactato ou solução salina 0,9%) visa restaurar a perfusão tecidual. Coleta de exames laboratoriais: hemoculturas são cruciais para identificar o(s) agente(s) etiológico(s) e direcionar a antibioticoterapia, se necessário. A dosagem de eletrólitos, função renal e outros marcadores inflamatórios auxilia na avaliação da gravidade da sepse e na identificação de distúrbios associados. Esvaziamento uterino (AMIU ou curetagem) após estabilização: a remoção do foco infeccioso (restos ovulares infectados) é fundamental para o controle da sepse. No entanto, em um quadro de instabilidade hemodinâmica, o procedimento cirúrgico imediato pode ser arriscado. Portanto, o esvaziamento deve ser realizado assim que a paciente apresentar melhora dos parâmetros vitais com a reposição volêmica e o início da antibioticoterapia. Justificativa das Respostas Incorretas:\\n\\nLaparotomia exploradora imediata: A laparotomia é reservada para casos de suspeita de perfuração uterina ou outras complicações intra-abdominais que não podem ser resolvidas com o esvaziamento uterino por via vaginal. Não é a primeira linha de manejo em um aborto infectado com sepse, a menos que haja evidências claras de perfuração. Iniciar antibioticoterapia (dose única) e curetagem imediata: Uma dose única de antibiótico é inadequada para sepse. Realizar curetagem em uma paciente instável hemodinamicamente aumenta o risco de complicações. Antipiréticos, antibioticoterapia oral e ultrassonografia antes do esvaziamento: antipiréticos tratam o sintoma, mas não a causa. A antibioticoterapia oral é inadequada para um quadro de sepse. Retardar o esvaziamento uterino em um caso de aborto infectado com sepse pode piorar o quadro infeccioso. Hemotransfusão imediata: A hemotransfusão pode ser necessária se houver anemia grave com instabilidade hemodinâmica persistente após a reposição volêmica inicial, mas não é a primeira prioridade. A reposição volêmica com cristaloides é a medida inicial para tratar a hipotensão.","needs_distractors":false},{"year":"2025.1","qnum":7,"enunciado":"(UNIMA) Paciente, 18 anos, G1P0A0, com 10 semanas de gestação confirmada, procura o serviço de emergência com dor abdominal em hipogástrio, sangramento vaginal volumoso e com odor fétido há 24 horas. Refere que a gestação não foi planejada e era indesejada. Ao exame físico observava-se: Tax: 38,7 °C, FC: 112 bpm, P.A.= 100/60 mmHg, útero sensível à palpação e menor que o esperado para idade gestacional. Ao exame especular: colo uterino dilatado com eliminação de material sugestivo de restos ovulares , sangue e pus, BCF não detectável .\\n\\nHemograma: hemoglobina: 10g/dl e leucocitose (18.500/mm³) com desvio à esquerda. Qual a hipótese diagnostica e provável fator predisponente?","alternativas":[{"letra":"A","texto":"abortamento completo decorrente, provavelmente, de incompetência istmo cervical"},{"letra":"B","texto":"abortamento incompleto infectado decorrente, provavelmente, de aborto provocado"},{"letra":"C","texto":"abortamento de repetição infectado decorrente, provavelmente, de má formação"},{"letra":"D","texto":"abortamento completo infectado decorrente, provavelmente, de má formação"}],"correta":"B","resposta":"ALTERNATIVA CORRETA: abortamento incompleto infectado decorrente, provavelmente, de aborto provocado. Trata-se de abotamento incompleto, pois ainda é visualizado eliminação de material sugestivo de restos ovulares durante o exame especular, é infectado porque a paciente apresenta febre, útero dolososo e subinvoluido, leucocitose com desvio a esquerda e elimina secreção de odor fétido. Como se tratava de uma gestação não desejada, possivelmente a paciente provocou o aborto, realizando de maneira inadequada o que pode ter levado a restos ovulares e infecção secundária. ALTERNATIVAS INCORRETAS: aborto de repetição só recebe essa designação se forem dois ou mais abortos consecutivos, no caso esse seria o primeiro dela e incompetência istmo cervical só ocorre quando o feto começa a pesar sobre o colo, geralmente no segundo trimestre da gestação e não está associado a aborto infectado.","needs_distractors":false},{"year":"2025.1","qnum":8,"enunciado":"(IESVAP) Mulher de 40 anos, diabética, com história de dor anal intensa há 3 dias. Refere febre de 38,4ºC e mal-estar. No exame físico, nota-se abaulamento em borda anal com edema, hiperemia e calor local. Não permitiu o toque retal. A conduta a ser adotada para a paciente é:","alternativas":[{"letra":"A","texto":"drenagem do abscesso sob anestesia e antibioticoterapia associada."},{"letra":"B","texto":"realizar retossigmoidoscopia para elucidação diagnóstica."},{"letra":"C","texto":"orientar banho de assento com água morna para drenagem espontânea."},{"letra":"D","texto":"higienização, pomada anestésica, cuidados locais, dieta rica em fibras e reavaliação após 3 dias."}],"correta":"A","resposta":"De acordo com o Sabiston (21ª ed., Capítulo 52 – Doenças do reto e ânus) e diretrizes clínicas:\\n\\n• O quadro descrito é típico de abscesso anorretal (abscesso perianal) , uma emergência cirúrgica infecciosa de origem criptoglandular, comum em pacientes imunossuprimidos ou diabéticos .\\n\\n• A conduta padrão é drenagem cirúrgica imediata , que pode ser realizada sob anestesia local, raquidiana ou geral, dependendo da dor e extensão da infecção.\\n\\n• A antibioticoterapia é indicada nos casos com febre sistêmica, diabetes, celulite extensa ou imunossupressão , como neste caso. “O tratamento de escolha para abscessos anorretais é a drenagem cirúrgica precoce. Antibióticos são indicados em pacientes imunocomprometidos, diabéticos, com celulite perianal ou sinais sistêmicos de infecção.” (Sabiston, 21ª ed., cap. 52, p. 1438) Distratores:\\n\\n• Banho de assento pode ser coadjuvante , mas não subst
