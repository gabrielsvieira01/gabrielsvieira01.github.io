propriada nesse momento?","alternativas":[{"letra":"A","texto":"Levar imediatamente o paciente para reabordagem cirúrgica exploratória."},{"letra":"B","texto":"Iniciar antibioticoterapia empírica de amplo espectro e observar evolução clínica."},{"letra":"C","texto":"Solicitar uma radiografia simples de abdome."},{"letra":"D","texto":"Solicitar tomografia computadorizada de abdome com contraste."}],"correta":"D","resposta":"Solicitar tomografia computadorizada com contraste. No contexto pós-operatório de colectomia, o aparecimento de febre persistente, leucocitose e dor abdominal localizada, especialmente após o 3º dia, sugere fortemente infecção intra-abdominal — sendo abscesso de parede ou intra-abdominal a principal hipótese diagnóstica . Segundo o Sabiston – Tratado de Cirurgia , 21ª edição:\\n\\n“A tomografia computadorizada com contraste intravenoso é o método diagnóstico de escolha na avaliação de complicações infecciosas intra-abdominais, como abscessos pós-operatórios, por sua capacidade de detectar coleções, espessamento de paredes, presença de gás e edema peritoneal.” (SABISTON , 2022, cap. 17 – Complicações cirúrgicas, p. 400-402) A TC permite:\\n\\n• Localizar com precisão a coleção (profunda ou subcutânea).\\n\\n• Avaliar a necessidade de drenagem percutânea guiada por imagem.\\n\\n• Evitar reoperações desnecessárias , que aumentam a morbidade.\\n\\nDistratores:\\n\\n• Radiografia simples de abdome tem valor muito limitado para detectar abscessos, servindo mais para avaliar obstrução intestinal ou pneumoperitônio. Não é indicada como exame inicial para febre no pós-operatório com suspeita de abscesso.\\n\\n• Iniciar antibiótico e observar sem elucidar o foco pode ser prejudicial. De acordo com diretrizes atuais, todo paciente com febre persistente no pós-operatório deve ser avaliado com exames direcionados para investigação de foco infeccioso. “Tratar infecção sem identificar a origem anatômica contraria os princípios de controle de infecção cirúrgica.” – Sabiston, cap. 17.\\n\\n• Reabordagem cirúrgica imediata está indicada em situações de:\\n\\n• Instabilidade hemodinâmica.\\n\\n• Peritonite generalizada.\\n\\n• Falência do tratamento conservador com imagem sugestiva de complicação grave. Não é o caso deste paciente, que apresenta quadro localizado e estável, com tempo hábil para diagnóstico por imagem.","needs_distractors":false},{"year":"2025.1","qnum":41,"enunciado":"(FACIMPA) Paciente, de 26 anos, primigesta, comparece à unidade básica de saúde para revisão de pré-natal, na 12ª semana de gravidez. Está assintomática e relata gestação sem intercorrências até o momento. Durante a consulta, os resultados dos exames laboratoriais são discutidos. O teste de IgG para toxoplasmose e o teste de IgM são positivos. No entanto, o teste de avidez de IgG revela um resultado baixo. Indique a conduta diante do quadro desta paciente.","alternativas":[{"letra":"A","texto":"Iniciar tratamento com espiramicina."},{"letra":"B","texto":"Realizar amniocentese para detecção de DNA de Toxoplasma gondii ."},{"letra":"C","texto":"Prescrever sulfadiazina e pirimetamina."},{"letra":"D","texto":"Recomendar repouso e monitoramento fetal."}],"correta":"A","resposta":"A conduta inicial adequada diante da sorologia com IgM e IgG reagentes associada à baixa avidez de IgG — especialmente antes da 16ª semana — é o início imediato de espiramicina. Essa medicação reduz a transmissão placentária da toxoplasmose, sendo preferida no primeiro trimestre. O uso de sulfadiazina e pirimetamina é reservado para casos em que há confirmação de infecção fetal, o que não foi determinado neste momento. A amniocentese deve ser realizada apenas após a 18ª semana, se necessário, para confirmação diagnóstica fetal. A recomendação de repouso isoladamente não é conduta suficiente, dada a evidência de infecção materna recente.","needs_distractors":false},{"year":"2025.1","qnum":42,"enunciado":"(AFYA PALMAS) Recém-nascido do sexo masculino, a termo, Apgar 3 no 1º minuto, após parto cesáreo por eclampsia materna. Feitas as medidas sem sucesso foi iniciado ventilação com pressão positiva (VPP) eficaz e após 30 segundos a frequência cardíaca permanece abaixo de 60 bpm. Iniciada massagem cardíaca coordenada à ventilação em sala de parto. Após mais 60 segundos, a frequência cardíaca segue abaixo de 60 bpm, sem melhora hemodinâmica. Com base nas diretrizes atuais da Sociedade Brasileira de Pediatria (SBP) e da American Heart Association (AHA) para reanimação neonatal, qual é a conduta medicamentosa mais apropriada neste momento?","alternativas":[{"letra":"A","texto":"Administrar epinefrina (adrenalina) por via endotraqueal na dose de 0,3 mL/kg (1:1.000)."},{"letra":"B","texto":"Iniciar infusão de dopamina endovenosa em bomba para suporte inotrópico."},{"letra":"C","texto":"Administrar epinefrina (adrenalina) por via intravenosa na dose de 0,1 a 0,3 mL/kg (1:10.000)."},{"letra":"D","texto":"Realizar dose única de naloxona por via intramuscular para reverter possível depressão respiratória."}],"correta":"C","resposta":"Resposta CORRETA: Administrar epinefrina (adrenalina) por via intravenosa na dose de 0,1 a 0,3 mL/kg (1:10.000). Após 30 segundos de VPP eficaz e 60 segundos de massagem cardíaca coordenada, se a frequência cardíaca permanece abaixo de 60 bpm, está indicada a administração de epinefrina (1:10.000). A via intravenosa é a preferencial e a dose recomendada é de 0,01 a 0,03 mg/kg, equivalente a 0,1 a 0,3 mL/kg da diluição 1:10.000. A via endotraqueal pode ser considerada apenas enquanto o acesso venoso não é obtido, e sua eficácia é inferior. A naloxona está contraindicada na sala de parto; dopamina não é medicação de escolha na reanimação inicial.","needs_distractors":false},{"year":"2025.1","qnum":43,"enunciado":"(FACIMPA) Paciente, 28 anos, sexo feminino, previamente hígida, foi internada na enfermaria de clínica médica com queixa de febre alta, calafrios e dor em flanco direito há 3 dias. Relatou também náuseas, episódios de vômito e sensação de fraqueza generalizada. No exame físico, encontrava-se febril (38,9 °C), com dor à palpação profunda em flanco direito e sinal de Giordano positivo à direita. Os exames laboratoriais mostravam leucocitose com desvio à esquerda e creatinina sérica de 0,8 mg/dL. O exame de urina revelou piúria, bacteriúria significativa e presença de leucócitos dismórficos. Urocultura foi coletada na admissão. Ultrassonografia de vias urinárias não evidenciou alterações estruturais significativas. Indique a melhor abordagem terapêutica neste momento clínico da paciente.","alternativas":[{"letra":"A","texto":"Iniciar antibioticoterapia oral com ciprofloxacino, considerando que a função renal está preservada e a urocultura já foi coletada."},{"letra":"B","texto":"Prescrever apenas antipiréticos e hidratação oral, pois o quadro clínico não indica gravidade, aguardar o resultado da urocultura."},{"letra":"C","texto":"Iniciar antibioticoterapia endovenosa com ceftriaxona e manter em observação, aguardando o resultado da urocultura para reavaliação."},{"letra":"D","texto":"Solicitar tomografia de abdome e pelve antes de iniciar antibiótico, para excluir complicações."}],"correta":"C","resposta":"A alternativa correta é a: Iniciar antibioticoterapia empírica endovenosa com ceftriaxona e manter em observação, aguardando o resultado da urocultura para reavaliação. A paciente apresenta quadro de pielonefrite aguda com sinais sistêmicos (febre alta, vômitos, leucocitose com desvio à esquerda, piúria), o que justifica internação e tratamento parenteral empírico. A ceftriaxona é uma escolha inicial segura, eficaz contra patógenos uropatogênicos comunitários. Após coleta de urocultura, é apropriado aguardar resultados para ajuste posterior. A alternativa “Iniciar antibioticoterapia oral com ciprofloxacino, considerando que a função renal está preservada e a urocultura já foi coletada”, não é ideal no momento inicial devido à gravidade clínica. A alternativa “Prescrever apenas antipiréticos e hidratação oral, pois o quadro clínico não indica gravidade.” é incorreta, pois há sinais de infecção grave, exigindo antibioticoterapia imediata. A alternativa “Solicitar tomografia de abdome e pelve antes de iniciar antibiótico, para excluir complicações” está indicada apenas se houver suspeita de complicação estrutural, o que não é o caso inicial.","needs_distractors":false},{"year":"2025.1","qnum":44,"enunciado":"(AFYA Itabuna) Paciente feminina de 28 anos, previamente hígida, comparece à UBS com queixa de sangramento vaginal há 2 meses. Refere ciclos menstruais com duração de 5 a 7 dias, mas nos últimos meses o sangramento tem ocorrido em intervalos irregulares, com episódios de sangramento intenso por até 10 dias, associados a cólicas menstruais intensas. Nega uso de métodos contraceptivos hormonais, histórico de doenças ginecológicas ou cirurgias prévias. Ao exame físico, apresenta-se normotensa, eutrófica, com sinais vitais dentro dos parâmetros normais. O exame ginecológico revela colo uterino sem alterações, sem sangramento ativo, e o toque vaginal é indolor. Considerando o quadro clínico apresentado, qual é a conduta inicial mais adequada para investigar a queixa da paciente?","alternativas":[{"letra":"A","texto":"Iniciar tratamento com anticoncepcional oral combinado e agendar retorno em 3 meses."},{"letra":"B","texto":"Solicitar exames laboratoriais para investigação de coagulopatias e realizar ultrassonografia transvaginal."},{"letra":"C","texto":"Realizar curetagem uterina para avaliação histopatológica."},{"letra":"D","texto":"Solicitar ultrassonografia transvaginal e dosar o Beta-HCG para descartar gravidez ectópica."}],"correta":"B","resposta":"O quadro clínico de sangramento vaginal irregular e intenso em uma paciente jovem sem histórico de doenças ginecológicas prévias exige uma investigação cuidadosa para determinar a causa subjacente. A ultrassonografia transvaginal é indicada para avaliar a presença de lesões estruturais, como miomas ou pólipos, que podem causar sangramentos anormais. Além disso, exames laboratoriais para investigação de coagulopatias são essenciais para descartar distúrbios hemorrágicos que podem se manifestar com sangramentos menstruais excessivos. Iniciar tratamento com anticoncepcional oral sem diagnóstico adequado pode mascarar a causa do sangramento e não é recomendado sem uma avaliação prévia. A realização de curetagem uterina deve ser considerada apenas após a exclusão de outras causas e quando indicada para avaliação histopatológica.","needs_distractors":false},{"year":"2025.1","qnum":45,"enunciado":"(UNISL Porto Velho) Maria, 25 anos, G2PN1A0, encontra-se na 20ª semana de gestação e realiza acompanhamento pré-natal em uma Unidade Básica de Saúde (UBS) de município prioritário para eliminação da sífilis congênita. Em consulta de rotina, apresenta VDRL reagente com titulação 1:2, sendo assintomática e sem histórico prévio de tratamento para sífilis. O parceiro não compareceu à UBS para avaliação. Considerando o cenário epidemiológico, a importância do diagnóstico precoce e as recomendações do Ministério da Saúde para prevenção da sífilis congênita, avalie o manejo frente a este caso e marque a alternativa correta.","alternativas":[{"letra":"A","texto":"Aguardar o terceiro trimestre para repetir VDRL, prescrever azitromicina, monitorar trimestralmente, não realizar notificação imediata e orientar o parceiro a procurar atendimento apenas se houver sintomas."},{"letra":"B","texto":"Repetir o VDRL em três meses, iniciar o tratamento com doxiciclina, encaminhar a gestante ao infectologista, notificar o caso de imediato e aguardar avaliação do parceiro antes de iniciar qualquer intervenção."},{"letra":"C","texto":"Solicitar teste rápido de sífilis, iniciar penicilina benzatina somente após novo resultado, realizar notificação e agendar retorno trimestral, abordando o parceiro apenas se houver confirmação laboratorial adicional."},{"letra":"D","texto":"Confirmar o diagnóstico com FTA-ABS, iniciar penicilina benzatina, realizar seguimento mensal com VDRL, notificar o caso e orientar o tratamento do parceiro, independentemente da comparação."}],"correta":"D","resposta":"Alternativa correta: Confirmar o diagnóstico com FTA-ABS, iniciar penicilina benzatina, realizar seguimento mensal com VDRL, notificar o caso e orientar o tratamento do parceiro, independentemente da comparação. O manejo proposto está integralmente alinhado às recomendações do Ministério da Saúde (BRASIL, 2020; 2018), que orientam a confirmação diagnóstica com FTA-ABS em casos de titulação baixa de VDRL na gestação, mas ressaltam que o tratamento com penicilina benzatina deve ser iniciado imediatamente, sem aguardar resultados confirmatórios, devido ao alto risco de sífilis congênita. O seguimento mensal com VDRL permite monitorar a resposta terapêutica. A notificação compulsória é obrigatória, e o tratamento do parceiro deve ser orientado, mesmo que ele não seja comparado, para interromper a cadeia de transmissão e evitar reinfecção materna (BRASIL, 2018). Alternativas incorretas:\\n\\n- Repetir o VDRL em três meses, iniciar o tratamento com doxiciclina, encaminhar a gestante ao infectologista, notificar o caso de imediato e aguardar avaliação do parceiro antes de iniciar qualquer intervenção: a doxiciclina é contraindicada na gestação devido ao risco de efeitos adversos fetais. Aguardar três meses para repetir o VDRL e postergar o tratamento aumenta o risco de transmissão vertical e não está de acordo com as políticas públicas de eliminação da sífilis congênita (BRASIL, 2018).\\n\\n- Solicitar teste rápido de sífilis, iniciar penicilina benzatina somente após novo resultado, realizar notificação e agendar retorno trimestral, abordando o parceiro apenas se houver confirmação laboratorial adicional: o teste rápido pode ser útil, mas não substitui o FTA-ABS para confirmação laboratorial em gestantes. Adiar o início da penicilina até novo resultado é inadequado, pois o tratamento deve ser imediato. O acompanhamento trimestral é insuficiente e a abordagem do parceiro deve ser precoce, independentemente de atualização laboratorial adicional (BRASIL, 2020).\\n\\n- Aguardar o terceiro trimestre para repetir VDRL, prescrever azitromicina, monitorar trimestralmente, não realizar notificação imediata e orientar o parceiro a procurar atendimento apenas se houver sintomas: aguardar o terceiro trimestre e prescrever azitromicina são condutas incorretas, pois atrasam o início do tratamento e utilizam medicação não indicada para gestantes. A notificação deve ser imediata e a orientação ao parceiro não deve depender de sintomas, pois a sífilis pode ser assintomática (BRASIL, 2018).","needs_distractors":false},{"year":"2025.1","qnum":46,"enunciado":"(FASA VIC) Homem, 58 anos, procurou a Unidade Básica de Saúde com queixa de perda de peso de 6 kg nos últimos dois meses, febre vespertina, astenia e linfadenopatia generalizada. Relata que é viúvo, não utiliza preservativos e teve uma parceira fixa até dois meses atrás. Nunca realizou testagem para HIV. A equipe da UBS propõe a realização de testagem rápida durante a consulta. Ao ser informado da possibilidade de infecção, demonstra inquietação e questiona se o resultado poderá ser conhecido por outras pessoas da equipe ou se será incluído automaticamente no prontuário eletrônico. Também expressa receio de ser discriminado pela comunidade caso o diagnóstico se confirme. Diante do quadro clínico e das preocupações do paciente, qual é a conduta mais adequada da equipe de saúde da APS para garantir um diagnóstico responsável e eticamente seguro da infecção pelo HIV?","alternativas":[{"letra":"A","texto":"Realizar a testagem rápida com aconselhamento pré e pós-teste, assegurando o sigilo profissional e esclarecendo sobre o fluxo de registro do resultado."},{"letra":"B","texto":"Reforçar a obrigatoriedade do teste, pois o quadro clínico é compatível com infecção avançada por HIV e o rastreamento é recomendado para sua faixa etária."},{"letra":"C","texto":"Realizar o teste apenas com solicitação formal assinada, pois o diagnóstico de HIV exige autorização por escrito, conforme normas de sigilo ampliado."},{"letra":"D","texto":"Adiar a testagem até que o paciente retorne com um acompanhante de confiança, para garantir apoio emocional diante de um possível diagnóstico positivo."}],"correta":"A","resposta":"Correta: Realizar a testagem rápida com aconselhamento pré e pós-teste, assegurando o sigilo profissional e esclarecendo sobre o fluxo de registro do resultado. A conduta ética e clínica adequada envolve oferecer a testagem rápida com aconselhamento pré e pós-teste, respeitando os princípios da bioética (autonomia, beneficência, não maleficência e justiça). O sigilo sobre o resultado é um direito garantido, e o paciente deve ser informado de forma clara sobre o fluxo de notificação e confidencialidade, inclusive no registro do prontuário. Essa abordagem fortalece o vínculo, reduz o estigma e promove o cuidado centrado na pessoa, conforme diretrizes de segurança do paciente e rastreamento precoce do HIV.\\n\\nIncorretas:\\n\\nReforçar a obrigatoriedade do teste, pois o quadro clínico é compatível com infecção avançada por HIV e o rastreamento é recomendado para sua faixa etária. Embora o rastreamento seja recomendado, o teste não é compulsório, e pressionar o paciente viola a autonomia e pode prejudicar o vínculo terapêutico. Adiar a testagem até que o paciente retorne com um acompanhante de confiança, para garantir apoio emocional diante de um possível diagnóstico positivo. Embora o apoio emocional seja importante, condicionar o teste à presença de um acompanhante fere o princípio da autonomia individual, podendo atrasar um diagnóstico necessário. Realizar o teste apenas com solicitação formal assinada, pois o diagnóstico de HIV exige autorização por escrito, conforme normas de sigilo ampliado. A autorização escrita não é exigida para testagem de HIV, desde que haja consentimento verbal e registro em prontuário com aconselhamento adequado. A exigência de formalidade desnecessária pode criar barreiras ao diagnóstico precoce.","needs_distractors":false},{"year":"2025.1","qnum":47,"enunciado":"(AFYA Itabuna) Paciente masculino de 26 anos, previamente hígido, comparece ao ambulatório com quadro de oligúria há 3 dias, associado a náuseas e vômitos. Relata histórico de diarreia aquosa nos últimos 5 dias. Ao exame físico, apresenta-se desidratado (++/4), com pressão arterial de 100/60 mmHg, frequência cardíaca de 110 bpm e mucosas secas. Os exames laboratoriais revelam: Creatinina: 2,5 mg/dL, Ureia: 70 mg/dL, Hemoglobina: 13,8 g/dL, Leucócitos:\\n\\n12.000/mm³ e Urina tipo I: densidade urinária 1010, sem proteínas, sem hemácias. Considerando o quadro clínico e os exames laboratoriais, assinale a alternativa que apresenta a conduta inicial mais adequada.","alternativas":[{"letra":"A","texto":"Iniciar antibioticoterapia empírica com ceftriaxona e solicitar ultrassonografia renal para avaliação de possíveis obstruções."},{"letra":"B","texto":"Solicitar biópsia renal para investigação de possível glomerulonefrite e iniciar corticoterapia."},{"letra":"C","texto":"Iniciar diuréticos de alça para promover diurese forçada e reduzir a retenção de líquidos."},{"letra":"D","texto":"Realizar hidratação intravenosa com solução salina isotônica, monitorar débito urinário e reavaliar função renal após 24 horas."}],"correta":"D","resposta":"O paciente apresenta quadro sugestivo de lesão renal aguda de origem pré-renal, provavelmente secundária à desidratação por diarreia. A conduta inicial deve focar na reposição volêmica adequada para corrigir o déficit hídrico e avaliar a resposta renal. A monitorização do débito urinário e a reavaliação da função renal após 24 horas são essenciais para determinar a necessidade de intervenções adicionais.","needs_distractors":false},{"year":"2025.1","qnum":48,"enunciado":"(FASA VIC) Maria Aparecida, 72 anos, moradora da zona urbana, compareceu à Unidade Básica de Saúde para consulta de rotina. Está em tratamento para hanseníase multibacilar há 3 meses com poliquimioterapia padrão (rifampicina, dapsona e clofazimina). Relata fadiga ao realizar atividades simples e que se sente “mais pálida”. Ao exame físico, apresenta-se orientada, com palidez cutâneo-mucosa e frequência cardíaca de 92 bpm. O hemograma revelou:\\n\\nHemoglobina: 9,4 g/dL.\\n\\nHematócrito: 28%.\\n\\nVCM: 70 fL HCM: 23 pg Leucócitos: 6.300/mm³ Plaquetas: 270.000/mm³ A equipe de saúde analisa o caso para ajustar a conduta terapêutica com base nos achados laboratoriais e no tratamento vigente. Com base no quadro clínico-laboratorial da paciente, qual a conduta mais adequada a ser adotada pela equipe da Atenção Primária?","alternativas":[{"letra":"A","texto":"Iniciar suplementação de ferro oral, manter poliquimioterapia e intensificar vigilância de sinais de intolerância à dapsona."},{"letra":"B","texto":"Manter esquema terapêutico inalterado, pois os níveis de hemoglobina estão dentro da normalidade para a idade."},{"letra":"C","texto":"Indicar transfusão de concentrado de hemácias e suspender todos os medicamentos do esquema padrão terapêutico."},{"letra":"D","texto":"Suspender imediatamente a dapsona e encaminhar ao especialista para avaliação de troca de esquema."}],"correta":"A","resposta":"Alternativa correta: Iniciar suplementação de ferro oral, manter poliquimioterapia e intensificar vigilância de sinais de intolerância à dapsona. A paciente apresenta anemia microcítica hipocrômica, compatível com anemia ferropriva, frequentemente agravada pelo uso da dapsona (medicação sabidamente oxidante, que pode induzir hemólise crônica leve, especialmente em idosos). A conduta adequada é iniciar suplementação com ferro oral, manter a poliquimioterapia, uma vez que ela ainda é a base do tratamento da hanseníase, e acompanhar clinicamente com atenção aos sinais de hemólise mais grave.\\n\\nIncorretas:\\n\\nSuspender imediatamente a dapsona e encaminhar ao especialista para avaliação de troca de esquema. A dapsona pode causar hemólise leve, mas não há, neste caso, indicação imediata de suspensão, tampouco necessidade de troca do esquema sem tentativa prévia de manejo da anemia. Indicar transfusão de concentrado de hemácias e suspender todos os medicamentos do esquema padrão terapêutico. A transfusão está indicada apenas em casos de anemia grave ou sintomática com risco hemodinâmico, o que não é o caso aqui. Além disso, suspender todo o tratamento comprometeria o manejo da hanseníase. Manter esquema terapêutico inalterado, pois os níveis de hemoglobina estão dentro da normalidade para a idade. A hemoglobina de 9,4 g/dL está abaixo do valor considerado normal para idosos (geralmente >12 g/dL em mulheres), indicando anemia. Manter esquema sem investigar ou tratar seria uma conduta negligente.","needs_distractors":false},{"year":"2025.1","qnum":49,"enunciado":"(AFYA Santa Inês) Um paciente do sexo masculino, 22 anos, previamente hígido, procura atendimento por edema em membros inferiores, urina espumosa e aumento de peso nas últimas duas semanas. Ao exame físico, apresenta pressão arterial de 125/80 mmHg, edema perimalelar bilateral e ausculta pulmonar sem alterações. Exames laboratoriais revelam proteinúria de 4+, creatinina sérica de 1,0 mg/dL, albumina sérica de 2,1 g/dL e colesterol total de 290 mg/dL. Diante da hipótese de glomerulopatia primária com síndrome nefrótica, qual exame complementar é mais apropriado neste momento para confirmar o diagnóstico e orientar a investigação etiológica?","alternativas":[{"letra":"A","texto":"Dosagem sérica de complemento (C3 e C4)."},{"letra":"B","texto":"Eletroforese de proteínas séricas."},{"letra":"C","texto":"Relação proteína/creatinina urinária em amostra isolada."},{"letra":"D","texto":"Biópsia renal imediata."}],"correta":"C","resposta":"Dosagem sérica de complemento (C3 e C4). Incorreta. A dosagem do complemento é útil em casos suspeitos de glomerulopatias associadas a imunocomplexos, como lúpus eritematoso sistêmico e glomerulonefrite pós-infecciosa. No entanto, não é o exame inicial mais indicado para um quadro clássico de síndrome nefrótica com função renal preservada. Relação proteína/creatinina urinária em amostra isolada. Correta. Este exame permite quantificação confiável da proteinúria, substituindo a coleta de 24 horas, especialmente em pacientes ambulatoriais. É útil para confirmar o diagnóstico de síndrome nefrótica (quando >3,5 g/g) e acompanhar a resposta ao tratamento. Biópsia renal imediata. Incorreta. A biópsia renal está indicada principalmente em casos atípicos (hematúria macroscópica persistente, função renal alterada, hipertensão grave, ou ausência de resposta a corticoides). Em adultos jovens com quadro clássico de síndrome nefrótica e função renal normal, é possível iniciar avaliação laboratorial antes da biópsia. Eletroforese de proteínas séricas. Incorreta. Este exame é mais indicado em casos de suspeita de gamopatias monoclonais, como mieloma múltiplo, que são raros em adultos jovens. Não é prioritário no contexto de síndrome nefrótica primária.","needs_distractors":false},{"year":"2025.1","qnum":50,"enunciado":"(AFYA Palmas) Mulher, 46 anos, G3PN3A0, apresenta-se à consulta ambulatorial com queixa de sangramento menstrual aumentado nos últimos 2 anos. Relata ciclos menstruais regulares, a cada 27 dias, fluxo menstrual intenso, com coágulos, e duração de 10 dias, associado a dismenorreia leve, a qual melhora ao uso de analgésicos orais. Nega sangramento vaginal no momento. Traz consigo ultrassonografia transvaginal realizada há 1 mês, na qual há a descrição de aumento do volume uterino (150 cm 3 – VR: 90-120 cm 3), miométrio heterogêneo, com 4 imagens nodulares, regulares, bem delimitadas, intramurais, sugestivas de leiomiomas FIGO 4, sendo a maior delas de 2,5 cm em seu maior diâmetro. Paciente sem comorbidades, nega uso de medicações contínuas, e como método contraceptivo relata que o parceiro realizou vasectomia. A respeito do tratamento proposto para esta paciente, assinale a alternativa correta.","alternativas":[{"letra":"A","texto":"Indicar tratamento cirúrgico por meio de miomectomia, histerectomia por via laparotômica ou via vaginal, por possuir prole constituída e não apresentar desejo reprodutivo."},{"letra":"B","texto":"Propor tratamento hormonal com estrogênio e progesterona combinados ou progestágenos isolados de forma contínua ou com sistema intra-uterino liberador de levonorgestrel."},{"letra":"C","texto":"Prescrever anti-inflamatórios não esteroidais e antifibrinolíticos de forma contínua por 3 meses e iniciar terapia de reposição hormonal devido à proximidade da menopausa."},{"letra":"D","texto":"Encaminhar a paciente ao pronto atendimento, para estabilização hemodinâmica, solicitação de exame de BHCG para descartar gestação e uso de antifibrinolítico."}],"correta":"B","resposta":"A paciente em questão encontra-se em cenário ambulatorial, com queixa de sangramento uterino anormal crônico, sem sangramento no momento, e, portanto, deve ser tratada com as opções de tratamento disponíveis e adequadas a este cenário. A mesma possui como causa estrutural os miomas intramurais FIGO 4. Os miomas submucosos e os intramurais com componente submucoso geralmente são tratados cirurgicamente, enquanto os demais (como neste caso) podem ser submetidos a tratamento farmacológico, que tem como opções os mesmos medicamentos disponíveis para SUA de causa não estrutural. Em geral, a primeira linha de tratamento do SUA é medicamentosa, destinando-se o tratamento cirúrgico a falha ou contraindicação a tratamento clínico ou a casos de instabilidade hemodinâmica importante. As opções disponíveis são tratamento hormonal (estrogênio e progestagênio combinados, progestagênio oral cíclico ou contínuo, progestagênio injetável, sistema intrauterino liberador de levonorgestrel) e tratamento não hormonal (anti-inflamatórios, antifibrinolíticos). Os antifibrinolíticos e os AINEs são opções não hormonais para cessar o episódio de sangramento, não devendo seu uso ultrapassar 5 dias de duração. Uso contínuo por 3 meses não é prática recomendada, podendo causar efeitos adversos. Podem ser usados isoladamente ou como terapia adjuvante de um tratamento hormonal. Não há indicação de TRH porque a paciente não se encontra no climatério. Não havendo resposta ao tratamento clínico, deve-se considerar a abordagem cirúrgica, na qual a via e o tipo de abordagem dependerão do número, da localização, do tamanho do mioma e do desejo futuro de concepção. As opções são miomectomia ou histerectomia por via vaginal, laparoscópica ou laparotômica.","needs_distractors":false},{"year":"2025.2","qnum":1,"enunciado":"(AFYA ITABUNA) Um homem de 38 anos, portador de SIDA (ou AIDS) em estágio avançado (CD4 < 100 cél/mm³), procura a UBS relatando diarreia com sangue vivo, muco e tenesmo há 5 dias, associada a perda ponderal e febre intermitente. Nega uso regular da TARV. Ao exame: PA 110x70 mmHg, FC 98 bpm, palidez +/4+, abdome doloroso à palpação em hipogástrio, sem sinais de peritonite. O toque retal revela presença de sangue vermelho vivo e muco. Considerando o quadro e as possibilidades diagnósticas, qual das abordagens abaixo é a mais apropriada na UBS?","alternativas":[{"letra":"A","texto":"Reforçar hidratação oral e prescrever antidiarreicos, pois a maioria dos casos de HDB em pacientes com HIV é autolimitada e não requer investigação na atenção básica."},{"letra":"B","texto":"Iniciar empiricamente metronidazol e ciprofloxacina, colher exames laboratoriais básicos e encaminhar para colonoscopia eletiva visando descartar retocolite ulcerativa."},{"letra":"C","texto":"Encaminhar imediatamente para o pronto-socorro com suspeita de sangramento alto, uma vez que a diarreia com sangue vivo sugere HDA em imunossuprimido."},{"letra":"D","texto":"Investigar etiologias infecciosas frequentes em imunossuprimidos, como Citomegalovírus ,Shigella , Entamoeba histolytica e Cryptosporidium , iniciando coleta de parasitológico de fezes e pesquisa de leucócitos fecais, além de orientar reintrodução urgente da TARV."}],"correta":"D","resposta":"Em pacientes com SIDA avançada, a diarreia com sangue pode ter causas infecciosas graves, como: CMV colite (muito comum em CD4 < 100); Shigella, Salmonella, Campylobacter (bactérias invasivas); Entamoeba histolytica (protozoário com potencial invasivo e ulcerativo); e Cryptosporidium (em geral causa diarreia aquosa, mas pode coexistir com outras infecções). A atenção básica pode e deve iniciar investigação com: parasitológico de fezes com pesquisa de leucócitos, avaliação clínica e anamnese detalhada, início da reintrodução ou adesão à TARV, medida essencial para controle imunológico, e encaminhamento para serviços especializados, se necessário. Embora parte do tratamento possa envolver antibióticos, a presunção de retocolite ulcerativa (autoimune) sem descartar causas infecciosas oportunistas em paciente com SIDA é inadequada. HDA (Hemorragia Digestiva Alta) costuma se manifestar com melena ou vômito com sangue – não com sangue vivo nas fezes. Uso de antidiarreicos em diarreia infecciosa com sangue é contraindicado, pois pode agravar a retenção de toxinas ou prolongar a infecção.","needs_distractors":false},{"year":"2025.2","qnum":2,"enunciado":"(UNIFIPMOC) Um menino de 7 anos é levado ao pronto-socorro com história de astenia, taquidispneia, cansaço aos pequenos esforços e surgimento de edema discreto de membros inferiores. A mãe refere que há 10 dias apresentou quadro de febre, diarreia e vômitos. Nas últimas horas, evoluiu com piora da hipoatividade e surgimento de esforço respiratório. Ao exame físico observava-se:\\n\\nFC 168 bpm, FR 40 irpm, SpO₂ 92% em ar ambiente. PA 78/42 mmHg Perfusão: tempo de enchimento capilar 5s, extremidades frias, pulsos periféricos fracos. Turgência jugular, hepatomegalia 4 cm. Ausculta pulmonar com estertores subcreptantes em ambas as bases. Diurese < 0,5 mL/kg/h nas últimas 4 horas Iniciado oxigênio a 100% sob máscara com reservatório e administrados 10 mL/kg de cristaloide isotônico sem melhora hemodinâmica. Qual é a conduta imediata mais adequada?","alternativas":[{"letra":"A","texto":"Repetir bolus de 20 mL/kg de cristaloide, seguido de, em 20 minutos, iniciar dopamina em infusão contínua."},{"letra":"B","texto":"Iniciar epinefrina em infusão contínua em baixa dose, após ressuscitação volêmica cautelosa, considerando suporte inotrópico precoce."},{"letra":"C","texto":"Iniciar norepinefrina em acesso periférico como droga de primeira escolha para restaurar perfusão sistêmica."},{"letra":"D","texto":"Proceder à intubação orotraqueal imediata com propofol em bolus."}],"correta":"B","resposta":"Repetir 20 mL/kg de cristaloide + dopamina – Incorreta No choque cardiogênico, a reposição volêmica deve ser cautelosa (5–10 mL/kg, lenta e com reavaliação), pois volumes excessivos pioram a congestão pulmonar e a função ventricular. A dopamina não é recomendada como primeira linha em choque cardiogênico pediátrico; estudos mostram maior taxa de efeitos adversos e menor eficácia comparada à epinefrina. Norepinefrina como primeira escolha – Incorreta A norepinefrina é preferida no choque distributivo séptico (vasodilatado), pois aumenta a resistência vascular sistêmica. No choque cardiogênico, a prioridade é melhorar a contratilidade e o débito cardíaco com inotrópico (epinefrina/milrinona/dobutamina), e não apenas elevar a pós-carga. Epinefrina em baixa dose + volume cauteloso – Correta A epinefrina é a droga de escolha no choque cardiogênico pediátrico, pois oferece efeito inotrópico e cronotrópico com suporte vasopressor leve. Deve ser usada em baixa dose contínua, ajustada conforme resposta. O manejo volêmico deve ser restrito (bolus de 5– 10 mL/kg), monitorando sinais de congestão. Intubação imediata com propofol em bolus – Incorreta e arriscada. Proceder à intubação sem estabilização hemodinâmica pode levar a colapso circulatório. Além disso, o propofol é contraindicado em choque e disfunção miocárdica, por causar vasodilatação e depressão miocárdica significativas. Se a via aérea for necessária, devem-se usar drogas hemodinamicamente estáveis (ex.: etomidato, ketamina com cautela) após otimização cardiovascular.","needs_distractors":false},{"year":"2025.2","qnum":3,"enunciado":"(UNIPTAN) Paciente masculino, 28 anos, admitido com injúria renal aguda (IRA) rapidamente progressiva secundária a uma glomerulonefrite de etiologia a esclarecer. Apesar da pulsoterapia com corticoides, o paciente evolui com piora. Exames laboratoriais atuais revelam creatinina sérica de 4,8 mg/dL e ureia de 130 mg/dL. O paciente queixa-se de fraqueza generalizada, porém nega náuseas, vômitos ou dor torácica. Ao exame, encontra-se orientado em tempo e espaço. O volume urinário nas últimas 24 horas foi de 500 mL. Uma gasometria arterial recente demonstra pH de 7,18, pCO₂ de 30 mmHg e bicarbonato de 12 mEq/L mesmo após medidas para controle. Considerando o caso apresentado, qual dos achados abaixo indica a necessidade imediata de iniciar terapia renal substitutiva?","alternativas":[{"letra":"A","texto":"Nível de creatinina acima de 4,0 mg/dL."},{"letra":"B","texto":"Acidose metabólica refratária."},{"letra":"C","texto":"Nível de ureia acima de 100 mg/dL."},{"letra":"D","texto":"Débito urinário < 1L/dia."}],"correta":"B","resposta":"Justificativa da alternativa correta A questão busca reconhecer as indicações de hemodiálise de urgência, a saber: acidose metabólica refratária, hipercalemia refratária, hipervolemia refratária, intoxicações exógenas e sintomas urêmicos (pericardite, pleurite, náuseas, vômitos, encefalopatia). Dessa forma, correta a alternativa \\"Acidose metabólica refratária\\". Justificativa das alternativas incorretas Nível de creatinina acima de 4,0 mg/dL.\\n\\nErro: A elevação da creatinina não é, isoladamente, indicação para início imediato de terapia renal substitutiva (TRS). O valor indica gravidade da disfunção renal, mas a decisão depende de manifestações clínicas e metabólicas refratárias ao tratamento conservador. Nível de ureia acima de 100 mg/dL.\\n\\nErro: assim como a creatinina, a ureia elevada não constitui critério absoluto para iniciar TRS. O valor pode variar conforme o catabolismo e o estado de hidratação, devendo ser interpretado junto a sintomas urêmicos ou complicações metabólicas. Débito urinário < 1L/dia.\\n\\nErro: Oligúria (< 400–500 mL/dia) é sinal de piora da função renal, mas não é critério isolado para diálise imediata. A decisão depende da presença de complicações graves (acidose, hipercalemia, uremia sintomática ou sobrecarga hídrica).","needs_distractors":false},{"year":"2025.2","qnum":4,"enunciado":"(UNIGRANRIO CAXIAS) Mãe, 28 anos, primigesta, obesa, apresentou hipertensão durante a gravidez. O bebê nasceu de parto cesárea, com 37 semanas, pesando 3.200 g, líquido amniótico claro com grumos. Ao nascer, não chorou, apresentou tônus diminuído e é levado ao berço aquecido. Sob calor radiante, após secagem e estímulo tátil, aos 30 segundos de vida apresenta respiração irregular e frequência cardíaca de 90 bpm. Qual é a conduta inicial adequada para esse recém-nascido?","alternativas":[{"letra":"A","texto":"Oferecer calor, iniciar compressões torácicas imediatas, aplicar VPP com oxigênio a cem por cento e prosseguir mesmo sem tentativa prévia de ventilação."},{"letra":"B","texto":"Prover calor, estimular vigorosamente por um minuto completo, administrar oxigênio suplementar a quarenta por cento e apenas depois iniciar ventilação."},{"letra":"C","texto":"Manter calor, aspirar boca e narinas de forma rotineira, oferecer oxigênio a 100% com máscara e aguardar reavaliação após trinta segundos."},{"letra":"D","texto":"Garantir calor, posicionar a cabeça em leve extensão, aspirar somente se houver obstrução, iniciar VPP com ar ambiente devido à frequência cardíaca menor que cem."}],"correta":"D","resposta":"Justificativa:\\n\\nManter calor, aspirar boca e narinas de forma rotineira, oferecer oxigênio a 100% com máscara e aguardar reavaliação após trinta segundos. Errada. Em recém-nascido ≥34 semanas levado ao berço aquecido por ausência de choro e tônus inadequado, as manobras iniciais corretas são: prover calor, posicionar a via aérea (leve extensão), secar/estimular e avaliar respiração e FC; aspiração é seletiva (somente se houver secreção obstrutiva/meconial com obstrução). Oxigênio a 100% de rotina não é indicado em termo; se houver respiração irregular e FC <100 bpm, a conduta é iniciar VPP com ar ambiente (21%), reavaliando em 30 s. A alternativa erra ao propor aspiração rotineira e O₂ a 100% antes de VPP. (SBP, Diretrizes de Reanimação Neonatal 2022) Garantir calor, posicionar a cabeça em leve extensão, aspirar somente se houver obstrução, iniciar VPP com ar ambiente devido à frequência cardíaca menor que cem. Certa. Em RN ≥ 34 semanas que não chorou e tem tônus diminuído, após 30 s de medidas iniciais, permanece com respiração irregular e FC 90 bpm: indica-se VPP com 21% (ar ambiente), mantendo calor, posicionamento em leve extensão, aspiração apenas se obstrução, secagem/estímulo e avaliação seriada de respiração e FC. Esse encadeamento (A-B-C-D-E do passo a passo) está alinhado às Diretrizes SBP 2022 para ≥34 semanas. (SBP, 2022) Prover calor, estimular vigorosamente por um minuto completo, administrar oxigênio suplementar a quarenta por cento e apenas depois iniciar ventilação. Errada. O estímulo prolongado por 1 minuto posterga o que importa (VPP) quando há respiração irregular e FC <100. Também não se recomenda oxigênio suplementar a 40% antes de VPP em termo. Para ≥34 semanas, o início é VPP com 21% quando indicado; O₂ suplementar é titulado conforme saturação/oximetria e resposta, não administrado empiricamente antes da VPP. (SBP, 2022) Oferecer calor, iniciar compressões torácicas imediatas, aplicar VPP com oxigênio a cem por cento e prosseguir mesmo sem tentativa prévia de ventilação. Errada. Compressões torácicas só são indicadas após 30 s de VPP eficaz se a FC permanecer <60 bpm. Neste caso, a FC é 90 bpm; portanto, a prioridade é VPP eficaz com 21%, sem compressões. Além disso, propor VPP com 100% de O₂ desde o início para termo não está de acordo com a recomendação para ≥34 semanas. (SBP, 2022)","needs_distractors":false},{"year":"2025.2","qnum":5,"enunciado":"(UNINOVAFAPI) Uma médica recém-chegada a uma Unidade de Saúde Fluvial relata dificuldades para organizar o cuidado longitudinal de uma comunidade ribeirinha. As famílias vivem em áreas dispersas, sem energia elétrica, acesso à internet ou transporte terrestre. Há elevado número de gestantes sem pré-natal e altos índices de verminoses e doenças de pele nas crianças. Considerando os princípios do SUS e a PNSIPCF, qual deve ser a abordagem mais adequada da APS para a população ribeirinha descrita?","alternativas":[{"letra":"A","texto":"Estabelecer parcerias com serviços de saúde urbanos, transferindo a população para tratamento e acompanhamento rotineiro."},{"letra":"B","texto":"Incentivar que a população busque atendimento nas cidades polos, a fim de facilitar o acesso a exames e consultas com especialistas."},{"letra":"C","texto":"Priorizar o uso de ferramentas digitais e atendimento remoto, dada a impossibilidade de acesso regular por via fluvial."},{"letra":"D","texto":"Desenvolver ações em saúde por meio de equipes itinerantes, com articulação intersetorial e foco em vigilância em saúde, educação sanitária e fortalecimento do vínculo com a comunidade."}],"correta":"D","resposta":"Desenvolver ações em saúde por meio de equipes itinerantes, com articulação intersetorial e foco em vigilância em saúde, educação sanitária e fortalecimento do vínculo com a comunidade. Correta. Essa abordagem é central na PNSIPCF, que orienta o cuidado à população ribeirinha com base na APS itinerante, foco em ações de promoção, prevenção e educação em saúde e forte articulação com outras políticas públicas (saneamento, educação, assistência social), respeitando os modos de vida locais e promovendo o vínculo longitudinal com a equipe. Priorizar o uso de ferramentas digitais e atendimento remoto, dada a impossibilidade de acesso regular por via fluvial. Incorreta. O uso de ferramentas digitais é limitado por ausência de conectividade nessas áreas. A estratégia remota é inviável como abordagem principal. Estabelecer parcerias com serviços de saúde urbanos, transferindo a população para tratamento e acompanhamento rotineiro. Incorreta. A transferência para centros urbanos é excepcional. O cuidado deve ser garantido no território, com resolutividade da APS. Incentivar que a população busque atendimento nas cidades polos, a fim de facilitar o acesso a exames e consultas com especialistas. Incorreta. Essa lógica sobrecarrega os centros urbanos e fere os princípios de equidade e descentralização do SUS.","needs_distractors":false},{"year":"2025.2","qnum":6,"enunciado":"(UNIGRANRIO BARRA) Lactente de 1 ano e 8 meses, masculino, é trazido à emergência com taquipneia, sibilos difusos, retrações subcostais, batimento de asa de nariz e gemência. Está hipoativo no colo da mãe. Saturação de O₂: 90% em ar ambiente. Ausculta revela murmúrio vesicular diminuído e sibilos bilaterais. Qual é a conduta inicial mais adequada quanto ao tratamento e à forma de oferta de oxigênio?","alternativas":[{"letra":"A","texto":"Iniciar nebulização com solução salina hipertônica e oxigênio com máscara sem reservatório; o quadro é compatível com bronquiolite viral."},{"letra":"B","texto":"Fornecer oxigênio por cateter nasal, administrar corticosteroide sistêmico e, caso não haja resposta clínica, iniciar salbutamol por via inalatória."},{"letra":"C","texto":"Administrar oxigênio por máscara com reservatório para manter SpO₂ ≥ 94% e iniciar salbutamol inalatório isolado."},{"letra":"D","texto":"Iniciar oxigênio por cateter nasal ou máscara com reservatório para manter SpO₂ ≥ 94%, associar salbutamol + brometo de ipratrópio inalados em doses repetidas e corticosteroide sistêmico."}],"correta":"D","resposta":"Segundo o PALS, em crianças com insuficiência respiratória por broncoespasmo (como na asma ou bronquiolite grave), o tratamento inicial inclui oferta de oxigênio suplementar com o objetivo de manter SpO₂ ≥ 94%. O oxigênio deve ser administrado por máscara com reservatório ou máscara facial, conforme a gravidade, e deve-se iniciar broncodilatadores inalados (salbutamol) o quanto antes. A ventilação com bolsa-válvula é reservada para casos de falência respiratória. O lactente apresenta sinais de desconforto respiratório grave (retratação, BAT, gemência, hipoatividade) e hipoxemia (SpO₂ 90%). Conduta inicial em crise asmática grave/primeiro episódio sibilante grave:\\n\\nOxigênio suplementar para manter SpO₂ ≥ 94%. Broncodilatadores inalados:\\n\\nSalbutamol + ipratrópio (3 doses na 1ª hora). Corticosteroide sistêmico precoce. Monitorização contínua. Restante das alternativas incorretas:\\n\\nAlternativa Erro Administrar oxigênio por máscara com reservatório para manter SpO₂ ≥ 94% e iniciar salbutamol inalatório isolado. Máscara com reservatório é para falência respiratória iminente; salbutamol deveria ser associado ao ipratrópio. Fornecer nebulização com solução salina hipertônica e observar em ar ambiente, pois o quadro é compatível com bronquiolite viral. Não é bronquiolite — há hipoxemia grave e sibilância responsiva a broncodilatador. Administrar apenas corticosteroide sistêmico inicialmente e aguardar resposta clínica para decidir sobre broncodilatador. Não se espera resposta sem broncodilatadores — risco de piora respiratória.","needs_distractors":false},{"year":"2025.2","qnum":7,"enunciado":"(IESVAP) Em uma Unidade Básica de Saúde, uma adolescente de 16 anos, G1P0, com 37 semanas e 3 dias de gestação, comparece relatando contrações regulares a cada 5 minutos há aproximadamente 3 horas. Ao exame físico, apresenta colo apagado em 80%, dilatação de 5 cm, membranas íntegras e batimentos cardiofetais normais. Encontra-se calma, acompanhada de uma amiga, e informa não desejar que sua mãe seja comunicada. Considerando as diretrizes do Ministério da Saúde para o manejo do trabalho de parto na atenção primária, bem como os princípios de biossegurança e ética médica, qual deve ser a conduta mais adequada da equipe de saúde?","alternativas":[{"letra":"A","texto":"Respeitar o desejo da adolescente de não envolver familiares, adotar medidas de suporte inicial e encaminhá-la com segurança e comunicação prévia à maternidade de referência para continuidade do parto."},{"letra":"B","texto":"Encaminhar imediatamente ao hospital de referência e informar obrigatoriamente a mãe e o Conselho Tutelar sobre o caso, por se tratar de menor em trabalho de parto."},{"letra":"C","texto":"Realizar analgesia e amniotomia para acelerar o trabalho de parto, mantendo observação até o início do período expulsivo, e só então transferir."},{"letra":"D","texto":"Considerando que a paciente em questão encontra-se em trabalho de parto inicial, o ideal é observar a evolução do trabalho de parto na UBS até que a dilatação atinja 6 cm, garantindo suporte emocional e biossegurança antes de transferir para o hospital de referência."}],"correta":"A","resposta":"A gestante apresenta trabalho de parto ativo (≥ 3 cm de dilatação), o que exige transferência imediata e segura para unidade de referência obstétrica, conforme as Diretrizes Nacionais de Assistência ao Parto Normal e o Manual de Atenção ao Pré-Natal e Puerpério (MS, 2022). Na atenção primária, a equipe deve garantir acolhimento, suporte inicial (hidratação, medidas de conforto, avaliação de vitalidade fetal) e comunicação com o serviço de referência, assegurando transporte seguro e contínuo cuidado materno-fetal. As condutas invasivas (analgesia, amniotomia) ou a retenção da paciente em trabalho de parto ativo na UBS violam princípios de segurança e biossegurança. Do ponto de vista ético, a adolescente tem direito à privacidade e confidencialidade, especialmente quanto a aspectos pessoais, conforme o ECA e o Código de Ética Médica, devendo-se comunicar familiares apenas quando necessário à segurança clínica.","needs_distractors":false},{"year":"2025.2","qnum":8,"enunciado":"(UNIDEP) Um homem de 32 anos, previamente saudável, procura atendimento médico em uma unidade de saúde após retornar de uma viagem a uma área rural da Amazônia, onde permaneceu por 3 semanas. Ele relata início de febre alta, calafrios intensos, dor de cabeça, mialgia, e sudorese há cerca de 5 dias. Refere também náuseas, mal-estar geral e que os episódios febris ocorrem de forma intermitente, geralmente a cada 48 horas. Ao exame físico, o paciente apresenta-se febril (38,8 °C), esplenomegalia leve e estado geral comprometido. Não há sinais de rigidez de nuca ou alterações neurológicas. Considerando as informações do caso, avalie as alternativas abaixo:\\n\\nI) O diagnóstico mais provável é de chikungunya e o exame a ser solicitado é a sorologia para chikungunya.\\n\\nII) O diagnóstico mais provável é de malária e o exame a ser solicitado é a microscopia da gota espessa.\\n\\nIII) A malária é uma doença infecciosa aguda causada pelo Plasmodium.\\n\\nIV) Independente da hipótese diagnóstica, o manejo é apenas sintomático, não sendo necessário uso de medicações específicas. Estão corretas as afirmações contidas nas alternativas:","alternativas":[{"letra":"A","texto":"II e IV"},{"letra":"B","texto":"I e III"},{"letra":"C","texto":"II e III"},{"letra":"D","texto":"I e IV"}],"correta":"C","resposta":"o quadro é sugestivo de malária, considerando os sinais clínicos e a história epidemiológica do paciente. A malária é causada pelo Plasmodium (vivax, falciparum, malarie e ovale). O Diagnóstico deve ser realizado pela microscopia da gota espessa que demonstra a quantidade de parasitas contados por campo. O manejo deve ser realizado com antimaláricos e primaquina.","needs_distractors":false},{"year":"2025.2","qnum":9,"enunciado":"(AFYA PARAÍBA) Um menino de 8 anos é trazido pela mãe à Unidade Básica de Saúde (UBS) com edema generalizado apresentado progressivamente há 2 semanas, sem história de febre recente ou infecção de vias respiratórias ou de urina espumosa visível. Ao exame: pressão arterial normal, sem hematúria visível, sem rash e com função renal preservada. Exame de urina: proteinúria maciça (++++), sem células ou cilindros vermelhos em número significativo. Proteína/creatinina urinária elevada, albumina sérica baixa, colesterol alto. Com base nesses achados clínicos e laboratoriais, qual o diagnóstico mais provável?","alternativas":[{"letra":"A","texto":"Glomeruloesclerose segmentar e focal (FSGS)."},{"letra":"B","texto":"Nefropatia por IgA (IgA- nefropathy )."},{"letra":"C","texto":"Glomerulonefrite pós‑estreptocócica (GNPE)."},{"letra":"D","texto":"Doença de lesões mínimas (MCD)."}],"correta":"D","resposta":"Doença de lesões mínimas - MCD (alternativa correta): Esta é a causa mais comum de síndrome nefrótica idiopática em crianças (especialmente entre 2 e 10 anos), caracterizada por quadro clássico de edema, proteinúria maciça, hipoalbuminemia, hipercolesterolemia, sem hematúria ou hipertensão marcante, e geralmente boa resposta a corticoide. No cenário da questão — criança de 8 anos, quadro de edema lento, proteinúria maciça, sem sinais de glomerulonefrite (hematúria, hipertensão) — este diagnóstico encaixa muito bem. Glomerulonefrite pós-estreptocócica - GNPE (alternativa incorreta): Caracteriza-se tipicamente por história recente de infecção de garganta ou de pele (estreptococo), manifestação de síndrome nefrítica (hematuria, hipertensão, edema), diminuição de C3 em muitos casos. No nosso caso: sem infecção recente, sem hematúria, pressão normal — isso torna GNPE improvável. Nefropatia por IgA - IgA- nefropathy (alternativa incorreta): Geralmente se manifesta em crianças/adolescentes com hematúria macroscópica (às vezes após infecção de vias respiratórias) ou micro-hematúria persistente, muitas vezes proteinúria leve/moderada, e curso mais crônico. Glomeruloesclerose segmentar e focal - FSGS (alternativa incorreta): Também pode se manifestar como síndrome nefrótica em crianças, especialmente se for resistente a tratamento ou em certas condições de risco. Embora seja possível, geralmente tem pior prognóstico, pode haver mais hipertensão, hematúria leve, e é menos “clássico” para o quadro típico puro de síndrome nefrótica em criança saudável .","needs_distractors":false},{"year":"2025.2","qnum":10,"enunciado":"(AFYA BRAGANÇA) Um paciente de 72 anos, portador de diabetes mellitus tipo 2 e doença arterial coronariana estável, faz uso regular de metformina 850 mg 2x/dia e ácido acetilsalicílico 100 mg/dia. Foi agendada uma cirurgia eletiva de hernioplastia inguinal sob anestesia geral. Durante a avaliação pré-operatória, o cirurgião solicita parecer clínico quanto à continuidade ou suspensão das medicações. Considerando o perfil do paciente, as características da cirurgia e os riscos envolvidos, qual a conduta mais apropriada em relação às medicações durante o preparo pré-operatório?","alternativas":[{"letra":"A","texto":"Manter o ácido acetilsalicílico para prevenir eventos isquêmicos e suspender a metformina 24 a 48 horas antes da cirurgia."},{"letra":"B","texto":"Suspender o ácido acetilsalicílico apenas no dia da cirurgia e manter a metformina para controle glicêmico intraoperatório."},{"letra":"C","texto":"Suspender o ácido acetilsalicílico cinco dias antes para evitar sangramento e manter a metformina até o dia da cirurgia."},{"letra":"D","texto":"Manter ambas as medicações, pois não interferem significativamente no risco cirúrgico e na possibilidade de complicações."}],"correta":"A","resposta":"O ácido acetilsalicílico não deve ser suspenso rotineiramente em pacientes com doença coronariana estável submetidos a cirurgias de baixo risco, como hernioplastias. Já a metformina deve ser suspensa antes da cirurgia por risco de acidose láctica, exigindo suspensão temporária antes de cirurgias com jejum prolongado, e o AAS deve ser mantido, mas não de forma irrestrita. A suspensão do AAS apenas no dia da cirurgia não é suficiente para reversão do efeito antiplaquetário, e manter a metformina no intraoperatório é contraindicado em jejum prolongado. Logo, a conduta ideal é manter o AAS, considerando seu benefício cardiovascular em paciente com DAC, e suspender a metformina devido ao risco de acidose láctica em situações de jejum ou uso de contraste.","needs_distractors":false},{"year":"2025.2","qnum":11,"enunciado":"(BANCO AFYA) Lactente de 10 meses, previamente saudável, é levado à UBS após episódio de engasgo com pedaço de maçã durante a alimentação. Desde então, evoluiu com choro fraco, irritabilidade e piora progressiva do padrão respiratório. No exame: FC 178 bpm, FR 56 irpm, PA 72/42 mmHg, SatO₂ 89% em ar ambiente, perfusão capilar > 4 segundos, extremidades frias e turgência jugular discreta. Apresenta murmúrio vesicular globalmente diminuído, roncos audíveis e importante esforço respiratório, sem estertores ou sopros. Considerando o quadro clínico e os princípios de atendimento às emergências na Atenção Primária, qual o diagnóstico provável e a conduta inicial adequada?","alternativas":[{"letra":"A","texto":"Choque distributivo, devido à taquicardia, má perfusão e instabilidade hemodinâmica; iniciar reposição volêmica vigorosa com cristaloides, ofertar oxigenoterapia suplementar e observar evolução clínica local antes de transferir."},{"letra":"B","texto":"Insuficiência respiratória aguda isolada, com hipóxia secundária à aspiração alimentar; iniciar broncodilatadores por nebulização, estimular hidratação e manter em observação até melhora clínica acompanhada de estabilidade vital."},{"letra":"C","texto":"Choque obstrutivo secundário à aspiração de corpo estranho, pela presença de hipoperfusão, esforço respiratório, taquicardia e turgência jugular; garantir via aérea de forma imediata e acionar transporte emergencial para unidade com suporte avançado."},{"letra":"D","texto":"Choque cardiogênico decorrente de disfunção ventricular aguda, com hipotensão e má perfusão; administrar inotrópicos e suporte ventilatório na UBS, evitando intervenções na via aérea até exames complementares confirmarem etiologia."}],"correta":"C","resposta":"justificativas Alternativa A v a li a ç ã o Justificativa Choque distributivo, devido à taquicardia, má perfusão e instabilidade hemodinâmica; iniciar reposição volêmica vigorosa com cristaloides, ofertar oxigenoterapia suplementar e observar evolução clínica local antes de transferir. E rr a d a Choque distributivo → extremidades quentes, pulsos amplos. Aqui há extremidades frias, turgência jugular, hipoperfusão Choque obstrutivo secundário à aspiração de corpo estranho, pela presença de hipoperfusão, esforço respiratório, taquicardia e turgência jugular; garantir via aérea de forma imediata e acionar transporte emergencial para unidade com suporte avançado. C o rr e t a Aspiração + sinais de obstrução + choque (hipotensão, taquicardia, perfusão lenta). Conduta:\\n\\nvia aérea + transferência imediata Choque cardiogênico decorrente de disfunção ventricular aguda, com hipotensão e má perfusão; administrar inotrópicos e suporte ventilatório na UBS, evitando intervenções na via aérea até exames complementares confirmarem etiologia. E rr a d a Cardiogênico → estertores, hepatomegalia, sem turgência jugular discreta pós-aspiração; não se posterga via aérea para exames Insuficiência respiratória aguda isolada, com hipóxia secundária à aspiração alimentar; iniciar broncodilatadores por nebulização, estimular hidratação e manter em observação até melhora clínica acompanhada de estabilidade vital. E rr a d a Não é apenas respiratório; há choque (hipotensão, perfusão lenta, extremidades frias), portanto conduta expectante é inadequada","needs_distractors":false},{"year":"2025.2","qnum":12,"enunciado":"(ITPAC PORTO NACIONAL) Gestante de 28 anos, G2P1A0, com 9 semanas de gestação e ausência de BCF na ultrassonografia. Procura atendimento com febre (38,5 °C), dor abdominal intensa tipo cólica e secreção vaginal fétida associada a sangramento moderado. No exame físico, apresenta frequência cardíaca de 110 bpm, pressão arterial de 100/60 mmHg, útero doloroso à palpação e orifício cervical entreaberto. Qual é a conduta inicial mais adequada para essa paciente?","alternativas":[{"letra":"A","texto":"Prescrever antibiótico oral e agendar o esvaziamento uterino para realização ambulatorial após melhora clínica."},{"letra":"B","texto":"Administrar medicação uterotônica para favorecer a expulsão espontânea dos produtos da concepção sem necessidade de antibiótico inicial."},{"letra":"C","texto":"Iniciar antibioticoterapia intravenosa de amplo espectro, realizar estabilização clínica e proceder ao esvaziamento uterino de forma precoce em ambiente hospitalar."},{"letra":"D","texto":"Solicitar ultrassonografia pélvica e manter observação clínica por 24 horas, adiando medidas invasivas e antibióticos até confirmação diagnóstica."}],"correta":"C","resposta":"Alternativa Análise Iniciar antibioticoterapia intravenosa de amplo espectro, realizar estabilização clínica e proceder ao esvaziamento uterino de forma precoce em ambiente hospitalar Certa. Quadro compatível com abortamento séptico. Conduta:\\n\\nantibioticoterapia IV imediata, estabilização e esvaziamento uterino precoce, conforme ALSO 2023. Prescrever antibiótico oral e agendar o esvaziamento uterino para realização ambulatorial após melhora clínica. Errada. Antibiótico oral e manejo ambulatorial são inadequados em quadro séptico com instabilidade clínica e infecção intrauterina. Administrar medicação uterotônica para favorecer a expulsão espontânea dos produtos da concepção sem necessidade de antibiótico inicial. Errada. Uterotônico não é indicado inicialmente em aborto séptico. Risco de piorar retenção e sepse. Prioridade é antibiótico + esvaziamento uterino. Solicitar somente ultrassonografia pélvica e manter observação clínica por 24 horas, adiando medidas invasivas e antibióticos até confirmação diagnóstica. Errada. A conduta não é expectante. Atraso terapêutico aumenta risco de choque séptico e óbito materno.","needs_distractors":false},{"year":"2025.2","qnum":13,"enunciado":"(AFYA ABAETETUBA) Homem, 34 anos, previamente hígido, chega à UPA no 6.º dia de doença, com história prévia de febre, cefaleia, mialgia intensa e inapetência. Refere piora do estado geral nas últimas horas, com sonolência, sensação de desmaio, dor abdominal difusa e oligúria. Ao exame físico, está pálido, sudorético, confuso, taquicárdico (FC 128 bpm), com pressão arterial 90/60 mmHg em decúbito e enchimento capilar lento. Extremidades frias e pulsos finos. Saturação de O₂ 96% em ar ambiente. Prova do laço positiva. Hemograma realizado na sala de emergência mostra hematócrito de 52% e plaquetas de 38.000/mm³. Considerando as classificações de dengue e o manejo adequado no setor de urgência, qual deve ser a conduta imediata?","alternativas":[{"letra":"A","texto":"Grupo D : tratar como choque hipovolêmico, iniciar reposição volêmica imediata com solução cristaloide em bolus, monitorização intensiva e transferência urgente para UTI."},{"letra":"B","texto":"Grupo A, choque séptico, iniciar antibiótico empírico de amplo espectro, reposição venosa conforme protocolo para sepse e manter observação até resultados laboratoriais específicos."},{"letra":"C","texto":"Grupo C : iniciar hidratação venosa com cristaloide em ritmo acelerado, monitorização contínua na unidade e transferência programada para hospital após estabilização inicial hemodinâmica."},{"letra":"D","texto":"Grupo B : administrar hidratação venosa moderada, manter observação clínica contínua na UPA, solicitar reavaliação laboratorial seriada e programar retorno após melhora clínica progressiva."}],"correta":"A","resposta":"Quadro de justificativas Alternativa Interpretaç ão Por que está certa/errada Grupo B: administrar hidratação venosa moderada, manter observação clínica contínua na UPA, solicitar reavaliação laboratorial seriada e programar retorno após melhora clínica progressiva. Grupo B Errada — Grupo B não inclui choque; aqui há hipoperfusão, hipotensão, extremidades frias, Ht↑ Grupo C: iniciar hidratação venosa com cristaloide em ritmo acelerado, monitorização contínua na unidade e transferência programada para hospital após estabilização inicial hemodinâmica. Grupo C Errada — Grupo C = sinais de alarme, porém sem choque; aqui existe choque estabelecido Grupo D: tratar como choque hipovolêmico, iniciar reposição volêmica imediata com solução cristaloide em bolus, monitorização intensiva e transferência urgente para UTI. Grupo D Correta — choque por dengue: taquicardia, hipotensão, Ht elevado, perfusão ruim → bolus + transferência imediata Grupo A, choque séptico, iniciar antibiótico empírico de amplo espectro, reposição venosa conforme protocolo para sepse e manter observação até resultados laboratoriais específicos. Grupo A Errada — quadro clássico de dengue grave, antibiótico não é primeira conduta e atrasaria o manejo","needs_distractors":false},{"year":"2025.2","qnum":14,"enunciado":"(BANCO AFYA) Gestante de 37 anos, G3P2, com 38 semanas, antecedente de cesariana prévia há 2 anos, é admitida na maternidade em trabalho de parto ativo. Após 6 horas de evolução, queixando-se de dor súbita e intensa no baixo ventre, seguida de mal-estar, palidez e sensação de desmaio iminente. Ao exame, encontram-se os seguintes sinais vitais: FC 128 bpm, PA 84×50 mmHg, sudorética, com abdome doloroso difusamente e dificuldade para palpar a apresentação fetal. A contratilidade uterina tornou-se ausente e a ausculta fetal revela BCF 80 bpm. Considerando o quadro, qual é o diagnóstico provável?","alternativas":[{"letra":"A","texto":"Vasa prévia rota, por sangramento fetal indolor, rupturas de membranas, bradicardia fetal marcada e estabilidade hemodinâmica materna nas fases iniciais."},{"letra":"B","texto":"Rotura uterina, por dor intensa súbita, instabilidade materna, parada da dinâmica uterina, bradicardia fetal e antecedente de cesariana prévia."},{"letra":"C","texto":"Placenta prévia, por sangramento vermelho vivo indolor, útero relaxado, vitalidade fetal preservada e associação com início espontâneo de trabalho de parto."},{"letra":"D","texto":"Descolamento prematuro de placenta, por dor abdominal progressiva, hipertonia uterina sustentada, sangramento evidente e sofrimento fetal com taquicardia inicial."}],"correta":"B","resposta":"Justificativa resumida Alternativa Justificativa Rotura uterina, por dor intensa súbita, instabilidade materna, parada da dinâmica uterina, bradicardia fetal e antecedente de cesariana prévia — Correta Dor súbita intensa, instabilidade materna, parada das contrações, bradicardia fetal, cicatriz uterina → quadro clássico de rotura uterina Descolamento prematuro de placenta, por dor abdominal progressiva, hipertonia uterina sustentada, sangramento evidente e sofrimento fetal com taquicardia inicial. — Incorreta DPP tem hipertonia uterina, dor contínua e sangramento; aqui há perda de tônus e palpação fetal difícil Placenta prévia, por sangramento vermelho vivo indolor, útero relaxado, vitalidade fetal preservada e associação com início espontâneo de trabalho de parto. — Incorreta Placenta prévia cursa com sangramento indolor, útero relaxado e vitalidade fetal preservada Vasa prévia rota, por sangramento fetal indolor, rupturas de membranas, bradicardia fetal marcada e estabilidade hemodinâmica materna nas fases iniciais. — Incorreta Vasa prévia → sangramento fetal, estabilidade materna inicial, bradicardia fetal após amniorrexe — não é o caso","needs_distractors":false},{"year":"2025.2","qnum":15,"enunciado":"(AFYA PALMAS) Homem, 55 anos, chega à emergência com dor abdominal intensa no quadrante superior direito há 12 horas, febre de 38,5°C e icterícia há 24 horas. Relata colúria e episódios de calafrios. Tem histórico de cálculos biliares, sem acompanhamento médico recente. Ao exame, está ictérico e com dor à palpação no quadrante superior direito. Sinal de Murphy positivo. Exames laboratoriais mostram leucocitose de 18.000/mm³, bilirrubina total de 6 mg/dL (predomínio de direta) e fosfatase alcalina elevada. Qual o primeiro exame de imagem seria indicado para confirmar o diagnóstico de colangite nesse paciente?","alternativas":[{"letra":"A","texto":"Ultrassonografia abdominal para avaliar dilatação da via biliar e presença de cálculos."},{"letra":"B","texto":"Colangiopancreatografia retrógrada endoscópica (CPRE) como exame diagnóstico inicial."},{"letra":"C","texto":"Colangiopancreatografia por ressonância magnética (CPRM) para detalhar a anatomia biliar."},{"letra":"D","texto":"Tomografia computadorizada de abdome para identificar cálculos biliares e obstrução biliar."}],"correta":"A","resposta":"CORRETA:\\n\\nA ultrassonografia abdominal é o exame inicial de escolha para pacientes com suspeita de colangite, pois permite avaliar a presença de cálculos e a dilatação das vias biliares. É não invasiva, de fácil acesso e eficaz no diagnóstico inicial.\\n\\nINCORRETAS:\\n\\nA CPRM é útil em casos onde a ultrassonografia não é conclusiva ou há dúvida sobre a anatomia biliar, mas não é o exame de escolha inicial. A tomografia computadorizada pode identificar cálculos ou outras causas de obstrução, mas tem menor sensibilidade que a ultrassonografia para cálculos biliares. A CPRE é preferencialmente usada para tratamento (desobstrução), sendo invasiva e associada a complicações; por isso, não é o exame diagnóstico inicial.","needs_distractors":false},{"year":"2025.2","qnum":16,"enunciado":"(UNIGRANRIO BARRA) Um homem de 33 anos, médico residente, é levado à UPA por colegas após ser encontrado trancado em seu quarto, desacordado, com frascos vazios de clonazepam e etanol ao lado. Após estabilização clínica, desperta confuso, negando intenção suicida: “Foi só uma tentativa de dormir, eu não queria morrer”. Relata fadiga constante, culpa por erros profissionais, isolamento social, insônia, anedonia e ideação de morte frequente nas últimas semanas, embora afirme “não ter coragem de se matar”. Nega sintomas psicóticos. Refere histórico de episódio depressivo maior há três anos, tratado com venlafaxina, com abandono do tratamento há 6 meses. Seu pai cometeu suicídio aos 52 anos. Relata uso abusivo recente de benzodiazepínicos e álcool, iniciado após término de relacionamento. No exame mental, apresenta: humor deprimido, afeto restrito, lentificação psicomotora; discurso coerente, mas permeado por desesperança (“nada vai mudar”); juízo crítico parcialmente preservado; insight parcial (“acho que não estou bem, mas não sei se quero ajuda”). A mãe, presente, afirma que o filho “sempre foi perfeccionista, reservado e trabalha demais”. O serviço de emergência debate a necessidade de internação. Com base nos critérios do DSM-5 e nas diretrizes do Ministério da Saúde, assinale a alternativa que descreve, de forma mais completa e fundamentada, os principais fatores de risco para o suicídio neste paciente.","alternativas":[{"letra":"A","texto":"Sexo masculino, insight preservado, adesão parcial ao tratamento e suporte familiar presente, sem sintomas psicóticos."},{"letra":"B","texto":"Uso de benzodiazepínicos e álcool, religiosidade incipiente, ausência de delírios e personalidade reservada, sem histórico familiar de suicídio."},{"letra":"C","texto":"Sexo masculino, médico, isolamento social, desesperança, uso abusivo de substâncias, histórico familiar de suicídio e abandono de tratamento antidepressivo."},{"letra":"D","texto":"Transtorno depressivo maior, suporte familiar, presença de culpa e arrependimento após tentativa e capacidade crítica preservada."}],"correta":"C","resposta":"Este caso apresenta um perfil de risco suicida alto e multifatorial, cuja complexidade exige análise de dimensões biológicas, psicológicas e sociais. Os principais fatores de risco identificados são:\\n\\n1. Fatores demográficos e socioculturais • Sexo masculino: maior letalidade e menor probabilidade de buscar ajuda.\\n\\n• Alta escolaridade e profissão médica: acesso facilitado a meios letais e alto nível de estresse ocupacional.\\n\\n2. Fatores clínicos e psiquiátricos • Transtorno depressivo maior, com anedonia e desesperança (marcadores psicológicos de risco).\\n\\n• Histórico familiar de suicídio: herança genética e modelagem comportamental aumentam vulnerabilidade.\\n\\n• Uso abusivo de substâncias (álcool e benzodiazepínicos): eleva a impulsividade, reduz o julgamento e potencializa a letalidade.\\n\\n• Abandono de tratamento antidepressivo: perda do efeito protetor farmacológico e desregulação serotonérgica.\\n\\n• Tentativa prévia (intoxicação voluntária): melhor preditor de suicídio consumado.\\n\\n3. Fatores psicológicos e de personalidade • Perfeccionismo e autocrítica: associados a maior risco entre profissionais de saúde.\\n\\n• Desesperança cognitiva: preditor independente de suicídio.\\n\\n• Isolamento social e perda afetiva recente: eventos precipitantes críticos.\\n\\n4. Fatores ambientais • Acesso a meios letais (medicação controlada): aumenta risco de tentativa letal. Por que as demais alternativas estão incorretas:\\n\\n• Insight e suporte familiar são fatores de proteção, não de risco.\\n\\n• A alternativa omite fatores de risco decisivos (histórico familiar, desesperança, perfeccionismo).\\n\\n• A culpa e o arrependimento pós-tentativa não reduzem o risco imediato, e o suporte familiar isolado não neutraliza múltiplos fatores de alto risco.","needs_distractors":false},{"year":"2025.2","qnum":17,"enunciado":"(FACIMPA) Um idoso de 68 anos, portador de hanseníase multibacilar em tratamento regular com rifampicina, dapsona e clofazimina, comparece à UBS relatando cansaço e palidez há duas semanas. Refere boa adesão medicamentosa e dieta pouco variada. Ao exame físico: mucosas hipocoradas, sem icterícia, sem esplenomegalia. O hemograma revelou:\\n\\nParâmetro Resultado Valores de referência Hemoglobina 9,2 g/dL 13–17 g/dL Hematócrito 28% 40–50% VCM 110 fL 80–96 fL Leucócitos 6.800 /mm³ 4.000–10.000 Plaquetas 220.000 /mm³ 150.000–450.000 Com base no quadro clínico e nos achados laboratoriais, qual deve ser a conduta mais adequada para este paciente na Atenção Primária à Saúde?","alternativas":[{"letra":"A","texto":"Interromper todo o tratamento da hanseníase e encaminhar o paciente para unidade hospitalar de urgência."},{"letra":"B","texto":"Manter o esquema poliquimioterápico e investigar anemia megaloblástica associada ao uso de dapsona, com suplementação de ácido fólico."},{"letra":"C","texto":"Iniciar transfusão sanguínea imediata e suspender rifampicina, considerando anemia hemolítica induzida por fármaco."},{"letra":"D","texto":"Suspender imediatamente a dapsona e iniciar reposição de ferro oral por suspeita de anemia ferropriva secundária à dieta pobre em ferro."}],"correta":"B","resposta":"Incorreta. A anemia ferropriva é microcítica e hipocrômica, enquanto o hemograma mostra macrocitose (VCM elevado). Correta. A dapsona pode causar hemólise leve e induzir anemia megaloblástica por deficiência de folato. O manejo na APS inclui investigar causas nutricionais e suplementar ácido fólico (5 mg/dia), mantendo a poliquimioterapia supervisionada. Incorreta. Não há critérios de urgência nem indicação para suspender o tratamento da hanseníase. Incorreta. A transfusão não é indicada neste contexto; a anemia é leve/moderada e requer abordagem ambulatorial.","needs_distractors":false},{"year":"2025.2","qnum":18,"enunciado":"(AFYA ITABUNA) Uma gestante de 20 semanas, atendida na UBS, apresenta sorologia positiva para toxoplasmose com IgM positivo e IgG positivo; realizou também teste de avidez com resultado compatível com baixa avidez. A ultrassonografia obstétrica não mostrou alterações fetais. Segundo as diretrizes atuais, qual o plano terapêutico mais adequado para essa paciente?","alternativas":[{"letra":"A","texto":"Iniciar imediatamente o esquema com espiramicina 500 mg via oral, de 8/8 h, até o final da gestação."},{"letra":"B","texto":"Suspender a investigação, pois a presença de IgG indica imunidade e ausência de risco fetal."},{"letra":"C","texto":"Aguardar novo teste sorológico em 3 semanas para confirmar infecção ativa antes de iniciar tratamento."},{"letra":"D","texto":"Iniciar tratamento com sulfadiazina, pirimetamina e ácido folínico, independentemente da avaliação fetal."}],"correta":"A","resposta":"Em caso de infecção aguda confirmada por IgM positivo + IgG com baixa avidez, o tratamento deve ser iniciado imediatamente com espiramicina, pois:\\n\\nA espiramicina reduz o risco de transmissão placentária do Toxoplasma gondii . O tratamento com sulfadiazina, pirimetamina e ácido folínico é reservado para casos em que a infecção fetal for confirmada por PCR positivo no líquido amniótico ou sinais sugestivos na ultrassonografia. Não se deve aguardar nova sorologia para iniciar o tratamento após confirmação laboratorial da infecção aguda. A presença de IgG com IgM positivo e baixa avidez indica infecção recente, com risco para o feto.","needs_distractors":false},{"year":"2025.2","qnum":19,"enunciado":"(UNIREDENTOR) Um paciente de 74 anos comparece ao ambulatório de clínica médica para avaliação de função renal. Refere hipertensão arterial há 15 anos, em uso irregular de anti-hipertensivos. Nega diabetes. Apresenta creatinina sérica de 1,9 mg/dL, taxa de filtração glomerular estimada (TFGe) de 42 mL/min/1,73 m² e albuminúria de 250 mg/g. Com base nas diretrizes atuais da KDIGO, como deve ser classificada a DRC deste paciente?","alternativas":[{"letra":"A","texto":"Estágio G3aA2 – DRC moderada, com albuminúria moderada."},{"letra":"B","texto":"Estágio G2A3 – DRC leve, com proteinúria nefrótica."},{"letra":"C","texto":"Estágio G1A2 – DRC leve, sem repercussão clínica."},{"letra":"D","texto":"Estágio G4A1 – DRC grave, sem albuminúria."}],"correta":"A","resposta":"- “Estágio G1A2 – DRC leve, sem repercussão clínica”. Incorreta – TFGe < 60 mL/min/1,73 m² exclui o estágio G1; além disso, a albuminúria está aumentada.\\n\\n- “Estágio G2A3 – DRC leve, com proteinúria nefrótica”. Incorreta – A albuminúria é moderada (A2: 30–300 mg/g), e não nefrótica (>300 mg/g).\\n\\n- “Estágio G3aA2 – DRC moderada, com albuminúria moderada”. Correta – TFGe entre 45– 59 mL/min/1,73 m² → G3a; albuminúria entre 30–300 mg/g → A2. Portanto, DRC estágio G3aA2, considerada moderada.\\n\\n- “Estágio G4A1 – DRC grave, sem albuminúria.” Incorreta – TFGe não corresponde ao estágio G4 (<30 mL/min/1,73 m²), e o paciente apresenta albuminúria significativa.","needs_distractors":false},{"year":"2025.2","qnum":20,"enunciado":"(UNISL PORTO VELHO) Um homem de 25 anos é atendido na UPA após uma tentativa de suicídio. Ele apresenta sintomas de síndrome depressiva, incluindo humor deprimido, anedonia, fadiga e dificuldade de concentração. Durante a avaliação, o paciente relata sentir-se desesperançado e afirma que acredita que sua vida não tem mais sentido. Ele menciona também a perda recente de um emprego e o término de um relacionamento. A equipe de saúde mental está avaliando a necessidade de internação e intervenções de tratamento. Considerando o quadro clínico apresentado, qual dos seguintes aspectos éticos e legais deve ser prioritariamente abordado pela equipe de saúde ao lidar com o paciente?","alternativas":[{"letra":"A","texto":"Respeito à autonomia do paciente em decidir sobre a implementação do tratamento, mesmo que ele esteja em crise durante avaliação."},{"letra":"B","texto":"A importância de assegurar que o paciente não tenha acesso a meios de suicídio, como medicamentos ou objetos cortantes."},{"letra":"C","texto":"A obrigatoriedade de notificar a família do paciente sobre sua condição imediatamente, independentemente do consentimento."},{"letra":"D","texto":"A necessidade de avaliar o risco de suicídio e a possibilidade de internação involuntária se o paciente estiver em perigo iminente."}],"correta":"D","resposta":"Resposta correta:\\n\\nA necessidade de avaliar o risco de suicídio e a possibilidade de internação involuntária se o paciente estiver em perigo iminente.\\n\\nJustificativa:\\n\\nRespeito à autonomia do paciente em decidir sobre a implementação do tratamento, mesmo que ele esteja em crise durante avaliação. - Incorreta Embora a autonomia seja um princípio importante, em situações de crise, pode ser necessário limitar essa autonomia para proteger a vida do paciente. A obrigatoriedade de notificar a família do paciente sobre sua condição imediatamente, independentemente do consentimento - Incorreta A notificação da família deve considerar o consentimento do paciente, especialmente em situações sensíveis. A necessidade de avaliar o risco de suicídio e a possibilidade de internação involuntária se o paciente estiver em perigo iminente - Correta Avaliar o risco de suicídio e considerar a internação involuntária são ações essenciais para garantir a segurança do paciente em situações de emergência. A necessidade de realizar uma avaliação neurológica completa para descartar condições que possam contribuir para os sintomas apresentados - Incorreta Embora uma avaliação neurológica possa ser relevante em alguns casos, a prioridade imediata deve ser a avaliação do risco de suicídio e a segurança do paciente.","needs_distractors":false},{"year":"2025.2","qnum":22,"enunciado":"(FACIMPA) P. M. N., 15 anos, sexo feminino, comparece à Unidade Básica de Saúde acompanhada pela mãe, relatando “fraqueza” súbita no membro inferior esquerdo há 24 horas, que a impede de caminhar desde o episódio. Refere que, na manhã anterior, teve uma discussão intensa com colegas na escola e sentiu-se muito ansiosa. Ao exame físico:\\n\\npaciente consciente, orientada, sem déficit de fala ou envolvimento facial; marcha impossível
